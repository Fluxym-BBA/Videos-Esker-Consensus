trEN:"<p><b>[00:01]</b> One of the most common challenges we see our prospective customers face is the lack of a purchasing workflow that is both structured enough to maintain compliance, but also dynamic enough to ensure the right approvers are automatically inserted into the approval process.</p><p><b>[00:15]</b> Esker's procurement module helps solve this problem with the ability to create dynamic workflow rules configured to meet company policy requirements. Let's take a look at how a workflow can automatically update based on pre-configured rules and also auto-generate purchase orders.</p><p><b>[00:30]</b> In this example you'll see I've already added one item to my requisition for a laptop. Now based on my company's policy, this requisition requires the approval of my manager Kate before going to our buyers team to create and release the purchase order.</p><p><b>[00:44]</b> Now, if I increase the quantity of my request, simultaneously increasing the total spend, Kate's manager is now added to the workflow automatically as the amount has exceeded her authorization limits. This ensures a tightly controlled and auditable process that is flexible enough to meet the requirements set by my organization.</p><p><b>[01:03]</b> Another element of the workflow process that aids in the streamlining and controlling of purchase orders is the ability to have Esker automatically create a PO following requisition approval.</p><p><b>[01:12]</b> In this example, I've selected a new item which, based on the rule configuration, only requires managerial approval before returning to me for the creation of the purchase order. When I click Submit for approval, I'm given the option of auto PO creation and transmission to the supplier to easily complete the entire purchasing process in a quick and efficient manner.</p><p><b>[01:33]</b> By leveraging Esker's built-in workflow capabilities, organizations have found how easy it is to enforce even the most complex approval processes in an effort to reduce their rogue spending.</p><p><b>[01:44]</b> Controlling cost is an important part of the Source-to-Pay process, and Esker's procurement module has helped countless organizations meet these initiatives.</p>",
trFR:"<p><b>[00:01]</b> L'un des défis les plus courants que rencontrent nos prospects est l'absence d'un workflow d'achat à la fois suffisamment structuré pour garantir la conformité, mais aussi suffisamment dynamique pour que les bons approbateurs soient automatiquement intégrés au processus d'approbation.</p><p><b>[00:15]</b> Le module d'approvisionnement d'Esker résout ce problème grâce à la possibilité de créer des règles de workflow dynamiques configurées pour répondre aux exigences de la politique d'entreprise. Voyons comment un workflow peut se mettre à jour automatiquement selon des règles préconfigurées et également générer automatiquement des commandes d'achat.</p><p><b>[00:30]</b> Dans cet exemple, vous verrez que j'ai déjà ajouté un article à ma demande d'achat pour un ordinateur portable. Selon la politique de mon entreprise, cette demande nécessite l'approbation de ma responsable Kate avant d'être transmise à l'équipe acheteurs pour créer et émettre la commande.</p><p><b>[00:44]</b> Maintenant, si j'augmente la quantité de ma demande, augmentant simultanément le montant total, le responsable de Kate est automatiquement ajouté au workflow car le montant a dépassé ses limites d'autorisation. Cela garantit un processus rigoureusement contrôlé et auditable, suffisamment flexible pour répondre aux exigences de mon organisation.</p><p><b>[01:03]</b> Un autre élément du workflow qui contribue à la rationalisation et au contrôle des commandes d'achat est la possibilité de faire créer automatiquement une commande par Esker après l'approbation de la demande.</p><p><b>[01:12]</b> Dans cet exemple, j'ai sélectionné un nouvel article qui, selon la configuration des règles, ne nécessite que l'approbation de mon responsable avant de me revenir pour la création de la commande. Lorsque je clique sur Soumettre pour approbation, j'ai l'option de la création automatique de la commande et de sa transmission au fournisseur, pour finaliser facilement l'ensemble du processus d'achat de manière rapide et efficace.</p><p><b>[01:33]</b> En tirant parti des fonctionnalités de workflow intégrées d'Esker, les organisations ont découvert à quel point il est facile d'appliquer même les processus d'approbation les plus complexes pour réduire leurs dépenses non conformes.</p><p><b>[01:44]</b> Le contrôle des coûts est un élément essentiel du processus Source-to-Pay, et le module d'approvisionnement d'Esker a aidé d'innombrables organisations à atteindre ces objectifs.</p>"},

  {f:"5 - Purchase Requisition Review",t:"Purchase Requisition Review",sz:"24.6",
trEN:"<p><b>[00:00]</b> Reviewing and approving requisitions is a critical step in the purchasing process. Esker's Procurement module provides approvers with visibility into all the details associated with the requisition and an easy-to-use interface.</p><p><b>[00:12]</b> This helps ensure delays and lost requisitions are no longer a concern due to a manual or antiquated process. Let's take a look at the approval step now.</p><p><b>[00:21]</b> Here is a list of all requisitions this user needs to review. After selecting one, I'm presented with the details of that requisition, including who the requester is, delivery information, and essential data on the item itself.</p><p><b>[00:34]</b> By expanding this pane, I can see key accounting elements such as GL Account, Cost Center, and Cost Type, along with budget info. If configured, I may also have the ability to modify these elements based on my permission level.</p><p><b>[00:48]</b> A check mark on the vendor name tells me that this is a registered vendor who has already been approved by the onboarding team. If attachments or comments from previous users in the workflow have been added, they can also be viewed here.</p><p><b>[01:00]</b> Now that I've reviewed the requisition, I can simply approve if everything appears to be in order — or maybe reject the requisition or send it back to the requester if more details are needed.</p><p><b>[01:11]</b> Alternatively, if I've downloaded the Esker Anywhere mobile app, I could also view the same requisition and approve it on the go.</p><p><b>[01:18]</b> Organizations depend on their procurement team to be able to make informed decisions on purchase requests in a timely manner. As we've seen, Esker's easy-to-use interface ensures all of the key details are immediately visible and accounted for.</p>",
trFR:"<p><b>[00:00]</b> La revue et l'approbation des demandes d'achat est une étape critique du processus d'achat. Le module d'approvisionnement d'Esker offre aux approbateurs une visibilité sur tous les détails associés à la demande et une interface facile à utiliser.</p><p><b>[00:12]</b> Cela permet de s'assurer que les retards et les demandes perdues ne sont plus un sujet de préoccupation grâce à l'abandon des processus manuels ou obsolètes. Examinons maintenant l'étape d'approbation.</p><p><b>[00:21]</b> Voici la liste de toutes les demandes que cet utilisateur doit examiner. Après en avoir sélectionné une, je visualise les détails de cette demande, notamment l'identité du demandeur, les informations de livraison et les données essentielles sur l'article lui-même.</p><p><b>[00:34]</b> En développant ce volet, je peux voir les éléments comptables clés tels que le compte GL, le centre de coûts et le type de coût, ainsi que les informations budgétaires. Si configuré, je peux également avoir la possibilité de modifier ces éléments selon mon niveau d'autorisation.</p><p><b>[00:48]</b> Une coche sur le nom du fournisseur m'indique qu'il s'agit d'un fournisseur enregistré qui a déjà été approuvé par l'équipe d'intégration. Si des pièces jointes ou des commentaires d'utilisateurs précédents dans le workflow ont été ajoutés, ils sont également consultables ici.</p><p><b>[01:00]</b> Maintenant que j'ai examiné la demande, je peux simplement l'approuver si tout semble en ordre — ou la rejeter, ou la renvoyer au demandeur si des détails supplémentaires sont nécessaires.</p><p><b>[01:11]</b> Alternativement, si j'ai téléchargé l'application mobile Esker Anywhere, je peux aussi consulter la même demande et l'approuver en déplacement.</p><p><b>[01:18]</b> Les organisations comptent sur leur équipe achats pour prendre des décisions éclairées sur les demandes d'achat dans les meilleurs délais. Comme nous l'avons vu, l'interface intuitive d'Esker garantit que tous les détails clés sont immédiatement visibles et pris en compte.</p>"},

  {f:"6 - Purchase Order Creation",t:"Purchase Order Creation",sz:"28.8",
trEN:"<p><b>[00:01]</b> Creating purchase orders through cumbersome ERP screens with multiple steps and data entry can increase the risk of miskeying information, leading to potential issues downstream.</p><p><b>[00:11]</b> With Esker's procurement module, approved requisitions can be converted to purchase orders quickly and accurately by a dedicated buyer or shared amongst a team of buyers. In this video, we'll see how a buyer can quickly and accurately create a purchase order from an approved requisition.</p><p><b>[00:28]</b> As a buyer, I have immediate visibility into all items in my queue that require a created PO. Here, I have the ability to select which requisition items I want to include in my purchase order. You can also combine items from different requisitions from the same vendor to help save on shipping costs.</p><p><b>[00:45]</b> This next screen shows all of the pertinent information required to complete the PO process. Here I can view delivery information, confirm or register the vendor fulfilling the order, create an advance payment request, and confirm the transmission method along with adding specific comments.</p><p><b>[01:03]</b> Most importantly, I also see the critical item details and can review the requisition through the embedded link if needed. If everything looks OK, I could preview a copy of the PO or simply submit the order to the supplier.</p><p><b>[01:17]</b> As we've just seen, Esker's Procurement module enables the PO creation process to be completed accurately and efficiently, giving buyers the flexibility in how their purchase orders are created and ensuring a high adoption rate and end user satisfaction.</p>",
trFR:"<p><b>[00:01]</b> Créer des commandes d'achat via des écrans ERP fastidieux avec de multiples étapes et saisies manuelles peut augmenter le risque d'erreurs de saisie, entraînant des problèmes potentiels en aval.</p><p><b>[00:11]</b> Avec le module d'approvisionnement d'Esker, les demandes approuvées peuvent être converties en commandes d'achat rapidement et précisément par un acheteur dédié ou partagées au sein d'une équipe d'acheteurs. Dans cette vidéo, nous verrons comment un acheteur peut créer rapidement et précisément une commande à partir d'une demande approuvée.</p><p><b>[00:28]</b> En tant qu'acheteur, j'ai une visibilité immédiate sur tous les articles de ma file d'attente nécessitant une commande. Ici, j'ai la possibilité de sélectionner les articles de demande que je souhaite inclure dans ma commande. Je peux également combiner des articles de différentes demandes du même fournisseur pour économiser sur les frais d'expédition.</p><p><b>[00:45]</b> Cet écran suivant affiche toutes les informations pertinentes nécessaires pour finaliser le processus de commande. Ici je peux consulter les informations de livraison, confirmer ou enregistrer le fournisseur exécutant la commande, créer une demande d'acompte, et confirmer le mode de transmission ainsi qu'ajouter des commentaires spécifiques.</p><p><b>[01:03]</b> Plus important encore, je vois aussi les détails critiques des articles et je peux consulter la demande via le lien intégré si nécessaire. Si tout est en ordre, je peux prévisualiser une copie de la commande ou simplement la soumettre au fournisseur.</p><p><b>[01:17]</b> Comme nous venons de le voir, le module d'approvisionnement d'Esker permet de finaliser le processus de création de commande de manière précise et efficace, offrant aux acheteurs la flexibilité dans la manière dont leurs commandes sont créées et garantissant un taux d'adoption élevé et la satisfaction des utilisateurs.</p>"},

  {f:"7 - Goods Receipt Creation",t:"Goods Receipt Creation",sz:"23.5",
trEN:"<p><b>[00:01]</b> After the requisition and purchase order phases, the creation of the goods receipt is the critical final step in the procurement process. An accurate and timely goods receipt can help automate the downstream processes of reconciliation and approval in Accounts Payable.</p><p><b>[00:16]</b> Let's take a look at how Esker's procurement module facilitates this. Here's a queue that shows items pending delivery.</p><p><b>[00:23]</b> Selecting one of these items provides full visibility into all information and activity relevant to the purchase order. I can also see all previously received items and could click the associated hyperlinks to see the details for that delivery.</p><p><b>[00:37]</b> Clicking New Receipt allows me to enter in the delivery information. This may include items like a packing slip number or even adding an image of the packing slip itself.</p><p><b>[00:48]</b> From here I just check the box of the item and either enter the received quantity or allow Esker to auto-fill the number if all remaining items have arrived. This feature can save a huge amount of time when large orders come in.</p><p><b>[01:01]</b> Clicking Confirm Receipt will save my progress and allow for the three-way match process to occur.</p><p><b>[01:07]</b> The receiving of goods is an essential part of the purchasing process that, without tight controls in place, can affect an organization's financial well-being. Esker's platform ensures that all of the phases of the procurement process are seamlessly integrated with one another for complete control and visibility.</p>",
trFR:"<p><b>[00:01]</b> Après les phases de demande d'achat et de commande, la création du bon de réception est l'étape finale critique du processus d'approvisionnement. Un bon de réception précis et ponctuel peut aider à automatiser les processus aval de rapprochement et d'approbation en Comptabilité Fournisseurs.</p><p><b>[00:16]</b> Voyons comment le module d'approvisionnement d'Esker facilite cette étape. Voici une file d'attente qui affiche les articles en attente de livraison.</p><p><b>[00:23]</b> Sélectionner l'un de ces articles offre une visibilité complète sur toutes les informations et activités liées à la commande d'achat. Je peux aussi voir tous les articles précédemment réceptionnés et cliquer sur les liens associés pour voir les détails de chaque livraison.</p><p><b>[00:37]</b> Cliquer sur Nouvelle Réception me permet de saisir les informations de livraison. Cela peut inclure des éléments comme un numéro de bon de livraison ou même l'ajout d'une image du bon de livraison lui-même.</p><p><b>[00:48]</b> De là, je coche simplement la case de l'article et je saisis la quantité reçue, ou je laisse Esker remplir automatiquement le nombre si tous les articles restants sont arrivés. Cette fonctionnalité permet de gagner un temps considérable lors de la réception de commandes volumineuses.</p><p><b>[01:01]</b> Cliquer sur Confirmer la Réception enregistrera ma progression et permettra le processus de rapprochement à trois voies.</p><p><b>[01:07]</b> La réception des marchandises est une partie essentielle du processus d'achat qui, sans contrôles rigoureux, peut affecter la santé financière d'une organisation. La plateforme Esker garantit que toutes les phases du processus d'approvisionnement sont parfaitement intégrées les unes aux autres pour un contrôle et une visibilité complets.</p>"},

  {f:"8 - Project-based Procurement",t:"Project-based Procurement",sz:"34.3",
trEN:"<p><b>[00:01]</b> Organizations often find themselves managing internal projects that require extensive purchasing elements but have no way to keep the activity connected while simultaneously monitoring crucial spending metrics.</p><p><b>[00:13]</b> Esker's Procurement module has a feature-rich project component to connect all purchasing and sourcing events to maintain full visibility into project-based spend. Let's take a look at it now.</p><p><b>[00:25]</b> Creating a new project allows you to define criteria such as a project owner, project team members, and key thresholds such as allowable maximum spend.</p><p><b>[00:34]</b> Since this project is already in progress, I have immediate visibility into these indicators at the top of my screen, allowing me to click into any of them to see the details.</p><p><b>[00:45]</b> Over on the left side of my screen, I also have several menu options, all related to this project. I can see existing tasks or create new ones, review and create notifications along with various documents, and with integration into our sourcing module, I can also link sourcing events to this project, link contracts to the project spend, and view my ordered and invoiced items.</p><p><b>[01:09]</b> Last but certainly not least, I also get a real-time look into the spending against the project with a dashboard devoted to it, including status bars indicating the spend progress.</p><p><b>[01:20]</b> Many organizations struggle with the purchasing elements needed to support their projects. Esker's ability to centralize this activity and spend while providing full visibility into the purchasing process is an exciting element added to the already robust offering of the procurement module.</p>",
trFR:"<p><b>[00:01]</b> Les organisations se retrouvent souvent à gérer des projets internes nécessitant d'importants achats, sans avoir les moyens de garder ces activités connectées tout en surveillant simultanément les métriques de dépenses essentielles.</p><p><b>[00:13]</b> Le module d'approvisionnement d'Esker dispose d'un composant projet riche en fonctionnalités pour connecter tous les événements d'achat et de sourcing et maintenir une visibilité complète sur les dépenses liées aux projets. Voyons cela maintenant.</p><p><b>[00:25]</b> La création d'un nouveau projet permet de définir des critères tels que le responsable du projet, les membres de l'équipe projet et des seuils clés comme le montant maximum de dépenses autorisé.</p><p><b>[00:34]</b> Comme ce projet est déjà en cours, j'ai une visibilité immédiate sur ces indicateurs en haut de mon écran, me permettant de cliquer sur chacun d'eux pour voir les détails.</p><p><b>[00:45]</b> Sur le côté gauche de mon écran, j'ai aussi plusieurs options de menu, toutes liées à ce projet. Je peux voir les tâches existantes ou en créer de nouvelles, consulter et créer des notifications ainsi que divers documents, et grâce à l'intégration avec notre module de sourcing, je peux également lier des événements de sourcing à ce projet, lier des contrats aux dépenses du projet, et consulter mes articles commandés et facturés.</p><p><b>[01:09]</b> Enfin et surtout, j'ai aussi un aperçu en temps réel des dépenses par rapport au projet avec un tableau de bord dédié, incluant des barres de progression indiquant l'avancement des dépenses.</p><p><b>[01:20]</b> De nombreuses organisations peinent avec les aspects achats nécessaires au support de leurs projets. La capacité d'Esker à centraliser cette activité et ces dépenses tout en offrant une visibilité complète sur le processus d'achat est un atout passionnant qui s'ajoute à l'offre déjà robuste du module d'approvisionnement.</p>"},
]},
{id:"em",label:"Expense Management",suite:"S2P",icon:"🧾",folder:"Expense Management",videos:[
  {f:"1 - Expense Management Overview",t:"Expense Management Overview",sz:"52.3",
trEN:"<p><b>[00:01]</b> Let's have a look at Esker's Expense Management module, which is a part of its Source-to-Pay application. This solution helps you gain control over the expense logging process, granting visibility and spend management in an easy-to-use interface available both on the web and on a mobile app.</p><p><b>[00:18]</b> Users have the possibility to submit an expense by sending an email to the application, uploading a receipt in the web interface, or using our Esker Anywhere mobile application by simply taking a picture of the receipt.</p><p><b>[00:30]</b> When my receipt is entered, Esker starts building the expense. Esker uses its Synergy AI data extraction technology to read and understand what is on the receipt to extract the key information on the form.</p><p><b>[00:45]</b> Expense types can be configured on the platform to dictate the relevant fields and mandatory information that the user needs to provide for the expense to be valid.</p><p><b>[00:55]</b> For example, choosing Car Mileage would add a car type and distance fields to the form, while choosing Hotel would give me the opportunity to add itemization to that bill.</p><p><b>[01:07]</b> After adding all my expenses to the application, I can add them to an expense report that can then be submitted for approval. The Esker workflow engine is used here to help automate the process and make sure that the proper users are involved.</p><p><b>[01:24]</b> Now on the web application, as the approver, I can see on my dashboard if I have expense reports waiting to be submitted or approved, and if I need to approve some myself.</p><p><b>[01:34]</b> There's also a counter for credit card transactions, as my company card transactions can be pulled on a regular basis and linked to the appropriate users. These users can then use those transactions to add to existing expenses or to create new expenses as well.</p><p><b>[01:51]</b> Coding information such as the GL account or cost center can be automatically determined based on, for example, the expense type.</p><p><b>[02:00]</b> Once this expense report is approved and controlled, if there is a reimbursable amount, Esker will create a vendor invoice on the AP side of the solution. It is possible to set up an automatic approval on the AP side.</p><p><b>[02:13]</b> Now we have the possibility to review the coding information and approve it. Once the invoice is created, it is linked to the expense report as we can see here.</p><p><b>[02:24]</b> That concludes our overview of Esker's Expense Management module. Thank you for watching.</p>",
trFR:"<p><b>[00:01]</b> Découvrons le module de Gestion des Notes de Frais d'Esker, qui fait partie de son application Source-to-Pay. Cette solution vous aide à garder le contrôle sur le processus de saisie des dépenses, offrant visibilité et gestion des dépenses dans une interface facile à utiliser, disponible à la fois sur le web et sur une application mobile.</p><p><b>[00:18]</b> Les utilisateurs ont la possibilité de soumettre une dépense en envoyant un email à l'application, en téléchargeant un justificatif dans l'interface web, ou en utilisant notre application mobile Esker Anywhere en prenant simplement une photo du reçu.</p><p><b>[00:30]</b> Lorsque mon reçu est saisi, Esker commence à construire la dépense. Esker utilise sa technologie d'extraction de données Synergy AI pour lire et comprendre ce qui figure sur le reçu et en extraire les informations clés dans le formulaire.</p><p><b>[00:45]</b> Les types de dépenses peuvent être configurés sur la plateforme pour définir les champs pertinents et les informations obligatoires que l'utilisateur doit fournir pour que la dépense soit valide.</p><p><b>[00:55]</b> Par exemple, choisir Indemnités Kilométriques ajouterait un type de véhicule et des champs de distance au formulaire, tandis que choisir Hôtel me donnerait la possibilité d'ajouter une ventilation à cette facture.</p><p><b>[01:07]</b> Après avoir ajouté toutes mes dépenses à l'application, je peux les ajouter à une note de frais qui peut ensuite être soumise pour approbation. Le moteur de workflow d'Esker est utilisé ici pour automatiser le processus et s'assurer que les bons utilisateurs sont impliqués.</p><p><b>[01:24]</b> Maintenant, sur l'application web en tant qu'approbateur, je peux voir sur mon tableau de bord si j'ai des notes de frais en attente de soumission ou d'approbation, et si je dois moi-même en approuver.</p><p><b>[01:34]</b> Il y a aussi un compteur pour les transactions par carte bancaire, car les transactions de mes cartes entreprise peuvent être récupérées régulièrement et associées aux utilisateurs appropriés. Ces utilisateurs peuvent ensuite utiliser ces transactions pour les ajouter à des dépenses existantes ou en créer de nouvelles.</p><p><b>[01:51]</b> Les informations de codification comme le compte GL ou le centre de coûts peuvent être déterminées automatiquement en fonction, par exemple, du type de dépense.</p><p><b>[02:00]</b> Une fois cette note de frais approuvée et contrôlée, s'il y a un montant remboursable, Esker crée une facture fournisseur côté Comptabilité Fournisseurs. Il est possible de configurer une approbation automatique côté AP.</p><p><b>[02:13]</b> Nous avons maintenant la possibilité de vérifier les informations de codification et de les approuver. Une fois la facture créée, elle est liée à la note de frais comme nous pouvons le voir ici.</p><p><b>[02:24]</b> Voilà qui conclut notre aperçu du module de Gestion des Notes de Frais d'Esker. Merci d'avoir regardé.</p>"},

  {f:"2 - Creating Expenses in the Mobile App",t:"Creating Expenses in the Mobile App",sz:"29.4",
trEN:"<p><b>[00:01]</b> I am going to show you how you can log expenses using the mobile application with Esker's Expense Management module.</p><p><b>[00:08]</b> After I downloaded the Esker Anywhere application on my Apple or Android phone, I can log in and start creating expenses. I can use my phone's camera to take a picture of a receipt or browse my phone for a saved image or document.</p><p><b>[00:22]</b> I'm going to choose a photo that I saved on my phone and Esker is now going to use its AI technology to try to capture the data. From the receipt, we can see Esker is able to identify that this is a business meal and it extracted the vendor, the date and the amount.</p><p><b>[00:41]</b> I can double check that information was extracted correctly. Then I can submit the expense.</p><p><b>[00:47]</b> I am now shown all my expenses waiting to be submitted. I can now select them and create an expense report.</p><p><b>[00:57]</b> After verifying that information displayed on the report is correct, I can go ahead and submit it for approval.</p><p><b>[01:06]</b> My manager will now need to approve the report or send it back to me with a note mentioning what I need to change. Once the report has been approved, I will receive an email notification and this will be reflected on the application.</p><p><b>[01:22]</b> And this was how you can log expenses using the mobile application with Esker's Expense Management module.</p>",
trFR:"<p><b>[00:01]</b> Je vais vous montrer comment saisir des dépenses à l'aide de l'application mobile avec le module de Gestion des Notes de Frais d'Esker.</p><p><b>[00:08]</b> Après avoir téléchargé l'application Esker Anywhere sur mon téléphone Apple ou Android, je peux me connecter et commencer à créer des dépenses. Je peux utiliser l'appareil photo de mon téléphone pour prendre une photo d'un reçu ou parcourir mon téléphone pour trouver une image ou un document enregistré.</p><p><b>[00:22]</b> Je vais choisir une photo que j'ai sauvegardée sur mon téléphone et Esker va maintenant utiliser sa technologie d'IA pour tenter de capturer les données. À partir du reçu, nous pouvons voir qu'Esker est capable d'identifier qu'il s'agit d'un repas d'affaires et a extrait le fournisseur, la date et le montant.</p><p><b>[00:41]</b> Je peux vérifier que les informations ont été correctement extraites. Ensuite, je peux soumettre la dépense.</p><p><b>[00:47]</b> Je vois maintenant toutes mes dépenses en attente de soumission. Je peux les sélectionner et créer une note de frais.</p><p><b>[00:57]</b> Après avoir vérifié que les informations affichées sur la note sont correctes, je peux la soumettre pour approbation.</p><p><b>[01:06]</b> Mon responsable devra maintenant approuver la note ou me la renvoyer avec un commentaire indiquant ce que je dois modifier. Une fois la note approuvée, je recevrai une notification par email et cela sera reflété dans l'application.</p><p><b>[01:22]</b> Et voilà comment saisir des dépenses via l'application mobile avec le module de Gestion des Notes de Frais d'Esker.</p>"},

  {f:"3 - Defining requirements based on Expense Type",t:"Defining Requirements Based on Expense Type",sz:"18.7",
trEN:"<p><b>[00:00]</b> We are going to see how we can define requirements based on the expense type with Esker's Expense Management module.</p><p><b>[00:08]</b> When entering an expense, you can choose an expense type which will then drive which fields will appear on the form and need to be filled by the requester.</p><p><b>[00:17]</b> For example, choosing Business Meal can add a text field asking for the list of guests. This field can be configured to display a message of your choosing.</p><p><b>[00:26]</b> Changing the expense type to Mileage will change the fields that are displayed on the screen, and now the departure, destination, distance and vehicle type are mandatory. Each type can be configured in the application to have specific values available for the vehicle type.</p><p><b>[00:43]</b> The total amount would then be calculated with the formula set by an administrator and easy to configure.</p><p><b>[00:50]</b> Now let's see how an administrator can easily create and configure expense types in the application. It is possible to allow itemization, hide a field or display it, make it optional or required.</p><p><b>[01:03]</b> It is also possible to set the default GL account for this expense type to have consistent coding information from the creation of the expense to the processing of the invoice on the AP side of the solution.</p><p><b>[01:15]</b> And this is how you can define requirements based on the expense type.</p>",
trFR:"<p><b>[00:00]</b> Nous allons voir comment définir des exigences en fonction du type de dépense avec le module de Gestion des Notes de Frais d'Esker.</p><p><b>[00:08]</b> Lors de la saisie d'une dépense, vous pouvez choisir un type de dépense qui déterminera quels champs apparaîtront sur le formulaire et devront être remplis par le demandeur.</p><p><b>[00:17]</b> Par exemple, choisir Repas d'Affaires peut ajouter un champ texte demandant la liste des convives. Ce champ peut être configuré pour afficher un message de votre choix.</p><p><b>[00:26]</b> Changer le type de dépense en Indemnités Kilométriques modifiera les champs affichés à l'écran, et maintenant le départ, la destination, la distance et le type de véhicule sont obligatoires. Chaque type peut être configuré dans l'application pour proposer des valeurs spécifiques pour le type de véhicule.</p><p><b>[00:43]</b> Le montant total est alors calculé avec la formule définie par un administrateur, facile à configurer.</p><p><b>[00:50]</b> Voyons maintenant comment un administrateur peut facilement créer et configurer des types de dépenses dans l'application. Il est possible d'autoriser la ventilation, de masquer ou afficher un champ, de le rendre optionnel ou obligatoire.</p><p><b>[01:03]</b> Il est également possible de définir le compte GL par défaut pour ce type de dépense afin d'avoir une codification cohérente depuis la création de la dépense jusqu'au traitement de la facture côté Comptabilité Fournisseurs.</p><p><b>[01:15]</b> Et voilà comment définir des exigences en fonction du type de dépense.</p>"},

  {f:"4 - Itemizing Expenses",t:"Itemizing Expenses",sz:"15.2",
trEN:"<p><b>[00:00]</b> Let's see how we can itemize expenses using Esker's Expense Management module.</p><p><b>[00:06]</b> When choosing an expense type where itemization has been allowed by an administrator, such as Hotel for example, it is possible to add itemization to the expense.</p><p><b>[00:17]</b> When clicking on Add Itemization, I am shown a new form where I can choose the expense type and enter the details of this itemization.</p><p><b>[00:26]</b> I can leverage Esker's extraction capabilities to capture data on the document instead of manually keying it. For example, I can double click on the amount to capture it, and if I want to capture a long text I can simply draw an area on the document.</p><p><b>[00:42]</b> I can then either click on Add to finish, or Add & New to create a new itemization. I can repeat the operation, capturing data from the document for each item until the totality of the expense has been entered.</p><p><b>[00:56]</b> And this is how you can leverage Esker's Expense Management module to itemize expenses.</p>",
trFR:"<p><b>[00:00]</b> Voyons comment ventiler des dépenses avec le module de Gestion des Notes de Frais d'Esker.</p><p><b>[00:06]</b> Lorsqu'on choisit un type de dépense pour lequel la ventilation a été autorisée par un administrateur, comme Hôtel par exemple, il est possible d'ajouter une ventilation à la dépense.</p><p><b>[00:17]</b> En cliquant sur Ajouter une Ventilation, un nouveau formulaire s'affiche où je peux choisir le type de dépense et saisir les détails de cette ligne de ventilation.</p><p><b>[00:26]</b> Je peux tirer parti des capacités d'extraction d'Esker pour capturer les données sur le document plutôt que de les saisir manuellement. Par exemple, je peux double-cliquer sur le montant pour le capturer, et si je souhaite capturer un texte long, je peux simplement dessiner une zone sur le document.</p><p><b>[00:42]</b> Je peux ensuite cliquer sur Ajouter pour terminer, ou sur Ajouter et Nouveau pour créer une nouvelle ligne de ventilation. Je peux répéter l'opération en capturant les données du document pour chaque élément jusqu'à ce que la totalité de la dépense ait été saisie.</p><p><b>[00:56]</b> Et voilà comment tirer parti du module de Gestion des Notes de Frais d'Esker pour ventiler des dépenses.</p>"},

  {f:"5 - Expense Report Review & Control",t:"Expense Report Review & Control",sz:"22.8",
trEN:"<p><b>[00:00]</b> I am going to show you how you can review and control expense reports using Esker's Expense Management module.</p><p><b>[00:07]</b> As a requester, once I have entered a few expenses, I can submit them by creating an expense report. This expense report will show a summary of the individual expenses and an approval workflow will be created by Esker automatically.</p><p><b>[00:22]</b> I will submit this report which will send it to my manager Alice for approval.</p><p><b>[00:30]</b> Now I am connected as Alice the manager, and on my dashboard I can see the expense report waiting for my approval. I can open the list which will show me the key information about the reports, and I can start approving them.</p><p><b>[00:47]</b> I can double check the information on this report and then choose to approve the expense report that was submitted by the requester, or choose to send it back. This can also be done using Esker's mobile application Esker Anywhere.</p><p><b>[01:04]</b> Now, as an AP Specialist, I receive an email notification for each expense report I need to control. I can click on the link included in the email, which will take me directly to the report to control.</p><p><b>[01:16]</b> I can control the expense report that has been submitted by the requester, which will in turn create the related invoice on the AP side of the solution. If edits are needed, I can click on the Back to Requester button to send the expense report to the user who created it, and then type a comment to provide more detail.</p><p><b>[01:33]</b> And we've now seen how we can review and control expense reports using Esker's Expense Management module.</p>",
trFR:"<p><b>[00:00]</b> Je vais vous montrer comment vous pouvez examiner et contrôler les notes de frais avec le module de Gestion des Notes de Frais d'Esker.</p><p><b>[00:07]</b> En tant que demandeur, une fois que j'ai saisi quelques dépenses, je peux les soumettre en créant une note de frais. Cette note de frais affichera un récapitulatif des dépenses individuelles et un workflow d'approbation sera créé automatiquement par Esker.</p><p><b>[00:22]</b> Je vais soumettre cette note, ce qui l'enverra à ma responsable Alice pour approbation.</p><p><b>[00:30]</b> Maintenant je suis connecté en tant qu'Alice la responsable, et sur mon tableau de bord je peux voir la note de frais en attente de mon approbation. Je peux ouvrir la liste qui me montre les informations clés sur les notes et commencer à les approuver.</p><p><b>[00:47]</b> Je peux vérifier les informations de cette note puis choisir d'approuver la note de frais soumise par le demandeur, ou choisir de la renvoyer. Cela peut aussi être fait via l'application mobile Esker Anywhere.</p><p><b>[01:04]</b> Maintenant, en tant que Spécialiste AP, je reçois une notification email pour chaque note de frais que je dois contrôler. Je peux cliquer sur le lien inclus dans l'email, ce qui m'amène directement à la note à contrôler.</p><p><b>[01:16]</b> Je peux contrôler la note de frais soumise par le demandeur, ce qui créera en retour la facture associée côté Comptabilité Fournisseurs. Si des modifications sont nécessaires, je peux cliquer sur le bouton Renvoyer au Demandeur pour renvoyer la note à l'utilisateur qui l'a créée, puis taper un commentaire pour donner plus de détails.</p><p><b>[01:33]</b> Nous venons de voir comment examiner et contrôler les notes de frais avec le module de Gestion des Notes de Frais d'Esker.</p>"},

  {f:"6 - Company Card Transactions",t:"Company Card Transactions",sz:"19.6",
trEN:"<p><b>[00:00]</b> I am going to show you how you can import company card transactions with Esker's Expense Management module.</p><p><b>[00:06]</b> Company card transactions are automatically extracted from a bank statement submitted to Esker. They are assigned to users either automatically or, as we can see here, manually assigned by the administrator or the AP specialist.</p><p><b>[00:20]</b> Standard bank statement formats such as Amex, MasterCard and Visa are supported.</p><p><b>[00:27]</b> Requesters will see their company card transactions to validate in a specific tab where they can double check the transactions and specify if they correspond to a new expense — which will create a new expense with the information of the transaction — an already created expense, in which case the existing expense is updated with the information available in the transaction, or finally a personal expense, where a new expense is created.</p><p><b>[00:52]</b> When a transaction corresponds to an expense that was previously created, this expense is automatically associated with the transaction. The Merchant Category Code (MCC), when available in the transaction, is used to suggest expense types.</p><p><b>[01:07]</b> Once a requester approves the transaction, expenses are either created or updated using the data coming from the bank statement. The requester can then submit an expense report without needing to key any information.</p><p><b>[01:19]</b> And this is how you can import company card transactions using Esker's Expense Management module.</p>",
trFR:"<p><b>[00:00]</b> Je vais vous montrer comment importer des transactions de carte entreprise avec le module de Gestion des Notes de Frais d'Esker.</p><p><b>[00:06]</b> Les transactions de carte entreprise sont automatiquement extraites d'un relevé bancaire soumis à Esker. Elles sont assignées aux utilisateurs soit automatiquement, soit comme nous le voyons ici, manuellement par l'administrateur ou le spécialiste AP.</p><p><b>[00:20]</b> Les formats de relevés bancaires standards tels qu'Amex, MasterCard et Visa sont pris en charge.</p><p><b>[00:27]</b> Les demandeurs verront leurs transactions de carte entreprise à valider dans un onglet dédié où ils peuvent vérifier les transactions et indiquer si elles correspondent à une nouvelle dépense — ce qui créera une nouvelle dépense avec les informations de la transaction — une dépense déjà créée, auquel cas la dépense existante est mise à jour avec les informations de la transaction, ou enfin une dépense personnelle, où une nouvelle dépense est créée.</p><p><b>[00:52]</b> Lorsqu'une transaction correspond à une dépense précédemment créée, cette dépense est automatiquement associée à la transaction. Le code catégorie commerçant (MCC), lorsqu'il est disponible dans la transaction, est utilisé pour suggérer des types de dépenses.</p><p><b>[01:07]</b> Une fois que le demandeur approuve la transaction, les dépenses sont soit créées soit mises à jour avec les données provenant du relevé bancaire. Le demandeur peut ensuite soumettre une note de frais sans avoir à saisir aucune information.</p><p><b>[01:19]</b> Et voilà comment importer des transactions de carte entreprise avec le module de Gestion des Notes de Frais d'Esker.</p>"},

  {f:"7 - Delegating Expenses",t:"Delegating Expenses",sz:"14.1",
trEN:"<p><b>[00:00]</b> Let's see how you can delegate expenses using Esker's Expense Management module.</p><p><b>[00:05]</b> With this functionality, you can be allowed by an administrator to create expenses and expense reports on behalf of other users.</p><p><b>[00:13]</b> To create expenses on behalf of other users, I can proceed as usual, except that I need to select the user for which I want to create the expense in the \"Expense Made By\" field. I can then create the expense as I would do normally, and this can also be done using the mobile application Esker Anywhere in the exact same way.</p><p><b>[00:35]</b> On the Company Card Transaction tab, I can now see the transactions of all the users that were delegated to me. This will allow me to validate another user's company card transactions.</p><p><b>[00:45]</b> After Esker receives the bank statement, a new expense will then be created, or if an existing expense is matching the information from this transaction, it will be updated.</p><p><b>[00:57]</b> And that is how you can delegate expenses using Esker's Expense Management module.</p>",
trFR:"<p><b>[00:00]</b> Voyons comment déléguer des dépenses avec le module de Gestion des Notes de Frais d'Esker.</p><p><b>[00:05]</b> Avec cette fonctionnalité, vous pouvez être autorisé par un administrateur à créer des dépenses et des notes de frais au nom d'autres utilisateurs.</p><p><b>[00:13]</b> Pour créer des dépenses au nom d'autres utilisateurs, je procède comme d'habitude, sauf que je dois sélectionner l'utilisateur pour lequel je souhaite créer la dépense dans le champ « Dépense effectuée par ». Je peux ensuite créer la dépense normalement, et cela peut aussi être fait via l'application mobile Esker Anywhere de la même manière.</p><p><b>[00:35]</b> Dans l'onglet Transactions Carte Entreprise, je peux maintenant voir les transactions de tous les utilisateurs qui m'ont été délégués. Cela me permet de valider les transactions de carte entreprise d'un autre utilisateur.</p><p><b>[00:45]</b> Après réception du relevé bancaire par Esker, une nouvelle dépense sera créée, ou si une dépense existante correspond aux informations de cette transaction, elle sera mise à jour.</p><p><b>[00:57]</b> Et voilà comment déléguer des dépenses avec le module de Gestion des Notes de Frais d'Esker.</p>"},
]},
{id:"ctm",label:"Contract Management",suite:"S2P",icon:"📑",folder:"Contract Management",videos:[
  {f:"1 - Vendor Contract Management Overview",t:"Vendor Contract Management Overview",sz:"62.4",
trEN:"<p><b>[00:01]</b> In this video, we'll be taking a high level look at Esker's Vendor Contracts module, which is a part of our Source-to-Pay application. It helps serve as a tool to upload, approve and maintain your contracts, as well as integrate with business processes for Accounts Payable and Procurement.</p><p><b>[00:21]</b> Here's an example of a Contract Specialist dashboard which serves as the welcome screen of the module. It's where users are able to get a concise view into contract life cycle details and what actions may be needed from them. At a glance, you can easily view where contracts are sitting in the process and any related KPIs.</p><p><b>[00:43]</b> I've gone ahead and started the upload process for a new contract in my demo environment. Esker here makes this process really easy. Something we get a lot of positive feedback on are our extraction technologies, which can be utilized to help understand the information being presented on contracts and then to populate the relevant fields on the validation form here.</p><p><b>[01:08]</b> And getting that data extracted accurately is one thing. What we do with it next is just as important. Organizations attribute the increased level of visibility gained from using this solution as a big factor in their automation improvements.</p><p><b>[01:25]</b> Being able to do things like create relevant notifications based on contract trends is a prime example. Users are able to set themselves up for success and stay in the know as the contract life cycle progresses, so they don't have to continuously log in and manually check up on how the contract is progressing.</p><p><b>[01:45]</b> And thanks to automated workflow determination, users are able to increase their level of confidence that the documents making their way through the system are being delivered to the proper users or groups.</p><p><b>[01:58]</b> Over here we have an example of an active contract in my environment. Something unique to Esker's approach is that viewing an individual contract becomes a hub of information on how that particular contract relates to other business processes.</p><p><b>[02:16]</b> Of course, you can review the core details of the contract and its audit trail, but further than that, our clients appreciate the ability to have all of this additional data at their fingertips. They're able to quickly see how many orders and invoices have been received in relation to the contract. They can see which procurement catalog items are connected, as well as the capability to create and review AP invoice schedules.</p><p><b>[02:47]</b> That's all I wanted to cover in this video for a quick, high level look at the Esker Vendor Contracts module. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Dans cette vidéo, nous allons examiner à haut niveau le module de Contrats Fournisseurs d'Esker, qui fait partie de notre application Source-to-Pay. Il sert d'outil pour télécharger, approuver et maintenir vos contrats, ainsi que pour s'intégrer aux processus métier de Comptabilité Fournisseurs et d'Approvisionnement.</p><p><b>[00:21]</b> Voici un exemple de tableau de bord d'un Spécialiste Contrats, qui sert d'écran d'accueil du module. C'est là que les utilisateurs peuvent obtenir une vue synthétique du cycle de vie des contrats et des actions qui pourraient être nécessaires de leur part. D'un coup d'œil, vous pouvez facilement voir où en sont les contrats dans le processus et les KPIs associés.</p><p><b>[00:43]</b> J'ai démarré le processus de téléchargement d'un nouveau contrat dans mon environnement de démonstration. Esker rend ce processus vraiment simple. Ce qui nous vaut beaucoup de retours positifs, ce sont nos technologies d'extraction, qui peuvent être utilisées pour comprendre les informations présentées dans les contrats puis renseigner les champs pertinents du formulaire de validation ici.</p><p><b>[01:08]</b> Extraire ces données avec précision est une chose. Ce que nous en faisons ensuite est tout aussi important. Les organisations attribuent le niveau de visibilité accru obtenu grâce à cette solution comme un facteur majeur dans leurs améliorations d'automatisation.</p><p><b>[01:25]</b> Pouvoir créer des notifications pertinentes basées sur les tendances des contrats en est un parfait exemple. Les utilisateurs peuvent se préparer au succès et rester informés à mesure que le cycle de vie du contrat progresse, sans avoir à se connecter continuellement pour vérifier manuellement l'avancement du contrat.</p><p><b>[01:45]</b> Et grâce à la détermination automatisée du workflow, les utilisateurs ont davantage confiance dans le fait que les documents transitant par le système sont bien acheminés vers les bons utilisateurs ou groupes.</p><p><b>[01:58]</b> Voici un exemple de contrat actif dans mon environnement. Ce qui est unique dans l'approche d'Esker, c'est que la consultation d'un contrat individuel devient un hub d'information sur la façon dont ce contrat se rattache à d'autres processus métier.</p><p><b>[02:16]</b> Bien sûr, vous pouvez consulter les détails essentiels du contrat et sa piste d'audit, mais au-delà, nos clients apprécient la possibilité d'avoir toutes ces données supplémentaires à portée de main. Ils peuvent rapidement voir combien de commandes et factures ont été reçues en lien avec le contrat. Ils peuvent voir quels articles du catalogue d'approvisionnement sont connectés, ainsi que la capacité de créer et consulter des échéanciers de facturation AP.</p><p><b>[02:47]</b> Voilà ce que je souhaitais couvrir dans cette vidéo pour un aperçu rapide du module de Contrats Fournisseurs d'Esker. Merci d'avoir regardé.</p>"},

  {f:"2 - Uploading & Importing Contracts",t:"Uploading & Importing Contracts",sz:"38.9",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you how uploading a new contract into Esker works. Let's start out by uploading an individual contract from the dashboard.</p><p><b>[00:13]</b> What's happening now is our AI technology is running in the background to analyze the contract and extract, using our OCR technology, details that will pull into the relevant data elements on the left-hand side here.</p><p><b>[00:32]</b> So on the right we see the contract I uploaded, and on the left side is all of the data that Esker was able to intelligently extract from the contract using our OCR and AI technologies. You can see where we pulled that data from based on the green highlights.</p><p><b>[00:50]</b> You can also manually annotate the document if you want to call anything out in particular. On the document itself you'll see some of the standard data elements regarding the contract — contract term and vendor details are pre-filled.</p><p><b>[01:05]</b> The vendor information displayed is utilizing the same data we have stored from your ERP for use in Esker's AP module, so all the same vendors are available to Esker for correct recognition.</p><p><b>[01:22]</b> If you wanted to mass import contract information, you can do so via a CSV file import with these contract data elements for multiple contracts in one spreadsheet. You can also include the physical contract or any additional attachments on the import by including them in a zip folder with your CSV file when you do an SFTP file transfer.</p><p><b>[01:49]</b> You can work with your Esker team to learn more on how to do this. So this was an overview of how you can get contracts into the Esker system.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer comment fonctionne le téléchargement d'un nouveau contrat dans Esker. Commençons par télécharger un contrat individuel depuis le tableau de bord.</p><p><b>[00:13]</b> Ce qui se passe maintenant, c'est que notre technologie d'IA analyse le contrat en arrière-plan et extrait, grâce à notre technologie OCR, des détails qui vont alimenter les éléments de données pertinents sur le côté gauche ici.</p><p><b>[00:32]</b> À droite, nous voyons le contrat que j'ai téléchargé, et à gauche se trouvent toutes les données qu'Esker a pu extraire intelligemment du contrat grâce à nos technologies OCR et IA. Vous pouvez voir d'où proviennent ces données grâce aux surlignages verts.</p><p><b>[00:50]</b> Vous pouvez également annoter manuellement le document si vous souhaitez mettre en évidence un point particulier. Sur le document lui-même, vous verrez certains éléments de données standard concernant le contrat — les termes du contrat et les détails du fournisseur sont pré-remplis.</p><p><b>[01:05]</b> Les informations fournisseur affichées utilisent les mêmes données que nous avons stockées depuis votre ERP pour utilisation dans le module AP d'Esker, donc tous les mêmes fournisseurs sont disponibles pour une reconnaissance correcte.</p><p><b>[01:22]</b> Si vous souhaitez importer en masse des informations contractuelles, vous pouvez le faire via un import de fichier CSV contenant ces éléments de données pour plusieurs contrats dans une même feuille de calcul. Vous pouvez également inclure le contrat physique ou toute pièce jointe supplémentaire lors de l'import en les intégrant dans un dossier zip avec votre fichier CSV lors d'un transfert SFTP.</p><p><b>[01:49]</b> Vous pouvez travailler avec votre équipe Esker pour en savoir plus sur cette procédure. Voilà pour cet aperçu de la façon dont vous pouvez intégrer des contrats dans le système Esker.</p>"},

  {f:"3 - Contract Dashboard",t:"Contract Dashboard",sz:"27.5",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you what a contract looks like within Esker once it has been uploaded, approved, and goes live.</p><p><b>[00:10]</b> You might find it initially unexpected when you first open up an existing contract that you're not directed to the physical document itself, but Esker is actually creating an interface for the contract. That makes it really easy to zero in on the key points in the contract and makes it easy to see supporting data across Esker modules.</p><p><b>[00:33]</b> We can see right away some KPIs and graphs based on invoice and order data coming over from AP and Procurement.</p><p><b>[00:41]</b> The following tabs dig into specifics regarding the details, terms, and how those set a precedent for automation across other Esker modules. You can review the general information about the contract, the terms and any specific notifications you set up, the workflow that took place for the approval of the contract, a preview of the contract itself, any catalog items associated with the contract, any invoice schedules, and finally any orders and invoices associated with the contract.</p><p><b>[01:20]</b> This has been a look at existing contracts within Esker and the interface that you're presented with. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer à quoi ressemble un contrat dans Esker une fois qu'il a été téléchargé, approuvé et activé.</p><p><b>[00:10]</b> Vous pourriez trouver surprenant au premier abord qu'en ouvrant un contrat existant, vous ne soyez pas dirigé vers le document physique lui-même. En fait, Esker crée une interface pour le contrat. Cela rend vraiment facile l'identification des points clés du contrat et la consultation des données associées dans les autres modules Esker.</p><p><b>[00:33]</b> Nous pouvons voir immédiatement des KPIs et graphiques basés sur les données de factures et commandes provenant de la Comptabilité Fournisseurs et de l'Approvisionnement.</p><p><b>[00:41]</b> Les onglets suivants approfondissent les détails, les termes, et la façon dont ceux-ci servent de base à l'automatisation dans les autres modules Esker. Vous pouvez consulter les informations générales du contrat, les termes et les notifications spécifiques que vous avez configurées, le workflow d'approbation du contrat, un aperçu du contrat lui-même, les articles de catalogue associés au contrat, les échéanciers de facturation, et enfin les commandes et factures associées au contrat.</p><p><b>[01:20]</b> Voilà pour cet aperçu des contrats existants dans Esker et de l'interface qui vous est présentée. Merci d'avoir regardé.</p>"},

  {f:"4 - Notifications",t:"Notifications",sz:"22.1",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you how notifications can be created on contracts to alert you proactively about contract compliance and deadlines. You can set these up on an existing live contract or during the initial upload of an individual contract.</p><p><b>[00:20]</b> This is a new contract I am uploading here. I can specify a spend threshold and I have the option to set up some cool notifications with spend thresholds as well.</p><p><b>[00:33]</b> These notifications are how Esker can help you track if you're meeting anything like a minimum spend or avoiding any penalties associated. If not, you can set up a notification to warn you of impending expiration or the need to renew.</p><p><b>[00:52]</b> And that's how you can ensure on-time contract renewals and minimize any service disruptions. And there's also the option to build out your own notifications based on other key features on the contract as well.</p><p><b>[01:06]</b> We can alert on dates, contract term percent, spend percent, and then if your spending trend is high or low. You can also set archiving settings for how long you want to store your contract documents.</p><p><b>[01:20]</b> This was a look at how notifications based on trends and terms can be set in Esker.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer comment des notifications peuvent être créées sur les contrats pour vous alerter de manière proactive sur la conformité contractuelle et les échéances. Vous pouvez les configurer sur un contrat actif existant ou lors du téléchargement initial d'un contrat individuel.</p><p><b>[00:20]</b> Voici un nouveau contrat que je suis en train de télécharger. Je peux spécifier un seuil de dépenses et j'ai l'option de configurer des notifications intéressantes avec des seuils de dépenses également.</p><p><b>[00:33]</b> Ces notifications permettent à Esker de vous aider à suivre si vous atteignez un montant minimum de dépenses ou si vous évitez les pénalités associées. Dans le cas contraire, vous pouvez configurer une notification pour vous avertir d'une expiration imminente ou de la nécessité de renouveler.</p><p><b>[00:52]</b> C'est ainsi que vous pouvez garantir des renouvellements de contrats en temps voulu et minimiser toute interruption de service. Il y a aussi la possibilité de créer vos propres notifications basées sur d'autres caractéristiques clés du contrat.</p><p><b>[01:06]</b> Nous pouvons alerter sur des dates, le pourcentage du terme du contrat, le pourcentage de dépenses, et si votre tendance de dépenses est élevée ou faible. Vous pouvez aussi définir des paramètres d'archivage pour la durée de conservation de vos documents contractuels.</p><p><b>[01:20]</b> Voilà comment configurer des notifications basées sur les tendances et les termes dans Esker.</p>"},

  {f:"5 - Invoicing Schedules",t:"Invoicing Schedules",sz:"34.7",
trEN:"<p><b>[00:00]</b> In this video I'm going to show you how you can use the Invoice Scheduling feature within Esker's Contract Management module to automatically generate recurring invoices.</p><p><b>[00:12]</b> I'm on the Invoice Scheduling tab on a live contract. We can set up recurring invoices to be generated automatically if we know that, per the terms of the contract, there will be a fixed amount that we're responsible for on a recurring basis. This is a great option for non-PO invoices like rent, utilities, etcetera.</p><p><b>[00:35]</b> I can set up this recurring invoicing with the specified details shown here. I can include a tolerance on the dollar amount and on the time frame we're expecting to receive an invoice, and then most importantly I can specify if they can be approved automatically.</p><p><b>[00:57]</b> If we already know this is going to be a low-touch recurring invoice that we pre-arranged per the terms of the contract, we might not want to have these invoices in the AP specialist queue at all. So we can set them up to auto-generate and auto-post to the ERP.</p><p><b>[01:19]</b> And we can even allow self-billing where we generate the invoice on behalf of our vendor, if we're both VAT-registered entities.</p><p><b>[01:30]</b> If I switch over to the AP module I can show you an example of the invoice that would get generated for your AP team. Here we see the invoice that got generated in my demo environment and we show the contract associated with that recurring non-PO invoice.</p><p><b>[01:51]</b> This was a look at how to generate recurring invoices that can be auto-posted to your ERP via Contract Management integration with AP, by setting up invoice schedules.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer comment utiliser la fonctionnalité d'Échéancier de Facturation du module de Gestion des Contrats d'Esker pour générer automatiquement des factures récurrentes.</p><p><b>[00:12]</b> Je suis sur l'onglet Échéancier de Facturation d'un contrat actif. Nous pouvons configurer des factures récurrentes générées automatiquement si nous savons que, selon les termes du contrat, il y aura un montant fixe dont nous serons redevables de manière récurrente. C'est une excellente option pour les factures sans commande comme le loyer, les charges, etc.</p><p><b>[00:35]</b> Je peux configurer cette facturation récurrente avec les détails spécifiés ici. Je peux inclure une tolérance sur le montant et sur le délai dans lequel nous attendons de recevoir une facture, et surtout je peux spécifier si elles peuvent être approuvées automatiquement.</p><p><b>[00:57]</b> Si nous savons déjà qu'il s'agit d'une facture récurrente nécessitant peu d'intervention, pré-arrangée selon les termes du contrat, nous ne voudrons peut-être pas que ces factures apparaissent dans la file d'attente du spécialiste AP. Nous pouvons donc les configurer pour qu'elles soient auto-générées et auto-comptabilisées dans l'ERP.</p><p><b>[01:19]</b> Nous pouvons même autoriser l'auto-facturation où nous générons la facture au nom de notre fournisseur, si nous sommes tous deux des entités assujetties à la TVA.</p><p><b>[01:30]</b> Si je bascule vers le module AP, je peux vous montrer un exemple de la facture qui serait générée pour votre équipe AP. Ici nous voyons la facture générée dans mon environnement de démonstration et nous affichons le contrat associé à cette facture récurrente sans commande.</p><p><b>[01:51]</b> Voilà comment générer des factures récurrentes pouvant être auto-comptabilisées dans votre ERP via l'intégration Gestion des Contrats avec l'AP, en configurant des échéanciers de facturation.</p>"},

  {f:"6 - Assigning Contracts to Catalog Items",t:"Assigning Contracts to Catalog Items",sz:"25.3",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you how to tie contracts to catalog items for use in Esker's procurement solution.</p><p><b>[00:09]</b> If you have your catalog items and contracts uploaded into Esker, you can specify which contract each item should be associated with by entering the vendor contract name and number for that item in the Items table in the Contracts module.</p><p><b>[00:29]</b> When opening a contract that has been activated, the contract owner can click Catalog Items to see the list of items related to this contract.</p><p><b>[00:40]</b> You can also associate catalog items with a vendor contract when initially importing your items in bulk by including that contract number and name in the corresponding columns of the CSV file that you'll import into Esker.</p><p><b>[00:57]</b> You can also associate an entire external punch-out catalog with that vendor's relevant contract. To associate all of the items from a commercial site with a contract, you would fill in the contract name and number in the section for the punch-out record in the punch-out table.</p><p><b>[01:20]</b> So we just looked at how to associate items and an external catalog with their appropriate vendor contracts. The benefit of doing this is to leverage Procurement and Contract Management in conjunction to fully realize the value of your negotiated pricing and terms, and ensure that there's compliance with your preferred spending practices.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer comment associer des contrats à des articles de catalogue pour utilisation dans la solution d'approvisionnement Esker.</p><p><b>[00:09]</b> Si vos articles de catalogue et vos contrats sont téléchargés dans Esker, vous pouvez spécifier quel contrat chaque article doit être associé en saisissant le nom et le numéro du contrat fournisseur pour cet article dans le tableau Articles du module Contrats.</p><p><b>[00:29]</b> En ouvrant un contrat qui a été activé, le propriétaire du contrat peut cliquer sur Articles du Catalogue pour voir la liste des articles liés à ce contrat.</p><p><b>[00:40]</b> Vous pouvez aussi associer des articles de catalogue à un contrat fournisseur lors de l'import initial de vos articles en masse, en incluant le numéro et le nom du contrat dans les colonnes correspondantes du fichier CSV que vous importerez dans Esker.</p><p><b>[00:57]</b> Vous pouvez également associer un catalogue punch-out externe complet au contrat correspondant de ce fournisseur. Pour associer tous les articles d'un site commercial à un contrat, il suffit de renseigner le nom et le numéro du contrat dans la section de l'enregistrement punch-out dans le tableau des punch-out.</p><p><b>[01:20]</b> Nous venons de voir comment associer des articles et un catalogue externe à leurs contrats fournisseurs appropriés. L'avantage de cette démarche est de tirer parti conjointement de l'Approvisionnement et de la Gestion des Contrats pour pleinement réaliser la valeur de vos prix et conditions négociés, et garantir la conformité avec vos pratiques de dépenses préférentielles.</p>"},
]},
{id:"so",label:"Sourcing",suite:"S2P",icon:"🔍",folder:"Sourcing",videos:[

  {f:"1 - Sourcing Overview",t:"Sourcing Overview",sz:"95.2",
trEN:"<p><b>[00:00]</b> Let's go through a high level overview of our sourcing solution, which currently lives within Market Dojo. From the dashboard, when we first enter Market Dojo, we have visibility into current and closed sourcing events, event analytics, and we can also view an event calendar.</p><p><b>[00:21]</b> Digital sourcing events within Dojo are the core of how we streamline the entire sourcing process. Our customers see on average 40% less time formatting responses and gathering information from suppliers when using Market Dojo to help standardize their sourcing activities.</p><p><b>[00:41]</b> A sourcing event within Dojo can consist of a questionnaire, an RFQ, and/or an auction — so any combination of those. When creating a net new event, we will be prompted with the option to create an event either from scratch, from a template, or by cloning a previous event.</p><p><b>[01:12]</b> I'm going to go ahead and create an event from a simple lot sourcing event template. In this example template, we are creating a sample event consisting of a simple RFQ and a questionnaire.</p><p><b>[01:27]</b> On the Settings tab, we have the option to edit our questions and RFQ settings. If we tab over, we'll see the Participants section is where we can invite our suppliers to the sourcing event. And then if we tab over to the Questionnaire tab, that's where we can ask questions to help qualify our suppliers.</p><p><b>[01:48]</b> The RFQ tab is where we see a centralization of the quotation activities, and this is where our customers are really benefiting from reduced transactional activity. We can specify lots of items that we are requesting quotes for and we can see centralized pricing information in one place.</p><p><b>[02:11]</b> You can also do some neat things with considering non-price criteria and a weighted event, which we can dive into in a more focused video.</p><p><b>[02:20]</b> By reducing the time and effort spent here and freeing up more time and effort to be focused on value creation and strategic priorities, our customers are finding huge savings. A current Esker AP customer in the food and beverage industry wanted to pilot sourcing functionality to validate if they were getting true market value from their suppliers. They ended up buying a monthly license for less than $800 and submitted an RFQ sourcing event to their existing and new suppliers and then also invited them to an e-auction. After that exercise, they saved in total a whopping $3.4 million.</p><p><b>[03:05]</b> Let's take a look at that e-auction functionality. I've pulled up examples of an ongoing e-auction and a completed one to demonstrate. An e-auction is how our customers are gaining efficiency with auctions to find the best market price and save by driving competition among suppliers.</p><p><b>[03:29]</b> The auctions allow you to conduct live virtual auctions with your invited suppliers where they bid for your business. I'm going to unpause this auction that I've got going in my demo environment, and then we'll see how new bids update in real time here.</p><p><b>[03:48]</b> Once this is done running, I could award these lots to a selected supplier and then directly create my purchase requisition from this completed sourcing event. You'll see that this integration into Esker's Procurement module makes our platform a powerful integrated system that is easy to use to solve your biggest purchasing challenges.</p><p><b>[04:12]</b> One of our customers was able to get up and running on Dojo within 24 hours. This customer had a new Director of Procurement that was focused on streamlining sourcing activities as a primary initiative, and he selected Market Dojo and referenced how the very low barrier to entry given the quick implementation and ease of use was key in his selection.</p><p><b>[04:40]</b> What you just saw was a high level overview of our sourcing solution. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Parcourons ensemble un aperçu général de notre solution de sourcing, qui fonctionne actuellement au sein de Market Dojo. Depuis le tableau de bord, lorsque nous entrons dans Market Dojo, nous avons une visibilité sur les événements de sourcing en cours et clôturés, les analyses d'événements, et nous pouvons également consulter un calendrier des événements.</p><p><b>[00:21]</b> Les événements de sourcing digitaux au sein de Dojo sont au cœur de notre façon de rationaliser l'ensemble du processus de sourcing. Nos clients constatent en moyenne 40 % de temps en moins pour formater les réponses et recueillir des informations auprès des fournisseurs en utilisant Market Dojo pour standardiser leurs activités de sourcing.</p><p><b>[00:41]</b> Un événement de sourcing dans Dojo peut se composer d'un questionnaire, d'un appel d'offres (RFQ) et/ou d'une enchère — donc de n'importe quelle combinaison de ces éléments. Lors de la création d'un nouvel événement, on nous propose de créer un événement soit de zéro, soit à partir d'un modèle, soit en clonant un événement précédent.</p><p><b>[01:12]</b> Je vais créer un événement à partir d'un modèle d'événement de sourcing par lot simple. Dans ce modèle d'exemple, nous créons un événement composé d'un RFQ simple et d'un questionnaire.</p><p><b>[01:27]</b> Dans l'onglet Paramètres, nous avons la possibilité de modifier nos questions et les paramètres du RFQ. Si nous passons à l'onglet suivant, la section Participants est l'endroit où nous pouvons inviter nos fournisseurs à l'événement de sourcing. Puis dans l'onglet Questionnaire, c'est là que nous pouvons poser des questions pour qualifier nos fournisseurs.</p><p><b>[01:48]</b> L'onglet RFQ est l'endroit où nous voyons la centralisation des activités de cotation, et c'est là que nos clients bénéficient le plus de la réduction de l'activité transactionnelle. Nous pouvons spécifier des lots d'articles pour lesquels nous demandons des devis et voir les informations tarifaires centralisées en un seul endroit.</p><p><b>[02:11]</b> Vous pouvez aussi faire des choses intéressantes en prenant en compte des critères non tarifaires et un événement pondéré, ce que nous pouvons approfondir dans une vidéo dédiée.</p><p><b>[02:20]</b> En réduisant le temps et l'effort dépensés ici et en libérant davantage de temps pour la création de valeur et les priorités stratégiques, nos clients réalisent des économies considérables. Un client Esker AP actuel dans l'industrie agroalimentaire souhaitait tester la fonctionnalité de sourcing pour vérifier s'il obtenait la vraie valeur marché de ses fournisseurs. Il a fini par acheter une licence mensuelle à moins de 800 $ et a soumis un événement RFQ à ses fournisseurs existants et nouveaux, puis les a également invités à une enchère électronique. À l'issue de l'exercice, il a économisé au total la somme impressionnante de 3,4 millions de dollars.</p><p><b>[03:05]</b> Examinons cette fonctionnalité d'enchère électronique. J'ai ouvert des exemples d'une enchère en cours et d'une enchère terminée pour démonstration. L'enchère électronique est la manière dont nos clients gagnent en efficacité pour trouver le meilleur prix du marché et économiser en stimulant la concurrence entre fournisseurs.</p><p><b>[03:29]</b> Les enchères vous permettent de mener des enchères virtuelles en direct avec vos fournisseurs invités, où ils enchérissent pour votre marché. Je vais relancer cette enchère que j'ai dans mon environnement de démo, et nous verrons comment les nouvelles offres se mettent à jour en temps réel.</p><p><b>[03:48]</b> Une fois l'enchère terminée, je peux attribuer ces lots à un fournisseur sélectionné puis créer directement ma demande d'achat à partir de cet événement de sourcing terminé. Vous constaterez que cette intégration au module d'Approvisionnement d'Esker fait de notre plateforme un système intégré puissant et facile à utiliser pour résoudre vos plus grands défis d'achat.</p><p><b>[04:12]</b> L'un de nos clients a pu être opérationnel sur Dojo en 24 heures. Ce client avait un nouveau Directeur des Achats qui souhaitait rationaliser les activités de sourcing comme initiative prioritaire, et il a choisi Market Dojo en soulignant que la très faible barrière à l'entrée grâce à l'implémentation rapide et la facilité d'utilisation avait été déterminante dans son choix.</p><p><b>[04:40]</b> Voilà pour cet aperçu général de notre solution de sourcing. Merci d'avoir regardé.</p>"},

  {f:"2 - Sourcing Events",t:"Sourcing Events",sz:"38.6",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you the different sourcing events that can be created within Market Dojo. Digital sourcing events within Dojo are the core of how we streamline the entire sourcing process.</p><p><b>[00:15]</b> From the dashboard, when we first enter Market Dojo, we have visibility into current and closed sourcing events, event analytics, and we can also view an event calendar.</p><p><b>[00:29]</b> A sourcing event within Dojo can consist of a questionnaire, an RFQ, and/or an auction. So you can have your event be one of those options individually or any combination of them.</p><p><b>[00:44]</b> When creating a net new event, we will be prompted with the option to create an event from scratch, from a template, or by cloning. I'm going to go ahead and create an event from a simple lot sourcing event template, and you'll see that Market Dojo generates the sourcing event in a new page.</p><p><b>[01:06]</b> The first tab here is where you can configure the settings for the subsequent tabs. On the next tabs, you'll identify participants or suppliers you're inviting to the sourcing events and other settings. For the questionnaire and RFQ, that comprises the specific type of sourcing events if you included those within the template.</p><p><b>[01:29]</b> Market Dojo is creating a streamlined workflow for you within a consistent user interface for all your sourcing events. That makes it really easy for you to interact with the system and complete your sourcing events quickly.</p><p><b>[01:45]</b> So this was a look at how you can start using Market Dojo for generating your RFPs, RFIs, RFQs — you name it — using Esker's Market Dojo sourcing solution.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer les différents événements de sourcing qui peuvent être créés dans Market Dojo. Les événements de sourcing digitaux dans Dojo sont au cœur de notre façon de rationaliser l'ensemble du processus de sourcing.</p><p><b>[00:15]</b> Depuis le tableau de bord, lorsque nous entrons dans Market Dojo, nous avons une visibilité sur les événements de sourcing en cours et clôturés, les analyses d'événements, et nous pouvons aussi consulter un calendrier des événements.</p><p><b>[00:29]</b> Un événement de sourcing dans Dojo peut se composer d'un questionnaire, d'un RFQ et/ou d'une enchère. Vous pouvez donc avoir votre événement sous l'une de ces formes individuellement ou toute combinaison de celles-ci.</p><p><b>[00:44]</b> Lors de la création d'un nouvel événement, on nous propose de créer un événement de zéro, à partir d'un modèle, ou par clonage. Je vais créer un événement à partir d'un modèle d'événement de sourcing par lot simple, et vous verrez que Market Dojo génère l'événement de sourcing dans une nouvelle page.</p><p><b>[01:06]</b> Le premier onglet ici est l'endroit où vous pouvez configurer les paramètres pour les onglets suivants. Dans les onglets suivants, vous identifiez les participants ou fournisseurs que vous invitez aux événements de sourcing et d'autres paramètres. Pour le questionnaire et le RFQ, cela constitue le type spécifique d'événements de sourcing si vous les avez inclus dans le modèle.</p><p><b>[01:29]</b> Market Dojo crée un workflow rationalisé pour vous au sein d'une interface utilisateur cohérente pour tous vos événements de sourcing. Cela rend très facile l'interaction avec le système et la finalisation rapide de vos événements de sourcing.</p><p><b>[01:45]</b> Voilà comment vous pouvez commencer à utiliser Market Dojo pour générer vos RFP, RFI, RFQ — quel que soit le type — avec la solution de sourcing Market Dojo d'Esker.</p>"},

  {f:"3 - RFQ Creation",t:"RFQ Creation",sz:"24.8",
trEN:"<p><b>[00:01]</b> In this video, I'm going to show you how you can set up RFQs within Esker to receive quotes from multiple suppliers as a part of a sourcing event.</p><p><b>[00:11]</b> If you select to have an RFQ on the settings page of a new sourcing event, you can specify the bid deadline and currency. The RFQ allows you to gather bids from suppliers against lots before a deadline, and participants can only submit one bid against each lot.</p><p><b>[00:33]</b> Keep in mind an RFQ can either be used on its own, in conjunction with questionnaires — which can make this a weighted event if required — and you can also progress this to an auction if required when the RFQ is complete.</p><p><b>[00:53]</b> On the RFQ tab within the sourcing event you can specify the lots for bidding. You can also tell Dojo what you are currently paying and what you would like to set for a qualification price. This helps highlight the difference in savings you can expect across bids.</p><p><b>[01:13]</b> That was a look at how RFQs can be used within sourcing events in Market Dojo and help negotiate with multiple suppliers simultaneously in order to achieve the most competitive pricing.</p>",
