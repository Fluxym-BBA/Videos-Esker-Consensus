trFR:"<p><b>[00:00]</b> Vous gérez une stratégie de recouvrement mais il vous manque les leviers pour créer une stratégie plus ciblée par client ou groupe de clients ? Cette fonctionnalité du module Collections Management peut vous aider.</p><p><b>[00:14]</b> On voit ici les paramètres sur 4 niveaux configurables : quand les relances partent et à qui elles sont envoyées. La puissance de cette fonctionnalité : cibler des groupes spécifiques. Approche courante : exploiter les données du module Credit Management et les niveaux de risque — un risque plus élevé déclenche une stratégie de recouvrement plus agressive. On peut aussi adapter les paramètres par client individuel — par exemple, désactiver toutes les relances automatisées pour un client VIP.</p><p><b>[00:57]</b> Outils disponibles : les « super overrides » en haut de l'écran, pour activer/désactiver temporairement des paramètres pendant la création de la stratégie. On explore les contenus de chaque niveau 1 à 4. Plus bas, l'application aux relevés de compte (account statements).</p><p><b>[01:27]</b> Enfin, un historique complet des modifications de la stratégie de recouvrement : quoi, quand, et par qui.</p><p><b>[01:37]</b> Voilà un aperçu rapide de la création d'une stratégie de recouvrement ciblée dans la solution Esker. Merci d'avoir regardé.</p>"},

  {f:"9 - Forecasting",t:"Forecasting",sz:"2.4",
trEN:"<p><b>[00:02]</b> When you're collecting past-due invoices, it's important to know when that cash is going to be coming on hand. Within the Collections tool in Esker, we have a dedicated Collections Forecast report. This is bringing in information from multiple different sections of the solution to show you when you should expect invoices to be paid — whether they're likely to be paid, promised to be paid, or actually scheduled to be paid.</p><p><b>[00:28]</b> Thanks so much for watching.</p>",
trFR:"<p><b>[00:02]</b> Lorsque vous recouvrez des factures en retard, il est essentiel de savoir quand la trésorerie arrivera. Dans l'outil Collections d'Esker, un rapport de prévision dédié agrège les informations de plusieurs sections de la solution pour indiquer quand les factures seront probablement payées — qu'elles soient susceptibles d'être payées, promises en paiement, ou effectivement planifiées.</p><p><b>[00:28]</b> Merci d'avoir regardé.</p>"},

  {f:"Parent-Child Hierarchies",t:"Parent-Child Hierarchies",sz:"13.2",
trEN:"<p><b>[00:02]</b> Collecting on accounts that are part of a parent-child relationship can be challenging because seeing the visibility of the overall parent account as compared to each individual account can be tough to do within ERP systems. Within the Collections tool, we have a way to combine customers — so that's what this video will show you.</p><p><b>[00:21]</b> Here you can see that these customers are already combined under parent ABC. Today I'm going to add a couple more customers into that parent company. Once I apply this, I have the option to either create a new parent customer or link them into an existing one. I'll use my existing customer and save that.</p><p><b>[00:44]</b> I'm now brought to my dashboard for the parent company. This is going to bring together the balances, the disputes, the past due for all of those child companies that are linked under the parent company.</p><p><b>[00:58]</b> You'll have the visibility into what's going on with the account as a whole within the parent company's dashboard. We also can display AR aging as well as all of the invoices and all of the credits for all of the children accounts — all within this dashboard.</p><p><b>[01:16]</b> Here I also have visibility into which accounts are part of that parent-child relationship. And if I need to, I can click out to see the details on those individual customers — I can click to get directly to this individual customer's information, get back to their dashboard, so I can see what's going on with each and every individual account.</p><p><b>[01:44]</b> So again, this is how to combine customers within the Collections tool to give you visibility for reporting at the parent level while maintaining individual reporting at the child level. Thanks so much for watching.</p>",
trFR:"<p><b>[00:02]</b> Le recouvrement sur des comptes faisant partie d'une relation parent-enfant peut être complexe : la visibilité consolidée du compte parent par rapport à chaque compte individuel est difficile à obtenir dans les ERP. L'outil Collections d'Esker permet de regrouper les clients.</p><p><b>[00:21]</b> Ici, des clients sont déjà regroupés sous le parent ABC. On ajoute d'autres clients au groupe. On peut créer un nouveau parent ou les rattacher à un existant.</p><p><b>[00:44]</b> Le tableau de bord du parent regroupe les soldes, litiges et retards de toutes les filiales rattachées.</p><p><b>[00:58]</b> Visibilité complète du compte parent : ancienneté des créances, factures et avoirs de tous les comptes enfants — le tout dans un seul tableau de bord.</p><p><b>[01:16]</b> On voit quels comptes font partie de la relation parent-enfant. En un clic, on accède au détail de chaque client individuel et à son propre tableau de bord.</p><p><b>[01:44]</b> Voilà comment regrouper des clients dans l'outil Collections pour obtenir un reporting au niveau parent tout en conservant le reporting individuel au niveau enfant. Merci d'avoir regardé.</p>"},

]},
{id:"crm",label:"Credit Management",suite:"O2C",icon:"🛡️",folder:"Credit Management",videos:[

  {f:"1 - Credit Management Overview",t:"Credit Management Overview",sz:"24.8",
trEN:"<p><b>[00:01]</b> Hi everyone, TJ from Esker here. And with this quick high-level 4-minute video, I plan to go over most of the major functionality tied in with Esker's Credit Management module. Tied in with that, I plan to go over some stories of how we've helped customers achieve value from the solution as well. So stay tuned and let's dig in.</p><p><b>[00:20]</b> The credit module is really designed to help with two separate credit processes. The first is the onboarding of potential customers via an automated web form application, and the second is keeping tabs on current customers — leveraging Esker's API connections to most major credit bureaus as well as credit insurers.</p><p><b>[00:38]</b> This can be exemplified on our dashboard here. On the left-hand side of the screen, I'm looking at information on current customers. We have queues and counters really designed to grab our attention for any customers who have fallen into the blocked order category. Maybe it's their time of the year to get that periodic review, as well as any changes into their credit score or credit limit.</p><p><b>[01:02]</b> On the right-hand side of the screen, we also have information into where they are in that credit onboarding process. How many applications have I sent out? Where are my customers in filling out that application? Here we get a better picture of those potential customers.</p><p><b>[01:19]</b> Let's take a quick look at sending out a credit application to a potential customer. There are really two different ways we can get a credit application into the hands of one of your potential customers. The first being a generic link either posted on your website or from any external communication, and the second is a link sent through Esker — where we have a little bit more flexibility into the process.</p><p><b>[01:42]</b> To see what that looks like, we can jump into the top left of our dashboard and click \"New Credit Application.\" Here we get some options to enter in that potential customer's email, choose from a language, as well as choose from different templates. I have these based on region, but our customers can tweak that for their diverse customer bases.</p><p><b>[02:06]</b> Here I've jumped ahead into the credit application process and now we're looking at the online web form that your customers will fill out. As you can see, there's really a ton of fields for them to fill out, but what's important here is that Esker has the flexibility to tweak these for what's important for your credit application process. Tied in with that, we also have the ability to build logic into these fields as well — for example within our tax exemption status. If I change this to \"exempt,\" this will require me to enter in that document further along in the process.</p><p><b>[02:42]</b> Upon the completion of this web form, we now have all the information needed to kick off an automated or manual credit approval workflow. Moving back into our Esker interface, we can now see all the information pulled from that application as well as steps in that workflow. What's really cool is that we can see automation — for example, automatically approve customers under $1,000 credit limit. Or we can take advantage of Esker's internal scorecard where you can leverage specific metrics such as their D&B score, maybe their NACM score, and have that be part of the automated approval workflow as well.</p><p><b>[03:25]</b> Lastly, I'd like to take a quick look at the other side of the coin — keeping tabs on your current customers. Here I have a review that's been triggered by a blocked order, where I now have all the tools necessary to resolve that issue.</p><p><b>[03:38]</b> So that was a quick snapshot of most of the major functionality within the Credit Management solution. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour à tous, ici TJ d'Esker. Dans cette vidéo de 4 minutes, je vais passer en revue les principales fonctionnalités du module Credit Management d'Esker, ainsi que quelques exemples de valeur apportée à nos clients. C'est parti.</p><p><b>[00:20]</b> Le module crédit est conçu pour couvrir deux processus distincts. Le premier concerne l'onboarding de clients potentiels via un formulaire web automatisé. Le second porte sur le suivi des clients existants — en s'appuyant sur les connexions API d'Esker avec les principaux bureaux de crédit et assureurs-crédit.</p><p><b>[00:38]</b> Cela se traduit sur notre tableau de bord. À gauche de l'écran, les informations sur les clients existants : files d'attente et compteurs conçus pour attirer l'attention sur les clients en situation de commande bloquée, ceux nécessitant une revue périodique, ou ayant des changements de score ou limite de crédit.</p><p><b>[01:02]</b> À droite, les informations sur le processus d'onboarding crédit : combien de demandes envoyées, où en sont les clients dans le remplissage de leur candidature. Cela donne une vue d'ensemble des prospects.</p><p><b>[01:19]</b> Voyons comment envoyer une demande de crédit à un prospect. Deux options : un lien générique publié sur votre site web ou dans une communication externe, ou un lien envoyé directement via Esker — offrant plus de flexibilité.</p><p><b>[01:42]</b> En cliquant sur « Nouvelle demande de crédit » en haut du tableau de bord, on peut saisir l'email du prospect, choisir la langue et sélectionner parmi différents modèles (par région, par exemple). Nos clients adaptent ces modèles à leurs différentes bases clients.</p><p><b>[02:06]</b> Voici le formulaire web en ligne que vos clients remplissent. Il contient de nombreux champs, mais Esker offre la flexibilité de les adapter à votre processus de crédit. On peut aussi intégrer de la logique conditionnelle — par exemple, si le statut d'exemption fiscale est changé en « exempté », un document justificatif sera requis plus tard dans le processus.</p><p><b>[02:42]</b> Une fois le formulaire complété, toutes les informations nécessaires sont disponibles pour lancer un workflow d'approbation de crédit automatisé ou manuel. Dans l'interface Esker, on voit les données de la candidature et les étapes du workflow. On peut par exemple approuver automatiquement les clients sous 1 000 $ de limite de crédit, ou utiliser le scorecard interne d'Esker avec des métriques comme le score D&B ou NACM dans le workflow d'approbation automatisé.</p><p><b>[03:25]</b> Enfin, côté suivi des clients existants : ici une revue déclenchée par une commande bloquée, avec tous les outils nécessaires pour résoudre la situation.</p><p><b>[03:38]</b> Voilà un aperçu rapide des principales fonctionnalités de la solution Credit Management. Merci d'avoir regardé.</p>"},

  {f:"2 - Blocked Order Functionality",t:"Blocked Order Functionality",sz:"14.4",
trEN:"<p><b>[00:02]</b> Credit departments struggle to have visibility into which orders are on credit block. It's often a manual report, then reviewing the account to see if the customer is risky or not, or if those orders should be released. Sales follows up, which creates tension between the sales department and the credit department — and they can also delay those orders going out.</p><p><b>[00:23]</b> This video is going to walk through how Esker's Credit Management tool can help with blocked orders. On my dashboard here, I can see that I have credit reviews open due to blocked orders. As Esker sees the orders are on credit block, we can trigger a credit review which will then give visibility to the credit analyst to take a look at that account — not only release the order, but also potentially change their credit limit.</p><p><b>[00:49]</b> Clicking into one of those credit reviews, I can see that it went on credit review because it does have blocked orders. I now have visibility into everything going on with this customer. A great at-a-glance view into what their credit score is, what their risk category is, what their exposure is. I can also see their aging and any disputes or claims that are in progress.</p><p><b>[01:16]</b> If I need additional details, I can click on the Credit Scores tab to pull any credit bureau information as well. All of this is going to give me great information to make an informed decision on whether I should release this order.</p><p><b>[01:33]</b> But then also, Esker's AI Synergy is calculating based on that payment behavior and order behavior, if we should maybe change the customer's credit limit or risk category. As you can see down here, I have an order on block. As soon as I apply that new credit limit, it's going to automatically release this order.</p><p><b>[01:52]</b> So in just a couple of clicks, I have now reviewed the customer's account, increased the credit limit, and also released that blocked order.</p><p><b>[02:03]</b> This was a recap on what Esker's Credit Management tool can do to help you with your blocked orders.</p>",
trFR:"<p><b>[00:02]</b> Les services crédit peinent à avoir de la visibilité sur les commandes bloquées. C'est souvent un rapport manuel, puis une analyse du compte pour évaluer le risque client et décider si les commandes doivent être libérées. Les relances des commerciaux créent des tensions entre les départements ventes et crédit, et retardent les expéditions.</p><p><b>[00:23]</b> Cette vidéo montre comment l'outil Credit Management d'Esker aide à gérer les commandes bloquées. Sur le tableau de bord, on voit des revues de crédit ouvertes suite à des commandes bloquées. Dès qu'Esker détecte un blocage crédit, une revue est déclenchée, donnant à l'analyste crédit la visibilité nécessaire pour examiner le compte, libérer la commande et éventuellement ajuster la limite de crédit.</p><p><b>[00:49]</b> En ouvrant une revue de crédit, on voit qu'elle a été déclenchée par des commandes bloquées. Une vue d'ensemble complète du client : score crédit, catégorie de risque, exposition. On peut aussi voir l'ancienneté des créances et les litiges ou réclamations en cours.</p><p><b>[01:16]</b> Pour plus de détails, l'onglet Scores de crédit permet de consulter les informations des bureaux de crédit. Tout cela aide à prendre une décision éclairée sur la libération de la commande.</p><p><b>[01:33]</b> De plus, l'IA Synergy d'Esker calcule, sur la base du comportement de paiement et de commande, s'il faut ajuster la limite de crédit ou la catégorie de risque du client. Dès que la nouvelle limite est appliquée, la commande bloquée est automatiquement libérée.</p><p><b>[01:52]</b> En quelques clics : revue du compte, augmentation de la limite de crédit et libération de la commande bloquée.</p><p><b>[02:03]</b> Voilà ce que l'outil Credit Management d'Esker peut faire pour vos commandes bloquées.</p>"},

  {f:"3 - Predictive Blocked Orders",t:"Predictive Blocked Orders",sz:"13.0",
trEN:"<p><b>[00:02]</b> Having orders go on credit block can cause strain between the sales team, the credit management team, and the end customer. Those credit limits are put in place to protect the company and make sure that they will be able to receive the cash on those orders. But sales wants to sell.</p><p><b>[00:21]</b> So what happens when a customer is exceeding their credit limit because they're successful and they're paying their bills on time? Esker's approach is to have a predictive credit review for those customers. In this video, we'll review how Esker is able to do that to prevent blocked orders in the future.</p><p><b>[00:42]</b> Clicking into this customer, I can see what their current credit limit is, but then Esker is also predicting where they expect that exposure to be in 7 to 10 days from now. And we can see that it's well past the existing credit limit. Esker's taking into account what the customer's order history has been and their payment history as well.</p><p><b>[01:03]</b> Here we're seeing that the customer is a good payer. We're actually suggesting to lower their credit risk and increase their credit limit. Scrolling down, I can see additional information on this customer — such as what their order history has been over the last several months, as well as invoice aging.</p><p><b>[01:22]</b> Once I review all of the information provided to me here, I can make a decision to go ahead and increase this customer's credit limit and apply that suggestion. So again, this is how Esker is able to proactively prevent orders from going on credit block. If they're able to review this credit limit, review their risk, and increase that credit limit before orders go on block, we can actually prevent that and allow sales to create orders that can ship right away.</p>",
trFR:"<p><b>[00:02]</b> Le blocage de commandes pour dépassement de crédit crée des tensions entre l'équipe commerciale, l'équipe crédit et le client final. Les limites de crédit protègent l'entreprise, mais les commerciaux veulent vendre.</p><p><b>[00:21]</b> Que se passe-t-il quand un client dépasse sa limite de crédit parce qu'il est en croissance et paie ses factures à temps ? L'approche d'Esker : une revue de crédit prédictive. Cette vidéo montre comment Esker prévient les blocages futurs.</p><p><b>[00:42]</b> En ouvrant la fiche client, on voit la limite de crédit actuelle, mais aussi la prédiction d'Esker sur l'exposition dans 7 à 10 jours — qui dépasse largement la limite existante. Esker prend en compte l'historique des commandes et l'historique de paiement.</p><p><b>[01:03]</b> Ici, le client est un bon payeur. Esker suggère de réduire le risque crédit et d'augmenter la limite de crédit. En descendant, des informations complémentaires : historique des commandes sur plusieurs mois et ancienneté des factures.</p><p><b>[01:22]</b> Après examen, on peut décider d'augmenter la limite de crédit et appliquer la suggestion. Esker prévient ainsi proactivement le blocage des commandes : en révisant la limite avant que les commandes ne soient bloquées, les commerciaux peuvent continuer à créer des commandes qui seront expédiées immédiatement.</p>"},

  {f:"4 - Aggregate Customers' Credit Limits",t:"Aggregate Customers' Credit Limits",sz:"13.0",
trEN:"<p><b>[00:00]</b> Are you currently managing a credit process with complex customer relationships such as parent-child or maybe franchisees? Well, this feature within the Credit Management solution should be able to help by giving you the ability to control whether or not you want to report or control on the aggregate credit limit of those relationships or the individual.</p><p><b>[00:21]</b> A really common example: let's say I manage 20 Home Depots and one of them is above their credit limit, but the overall aggregate for all Home Depot credit limits is still under and manageable. So here's where we can take a look into how we might manage those situations with a quick demo.</p><p><b>[00:42]</b> I have 3 customers that I want to include in that credit relationship already selected. What I can do now is easily combine these customers with our button at the top of the screen. This is going to present me the option as a credit specialist to either manage these credit limits at the aggregate or at the individual level.</p><p><b>[01:06]</b> Once I do that, it'll then group these customers and give me the option to report on the whole of those customers down the road. So here I've navigated over to where we can manage and view that relationship that we just created. We get a lot of relevant credit data — what we're looking at is that $85,000 overall or aggregate credit limit that we just created.</p><p><b>[01:32]</b> Let's say we also want to investigate the individual credit limit for the sub-customers — we can view that in the top right of the screen. What's powerful here is that it now gives your credit controllers the ability to manage and fine-tune those relationships that may be bogging down your credit process today.</p>",
trFR:"<p><b>[00:00]</b> Gérez-vous un processus crédit avec des relations client complexes — parent-filiale ou franchises ? Cette fonctionnalité du module Credit Management vous permet de contrôler et piloter la limite de crédit soit au niveau agrégé de ces relations, soit au niveau individuel.</p><p><b>[00:21]</b> Exemple courant : vous gérez 20 magasins Home Depot dont un dépasse sa limite de crédit, mais l'agrégat global reste sous contrôle. Voyons comment gérer cette situation.</p><p><b>[00:42]</b> J'ai sélectionné 3 clients à inclure dans cette relation de crédit. En un clic, je les regroupe. Le système me propose alors de gérer les limites de crédit soit au niveau agrégé, soit au niveau individuel.</p><p><b>[01:06]</b> Les clients sont regroupés avec possibilité de reporting sur l'ensemble. Ici, on voit la relation créée avec une limite de crédit agrégée de 85 000 $.</p><p><b>[01:32]</b> On peut aussi consulter la limite de crédit individuelle de chaque sous-client en haut à droite. Cela donne aux contrôleurs crédit la capacité d'affiner et gérer ces relations complexes qui peuvent ralentir le processus crédit.</p>"},

  {f:"5 - Auto Triggers for Credit Reviews",t:"Auto Triggers for Credit Reviews",sz:"13.4",
trEN:"<p><b>[00:00]</b> Staying on top of credit reviews is vital for effective credit management. You want your customers in the proper category based on their risk profile as it stands now, and you need a solution to flag any meaningful changes to your customer's circumstances.</p><p><b>[00:17]</b> Let's dive into how the Esker Credit Management solution can highlight different types of credit review triggers so you can zero in on what's important. This dashboard is all you need to focus your efforts. These counters apply to all credit management dashboards, no matter your role on the credit team. As you can see, we have multiple items to validate — everything is in one place and prioritized so we can get started.</p><p><b>[00:49]</b> Esker sets a default priority for blocked orders, where new orders would push a customer over their credit limit, overall credit limit alerts, and then finally periodic credit reviews. If you use a third-party credit bureau, adverse changes to your customer's credit score will also trigger an alert. The priorities you see here are set by default, but we can show you how to reorganize them to fit your specific needs.</p><p><b>[01:17]</b> Opening the credit review, the reason for the trigger is visible in the upper left-hand corner. Additionally, an overall customer-level dashboard with a more specific note is right here. In this case, I can see that D&B has updated their credit score for this customer and it's gone from A4 to A3.</p><p><b>[01:38]</b> This allows me to take action to make sure that I'm collecting on my receivables. Esker helps credit teams focus their efforts on where they bring the most value — by spotlighting attention on needed credit reviews and grouping reviews by type to help you prioritize your work.</p>",
trFR:"<p><b>[00:00]</b> Rester à jour sur les revues de crédit est essentiel pour une gestion efficace du crédit. Vos clients doivent être classés correctement selon leur profil de risque actuel, et vous avez besoin d'une solution qui signale tout changement significatif de leur situation.</p><p><b>[00:17]</b> Voyons comment la solution Credit Management d'Esker met en avant les différents types de déclencheurs de revue de crédit. Ce tableau de bord centralise tout. Les compteurs s'appliquent à tous les rôles de l'équipe crédit. Tout est rassemblé et priorisé pour démarrer immédiatement.</p><p><b>[00:49]</b> Esker définit une priorité par défaut : commandes bloquées, alertes de dépassement de limite de crédit globale, puis revues périodiques. Si vous utilisez un bureau de crédit tiers, les changements défavorables du score crédit déclenchent aussi une alerte. Ces priorités par défaut sont personnalisables selon vos besoins.</p><p><b>[01:17]</b> En ouvrant une revue de crédit, la raison du déclenchement apparaît en haut à gauche. Un tableau de bord client global avec une note spécifique est également affiché. Ici, D&B a mis à jour le score crédit du client, passant de A4 à A3.</p><p><b>[01:38]</b> Cela permet d'agir pour sécuriser les créances. Esker aide les équipes crédit à concentrer leurs efforts là où ils apportent le plus de valeur — en mettant en lumière les revues nécessaires et en les regroupant par type pour faciliter la priorisation.</p>"},

  {f:"6 - Interoperability with Collections",t:"Interoperability with Collections",sz:"9.2",
trEN:"<p><b>[00:01]</b> Think about the tools your credit and collections teams use to share the latest news on your customers. Is it a manual process? Would those departments benefit from having their cooperation automated?</p><p><b>[00:15]</b> When credit and collections work together, they increase cash flow by getting more money from delinquent accounts. They present a united front to enhance strategic customer relationships and shut down customers that give you the runaround.</p><p><b>[00:31]</b> Esker's Credit and Collections modules pair well together in many ways. Credit managers can request collection calls when customers are at risk for going over their credit limit. Risk categories can automatically adjust the dunning strategy for your customers — so that VIP customers are treated like VIPs and high-risk customers are treated like high-risk customers.</p><p><b>[00:57]</b> Collection statistics and insights like average days to pay, payer rating, and collections history include call notes from Collections Management. Greater cooperation between credit and collections means lower DSO and better risk management.</p><p><b>[01:14]</b> Collaboration in Esker saves your credit and collection teams time and ensures both teams work together, leveraging each other's intelligence to manage risk and collect receivables.</p>",
trFR:"<p><b>[00:01]</b> Réfléchissez aux outils que vos équipes crédit et recouvrement utilisent pour partager les dernières informations clients. Est-ce un processus manuel ? Ces départements bénéficieraient-ils d'une coopération automatisée ?</p><p><b>[00:15]</b> Quand crédit et recouvrement travaillent ensemble, ils augmentent le cash-flow en récupérant davantage sur les comptes en retard. Ils présentent un front uni pour renforcer les relations clients stratégiques et gérer les clients qui temporisent.</p><p><b>[00:31]</b> Les modules Credit et Collections d'Esker fonctionnent très bien ensemble. Les responsables crédit peuvent demander des appels de recouvrement quand des clients risquent de dépasser leur limite. Les catégories de risque ajustent automatiquement la stratégie de relance — les clients VIP sont traités comme des VIP, les clients à haut risque comme tels.</p><p><b>[00:57]</b> Les statistiques de recouvrement — délai moyen de paiement, notation payeur, historique des relances incluant les notes d'appels — sont partagées. Une meilleure coopération entre crédit et recouvrement signifie un DSO plus bas et une meilleure gestion des risques.</p><p><b>[01:14]</b> La collaboration dans Esker fait gagner du temps aux deux équipes et garantit qu'elles travaillent de concert, en exploitant mutuellement leur intelligence pour gérer les risques et encaisser les créances.</p>"},

  {f:"7 - Required Fields in Credit Application",t:"Required Fields in Credit Application",sz:"10.2",
trEN:"<p><b>[00:02]</b> How much time do you waste going back and forth with new customers that don't completely fill out credit applications? How much time would you save with an online application that couldn't be submitted without specific information — or documents for that matter — from your customer?</p><p><b>[00:20]</b> Required fields on credit applications help you collect the information you need about your applicants so that you can make the right credit decisions. While filling out online applications, your customers will know exactly what fields are required and when they've overlooked providing information to you.</p><p><b>[00:40]</b> Esker calls out required fields with a red asterisk and notes when a selection will need backup documentation. For example, tax exempt status — customers literally can't submit incomplete applications. Esker will take them back to the section that is missing data.</p><p><b>[01:00]</b> Additionally, you can track application progress through the home dashboard when you log into Esker. From there you'll find insight into what specifically is missing. For example, this application needs AP contact information. Message co-workers to let them know the application status or ask for their help getting the application submitted.</p><p><b>[01:25]</b> It doesn't have to be a manual process, though. Applications with incomplete information will receive automatic reminders to fill in whatever's missing. When new customers provide complete credit information, onboarding becomes an easier process to manage. Required fields ensure complete applications, saving you time to work on more meaningful tasks.</p>",
trFR:"<p><b>[00:02]</b> Combien de temps perdez-vous en allers-retours avec des prospects qui ne remplissent pas complètement leurs demandes de crédit ? Combien de temps gagneriez-vous avec un formulaire en ligne qui ne peut pas être soumis sans les informations requises — ou les documents justificatifs ?</p><p><b>[00:20]</b> Les champs obligatoires sur les demandes de crédit garantissent que vous collectez les informations nécessaires pour prendre les bonnes décisions. Lors du remplissage, vos clients voient clairement quels champs sont requis et s'ils ont oublié des informations.</p><p><b>[00:40]</b> Esker signale les champs obligatoires avec un astérisque rouge et indique quand une sélection nécessite un document justificatif. Par exemple, le statut d'exemption fiscale — les clients ne peuvent tout simplement pas soumettre une demande incomplète. Esker les ramène à la section où des données manquent.</p><p><b>[01:00]</b> De plus, vous pouvez suivre la progression des demandes via le tableau de bord d'accueil dans Esker. Vous verrez exactement ce qui manque — par exemple, les coordonnées du contact comptabilité fournisseurs. Vous pouvez envoyer un message à vos collègues pour les informer du statut ou demander leur aide.</p><p><b>[01:25]</b> Pas besoin que ce soit manuel : les demandes incomplètes reçoivent automatiquement des rappels pour compléter les informations manquantes. Quand les nouveaux clients fournissent des informations de crédit complètes, l'onboarding devient bien plus facile à gérer. Les champs obligatoires garantissent des dossiers complets et vous font gagner du temps.</p>"},

  {f:"8 - Required Documents in Credit Application",t:"Required Documents in Credit Application",sz:"9.4",
trEN:"<p><b>[00:02]</b> When you have new customers that want to apply for credit terms, it can be challenging when you're not getting all of the information that the credit team needs to be able to approve those new applications. In this video, we'll walk through how Esker is able to require certain documents so that your customers are unable to send in their applications without all of that required information.</p><p><b>[00:24]</b> Here, as a customer, I have an online form to fill in for the credit application. I have different pages where I fill in my information, and when I get to the documents page, I can see that a tax exemption certificate is required because I did note myself as tax exempt.</p><p><b>[00:43]</b> Rather than having to go back and forth with the customer to request these documents after submitting the application, here we actually prevent them from sending that application through. If I were to try to send this through, I get the warning that that required document is missing — prompting me to go back and make sure that I attach that document so that the application is complete.</p><p><b>[01:06]</b> Once this then gets to the credit management team, they'll be able to expedite this information through because they'll have all of the required information that they need to actually process the application.</p><p><b>[01:19]</b> So that was how Esker is able to support required documents through the Credit Management application solution. Thanks so much for watching.</p>",
trFR:"<p><b>[00:02]</b> Quand de nouveaux clients souhaitent demander des conditions de crédit, il est difficile de s'assurer que l'équipe crédit dispose de toutes les informations nécessaires pour approuver ces demandes. Dans cette vidéo, voyons comment Esker peut exiger certains documents pour que les clients ne puissent pas soumettre leur candidature sans toutes les informations requises.</p><p><b>[00:24]</b> Ici, en tant que client, j'ai un formulaire en ligne à remplir. Sur la page des documents, je vois qu'un certificat d'exemption fiscale est requis car j'ai indiqué être exempté de taxe.</p><p><b>[00:43]</b> Plutôt que de faire des allers-retours pour demander ces documents après soumission, Esker empêche l'envoi de la candidature incomplète. Si j'essaie de soumettre, un avertissement m'indique que le document requis est manquant — me ramenant en arrière pour joindre le document nécessaire.</p><p><b>[01:06]</b> Quand la demande arrive à l'équipe crédit, elle peut être traitée rapidement car toutes les informations et documents requis sont déjà présents.</p><p><b>[01:19]</b> Voilà comment Esker gère les documents obligatoires dans la solution Credit Management. Merci d'avoir regardé.</p>"},

]},
{id:"cd",label:"Claims & Deductions",suite:"O2C",icon:"⚖️",folder:"Deduction Claims",videos:[

  {f:"1 - Claims & Deductions Overview",t:"Claims & Deductions Overview (Aaron)",sz:"27.6",
trEN:"<p><b>[00:02]</b> Hi there, Aaron with Esker here. Today I'm going to walk you through a high-level demonstration of our Deductions & Claims solution, focusing on customer success stories to explain how Esker has helped our existing customers and how we can help you as well.</p><p><b>[00:19]</b> One of our existing customers came to Esker because they had over 10,000 trade promotions that they were processing annually. Due to this high volume, they were having a hard time keeping up and were processing those late — that really started causing friction with their customers, especially when they tried to dispute those deductions after a validity date.</p><p><b>[00:42]</b> With Esker, they were able to automate those deductions through our trade promotions, validating if they were valid or not. Automating those that were valid freed up time so they could focus on the ones that weren't and be able to recoup those.</p><p><b>[01:01]</b> Clicking into a sales promotion here, you can see the document provided by the customer on the right, and on the left is Esker's validation screen. We've extracted information off of the document using our Esker Synergy AI technologies. Here we're validating that all of this information is correct — we have 3 green checks, meaning everything has been validated against the ERP. But additionally, we're also checking that this promotion the customer is referencing is valid. I can see that this discount they are taking is valid. We have everything automated here — because it was 100% validated, it could go through automatically. If you wish to have a workflow, you can set that up as well.</p><p><b>[02:03]</b> Another customer came to us because they also had a lot of promotional agreements that were really hard to track — it was hard to stay accurate for accounting purposes and cash application. By using the Esker solution and those automated trade promotions, they were able to save 500 hours, processing 50% of their promotional invoices in less than a minute. This also gave them great visibility into what claims were being processed.</p><p><b>[02:36]</b> Looking at another sales promotion, we can see what would happen if the customer is taking something that is not valid. We're running this against known trade promotions — this one is past the due date, this one does not exist, and this one, the customer took too high of a deduction. We're able to validate and give visibility into what is not an existing promotion so that it can be resolved.</p><p><b>[03:09]</b> You can also reach out to your customer from the solution. If they're taking something that is not valid, you can request documentation here. You can also attach additional documentation — maybe from the carrier regarding damage or backup from the customer that this is a valid deduction. All of that can be attached here. Once the final approver receives the deduction claim, they'll be able to have everything all in one place for quick visibility into whether or not this is valid.</p><p><b>[03:50]</b> This was a high-level overview of the Deductions & Claims solution — how we can process trade promotions automatically and also process through different claims from your customers. Thanks for watching.</p>",
trFR:"<p><b>[00:02]</b> Bonjour, ici Aaron d'Esker. Aujourd'hui, je vais vous présenter une démonstration de notre solution Deductions & Claims, en m'appuyant sur des retours clients pour illustrer comment Esker a aidé nos clients existants et comment nous pouvons vous aider aussi.</p><p><b>[00:19]</b> Un de nos clients traitait plus de 10 000 promotions commerciales par an. Ce volume élevé entraînait des retards de traitement, créant des frictions avec leurs clients — surtout lorsqu'ils tentaient de contester des déductions après la date de validité.</p><p><b>[00:42]</b> Avec Esker, ils ont pu automatiser la validation de ces déductions via les promotions commerciales. L'automatisation des déductions valides a libéré du temps pour se concentrer sur celles qui ne l'étaient pas et les récupérer.</p><p><b>[01:01]</b> En ouvrant une promotion commerciale : à droite, le document fourni par le client ; à gauche, l'écran de validation Esker. Les informations sont extraites grâce aux technologies d'IA Esker Synergy. Trois coches vertes = tout validé contre l'ERP. On vérifie aussi que la promotion référencée est valide. Tout étant validé à 100%, le traitement est entièrement automatisé. Un workflow d'approbation peut être ajouté si souhaité.</p><p><b>[02:03]</b> Un autre client avait beaucoup d'accords promotionnels difficiles à suivre, avec des problèmes de fiabilité comptable et de rapprochement de trésorerie. Grâce à Esker et aux promotions automatisées, ils ont économisé 500 heures et traité 50% de leurs factures promotionnelles en moins d'une minute — avec une visibilité accrue sur les réclamations traitées.</p><p><b>[02:36]</b> Autre exemple : une promotion non valide. La vérification contre les promotions connues révèle : une dépassant la date limite, une inexistante, et une déduction trop élevée. Esker identifie et signale ces écarts pour résolution.</p><p><b>[03:09]</b> On peut aussi contacter le client directement depuis la solution pour demander des justificatifs. Les documents complémentaires (justificatifs transporteur, preuves de dommage, etc.) peuvent être attachés. L'approbateur final dispose de tout en un seul endroit pour une décision rapide.</p><p><b>[03:50]</b> Voilà un aperçu de la solution Deductions & Claims — traitement automatisé des promotions commerciales et gestion des réclamations clients. Merci d'avoir regardé.</p>"},

  {f:"1 - Claims & Deductions Overview (Bethany)",t:"Claims & Deductions Overview (Bethany)",sz:"29.4",
trEN:"<p><b>[00:00]</b> In this video I'll be doing a high-level walkthrough of the Claims & Deductions solution. I'll be throwing in some different customer stories to give you context on how the solution has helped them and how it could help you in your situation.</p><p><b>[00:14]</b> For one of our customers, their biggest issue was the general process around claims and deductions. This might sound familiar — they were using a disorganized Outlook inbox, passing back and forth Excel files. They had no visibility, and things were getting lost and sitting for multiple days before getting processed. But with Esker, they were able to save 500 CSR hours per year on that claims resolution process.</p><p><b>[00:46]</b> Coming into one claim here — this is for missing products. On the right-hand side, you're always going to see that claim document, whether that's the body of an email or a formatted document. And on the left-hand side are fields that Esker is either pulling from that document or from an open AR file. We're categorizing the claim type as you can see at the top. Scrolling down, we can see the line items as well as the workflow.</p><p><b>[01:13]</b> For one of our customers, their biggest concern was the communication back and forth as well as searching for related documents. Over 50% of the time spent resolving claims was related to that communication and those ancillary documents. In Esker, we are pulling in reference numbers — invoice, PO number, delivery note number — as applicable from the open AR file or the document.</p><p><b>[01:42]</b> We also facilitate communication in a variety of ways. The internal conversations tool can be used to communicate internally, or you can send a message to the customer utilizing email. I can select a template — maybe I want to ask for a packing slip or proof of delivery. I can attach the claim and send it out. I can also add a comment to note what I've discovered on this claim.</p><p><b>[02:19]</b> Maybe we want to wait for a response from the customer. From here, I've done all that I need to do and I can save this claim.</p><p><b>[02:27]</b> Now let's skip over to the final step, which is to post. For another one of our customers, the biggest thing was their workflow. They were using their ERP for workflow, meaning IT had to get heavily involved anytime they wanted to make modifications. In Esker, the workflow is super easy to configure — it can be based on the total dollar amount of the claim or the claim type, and it doesn't require any IT involvement to change. Here you can see all the previous people in the workflow and any comments they've added. For the final approver, most fields are read-only — I'm just giving it that last review before marking it as resolved.</p><p><b>[03:18]</b> For that same customer, they were having issues not being able to tell where that claim was in the resolution process, who it was sitting with, and how long it had been there. But with our reporting, we're able to see where it's at, how long it has taken to resolve, and who is the next person that needs to go in and resolve that claim.</p><p><b>[03:39]</b> From here I can mark this one as resolved since it's completed, and that can get posted to the ERP.</p><p><b>[03:51]</b> Coming back to the dashboard, we have great reports and metrics that allow our customers to dive into what their team is actually doing. They also provide an opportunity to offer a white-glove experience to certain customers. One of our customers wanted to drill down into their top customers — how long were claims taking to process, what was the claim amount — so they could really try to reduce those processing times for those specific customers.</p><p><b>[04:20]</b> That was an overview of the Claims & Deductions solution with Esker. If you have any questions, don't hesitate to reach out. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous présenter une vue d'ensemble de la solution Claims & Deductions, avec des retours clients pour illustrer comment la solution les a aidés et comment elle peut vous aider.</p><p><b>[00:14]</b> Un de nos clients avait un processus désorganisé — boîte Outlook encombrée, fichiers Excel échangés en va-et-vient, aucune visibilité, des réclamations perdues ou en attente pendant plusieurs jours. Avec Esker, ils ont économisé 500 heures CSR par an sur le processus de résolution des réclamations.</p><p><b>[00:46]</b> Voici une réclamation pour produits manquants. À droite : le document de réclamation (corps d'email ou document formaté). À gauche : les champs extraits par Esker depuis le document ou le fichier AR ouvert. Le type de réclamation est catégorisé en haut. En dessous : les lignes d'articles et le workflow.</p><p><b>[01:13]</b> Chez un autre client, la communication et la recherche de documents représentaient plus de 50% du temps de résolution. Esker extrait automatiquement les références — facture, bon de commande, bon de livraison — depuis le fichier AR ou le document.</p><p><b>[01:42]</b> La communication est facilitée : outil de conversations internes pour les échanges en interne, ou envoi d'email au client via des modèles prédéfinis — par exemple pour demander un bon de livraison ou une preuve de réception. On peut attacher la réclamation et ajouter des commentaires.</p><p><b>[02:27]</b> Étape finale : le post vers l'ERP. Un autre client avait un workflow géré dans l'ERP, nécessitant l'IT pour chaque modification. Dans Esker, le workflow se configure facilement — par montant ou type de réclamation, sans intervention IT. L'historique du workflow est visible : intervenants précédents, commentaires. L'approbateur final voit les champs en lecture seule pour une dernière revue.</p><p><b>[03:18]</b> Ce même client n'avait pas de visibilité sur l'avancement des réclamations. Le reporting Esker montre où en est chaque réclamation, depuis combien de temps, et qui doit intervenir ensuite.</p><p><b>[03:51]</b> Retour au tableau de bord : rapports et métriques pour analyser l'activité de l'équipe. Possibilité d'offrir un traitement premium à certains clients — par exemple, analyser les délais de traitement et montants des réclamations des clients principaux pour réduire les temps de traitement.</p><p><b>[04:20]</b> Voilà un aperçu de la solution Claims & Deductions d'Esker. N'hésitez pas à nous contacter. Merci d'avoir regardé.</p>"},

  {f:"2 - Auto Approval of Trade Promotions and Tracking Accrual Balances",t:"Auto Approval of Trade Promotions & Tracking Accrual Balances",sz:"14.8",
trEN:"<p><b>[00:00]</b> Managing trade promotions and their accrual balances can often be a time-consuming and tedious task for many accounting teams. Esker's Claims & Deductions module can help alleviate this process by really being the source of truth and checking the validity of those trade promotions, or automatically approving them to the next step in the workflow.</p><p><b>[00:21]</b> Esker can accomplish this by either mirroring and connecting to your trade promotion system, or you can treat Esker as the source of truth and kick off those trade promotions on a customer-by-customer basis. So let's jump into a quick example.</p><p><b>[00:38]</b> Here we have an example within the verification stage. On the right-hand side, we have a backup document that's been sourced from a specific portal or fed into Esker via forwarding rules. We can see Esker's AI extraction engine at work — wherever we see those green lines is where we're extracting off the layout of that document, not a specific template.</p><p><b>[01:02]</b> We pulled those fields into the solution, and on the left-hand side, we're checking the validity of those specific trades. We have two that look good and one that's giving us some insight into a potential warning. Scrolling right, we can see all the fields we commonly work with. In this case, because we are tracking the accrual of how many trades this customer has taken, we can flag once they've exceeded that balance — just one of the checks and balances to make sure we're approving or rejecting this claim in a timely manner.</p><p><b>[01:38]</b> Some other tools that align with automatically approving: let's say there is not a backup document and you want to auto-approve anything under $200 — that's an easy rule. Or another example, we could forward this to the salesperson if they are missing that backup document. Really a lot of tools at your fingertips to make sure we're getting this backup document in the right hands, or auto-approving once you feel confident with both the extraction and the workflow rules in place.</p><p><b>[02:07]</b> So that was a quick run-through of some of the automated tools to manage trade promotions within the Claims & Deductions module.</p>",
trFR:"<p><b>[00:00]</b> La gestion des promotions commerciales et de leurs provisions cumulées est souvent chronophage et fastidieuse pour les équipes comptables. Le module Claims & Deductions d'Esker allège ce processus en servant de source de vérité pour valider les promotions ou les approuver automatiquement vers l'étape suivante du workflow.</p><p><b>[00:21]</b> Esker peut se connecter à votre système de promotions commerciales en miroir, ou servir directement de référence pour gérer les promotions client par client.</p><p><b>[00:38]</b> Exemple en phase de vérification : à droite, le document justificatif (issu d'un portail ou de règles de transfert). Le moteur d'extraction IA d'Esker repère les champs directement sur le layout du document (pas de template spécifique).</p><p><b>[01:02]</b> Les champs extraits sont vérifiés à gauche : deux promotions valides, une avec un avertissement. Esker suit le cumul des promotions par client et signale les dépassements de solde — un des contrôles garantissant l'approbation ou le rejet dans les délais.</p><p><b>[01:38]</b> Autres outils d'automatisation : approbation automatique sous un seuil (ex. $200), transfert au commercial si le justificatif est manquant. De nombreuses options pour s'assurer que le bon document arrive au bon interlocuteur, ou que l'approbation automatique est déclenchée dès que les règles d'extraction et de workflow sont satisfaites.</p><p><b>[02:07]</b> Voilà un aperçu rapide des outils automatisés de gestion des promotions commerciales dans le module Claims & Deductions.</p>"},

  {f:"3 - Supporting Documents",t:"Supporting Documents",sz:"13.6",
trEN:"<p><b>[00:02]</b> When processing claims, one big challenge is gathering all of the different documents to support the claim. This might include pictures, bills of lading, proofs of delivery, etcetera. Often these live in multiple different systems — email, maybe a carrier website, etcetera. And these documents need to be provided to each person in the approval workflow to be able to approve or deny those claims.</p><p><b>[00:30]</b> In this video, we'll focus on Esker's ability to gather all of those documents into one form so that it's easy to review and approve or deny claims.</p><p><b>[00:42]</b> Going into a claim document, I can see the claim received from my customer. They say they're missing products — so maybe I need to reach out internally using the internal conversation tool to request the bill of lading. I can reach out and ask that from my team.</p><p><b>[01:01]</b> Once I receive that information, I can get it attached into the additional documentation. I already have a proof of delivery added in, and now I'm also going to add the bill of lading.</p><p><b>[01:18]</b> Now that I've attached all of the different documents needed to support this claim, I can go ahead and request approval. The next person in the workflow — the supply chain approvers group — is going to receive this claim with all of the information they need to make an important decision. Once they're able to review, they can then approve or deny that claim.</p><p><b>[01:44]</b> So this was Esker's option to support additional documentation within Claims & Deductions so that approvers have all of the information required to pass it along for approval, and the approvers have everything they need to quickly review and approve.</p>",
trFR:"<p><b>[00:02]</b> Un des grands défis du traitement des réclamations : rassembler tous les documents justificatifs — photos, lettres de transport, preuves de livraison, etc. Ces documents sont souvent dispersés dans plusieurs systèmes (email, sites transporteurs) et doivent être fournis à chaque intervenant du workflow d'approbation.</p><p><b>[00:30]</b> Cette vidéo montre comment Esker centralise tous ces documents en un seul formulaire pour faciliter la revue et l'approbation ou le rejet des réclamations.</p><p><b>[00:42]</b> En ouvrant une réclamation pour produits manquants, on peut utiliser l'outil de conversation interne pour demander la lettre de transport à l'équipe logistique.</p><p><b>[01:01]</b> Une fois reçus, les documents sont attachés à la réclamation — preuve de livraison déjà ajoutée, plus la lettre de transport.</p><p><b>[01:18]</b> Avec tous les justificatifs réunis, on demande l'approbation. Le groupe suivant dans le workflow (approbateurs supply chain) reçoit la réclamation complète avec toute l'information nécessaire pour décider d'approuver ou rejeter.</p><p><b>[01:44]</b> Voilà comment Esker permet de centraliser la documentation complémentaire dans Claims & Deductions, pour que chaque approbateur dispose de tout le nécessaire pour une décision rapide.</p>"},

  {f:"4- Validate Against Materials",t:"Validate Against Materials",sz:"13.2",
trEN:"<p><b>[00:04]</b> Customers often create their own item numbers and don't use the item numbers created from your ERP. This can cause challenges when processing claims, as you need to identify the correct ERP item number so that you can create a credit or debit.</p><p><b>[00:18]</b> This video is going to walk you through how to use Esker's material mapping options, which allow us to automate the mapping of your customer's item numbers to the ERP item numbers. If this is something that you maintain in your ERP today, we can import this at the beginning of the project to give you a jump start on those known mappings.</p><p><b>[00:37]</b> In the first example, we'll see that the customer sent in the product Maxik Tech R3133. Scrolling down to my item table, I can see this is what was pulled off of the document, but we already have it mapped to the correct ERP material. So if we know those mappings ahead of time, we can automate this and push it through without any intervention.</p><p><b>[01:04]</b> In the second example, we are still validating those materials. We extract it off of the document, but we validated that this is not the correct ERP material — this doesn't exist in my ERP today. So I can fix this on the fly by searching to find the correct material number.</p><p><b>[01:28]</b> Once I found the correct material number, we'll make that mapping and it will be saved. So the next time that this customer sends in something for that item, we'll know it relates to the correct ERP material.</p><p><b>[01:42]</b> This was to show you how to map your materials — either by bringing them in a file at the beginning of the project or creating them on the fly. Esker is able to save this information and save you time the next time those customers use that item number for a claim.</p>",
trFR:"<p><b>[00:04]</b> Les clients utilisent souvent leurs propres références articles, différentes de celles de votre ERP. Cela complique le traitement des réclamations : il faut identifier le bon article ERP pour créer un avoir ou un débit.</p><p><b>[00:18]</b> Cette vidéo présente les options de mapping matière d'Esker, qui permettent d'automatiser la correspondance entre les références client et les références ERP. Si ce mapping existe dans votre ERP, on peut l'importer au début du projet.</p><p><b>[00:37]</b> Premier exemple : le client a envoyé le produit Maxik Tech R3133. Dans la table articles, la référence extraite du document est déjà mappée à la bonne matière ERP. Si le mapping est connu, le traitement est automatisé sans intervention.</p><p><b>[01:04]</b> Deuxième exemple : la validation identifie que la référence extraite n'existe pas dans l'ERP. On peut corriger à la volée en recherchant la bonne référence matière.</p><p><b>[01:28]</b> Une fois trouvée, le mapping est enregistré. La prochaine fois que ce client enverra cette référence, Esker fera automatiquement la correspondance.</p><p><b>[01:42]</b> Voilà comment mapper vos matières — par import de fichier au début du projet ou création à la volée. Esker mémorise ces correspondances pour gagner du temps à chaque réclamation future.</p>"},

]},
{id:"cim",label:"Customer Inquiries",suite:"O2C",icon:"💬",folder:"Customer Inquiries",videos:[

  {f:"1 - Customer Inquiries Overview",t:"Customer Inquiries Overview",sz:"27.6",
trEN:"<p><b>[00:01]</b> Hello everyone, today I'll be walking through an overview of the Customer Inquiries solution. I'm going to be throwing in some different customer stories — why they came to us in the first place and what results they were able to achieve — to give you a better feel for what this solution can do.</p><p><b>[00:18]</b> To start off, I'm going to send in two different emails. One is an order status request and the other is a new purchase order.</p><p><b>[00:33]</b> One prospect came to us and they had two full-time people — supervisors actually — managing email inboxes, determining which emails to send to which customer service reps to process. It took them days to sift through and then respond to those inquiries. You can imagine this wasn't the level of service they wanted to provide to their customers.</p><p><b>[00:54]</b> In Esker, we're able to do all of the triaging and classification in the background. That customer was able to go from 2 full-time people doing that job to having it all done in the background, allowing those supervisors more time to actually spend developing their team.</p><p><b>[01:09]</b> You can see here on the dashboard we have multiple different counters and queues. These categories are just different options that we frequently see our customers utilizing. However, these can be exactly what you would need for your specific business application.</p><p><b>[01:27]</b> One prospect came to us because they were spending way too much time gathering information to respond over and over again to similar requests. This is an example of a customer reaching out for a status on their order. For questions like these, sometimes CSRs have to go to multiple different systems — maybe an ERP, a 3PL, or a carrier site — and it takes a lot of time to gather that information, confirm the data is accurate, and then formulate that response to the customer.</p><p><b>[01:54]</b> What we're able to do in our solution is once we receive that incoming request, we classify it. As you can see on the left-hand side, we've pulled in that order number, which has then allowed us to identify any related information. We're then formulating that response. So as a customer service rep, all I have to do is come in here, quickly read through that response and either send it out directly by clicking send, or click edit, make any minor changes as needed, and then simply send it out to the customer.</p><p><b>[02:27]</b> Now that I've sent out that response, I'm simply going to archive this inquiry to complete it. If they reply to that inquiry, we're not going to lose visibility to that response — we have full visibility on the dashboard in a specific queue dedicated to inquiries with new messages.</p><p><b>[02:46]</b> One manager came to us and their biggest issue was the lack of visibility on what their team was working on, what was taking the most time, how long it was taking for customers to get responses. They just had no idea on the effectiveness of their team and really no way to track progress. But with the Esker solution, not only did they have the dashboard and categorization, they also had metrics and reporting that allowed them to see where they could improve their day-to-day to in turn improve the customer experience.</p><p><b>[03:16]</b> Finally, we're also able to classify specific inquiries as priority — track inquiries that are beyond a certain SLA and indicate inquiries where the customer is upset. That was a huge win for one of our customers, being able to help determine the priority of those responses so the most critical ones can get resolved as quickly as possible.</p><p><b>[03:40]</b> That was an overview of our Customer Inquiries solution. We talked about our AI classification, how we can gather information, formulate responses, and facilitate getting those sent out. Finally, we talked about visibility and metrics. If you have any questions, don't hesitate to reach out. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour à tous, aujourd'hui je vais vous présenter une vue d'ensemble de la solution Customer Inquiries. J'intègrerai des retours clients pour illustrer pourquoi ils nous ont choisis et les résultats obtenus.</p><p><b>[00:18]</b> Pour commencer, j'envoie deux emails : une demande de statut de commande et un nouveau bon de commande.</p><p><b>[00:33]</b> Un prospect avait deux superviseurs à plein temps pour trier manuellement les emails entrants et les distribuer aux représentants du service client. Le traitement prenait des jours — loin du niveau de service qu'ils visaient.</p><p><b>[00:54]</b> Avec Esker, le triage et la classification se font automatiquement en arrière-plan. Ce client est passé de 2 personnes à plein temps sur cette tâche à un traitement entièrement automatisé, libérant du temps pour le développement de l'équipe.</p><p><b>[01:09]</b> Le tableau de bord propose des compteurs et files d'attente par catégorie — personnalisables selon les besoins métier de chaque entreprise.</p><p><b>[01:27]</b> Un autre prospect passait trop de temps à rassembler les informations pour répondre aux demandes récurrentes. Pour une simple question de statut de commande, les CSR devaient consulter plusieurs systèmes (ERP, 3PL, site transporteur), vérifier les données, puis rédiger la réponse.</p><p><b>[01:54]</b> Avec Esker, dès réception de la demande, on la classifie, on extrait le numéro de commande, on identifie les informations associées et on formule la réponse. Le représentant n'a plus qu'à relire, éventuellement ajuster, et envoyer directement.</p><p><b>[02:27]</b> Après envoi, l'enquête est archivée. Si le client répond, elle réapparaît dans une file dédiée « Inquiries with New Messages » — aucune perte de visibilité.</p><p><b>[02:46]</b> Un responsable manquait de visibilité sur l'activité de son équipe : temps de traitement, volumes, efficacité. Avec Esker, le tableau de bord, la catégorisation et les métriques lui ont permis d'identifier les axes d'amélioration et d'optimiser l'expérience client.</p><p><b>[03:16]</b> Esker classifie aussi les demandes prioritaires — dépassement de SLA, clients mécontents — pour que les cas les plus critiques soient traités en premier.</p><p><b>[03:40]</b> Voilà un aperçu de la solution Customer Inquiries : classification IA, collecte d'informations, formulation de réponses, et métriques de visibilité. Merci d'avoir regardé.</p>"},

  {f:"2 - AI-Assisted Replies",t:"AI-Assisted Replies",sz:"14.2",
trEN:"<p><b>[00:00]</b> Many customer service reps are faced with repetitive tasks of responding to inquiries that come in day in, day out. Sometimes these inquiries are not as easy to respond to as others — maybe they require searching for data from the ERP system, a carrier site, a 3PL, or a variety of other sources.</p><p><b>[00:21]</b> In this video, I'm going to walk through how Esker can help with creating a response and assist that customer service rep in quickly answering the customer.</p><p><b>[00:32]</b> Here we have an order status question. The email says: do you have a status on my order, it should be arriving soon — and they provided the PO number. We were able to classify the customer, classify the type, and from there pull in all of the applicable information from a variety of sources.</p><p><b>[00:51]</b> From here, we're crafting that response. This can either be a template-based response or you can utilize GPT for a more dynamic response to that customer. As a customer service rep, I can quickly scan through, read this, and either send it out if it's good to go — or if I want to make edits, maybe add some personalization or highlight some information, I can do that. I can also add other recipients and attachments.</p><p><b>[01:25]</b> I'm ready to send out this response. You can see how Esker can assist customer service reps in answering those inquiries quickly, pulling information from a variety of sources so that they don't have to do those tasks over and over again.</p><p><b>[01:44]</b> From here, I'm going to archive and close out this inquiry. If the customer responds to that thread, we would simply see that in the Inquiries with New Messages queue.</p><p><b>[02:01]</b> Hopefully that was a helpful overview of how Esker can help facilitate communication — not only by crafting a response, but by pulling data from multiple locations to use in that response.</p>",
trFR:"<p><b>[00:00]</b> Les représentants du service client font face à des tâches répétitives : répondre aux mêmes types de demandes jour après jour. Certaines nécessitent de chercher des informations dans l'ERP, chez un transporteur, un 3PL ou d'autres sources.</p><p><b>[00:21]</b> Cette vidéo montre comment Esker aide à créer des réponses et à accélérer le traitement des demandes clients.</p><p><b>[00:32]</b> Exemple : une question sur le statut d'une commande. Le client fournit son numéro de commande. Esker classifie le client, le type de demande, et récupère automatiquement les informations pertinentes depuis différentes sources.</p><p><b>[00:51]</b> Esker prépare la réponse — soit via un template, soit avec GPT pour une réponse plus dynamique. Le représentant n'a qu'à relire, personnaliser si besoin, ajouter des destinataires ou pièces jointes, et envoyer.</p><p><b>[01:25]</b> Esker accélère considérablement la réponse en récupérant automatiquement les données depuis plusieurs sources — fini les tâches répétitives de recherche.</p><p><b>[01:44]</b> L'enquête est archivée après envoi. Si le client répond, la demande réapparaît dans la file « Inquiries with New Messages ».</p><p><b>[02:01]</b> Voilà comment Esker facilite la communication : rédaction assistée de réponses et agrégation de données multi-sources.</p>"},

  {f:"3 - AI Classification and Triage",t:"AI Classification & Triage",sz:"13.6",
trEN:"<p><b>[00:01]</b> Many customer service departments struggle with the volume of emails they receive. These can easily pile up, causing important emails to be lost and a poor customer experience. In some cases, full-time people are assigned to the task of sorting through an inbox with the hopes of not missing any key items and trying to stay ahead of those ever-increasing requests.</p><p><b>[00:22]</b> This video will be focusing on how Esker can automatically classify and prioritize incoming emails. So let's dive in.</p><p><b>[00:31]</b> I'm going to send in two different emails. The first one is an order status request. The second is a new purchase order. On the dashboard you can see that there are many categories — these are examples of what we commonly see across customer service departments, but these categories will be whatever is applicable to your business.</p><p><b>[00:57]</b> By using a variety of AI technologies, we're able to accurately classify those incoming emails, providing a quick view to users so they know exactly what they need to work on. In addition to categories like order question and availability request, we're also able to identify those emails coming in with negative or mixed sentiment — identifying upset customers.</p><p><b>[01:22]</b> By doing this, we can help users appropriately manage their workload. This classification frees up valuable time from the customer service teams as they no longer have to spend time manually triaging that inbox.</p><p><b>[01:38]</b> Now you can see that the counter increased for those two emails I sent in. We've received another order question and we've routed another inquiry to our Order Management solution.</p><p><b>[01:50]</b> To summarize, in this video we reviewed how Esker can classify incoming emails to categories that you would define, to free up customer service time, provide visibility of those emails, and help process them more efficiently.</p>",
trFR:"<p><b>[00:01]</b> Beaucoup de services client croulent sous le volume d'emails. Les demandes s'accumulent, des emails importants sont perdus, et l'expérience client en souffre. Parfois, des personnes à plein temps sont affectées au tri de la boîte de réception.</p><p><b>[00:22]</b> Cette vidéo montre comment Esker classifie et priorise automatiquement les emails entrants.</p><p><b>[00:31]</b> Deux emails envoyés : une demande de statut de commande et un nouveau bon de commande. Le tableau de bord affiche des catégories personnalisables selon les besoins métier.</p><p><b>[00:57]</b> Grâce à des technologies d'IA variées, Esker classifie précisément les emails entrants. Au-delà des catégories (question commande, disponibilité), Esker détecte aussi le sentiment négatif ou mixte — identifiant les clients mécontents.</p><p><b>[01:22]</b> Cette classification libère un temps précieux : plus besoin de trier manuellement la boîte de réception.</p><p><b>[01:38]</b> Les compteurs se mettent à jour en temps réel. La question commande est classifiée, le bon de commande est routé directement vers la solution Order Management.</p><p><b>[01:50]</b> En résumé : Esker classifie les emails entrants dans des catégories personnalisées, libère du temps, offre de la visibilité et accélère le traitement.</p>"},

  {f:"4 - Metrics and SLA Monitoring",t:"Metrics & SLA Monitoring",sz:"14.4",
trEN:"<p><b>[00:01]</b> One big challenge that customer service departments face today is not having the metrics, reporting, or visibility of their overall process. Without these metrics, it's hard to see what the team is working on and what service level is being provided to the customers.</p><p><b>[00:16]</b> In this video, I'm going to walk through how Esker can help support with the overall visibility, metrics, and reporting.</p><p><b>[00:24]</b> As you can see on this dashboard, we have multiple different reports available out-of-the-box — if you want to measure average response time and resolution time, see which customers are submitting the most inquiries, or track fluctuations in those inquiries. To help identify an underlying cause of high inquiry times, any data within Customer Inquiries can easily be reported on. We enable you as a user to create those reports easily, making sure you're focusing on the things that are important to you.</p><p><b>[01:03]</b> Let's get into an example report. All of our reports are going to have that graph at the top — this one is showing inquiries by customer. They're all going to have the actual data listed right below, so you can drill down and see that data right there. It's easy to edit these reports — let's say you want to filter this down to just your top five customers. You can also print out these reports or export that raw data to be used in some other reporting tool. Or finally, you can schedule these reports to get sent out on a one-time or recurring basis — maybe you want upper-level management to have visibility to some of those reports.</p><p><b>[01:51]</b> In this video, I talked about how Esker's Customer Inquiries solution improves overall visibility for your team by providing those metrics and reporting tools so that you can really track what's going on in the customer service team. Ultimately, this enables you to see where you're doing well, where you need to improve, and track any changes over time.</p>",
trFR:"<p><b>[00:01]</b> Un défi majeur des services client : le manque de métriques, de reporting et de visibilité sur le processus global. Sans ces indicateurs, difficile de savoir ce sur quoi l'équipe travaille et quel niveau de service est fourni.</p><p><b>[00:16]</b> Cette vidéo présente comment Esker améliore la visibilité, les métriques et le reporting.</p><p><b>[00:24]</b> Le tableau de bord propose des rapports prêts à l'emploi : temps de réponse moyen, temps de résolution, clients soumettant le plus de demandes, fluctuations des volumes. Toutes les données de Customer Inquiries sont reportables. Les rapports sont faciles à créer et à personnaliser.</p><p><b>[01:03]</b> Exemple de rapport : demandes par client, avec graphique en haut et données détaillées en dessous. On peut filtrer (top 5 clients), imprimer, exporter les données brutes, ou planifier l'envoi récurrent — par exemple pour la direction.</p><p><b>[01:51]</b> La solution Customer Inquiries d'Esker améliore la visibilité globale avec des métriques et du reporting pour suivre l'activité du service client, identifier les points forts et les axes d'amélioration, et mesurer l'évolution dans le temps.</p>"},

  {f:"5 - Inquiry and Document Routing",t:"Inquiry & Document Routing",sz:"10.6",
trEN:"<p><b>[00:01]</b> In this video, I'll be talking through how Esker can classify and then route incoming emails as applicable, to help speed up processing time and eliminate the need to manually categorize and route those emails.</p><p><b>[00:15]</b> An example of this is our order routing. I'm going to send in an email — this is a new purchase order. Let's say you have our Order Management solution as well. After our AI technology identifies the incoming email as an order, it can get sent directly to the Order Management solution without anyone having to look at it. This helps make sure that those orders are getting processed as quickly as possible.</p><p><b>[00:42]</b> But this can apply to a variety of different emails that you may receive. Each of these queues here will have a specific routing applicable to that category. For instance, maybe invoice-related questions I want to send to my AR department and those orders go to Order Management.</p><p><b>[01:02]</b> Let's go into one example. This is actually an invoice question. Right now I have that routing set to email. All this could happen in the background — however, for this example, I'm pulling it up to show you how easy it is to set those defaults or change them. If for whatever reason I didn't want to email it out and simply wanted to archive it and respond directly from this platform, all I have to do is click that dropdown, change that routing method, and I'm good to go.</p><p><b>[01:31]</b> Routing really just helps make sure that the right people are looking at that inquiry as quickly as possible so that we can make sure it's resolved in a timely manner for the customer.</p>",
trFR:"<p><b>[00:01]</b> Cette vidéo présente comment Esker classifie et route automatiquement les emails entrants pour accélérer le traitement et supprimer le triage manuel.</p><p><b>[00:15]</b> Exemple : routage de commandes. Un email contenant un nouveau bon de commande est identifié par l'IA et envoyé directement vers la solution Order Management — sans intervention humaine. Résultat : les commandes sont traitées au plus vite.</p><p><b>[00:42]</b> Ce principe s'applique à tous les types d'emails. Chaque file a un routage spécifique par catégorie : les questions factures vers le département AR, les commandes vers Order Management.</p><p><b>[01:02]</b> Exemple avec une question facture : le routage par défaut est configuré sur email, mais on peut le modifier en un clic — archiver et répondre directement depuis la plateforme, par exemple. La configuration est simple et ne nécessite aucune intervention IT.</p><p><b>[01:31]</b> Le routage garantit que la bonne personne traite la demande au plus vite pour une résolution rapide.</p>"},

  {f:"6 - Salesforce Case Creation",t:"Salesforce Case Creation",sz:"8.6",
trEN:"<p><b>[00:02]</b> In this video, I'll be walking through Esker's ability to automatically create and close cases in Salesforce from the Customer Inquiries solution. We recognize that many customer service departments are working with a large digital landscape — they may have to provide information to multiple different teams using different software tools.</p><p><b>[00:21]</b> For companies that are utilizing Salesforce, Esker has a prebuilt connector that allows us to create cases either when an inquiry is received, when one is saved, or archived — to make sure that we're keeping information in Salesforce as up-to-date as possible for any other teams that may be utilizing that for information.</p><p><b>[00:41]</b> Coming into this example, you can see I have a link to view the case in Salesforce. If I click this link, it will bring me to that case where I can see all of the relevant information that was created in real time when I was working in Esker. You can also see a link back to that Esker inquiry.</p><p><b>[01:02]</b> Esker's Salesforce Connector allows for simplifying the customer service representative's workload as they can utilize the Customer Inquiries tool and all of its benefits — such as routing those inquiries, responding to inquiries, and all the reporting — while still being able to maintain other systems such as Salesforce in real time without doing any manual work.</p>",
trFR:"<p><b>[00:02]</b> Cette vidéo présente la capacité d'Esker à créer et clôturer automatiquement des cases dans Salesforce depuis la solution Customer Inquiries. Les services client travaillent souvent avec un paysage digital complexe et plusieurs outils logiciels.</p><p><b>[00:21]</b> Pour les entreprises utilisant Salesforce, Esker dispose d'un connecteur préintégré qui crée des cases à la réception, sauvegarde ou archivage d'une enquête — maintenant Salesforce à jour en temps réel pour toutes les équipes.</p><p><b>[00:41]</b> Exemple : un lien direct vers le case Salesforce est disponible depuis Esker. Toutes les informations sont créées en temps réel pendant le traitement dans Esker. Un lien retour vers l'enquête Esker est aussi disponible dans Salesforce.</p><p><b>[01:02]</b> Le connecteur Salesforce simplifie le travail des CSR : ils utilisent Customer Inquiries avec tous ses avantages (routage, réponses, reporting) tout en maintenant Salesforce à jour automatiquement — sans aucun travail manuel.</p>"},

  {f:"7 - Communicating Internally and Externally",t:"Communicating Internally & Externally",sz:"13.6",
