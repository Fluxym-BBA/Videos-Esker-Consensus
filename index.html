trEN:"<p><b>[00:00]</b> In this video, I'll be walking through how Esker can help facilitate communication both internally and externally within the Customer Inquiries Management solution.</p><p><b>[00:10]</b> When processing inquiries, there are times when help is needed from other departments or team members prior to responding to the customer. Rather than toggling between Customer Inquiries, email, and maybe your IM system — having communication regarding an inquiry in multiple locations — the internal conversations feature helps facilitate that communication in an organized way. A major benefit is that all communication is archived with the inquiry.</p><p><b>[00:38]</b> Here's an example: a customer is reaching out about lead time on an item. If I need to reach out to the shipping department, I simply add the right person to the conversation and send them a quick message. Olivia will get an email notification with a link bringing her to Esker to view the screen. If she responds back, I will receive a notification and can relay the information to the customer and archive this inquiry. Or, depending on the level of access, Olivia could send the message directly to the customer from Esker.</p><p><b>[01:17]</b> Utilizing customer conversations — when using them, GPT or dynamic templates can assist in crafting responses. These drafts can be utilized directly and sent to the customer, edited, or a user can start from scratch. I can add different recipients, either internal or external, and even save contacts for future communication.</p><p><b>[01:40]</b> Once I send this out, the customer will receive it via email. When they respond, I will have visibility to that on my dashboard in the Inquiries with New Messages queue, regardless of whether I have closed out this inquiry or not.</p><p><b>[01:55]</b> That was an overview of communication features in Esker and how they can help facilitate communication to rapidly resolve inquiries.</p>",
trFR:"<p><b>[00:00]</b> Cette vidéo présente comment Esker facilite la communication interne et externe dans la solution Customer Inquiries.</p><p><b>[00:10]</b> Le traitement des demandes nécessite parfois l'aide d'autres départements. Plutôt que de jongler entre Customer Inquiries, email et messagerie instantanée, la fonctionnalité de conversations internes centralise les échanges de manière organisée. Tout est archivé avec la demande.</p><p><b>[00:38]</b> Exemple : un client demande un délai de livraison. On ajoute la bonne personne (département expédition) à la conversation. Olivia reçoit un email avec un lien vers Esker. Si elle répond, une notification est envoyée pour relayer l'information au client. Selon les droits d'accès, Olivia peut aussi répondre directement au client depuis Esker.</p><p><b>[01:17]</b> Pour les conversations client, GPT ou les templates dynamiques aident à rédiger les réponses. On peut envoyer le brouillon tel quel, le modifier, ou repartir de zéro. Possibilité d'ajouter des destinataires internes ou externes et de sauvegarder des contacts.</p><p><b>[01:40]</b> Le client reçoit la réponse par email. S'il répond, la demande réapparaît dans la file « Inquiries with New Messages » — que l'enquête soit clôturée ou non.</p><p><b>[01:55]</b> Voilà les fonctionnalités de communication Esker pour résoudre rapidement les demandes.</p>"},

  {f:"8 - Sentiment analysis",t:"Sentiment Analysis",sz:"11.0",
trEN:"<p><b>[00:00]</b> Being able to know if a customer is upset before even looking at an email is a huge win for customer service departments. Working these emails right away is crucial to avoid repeat emails, phone calls, or losing a customer.</p><p><b>[00:15]</b> This video will be focused on how Esker can automatically identify and categorize inquiries based on customer sentiment. This visibility gives users and managers the ability to prioritize and address those inquiries right away.</p><p><b>[00:31]</b> This classification of negative, mixed, or positive sentiment is accomplished automatically as soon as the email reaches the platform. Through Esker, we also have reporting capabilities — trends can be tracked over time by customer, inquiry type, or other important metrics for your business.</p><p><b>[00:52]</b> Now let's go in and see how Esker classified an email inquiry as negative. In my queue, we have 5 classified as negative or mixed. Let's go into this example.</p><p><b>[01:07]</b> On the right-hand side, I can see we have an upset customer — their shipment was damaged. Esker is looking for a combination of things in the email like multiple exclamation points, capital letters, and keywords to make the determination. On the left, I can see it was correctly classified as negative sentiment.</p><p><b>[01:27]</b> Now I can take action on this email by responding to the customer, forwarding to another department, or doing further investigation myself.</p><p><b>[01:36]</b> So this was an overview of how Esker can support email sentiment analysis and the benefits of the feature. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Savoir si un client est mécontent avant même de lire son email est un avantage considérable. Traiter ces emails en priorité est crucial pour éviter les relances, appels téléphoniques ou pertes de clients.</p><p><b>[00:15]</b> Cette vidéo montre comment Esker identifie et catégorise automatiquement les demandes selon le sentiment client — permettant aux utilisateurs et managers de prioriser les réponses.</p><p><b>[00:31]</b> La classification (sentiment négatif, mixte ou positif) est automatique dès réception de l'email. Le reporting permet de suivre les tendances dans le temps par client, type de demande ou autre métrique.</p><p><b>[00:52]</b> Exemple : 5 demandes classifiées comme négatives ou mixtes dans la file. Un client mécontent dont la livraison est endommagée.</p><p><b>[01:07]</b> Esker analyse une combinaison d'éléments : points d'exclamation, lettres majuscules, mots-clés. Le sentiment négatif est correctement détecté.</p><p><b>[01:27]</b> On peut alors agir : répondre au client, transférer à un autre département, ou investiguer davantage.</p><p><b>[01:36]</b> Voilà comment Esker gère l'analyse de sentiment des emails. Merci d'avoir regardé.</p>"},

  {f:"9 - Order status information",t:"Order Status Information",sz:"12.6",
trEN:"<p><b>[00:00]</b> Order status questions are very common in customer service departments. These simple inquiries can take customer service teams away from more value-add activities and from providing customers the service they need.</p><p><b>[00:13]</b> In this video, I'll be walking through how Esker streamlines and automates these inquiry types. By presenting order status information to the user, customer service no longer has to look in multiple systems to retrieve this data. This functionality reduces errors and speeds up the resolution time.</p><p><b>[00:32]</b> Even if you're getting a phone call about an order, you can log that inquiry in Esker, keeping all customer interactions in one central location.</p><p><b>[00:40]</b> Now let's dive in and process this order question. On the right side, I can see the customer is asking about the status of their order and has provided the order number. Immediately when Esker receives the inquiry, we look in our system for that order and display everything we have about it. For this one, I see it's for Milton and Milton Company. We have the order number in our system. If Esker has the documents, I can view the order, order confirmation, and advance shipment notice. Additionally, we have other important data points here, including the tracking link.</p><p><b>[01:21]</b> With this one, Esker has done all the work. We've pre-drafted the response using our AI-assisted or dynamic message templates that you can configure. So now I can send an email to the customer, archive the inquiry, and my job is done.</p><p><b>[01:40]</b> This was a brief overview of how Esker can have order status details in the system and streamline the answering of these questions. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Les questions de statut de commande sont très fréquentes dans les services client. Ces demandes simples mobilisent les équipes et les détournent d'activités à plus forte valeur ajoutée.</p><p><b>[00:13]</b> Cette vidéo montre comment Esker rationalise et automatise ces types de demandes. En présentant directement les informations de statut, le service client n'a plus besoin de consulter plusieurs systèmes. Cela réduit les erreurs et accélère la résolution.</p><p><b>[00:32]</b> Même pour un appel téléphonique, on peut enregistrer la demande dans Esker — toutes les interactions client sont centralisées.</p><p><b>[00:40]</b> Exemple : le client demande le statut de sa commande et fournit le numéro. Dès réception, Esker recherche la commande et affiche toutes les informations disponibles : client, numéro de commande, documents associés (commande, confirmation, avis d'expédition), lien de suivi.</p><p><b>[01:21]</b> Esker a fait tout le travail : réponse pré-rédigée via les templates IA ou dynamiques configurables. Il ne reste qu'à envoyer l'email au client et archiver la demande.</p><p><b>[01:40]</b> Voilà comment Esker centralise les informations de statut de commande et accélère le traitement de ces demandes. Merci d'avoir regardé.</p>"},

// =============================================================================
// STATE & HELPERS
// =============================================================================
let curMod=null,curVid=null;
function getUrl(m,v){return url(m.suite,m.folder,v.f)}

// =============================================================================
// SIDEBAR
// =============================================================================
function initSb(){
  const sb=document.getElementById("sb");
  const g={S2P:[],O2C:[]};
  M.forEach(m=>{if(m.suite==="S2P")g.S2P.push(m);else g.O2C.push(m)});
  const labels={S2P:"Source-to-Pay",O2C:"Order-to-Cash"};
  let h="";
  for(const[k,mods]of Object.entries(g)){
    h+='<div class="sb-group"><div class="sb-title">'+labels[k]+'</div>';
    mods.forEach(m=>{
      h+='<div class="sb-item" data-id="'+m.id+'" onclick="sel(\''+m.id+'\')">'
        +'<span class="sb-icon">'+m.icon+'</span>'+m.label
        +'<span class="sb-cnt">'+m.videos.length+'</span>'
        +'<span class="sb-arr">→</span></div>';
    });
    h+='</div>';
    if(k==="S2P")h+='<div class="sb-div"></div>';
  }
  sb.innerHTML=h;
  let tot=0,szTotal=0;
  M.forEach(m=>{tot+=m.videos.length;m.videos.forEach(v=>{szTotal+=parseFloat(v.sz||0)})});
  document.getElementById("sT").textContent=tot;
  document.getElementById("sD").textContent=(szTotal/1024).toFixed(1)+" Go";
}

// =============================================================================
// SELECT MODULE
// =============================================================================
function sel(id){
  const mod=M.find(m=>m.id===id);if(!mod)return;
  curMod=mod;curVid=null;
  document.querySelectorAll(".sb-item").forEach(e=>e.classList.remove("on"));
  const el=document.querySelector('.sb-item[data-id="'+id+'"]');if(el)el.classList.add("on");
  const mn=document.getElementById("mn");
  mn.innerHTML=
    '<div class="mh"><div class="mh-bc"><b>'+mod.suite+'</b> › '+mod.label+'</div>'
    +'<h1><span>'+mod.icon+'</span> '+mod.label+'</h1>'
    +'<div class="mh-sub">'+mod.videos.length+' vidéos · '+mod.videos.reduce((a,v)=>a+parseFloat(v.sz||0),0).toFixed(0)+' Mo</div></div>'
    +'<div class="player-layout" id="pl">'
      +'<div class="player-main">'
        +'<div class="player-frame" id="pf">'
          +'<div class="player-empty"><div class="player-empty-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><p>Sélectionnez une vidéo ci-dessous</p></div>'
        +'</div>'
        +'<div class="player-bar"><div class="player-bar-t"><span class="pdot" id="pd"></span><span id="pt">—</span></div><div class="player-bar-m" id="pm"></div></div>'
      +'</div>'
      +'<div class="player-tr">'
        +'<div class="player-tr-head">'
          +'<div class="player-tr-label">Transcript</div>'
			+'<div class="player-tr-tabs">'
			  +'<button class="player-tr-tab on" onclick="ptab(this,\'en\')">🇬🇧 English</button>'
			  +'<button class="player-tr-tab" onclick="ptab(this,\'fr\')">🇫🇷 Français</button>'
			  +'<button class="player-tr-tab" onclick="dltr()" title="Télécharger le transcript" style="margin-left:auto">⬇ Download</button>'
			+'</div>'
        +'</div>'
        +'<div id="ptr-en" class="player-tr-body"></div>'
        +'<div id="ptr-fr" class="player-tr-body" style="display:none"></div>'
        +'<div id="ptr-empty" class="player-tr-empty">Sélectionnez une vidéo pour afficher le transcript</div>'
      +'</div>'
    +'</div>'
    +'<div class="fbar"><div class="fsearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
    +'<input type="text" id="fi" placeholder="Filtrer les vidéos..."></div>'
    +'<div class="fcnt" id="fc">'+mod.videos.length+' vidéos</div></div>'
    +'<div class="vgrid" id="vg"></div>';
  renderCards(mod);
  document.getElementById("fi").addEventListener("input",function(){
    const q=this.value.toLowerCase();let c=0;
    document.querySelectorAll(".vcard").forEach(e=>{const ok=e.dataset.t.toLowerCase().includes(q);e.style.display=ok?"":"none";if(ok)c++});
    document.getElementById("fc").textContent=c+" vidéo"+(c>1?"s":"");
  });
}

// =============================================================================
// RENDER CARDS
// =============================================================================
function renderCards(mod){
  const g=document.getElementById("vg");
  g.innerHTML=mod.videos.map((v,i)=>{
    const p=curVid===i;
    const hasT=v.trEN&&v.trEN.length>0;
    return '<div class="vcard ani d'+(i%6+1)+(p?' playing':'')+'" data-i="'+i+'" data-t="'+v.t+'">'
      +'<div class="vcard-top" onclick="play('+i+')">'
      +'<div class="vcard-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>'
      +'<div class="vcard-num">Vidéo '+(i+1)+'</div>'
      +'<h3>'+v.t+'</h3></div>'
      +'<div class="vcard-bot" onclick="play('+i+')">'
      +'<span class="vcard-sz">'+v.sz+' Mo</span></div>'
      +(hasT?'<div class="vcard-xpand" onclick="xpand(this)">Transcript <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>'
      +'<div class="vcard-transcript"><div class="tr-tabs">'
      +'<div class="tr-tab on" onclick="stab(this,\'en\')">🇬🇧 English</div>'
      +'<div class="tr-tab" onclick="stab(this,\'fr\')">🇫🇷 Français</div></div>'
      +'<div class="tr-body" data-l="en">'+v.trEN+'</div>'
      +'<div class="tr-body hide" data-l="fr">'+v.trFR+'</div></div>'
      :'<div class="vcard-xpand" onclick="xpand(this)">Transcript <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>'
      +'<div class="vcard-transcript"><div class="tr-tabs">'
      +'<div class="tr-tab on" onclick="stab(this,\'en\')">🇬🇧 English</div>'
      +'<div class="tr-tab" onclick="stab(this,\'fr\')">🇫🇷 Français</div></div>'
      +'<div class="tr-body" data-l="en"><em style="color:var(--gray-400)">Transcript coming soon...</em></div>'
      +'<div class="tr-body hide" data-l="fr"><em style="color:var(--gray-400)">Transcript bientôt disponible...</em></div></div>')
      +'</div>';
  }).join("");
}

// =============================================================================
// PLAY VIDEO
// =============================================================================
function play(i){
  if(!curMod)return;curVid=i;
  const v=curMod.videos[i],u=getUrl(curMod,v);
  // Update video
  document.getElementById("pf").innerHTML='<iframe src="'+u+'" allowfullscreen allow="autoplay"></iframe>';
  document.getElementById("pt").textContent=v.t;
  document.getElementById("pd").classList.add("on");
  document.getElementById("pm").innerHTML='📁 '+curMod.folder+' · '+v.sz+' Mo';
  
  // Update transcript panel
  const hasTr=v.trEN&&v.trEN.length>0;
  const pl=document.getElementById("pl");
  const ptrEn=document.getElementById("ptr-en");
  const ptrFr=document.getElementById("ptr-fr");
  const ptrEmpty=document.getElementById("ptr-empty");
  
  if(hasTr){
    pl.classList.add("has-tr");
    ptrEn.innerHTML=v.trEN;
    ptrFr.innerHTML=v.trFR||'<em style="color:var(--gray-400)">Traduction bientôt disponible...</em>';
    ptrEmpty.style.display="none";
    ptrEn.style.display="";
    // Keep current lang selection
    const activeLang=document.querySelector(".player-tr-tab.on");
    if(activeLang&&activeLang.textContent.includes("Français")){
      ptrEn.style.display="none";ptrFr.style.display="";
    }else{
      ptrEn.style.display="";ptrFr.style.display="none";
    }
  }else{
    pl.classList.remove("has-tr");
    ptrEn.innerHTML="";ptrFr.innerHTML="";
    ptrEmpty.style.display="";ptrEn.style.display="none";ptrFr.style.display="none";
  }
  
  // Scroll & highlight card
  document.getElementById("pl").scrollIntoView({behavior:"smooth",block:"start"});
  document.querySelectorAll(".vcard").forEach(c=>c.classList.remove("playing"));
  const card=document.querySelector('.vcard[data-i="'+i+'"]');if(card)card.classList.add("playing");
  renderCards(curMod);
}

// =============================================================================
// TRANSCRIPT
// =============================================================================
function xpand(el){el.closest(".vcard").classList.toggle("expanded")}
function stab(el,l){
  const c=el.closest(".vcard");
  c.querySelectorAll(".tr-tab").forEach(t=>t.classList.remove("on"));el.classList.add("on");
  c.querySelectorAll(".tr-body").forEach(b=>{b.classList.toggle("hide",b.dataset.l!==l)});
}
function ptab(el,l){
  document.querySelectorAll(".player-tr-tab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");
  const en=document.getElementById("ptr-en"),fr=document.getElementById("ptr-fr");
  if(l==='en'){en.style.display="";fr.style.display="none"}
  else{en.style.display="none";fr.style.display=""}
}
function dltr(){
  if(!curMod||curVid===null)return;
  const v=curMod.videos[curVid];
  const isEN=document.getElementById("ptr-en").style.display!=="none";
  const lang=isEN?"en":"fr";
  const html=isEN?v.trEN:v.trFR;
  if(!html)return;
  // Parse each <p> separately and add spacing between timecoded blocks
  const tmp=document.createElement("div");
  tmp.innerHTML=html;
  const paragraphs=tmp.querySelectorAll("p");
  let txt="";
  paragraphs.forEach((p,i)=>{
    if(i>0)txt+="\n\n\n"; // 2 blank lines before each timecode
    txt+=p.textContent.trim();
  });
  const safeName=v.t.replace(/[^a-zA-Z0-9À-ÿ\s\-]/g,"").trim();
  const filename=safeName+" - Transcript "+lang.toUpperCase()+".txt";
  const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
// =============================================================================
// GLOBAL SEARCH
// =============================================================================
document.getElementById("gSearch").addEventListener("input",function(){
  const q=this.value.toLowerCase().trim();
  if(!q){if(curMod)sel(curMod.id);return;}
  let r=[];
  M.forEach(mod=>{mod.videos.forEach((v,i)=>{
    if(v.t.toLowerCase().includes(q)||mod.label.toLowerCase().includes(q))r.push({mod,v,i});
  })});
  const mn=document.getElementById("mn");
  mn.innerHTML='<div class="mh"><div class="mh-bc">Recherche globale</div>'
    +'<h1><span>🔍</span> '+r.length+' résultat'+(r.length>1?'s':'')+'</h1>'
    +'<div class="mh-sub">pour «'+this.value+'»</div></div>'
    +'<div class="vgrid">'+r.map((x,j)=>{
      return '<div class="vcard ani d'+(j%6+1)+'" onclick="sel(\''+x.mod.id+'\');setTimeout(()=>play('+x.i+'),100)">'
        +'<div class="vcard-top"><div class="vcard-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>'
        +'<div class="vcard-num">'+x.mod.icon+' '+x.mod.label+'</div>'
        +'<h3>'+x.v.t+'</h3></div>'
        +'<div class="vcard-bot"><span class="vcard-sz">'+x.v.sz+' Mo</span></div></div>';
    }).join("")+'</div>';
});

// INIT
initSb();
</script>
