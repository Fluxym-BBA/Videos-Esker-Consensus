  {f:"1 - Supplier Inquiry Overview",t:"Supplier Inquiry Overview",sz:"73.5",
trEN:"<p><b>[00:02]</b> Hello everyone, today I'll be walking through another view of the Supplier Inquiry solution. I'm going to be throwing in some different customer stories — why they came to us in the first place and what results they were able to achieve.</p><p><b>[00:15]</b> To give you a better feel for what this solution can do: one prospect came to us and they had two full-time people — supervisors actually — managing email inboxes, determining which emails to send to which department or employees to process. It took them too much time to find out and then respond to those inquiries. You can imagine this wasn't the best way to keep a good relationship with their suppliers.</p><p><b>[00:43]</b> In Esker, we're able to do all of the triage and classification in the background. That customer was able to go from two full-time people doing that job to having it all done in the background, allowing those supervisors more time to actually spend developing their team.</p><p><b>[01:01]</b> You can see here on the dashboard we have multiple different counters and queues. These categories are just different options that we frequently see our customers utilizing. However, this can be exactly what you would need for your specific business application.</p><p><b>[01:22]</b> Let's go ahead and get into an example. Let's consider an accounts payable team spending way too much time gathering information to respond over and over again to similar requests. This is an example of a supplier reaching out for a status on their invoice.</p><p><b>[01:39]</b> With a question like this, accountants have to go to their financial system or ERP and retrieve the right invoice. It can take a lot of time to find the invoice, gather the required information, confirm the data is accurate, and then formulate that response to the supplier.</p><p><b>[01:57]</b> But what we're able to do in our solution is: once we receive that incoming request, we classify it. As you can see on the left-hand side, we've pulled in that invoice number, which has then allowed us to identify any related information and formulate that response.</p><p><b>[02:16]</b> So as an AP specialist, now all I have to do is come in here, quickly read through that response and either send it out directly by clicking Send, or I can go ahead and click Edit, make any minor changes as needed, and then simply send it out to my supplier.</p><p><b>[02:35]</b> Now that I've sent out my response, I'm simply going to archive this inquiry to complete it. If they reply to the response that I sent out, we have full visibility on the dashboard in a specific queue dedicated to inquiries with new messages.</p><p><b>[02:55]</b> One manager came to us and their biggest issue was the lack of visibility on what their team was working on, what was taking the most time, how long it was taking for suppliers to get responses, et cetera. They just had no idea of the effectiveness of their team and really no way to track progress.</p><p><b>[03:14]</b> But with the Esker solution, not only did they have the dashboard and categorization, they also had metrics and reporting that allowed them to see where they could improve their day-to-day activities to enhance their supplier relationships.</p><p><b>[03:29]</b> Finally, we're also able to classify specific inquiries as priority, tracking queries that are beyond certain SLAs and indicating inquiries where the supplier is upset. That was a huge win for our customers — being able to help determine the priority of those responses so the most critical ones can get resolved as quickly as possible.</p><p><b>[03:54]</b> That was another view of our Supplier Inquiry solution. We talked about AI classification, how we can retrieve information, formulate responses, and facilitate getting those sent out. Finally, we talked about visibility and metrics to give you a better feel for how other customers have benefited from this solution. If you have any questions, don't hesitate to reach out to us. And thanks for taking the time to watch this video.</p>",
trFR:"<p><b>[00:02]</b> Bonjour à tous, aujourd'hui je vais vous présenter une autre vue de la solution Supplier Inquiry. Je vais intégrer quelques retours clients — pourquoi ils sont venus nous voir et quels résultats ils ont pu obtenir.</p><p><b>[00:15]</b> Pour vous donner une meilleure idée de ce que cette solution peut faire : un prospect est venu nous voir avec deux personnes à temps plein — des superviseurs en fait — qui géraient les boîtes e-mail, déterminant quels emails envoyer à quel département ou employé pour traitement. Cela leur prenait trop de temps pour analyser puis répondre à ces demandes. Vous imaginez que ce n'était pas la meilleure façon de maintenir de bonnes relations avec leurs fournisseurs.</p><p><b>[00:43]</b> Avec Esker, nous sommes capables de réaliser tout le triage et la classification en arrière-plan. Ce client est passé de deux personnes à temps plein effectuant ce travail à une automatisation complète en arrière-plan, libérant du temps pour que ces superviseurs puissent se consacrer au développement de leur équipe.</p><p><b>[01:01]</b> Vous pouvez voir ici sur le tableau de bord que nous avons plusieurs compteurs et files d'attente. Ces catégories sont simplement les différentes options que nous voyons fréquemment chez nos clients. Cependant, elles peuvent être adaptées exactement à vos besoins métier spécifiques.</p><p><b>[01:22]</b> Prenons un exemple. Considérons une équipe comptabilité fournisseurs qui passe beaucoup trop de temps à rassembler des informations pour répondre encore et encore à des demandes similaires. Voici un exemple de fournisseur qui demande le statut de sa facture.</p><p><b>[01:39]</b> Avec ce type de question, les comptables doivent aller dans leur système financier ou ERP pour retrouver la bonne facture. Cela peut prendre beaucoup de temps : trouver la facture, rassembler les informations requises, confirmer l'exactitude des données, puis formuler la réponse au fournisseur.</p><p><b>[01:57]</b> Ce que notre solution permet : dès réception de la demande entrante, nous la classifions. Comme vous pouvez le voir sur le côté gauche, nous avons extrait le numéro de facture, ce qui nous a permis d'identifier toutes les informations associées et de formuler la réponse.</p><p><b>[02:16]</b> En tant que spécialiste AP, tout ce que j'ai à faire est de venir ici, lire rapidement la réponse et soit l'envoyer directement en cliquant sur Envoyer, soit cliquer sur Modifier pour apporter des ajustements mineurs, puis l'envoyer à mon fournisseur.</p><p><b>[02:35]</b> Maintenant que j'ai envoyé ma réponse, je vais simplement archiver cette demande pour la clôturer. Si le fournisseur répond à mon message, nous avons une visibilité complète sur le tableau de bord dans une file dédiée aux demandes avec de nouveaux messages.</p><p><b>[02:55]</b> Un responsable est venu nous voir et son plus gros problème était le manque de visibilité sur ce que son équipe traitait, ce qui prenait le plus de temps, combien de temps les fournisseurs attendaient leurs réponses, etc. Il n'avait aucune idée de l'efficacité de son équipe et aucun moyen de suivre la progression.</p><p><b>[03:14]</b> Avec la solution Esker, non seulement ils disposaient du tableau de bord et de la catégorisation, mais aussi de métriques et de rapports leur permettant d'identifier les axes d'amélioration de leurs activités quotidiennes pour renforcer leurs relations fournisseurs.</p><p><b>[03:29]</b> Enfin, nous sommes aussi capables de classifier certaines demandes comme prioritaires, de suivre les requêtes dépassant certains SLAs et d'identifier les demandes où le fournisseur est mécontent. C'est un gain majeur pour nos clients — pouvoir déterminer la priorité des réponses afin que les cas les plus critiques soient résolus le plus rapidement possible.</p><p><b>[03:54]</b> Voilà une autre vue de notre solution Supplier Inquiry. Nous avons parlé de la classification IA, de la récupération d'informations, de la formulation de réponses et de leur envoi. Enfin, nous avons abordé la visibilité et les métriques pour illustrer comment d'autres clients ont bénéficié de cette solution. Si vous avez des questions, n'hésitez pas à nous contacter. Merci d'avoir pris le temps de regarder cette vidéo.</p>"},

  {f:"2 - AI Classification and Triage",t:"AI Classification and Triage",sz:"41.6",
trEN:"<p><b>[00:02]</b> Many supplier management departments struggle with the volume of emails they receive. This can easily pile up, causing important emails to be lost and deteriorating supplier relationships.</p><p><b>[00:14]</b> In some cases, full-time people are assigned to the task of sorting through an inbox with the hopes of not missing any key items and trying to stay ahead of those ever-increasing requests. This video will be focusing on how Esker can meet this need and automatically classify and prioritize incoming emails.</p><p><b>[00:35]</b> So let's dive in to see how it works. To start off, I'm going to be sending in three different emails. The first one is an invoice status request asking what is the status of their invoice and when it will be paid. The second one is an overdue invoice reminder with a kind of negative tone. The last one is a request to change bank account details.</p><p><b>[01:06]</b> On the dashboard, you can see that there are many categories. These are examples of what we commonly see across supplier management departments, but these categories will be whatever is applicable to your business.</p><p><b>[01:20]</b> By using a variety of AI technologies, we're able to accurately classify those incoming emails, providing a quick view to users so they know exactly what they need to work on. In addition to categories like invoice questions, overdue payment reminders, and supplier information updates, we're also able to identify those emails coming in with negative or mixed sentiment — so identifying our upset suppliers.</p><p><b>[01:50]</b> By doing this, we can help users appropriately manage their workload. This classification frees valuable time for supplier management teams as they no longer have to spend time manually triaging that inbox.</p><p><b>[02:06]</b> Now you can see that the counter increased for those three emails that I sent in. I've received another invoice question, an additional overdue payment reminder, and a supplier information update. We're also able to route invoices automatically to the Accounts Payable solution.</p><p><b>[02:26]</b> To summarize, in this video we reviewed how Esker can classify incoming emails to categories that you would define, to free up supplier management department time, provide visibility of those emails, and help process those emails more efficiently.</p>",
trFR:"<p><b>[00:02]</b> De nombreux départements de gestion fournisseurs peinent face au volume d'emails reçus. Ceux-ci peuvent facilement s'accumuler, entraînant la perte d'emails importants et la détérioration des relations fournisseurs.</p><p><b>[00:14]</b> Dans certains cas, des personnes à temps plein sont affectées au tri de la boîte de réception dans l'espoir de ne manquer aucun élément clé et de faire face aux demandes toujours croissantes. Cette vidéo se concentre sur la façon dont Esker peut répondre à ce besoin et classifier automatiquement les emails entrants par priorité.</p><p><b>[00:35]</b> Voyons comment cela fonctionne. Pour commencer, je vais envoyer trois emails différents. Le premier est une demande de statut de facture demandant où en est leur facture et quand elle sera payée. Le deuxième est un rappel de facture en retard avec un ton plutôt négatif. Le dernier est une demande de modification de coordonnées bancaires.</p><p><b>[01:06]</b> Sur le tableau de bord, vous pouvez voir qu'il existe de nombreuses catégories. Ce sont des exemples de ce que nous voyons couramment dans les départements de gestion fournisseurs, mais ces catégories seront adaptées à votre activité.</p><p><b>[01:20]</b> Grâce à diverses technologies d'IA, nous sommes capables de classifier précisément ces emails entrants, offrant une vue rapide aux utilisateurs pour qu'ils sachent exactement sur quoi travailler. En plus de catégories comme les questions sur les factures, les rappels de paiement en retard et les mises à jour d'informations fournisseurs, nous pouvons aussi identifier les emails au sentiment négatif ou mitigé — identifiant ainsi les fournisseurs mécontents.</p><p><b>[01:50]</b> Ce faisant, nous aidons les utilisateurs à gérer leur charge de travail de manière appropriée. Cette classification libère un temps précieux pour les équipes de gestion fournisseurs qui n'ont plus à trier manuellement leur boîte de réception.</p><p><b>[02:06]</b> Vous pouvez voir que les compteurs ont augmenté pour les trois emails envoyés. J'ai reçu une nouvelle question sur une facture, un rappel de paiement en retard supplémentaire et une mise à jour d'informations fournisseur. Nous pouvons aussi acheminer automatiquement les factures vers la solution Comptabilité Fournisseurs.</p><p><b>[02:26]</b> En résumé, dans cette vidéo nous avons vu comment Esker peut classifier les emails entrants dans des catégories que vous définissez, pour libérer du temps au département de gestion fournisseurs, offrir de la visibilité sur ces emails et aider à les traiter plus efficacement.</p>"},

  {f:"3 - Inquiry and Document Routing",t:"Inquiry and Document Routing",sz:"33.6",
trEN:"<p><b>[00:01]</b> In this video, we'll be talking through how Esker can classify and then route, as applicable, incoming emails to help speed up that processing time and eliminate the need to manually categorize and route those emails.</p><p><b>[00:16]</b> So an example of this is our invoice routing. You can see here an example of a supplier invoice that has been sent by email. Let's say that if you have our Accounts Payable solution as well, after our AI technology identifies the incoming email as an invoice, it can get sent directly to the AP solution without anyone having to look at it.</p><p><b>[00:40]</b> This helps make sure that those invoices are getting processed as quickly as possible. But this can apply to a variety of different emails that you may receive.</p><p><b>[00:52]</b> So each of these queues here will have a specific routing applicable to that category. For instance, we might want to send the supplier information updates to our Supplier Management department and those invoices go to Accounts Payable.</p><p><b>[01:08]</b> Let's go into one example. This is actually an invoice question. Right now I have that routing set to email. Now, all this could happen in the background. However, for example, I'm pulling it up to show you how easy it is to set those defaults and change them.</p><p><b>[01:29]</b> If for whatever reason I didn't want to email it out and I simply wanted to archive it and respond directly from this platform, all I have to do is click that dropdown, change that routing method, and I'm good to go.</p><p><b>[01:45]</b> So again, routing really just helps make sure that the right people are looking at that inquiry as quickly as possible so that we can make sure that it's resolved in a timely manner for the supplier.</p>",
trFR:"<p><b>[00:01]</b> Dans cette vidéo, nous allons voir comment Esker peut classifier puis router, selon les cas, les emails entrants pour accélérer le temps de traitement et éliminer le besoin de catégoriser et router manuellement ces emails.</p><p><b>[00:16]</b> Un exemple concret est le routage des factures. Vous voyez ici un exemple de facture fournisseur envoyée par email. Si vous disposez également de notre solution Comptabilité Fournisseurs, dès que notre technologie IA identifie l'email entrant comme une facture, il peut être envoyé directement vers la solution AP sans intervention humaine.</p><p><b>[00:40]</b> Cela garantit que les factures sont traitées le plus rapidement possible. Mais cela s'applique aussi à une variété d'autres types d'emails que vous pourriez recevoir.</p><p><b>[00:52]</b> Chacune de ces files d'attente possède un routage spécifique à sa catégorie. Par exemple, nous pourrions vouloir envoyer les mises à jour d'informations fournisseurs au département Gestion des Fournisseurs, et les factures à la Comptabilité Fournisseurs.</p><p><b>[01:08]</b> Voyons un exemple. Il s'agit d'une question sur une facture. Actuellement, le routage est configuré par email. Tout cela pourrait se passer en arrière-plan, mais je l'affiche ici pour vous montrer la facilité de configuration et de modification des paramètres par défaut.</p><p><b>[01:29]</b> Si pour une raison quelconque je ne souhaitais pas envoyer par email et que je voulais simplement archiver et répondre directement depuis cette plateforme, il me suffit de cliquer sur la liste déroulante, changer la méthode de routage, et c'est fait.</p><p><b>[01:45]</b> Le routage aide simplement à s'assurer que les bonnes personnes consultent cette demande le plus rapidement possible, afin qu'elle soit résolue dans les meilleurs délais pour le fournisseur.</p>"},

  {f:"4 - Sentiment Analysis",t:"Sentiment Analysis",sz:"35.1",
trEN:"<p><b>[00:02]</b> Being able to know if a supplier is upset before even looking at an email is a huge win for a supplier management department. Working these emails right away is crucial to avoid repeat emails, phone calls, or disappointing a supplier.</p><p><b>[00:17]</b> This video will be focused on how Esker can meet the need to automatically identify and categorize inquiries based on supplier sentiment. This visibility gives users and managers the ability to prioritize and address those inquiries right away.</p><p><b>[00:37]</b> This classification of negative, mixed, or positive sentiment is accomplished automatically as soon as the email reaches the platform. Through Esker, we also have reporting capabilities. Trends can be tracked over time by supplier inquiry type or other important metrics for your business.</p><p><b>[00:57]</b> Now let's go in and see how Esker classified an email inquiry as negative. In my queue we have three inquiries classified as negative or mixed. Let's go into this example.</p><p><b>[01:12]</b> On the right-hand side I can see we have an upset supplier. An invoice is pending to be paid and our supplier advises to act promptly, explaining the consequences if we don't. Esker is looking for a combination of things in the email — like multiple exclamation points, capital letters, and keywords — to make the determination. On the left I can see it was correctly classified as negative.</p><p><b>[01:43]</b> Now we can take action on this email by responding to the supplier, forwarding to another department, or doing further investigation.</p><p><b>[01:53]</b> So this was an overview of how Esker can support email sentiment analysis and the benefits of the feature. Thanks for watching.</p>",
trFR:"<p><b>[00:02]</b> Pouvoir savoir si un fournisseur est mécontent avant même d'ouvrir un email est un atout majeur pour un département de gestion fournisseurs. Traiter ces emails immédiatement est crucial pour éviter les relances, les appels téléphoniques ou de décevoir un fournisseur.</p><p><b>[00:17]</b> Cette vidéo se concentre sur la capacité d'Esker à identifier et catégoriser automatiquement les demandes selon le sentiment du fournisseur. Cette visibilité donne aux utilisateurs et aux managers la capacité de prioriser et traiter ces demandes immédiatement.</p><p><b>[00:37]</b> Cette classification en sentiment négatif, mitigé ou positif est réalisée automatiquement dès que l'email arrive sur la plateforme. Esker propose également des capacités de reporting. Les tendances peuvent être suivies dans le temps par type de demande fournisseur ou selon d'autres métriques importantes pour votre activité.</p><p><b>[00:57]</b> Voyons maintenant comment Esker a classifié une demande email comme négative. Dans ma file, j'ai trois demandes classifiées comme négatives ou mitigées. Prenons cet exemple.</p><p><b>[01:12]</b> Sur le côté droit, je vois que nous avons un fournisseur mécontent. Une facture est en attente de paiement et le fournisseur nous demande d'agir rapidement, nous expliquant les conséquences en cas de non-action. Esker recherche une combinaison d'éléments dans l'email — points d'exclamation multiples, lettres majuscules et mots-clés — pour effectuer cette détermination. Sur la gauche, je peux voir qu'il a été correctement classifié comme négatif.</p><p><b>[01:43]</b> Nous pouvons maintenant agir sur cet email en répondant au fournisseur, en le transférant à un autre département, ou en menant une investigation plus approfondie.</p><p><b>[01:53]</b> Voilà un aperçu de la façon dont Esker peut supporter l'analyse de sentiment des emails et les avantages de cette fonctionnalité. Merci d'avoir regardé.</p>"},

  {f:"5 - AI-Assisted Replies",t:"AI-Assisted Replies",sz:"39.4",
trEN:"<p><b>[00:02]</b> Many procurement and finance teams are flooded with inquiries from suppliers. They spend time on repetitive tasks of responding, and sometimes these inquiries are not as easy to respond to as others. Maybe they require searching for data and getting it from the ERP system.</p><p><b>[00:22]</b> In this video I'm going to walk through how Esker can help with creating a response and assist procurement and accounts payable teams in quickly answering suppliers.</p><p><b>[00:34]</b> So here we have an invoice status question. The email says: \"Did you correctly receive my invoice?\" Notice that the invoice number has been provided in the email. We were able to retrieve the supplier, classify the type of inquiry, and from there pull in all the applicable information and even display the invoice from the link.</p><p><b>[00:58]</b> From here we are crafting that response. This can be either a template-based response or you can utilize ChatGPT for a more dynamic response to that supplier.</p><p><b>[01:11]</b> From here, as an AP specialist, I can quickly scan through, read this and either send it out if it's good to go, or if I want to make any edits — maybe add some sort of personalization or adjust some information — I can do that here. If I want to add another recipient, I can add them as well, and I can add attachments.</p><p><b>[01:34]</b> I'm ready to go ahead and send out this response. So you can see how Esker can assist accounts payable and procurement teams in answering those inquiries quickly, pulling accurate information from trusted sources so that the AP specialist doesn't have to do those tasks over and over again.</p><p><b>[01:55]</b> From here, I'm ready to go ahead and archive and close out this inquiry. Now that I've archived that inquiry, it's off my plate. If the supplier would have another question and respond to that thread, we would simply see that in the inquiries with new messages queue here.</p><p><b>[02:15]</b> So hopefully that was a helpful overview of how Esker can help facilitate communication — not only by crafting a response, but by pulling accurate data from relevant sources to build that response.</p>",
trFR:"<p><b>[00:02]</b> De nombreuses équipes achats et finance sont submergées de demandes de fournisseurs. Elles passent du temps sur des tâches répétitives de réponse, et parfois ces demandes ne sont pas aussi simples à traiter que d'autres. Elles nécessitent peut-être de rechercher des données dans le système ERP.</p><p><b>[00:22]</b> Dans cette vidéo, je vais montrer comment Esker peut aider à créer une réponse et assister les équipes achats et comptabilité fournisseurs pour répondre rapidement aux fournisseurs.</p><p><b>[00:34]</b> Nous avons ici une question sur le statut d'une facture. L'email dit : « Avez-vous bien reçu ma facture ? » Notez que le numéro de facture a été fourni dans l'email. Nous avons pu retrouver le fournisseur, classifier le type de demande et à partir de là récupérer toutes les informations pertinentes, voire afficher la facture via le lien.</p><p><b>[00:58]</b> À partir de là, nous rédigeons la réponse. Celle-ci peut être basée sur un modèle ou utiliser ChatGPT pour une réponse plus dynamique au fournisseur.</p><p><b>[01:11]</b> En tant que spécialiste AP, je peux rapidement parcourir et lire la réponse, puis soit l'envoyer directement si elle convient, soit effectuer des modifications — ajouter une touche de personnalisation ou ajuster certaines informations. Je peux aussi ajouter un destinataire supplémentaire et des pièces jointes.</p><p><b>[01:34]</b> Je suis prêt à envoyer cette réponse. Vous voyez comment Esker peut assister les équipes comptabilité fournisseurs et achats pour répondre rapidement aux demandes, en récupérant des informations précises depuis des sources fiables pour que le spécialiste AP n'ait plus à répéter ces tâches encore et encore.</p><p><b>[01:55]</b> Je vais maintenant archiver et clôturer cette demande. Une fois archivée, elle est retirée de ma file. Si le fournisseur a une autre question et répond au fil de discussion, nous la verrons simplement apparaître dans la file des demandes avec nouveaux messages.</p><p><b>[02:15]</b> J'espère que cet aperçu vous a été utile pour comprendre comment Esker peut faciliter la communication — non seulement en rédigeant une réponse, mais en récupérant des données précises depuis les sources pertinentes pour construire cette réponse.</p>"},

  {f:"6 - Communicating Internally and Externally",t:"Communicating Internally and Externally",sz:"33.6",
trEN:"<p><b>[00:01]</b> In this video, we'll be talking through how Esker can classify and then route, as applicable, incoming emails to help speed up that processing time and eliminate the need to manually categorize and route those emails.</p><p><b>[00:16]</b> So an example of this is our invoice routing. You can see here an example of a supplier invoice that has been sent by email. Let's say that if you have our Accounts Payable solution as well, after our AI technology identifies the incoming email as an invoice, it can get sent directly to the AP solution without anyone having to look at it.</p><p><b>[00:40]</b> This helps make sure that those invoices are getting processed as quickly as possible. But this can apply to a variety of different emails that you may receive.</p><p><b>[00:52]</b> So each of these queues here will have a specific routing applicable to that category. For instance, we might want to send the supplier information updates to our Supplier Management department and those invoices go to Accounts Payable.</p><p><b>[01:08]</b> Let's go into one example. This is actually an invoice question. Right now I have that routing set to email. Now, all this could happen in the background. However, for example, I'm pulling it up to show you how easy it is to set those defaults and change them.</p><p><b>[01:29]</b> If for whatever reason I didn't want to email it out and I simply wanted to archive it and respond directly from this platform, all I have to do is click that dropdown, change that routing method, and I'm good to go.</p><p><b>[01:45]</b> So again, routing really just helps make sure that the right people are looking at that inquiry as quickly as possible so that we can make sure that it's resolved in a timely manner for the supplier.</p>",
trFR:"<p><b>[00:01]</b> Dans cette vidéo, nous allons voir comment Esker peut classifier puis acheminer les emails entrants selon les cas, pour accélérer le temps de traitement et supprimer le besoin de catégoriser et router manuellement ces emails.</p><p><b>[00:16]</b> Un exemple concret est le routage des factures. Vous voyez ici un exemple de facture fournisseur envoyée par email. Si vous disposez aussi de notre solution Comptabilité Fournisseurs, après que notre technologie IA identifie l'email entrant comme une facture, il peut être envoyé directement vers la solution AP sans intervention humaine.</p><p><b>[00:40]</b> Cela garantit que les factures sont traitées le plus rapidement possible. Mais cela s'applique à une variété d'emails différents que vous pourriez recevoir.</p><p><b>[00:52]</b> Chacune de ces files d'attente dispose d'un routage spécifique à sa catégorie. Par exemple, nous pourrions envoyer les mises à jour d'informations fournisseurs au département Gestion des Fournisseurs, et les factures à la Comptabilité Fournisseurs.</p><p><b>[01:08]</b> Voyons un exemple. Il s'agit d'une question sur une facture. Le routage est actuellement configuré par email. Tout cela pourrait se passer en arrière-plan, mais je l'affiche pour montrer la facilité de configuration et de modification des paramètres par défaut.</p><p><b>[01:29]</b> Si je ne souhaitais pas envoyer par email et que je voulais simplement archiver et répondre directement depuis cette plateforme, il me suffit de cliquer sur la liste déroulante, changer la méthode de routage, et c'est fait.</p><p><b>[01:45]</b> Le routage aide à s'assurer que les bonnes personnes consultent la demande le plus rapidement possible, pour qu'elle soit résolue dans les meilleurs délais pour le fournisseur.</p>"},

  {f:"7 - Metrics and SLA Monitoring",t:"Metrics and SLA Monitoring",sz:"40.8",
trEN:"<p><b>[00:01]</b> One big challenge that supplier management departments face today is not having the metrics, reporting, or visibility of their overall process. Without these metrics, it's hard to evaluate supplier frustration and positively impact cash flow management.</p><p><b>[00:19]</b> In this video, I'm going to walk through how Esker can help support with this overall visibility, metrics, and reporting.</p><p><b>[00:27]</b> As you can see on this dashboard, we have multiple different reports available out of the box. You may want to measure average response time and resolution time. Maybe you're interested in which suppliers are submitting the most inquiries, or maybe you're just interested in what are the fluctuations in those inquiries to help identify an underlying cause of those high inquiry times. Any data within Supplier Inquiries can easily be reported on.</p><p><b>[00:59]</b> We enable you as a user to be able to create those reports easily, making sure that you're focusing on the things that are important to you.</p><p><b>[01:09]</b> Let's go ahead and get into an example report. All of our reports are going to have that graph at the top. So this one is showing inquiries by supplier. They're all going to have the actual data listed right below, so here's where you can drill down and see that data right there. You don't have to go digging to find it in a different location.</p><p><b>[01:35]</b> It's easy to edit this report. Let's say you want to filter this down to just your top five suppliers. You can also print out this report or export that raw data to be used in other reporting tools.</p><p><b>[01:53]</b> Or finally, you can schedule this report to get sent out on a one-time or recurring basis. Maybe you want upper-level management to have visibility to some of those reports.</p><p><b>[02:06]</b> In this video, I've talked about how Esker's Supplier Inquiries solution improves overall visibility of your team by providing those metrics and reporting tools so that you can really track what's going on in your accounts payable team. Ultimately, this enables you to see where are the areas that you're doing well and where are the areas that you need to improve, and track any changes over time. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Un défi majeur auquel les départements de gestion fournisseurs font face aujourd'hui est le manque de métriques, de reporting et de visibilité sur leur processus global. Sans ces métriques, il est difficile d'évaluer la frustration des fournisseurs et d'impacter positivement la gestion de trésorerie.</p><p><b>[00:19]</b> Dans cette vidéo, je vais montrer comment Esker peut apporter cette visibilité globale, ces métriques et ce reporting.</p><p><b>[00:27]</b> Comme vous pouvez le voir sur ce tableau de bord, nous disposons de plusieurs rapports prêts à l'emploi. Vous pouvez vouloir mesurer le temps moyen de réponse et de résolution. Peut-être êtes-vous intéressé par les fournisseurs qui soumettent le plus de demandes, ou peut-être voulez-vous simplement comprendre les fluctuations de ces demandes pour identifier une cause sous-jacente aux pics. Toute donnée au sein de Supplier Inquiries peut facilement faire l'objet d'un rapport.</p><p><b>[00:59]</b> Nous vous permettons en tant qu'utilisateur de créer ces rapports facilement, en vous assurant que vous vous concentrez sur ce qui est important pour vous.</p><p><b>[01:09]</b> Voyons un exemple de rapport. Tous nos rapports ont un graphique en haut. Celui-ci montre les demandes par fournisseur. Les données détaillées sont listées juste en dessous, où vous pouvez approfondir et consulter les données directement, sans avoir à les chercher ailleurs.</p><p><b>[01:35]</b> Il est facile de modifier ce rapport. Supposons que vous vouliez le filtrer pour n'afficher que vos cinq principaux fournisseurs. Vous pouvez aussi imprimer ce rapport ou exporter les données brutes pour les utiliser dans d'autres outils de reporting.</p><p><b>[01:53]</b> Enfin, vous pouvez planifier l'envoi de ce rapport de manière ponctuelle ou récurrente. Peut-être souhaitez-vous que la direction ait une visibilité sur certains de ces rapports.</p><p><b>[02:06]</b> Dans cette vidéo, j'ai montré comment la solution Supplier Inquiries d'Esker améliore la visibilité globale de votre équipe en fournissant des métriques et des outils de reporting pour suivre réellement ce qui se passe au sein de votre équipe comptabilité fournisseurs. Au final, cela vous permet de voir où vous performez bien, où vous devez vous améliorer, et de suivre les évolutions dans le temps. Merci d'avoir regardé.</p>"},
]},
{id:"ai",label:"Esker AI",suite:"S2P",icon:"🤖",folder:"AI S2P",videos:[

  {f:"Esker AI - Predictive Coding",t:"Predictive Coding",sz:"26.5",
trEN:"<p><b>[00:01]</b> Hello, this is Christina. And today we're going to take a look at our AI feature for predictive coding of non-PO invoices.</p><p><b>[00:08]</b> So Esker knows that coding, even within a specific supplier, can vary invoice to invoice based on things like the service, ship-to address, or even the items that are on the invoice.</p><p><b>[00:21]</b> So what the AI is going to do, instead of suggesting the coding from the last invoice, the AI is going to take it a step further and evaluate the coding of every invoice within that supplier to identify a document that most closely resembles the one that we're currently processing.</p><p><b>[00:42]</b> So this match can be based on words or values from the document, but when Esker identifies that match, that coding will be populated in the current invoice with confidence levels to support decision-making by the user.</p><p><b>[00:57]</b> So in this example here, we'll notice that because these invoices within the supplier are coded so many different ways, we have some varying confidence levels. You'll notice 78% for the GL account, 56% for the cost center. But again, this supports decision-making by the user, whether it's a specific workflow or another business process.</p><p><b>[01:22]</b> In comparison, we have a utility bill that is coded the same way every single time, so Esker and the AI are able to display a 100% confidence level. If you have any questions, please let us know. Thank you.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, ici Christina. Aujourd'hui, nous allons examiner notre fonctionnalité IA de codification prédictive des factures hors commande (non-PO).</p><p><b>[00:08]</b> Esker sait que la codification, même au sein d'un même fournisseur, peut varier d'une facture à l'autre en fonction d'éléments comme le service, l'adresse de livraison ou les articles figurant sur la facture.</p><p><b>[00:21]</b> Ce que l'IA va faire, au lieu de simplement suggérer la codification de la dernière facture, c'est aller plus loin en évaluant la codification de chaque facture de ce fournisseur pour identifier le document qui ressemble le plus à celui en cours de traitement.</p><p><b>[00:42]</b> Cette correspondance peut se baser sur des mots ou des valeurs du document. Lorsqu'Esker identifie cette correspondance, la codification est pré-remplie dans la facture en cours avec des niveaux de confiance pour aider l'utilisateur dans sa prise de décision.</p><p><b>[00:57]</b> Dans cet exemple, comme les factures de ce fournisseur sont codifiées de nombreuses façons différentes, nous avons des niveaux de confiance variables : 78 % pour le compte comptable, 56 % pour le centre de coûts. Cela soutient la prise de décision de l'utilisateur, que ce soit via un workflow spécifique ou un autre processus métier.</p><p><b>[01:22]</b> En comparaison, nous avons une facture de service public qui est codifiée de la même manière à chaque fois : Esker et l'IA sont alors capables d'afficher un niveau de confiance de 100 %. Si vous avez des questions, n'hésitez pas à nous contacter. Merci.</p>"},

  {f:"Esker AI - Unusual Amount Detection",t:"Unusual Amount Detection",sz:"16.3",
trEN:"<p><b>[00:00]</b> Hello, this is Christina. And today we're going to take a look at Esker's AI for unusual amount detection.</p><p><b>[00:07]</b> So what we're looking at here is a non-PO invoice. And right off the bat, we have a flag where the AI is letting us know that based on the invoice history of the supplier, this current invoice amount is outside of what we would typically expect.</p><p><b>[00:22]</b> I could certainly open the history and see for myself that absolutely this is an unusual amount. What the AI is doing is protecting from potential fraud, but also supporting decision-making.</p><p><b>[00:35]</b> So whether that is adding an additional user to the workflow, or initiating a conversation with the supplier that has been archived with this invoice, that AI flag right off the bat gives us the visibility to know what action needs to be taken. If you have any questions, please let us know. Thank you.</p>",
trFR:"<p><b>[00:00]</b> Bonjour, ici Christina. Aujourd'hui, nous allons examiner l'IA d'Esker pour la détection de montants inhabituels.</p><p><b>[00:07]</b> Ce que nous voyons ici est une facture hors commande (non-PO). D'emblée, nous avons un indicateur où l'IA nous signale que, sur la base de l'historique de facturation de ce fournisseur, le montant de cette facture est en dehors de ce que nous attendrions habituellement.</p><p><b>[00:22]</b> Je pourrais bien sûr ouvrir l'historique et constater par moi-même qu'il s'agit effectivement d'un montant inhabituel. Ce que fait l'IA, c'est protéger contre la fraude potentielle, tout en aidant à la prise de décision.</p><p><b>[00:35]</b> Que ce soit pour ajouter un approbateur supplémentaire au workflow ou pour initier une conversation avec le fournisseur archivée avec cette facture, cet indicateur IA donne immédiatement la visibilité nécessaire pour savoir quelle action entreprendre. Si vous avez des questions, n'hésitez pas à nous contacter. Merci.</p>"},

  {f:"Esker AI - Dashboard Synergy Assistant",t:"Dashboard Synergy Assistant",sz:"51.4",
trEN:"<p><b>[00:01]</b> Hello, this is Christina. And today we're going to be taking a look at one of Esker's AI features: the Dashboard Synergy Assistant.</p><p><b>[00:08]</b> So there are different ways that we can interact with Synergy Assistant. I will be typing in my requests, but you can also absolutely use the microphone functionality as well.</p><p><b>[00:19]</b> So I'll start by saying \"show me all [supplier name]...\"</p><p><b>[00:27]</b> A couple of things to note right off the bat: Synergy Assistant is AI designed to understand natural language. So I didn't even type out the supplier name in its entirety and Synergy Assistant was still able to understand my request. You don't have to spell everything correctly, and Synergy Assistant is also smart enough to know that this is an ongoing conversation — so my next request will most likely relate back to the information that it's providing me now.</p><p><b>[00:55]</b> So I can see that there are some various invoice statuses here. I can say \"you know what, actually just the ones needing verification\" — not being very specific in my language, I don't have to specify \"the invoices needing verification.\"</p><p><b>[01:15]</b> Again, Synergy Assistant understands that natural ongoing language in a conversation and can display the information that I'm looking for here.</p><p><b>[01:25]</b> Displaying information in a list view like this is not the only way that Synergy Assistant can provide information. Synergy Assistant can also pull information from the documentation to support a request. So if I say \"how can I manage duplicates\" — this is a more general topic than specific to individual invoices.</p><p><b>[01:51]</b> So Synergy Assistant should be pulling some information from the documentation for me. And then Synergy Assistant will even display the links so that I can view that information myself. And here we have at the bottom the link to the documentation.</p><p><b>[02:10]</b> One other way that Synergy Assistant can provide information is via a counter. So Synergy Assistant can understand that a request might be a priority or require higher continued visibility and can provide a counter that can be added to a dashboard.</p><p><b>[02:41]</b> And this is that counter that I can very quickly add to my dashboard. So this is just the tip of the iceberg of Esker's AI — of what we're doing now and where we're going. But if you have any questions on Esker's AI, please reach out to us. Thank you.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, ici Christina. Aujourd'hui, nous allons découvrir l'une des fonctionnalités IA d'Esker : l'assistant Synergy du tableau de bord.</p><p><b>[00:08]</b> Il existe différentes façons d'interagir avec l'assistant Synergy. Je vais taper mes demandes, mais vous pouvez aussi utiliser la fonctionnalité microphone.</p><p><b>[00:19]</b> Je commence par demander « montre-moi toutes les [nom du fournisseur]... »</p><p><b>[00:27]</b> Plusieurs points à noter d'emblée : l'assistant Synergy est une IA conçue pour comprendre le langage naturel. Je n'ai même pas tapé le nom du fournisseur en entier et l'assistant Synergy a quand même compris ma demande. Vous n'avez pas besoin de tout orthographier correctement, et l'assistant Synergy est aussi suffisamment intelligent pour savoir qu'il s'agit d'une conversation continue — ma prochaine demande sera probablement liée aux informations qu'il me fournit actuellement.</p><p><b>[00:55]</b> Je peux voir qu'il y a différents statuts de factures ici. Je peux dire « en fait, juste celles en vérification » — sans être très précis dans mon langage, je n'ai pas à spécifier « les factures nécessitant une vérification ».</p><p><b>[01:15]</b> Encore une fois, l'assistant Synergy comprend ce langage naturel et conversationnel et peut afficher les informations que je recherche.</p><p><b>[01:25]</b> Afficher les informations sous forme de liste n'est pas le seul mode de présentation de l'assistant Synergy. Il peut aussi extraire des informations de la documentation pour répondre à une demande. Si je dis « comment gérer les doublons » — c'est un sujet plus général que lié à des factures individuelles.</p><p><b>[01:51]</b> L'assistant Synergy va alors extraire des informations de la documentation pour moi. Il affiche même les liens pour que je puisse consulter ces informations par moi-même. Et voici en bas le lien vers la documentation.</p><p><b>[02:10]</b> L'assistant Synergy peut aussi fournir des informations via un compteur. Il peut comprendre qu'une demande peut être prioritaire ou nécessiter une visibilité continue accrue, et proposer un compteur qui peut être ajouté au tableau de bord.</p><p><b>[02:41]</b> Voilà ce compteur que je peux très rapidement ajouter à mon tableau de bord. Ce n'est que la partie émergée de l'iceberg de l'IA d'Esker — de ce que nous faisons aujourd'hui et de la direction que nous prenons. Si vous avez des questions sur l'IA d'Esker, n'hésitez pas à nous contacter. Merci.</p>"},
]},

{id:"om",label:"Order Management",suite:"O2C",icon:"📦",folder:"Order Management",videos:[

  {f:"1 - Order Management",t:"Order Management Overview",sz:"63.5",
trEN:"<p><b>[00:00]</b> In this video, I'm going to walk through a high-level overview of the Esker Order Management solution. I'll be throwing in some different customer stories — what brought them to Esker in the first place and some of the results that they've been able to achieve.</p><p><b>[00:14]</b> Let's go ahead and process an order. So for one of our customers, their biggest issue prior to Esker was the amount of time spent manually keying in those orders. Their CSRs were spending 75% of their day on that manual data entry. After implementing Esker, they were able to reduce the order entry time from 9 minutes on average to just 2½ minutes.</p><p><b>[00:40]</b> So let's see how that actually works. Coming into an order, on the right-hand side you can see that original order that was submitted by the customer. On the left-hand side is where Esker's pulling in data that will then get passed to the ERP to create the order. On the top left here we see any other attachments or the email.</p><p><b>[00:59]</b> As a user, now it's really just my job to make sure that that information has been extracted correctly. There's no red or orange warnings, and then I can simply go ahead and approve this order.</p><p><b>[01:14]</b> But time savings isn't everything. For another one of our customers, their biggest concern was the amount of errors happening during order entry. After implementing Esker, they were able to reduce those order entry errors by 50%.</p><p><b>[01:31]</b> So how is Esker helping with that error reduction? Well, as we already discussed, simply eliminating or greatly reducing the manual data entry has a big part to play. We're also doing some background validations — so we're making sure that it's a valid sold-to, it's a valid ship-to, the materials are all valid, and it's quantities that we would expect this customer to order. If any of these things aren't correct, we're going to flag it to make sure that we're only going to be passing accurate data to create these orders.</p><p><b>[02:05]</b> Another way that we can help out is by facilitating communication. Some customers come to us because they're having issues with resolving disputes, whether that's a pricing discrepancy from what was on the purchase order to what was invoiced, or something like that. But with the Esker Conversations tool, I can simply go ahead and send a new message by selecting a template. I can include an attachment as well.</p><p><b>[02:32]</b> I'm going to send this out. The customer will receive that. Any responses will come right back here and be archived directly with this order. So instead of having to go dig through Outlook email inboxes to find a trail of communication, it's all tied directly to the order in Esker.</p><p><b>[03:02]</b> Now the final piece that I want to touch on is the dashboard. So really the dashboard helps provide that overall visibility into the order entry process. One manager came to us because they were having concerns around not having the visibility to what their team was working on, what they were struggling on, or where they maybe need to focus training or improve their team to offer a better customer experience. With the dashboard, we're tracking those key metrics that give that full visibility to managers and customer service team members alike.</p><p><b>[03:35]</b> That was an overview of the Esker Order Management solution. We talked about error reduction, time savings, communication, as well as the dashboards and the visibility. If you have any questions, don't hesitate to reach out and thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous présenter une vue d'ensemble de la solution Esker Order Management. J'intégrerai des retours clients — ce qui les a amenés vers Esker et les résultats qu'ils ont pu obtenir.</p><p><b>[00:14]</b> Traitons une commande. Pour l'un de nos clients, le principal problème avant Esker était le temps passé à saisir manuellement les commandes. Leurs CSR passaient 75 % de leur journée sur cette saisie manuelle. Après l'implémentation d'Esker, ils ont réduit le temps de saisie de commande de 9 minutes en moyenne à seulement 2 minutes 30.</p><p><b>[00:40]</b> Voyons comment cela fonctionne concrètement. En ouvrant une commande, sur le côté droit vous voyez la commande originale soumise par le client. Sur le côté gauche, Esker extrait les données qui seront ensuite transmises à l'ERP pour créer la commande. En haut à gauche, on retrouve les pièces jointes ou l'email.</p><p><b>[00:59]</b> En tant qu'utilisateur, mon rôle se limite à vérifier que les informations ont été correctement extraites. S'il n'y a pas d'avertissements rouges ou oranges, je peux simplement approuver la commande.</p><p><b>[01:14]</b> Mais le gain de temps n'est pas tout. Pour un autre client, la préoccupation principale était le nombre d'erreurs lors de la saisie des commandes. Après l'implémentation d'Esker, ils ont réduit ces erreurs de saisie de 50 %.</p><p><b>[01:31]</b> Comment Esker aide-t-il à cette réduction d'erreurs ? Comme déjà évoqué, éliminer ou réduire fortement la saisie manuelle y contribue largement. Nous effectuons aussi des validations en arrière-plan : vérification de la validité du sold-to, du ship-to, des articles, et des quantités attendues pour ce client. Si quelque chose n'est pas correct, nous le signalons pour ne transmettre que des données fiables à la création des commandes.</p><p><b>[02:05]</b> Nous facilitons aussi la communication. Certains clients viennent à nous car ils ont des difficultés à résoudre des litiges — écarts de prix entre le bon de commande et la facture, par exemple. Grâce à l'outil Conversations d'Esker, je peux envoyer un nouveau message en sélectionnant un modèle et joindre une pièce.</p><p><b>[02:32]</b> J'envoie ce message. Le client le recevra. Toute réponse reviendra ici et sera archivée directement avec cette commande. Plus besoin de fouiller dans les boîtes Outlook pour retrouver un historique de communication — tout est lié directement à la commande dans Esker.</p><p><b>[03:02]</b> Dernier point : le tableau de bord. Il offre une visibilité globale sur le processus de saisie des commandes. Un responsable est venu nous voir car il n'avait aucune visibilité sur le travail de son équipe, ses difficultés, ou les axes de formation nécessaires pour améliorer l'expérience client. Avec le tableau de bord, nous suivons les métriques clés donnant une visibilité complète aux managers comme aux membres de l'équipe service client.</p><p><b>[03:35]</b> Voilà un aperçu de la solution Esker Order Management. Nous avons abordé la réduction d'erreurs, le gain de temps, la communication, ainsi que les tableaux de bord et la visibilité. Si vous avez des questions, n'hésitez pas à nous contacter. Merci d'avoir regardé.</p>"},

  {f:"2 - Data Capture & Validation",t:"Data Capture & Validation",sz:"33.4",
trEN:"<p><b>[00:01]</b> In this video, I'll be walking through how to validate and approve an order in Esker. As a CSR working in Esker, your role in order entry shifts from that manual data entry to now verifying and approving orders. This enables CSRs to focus their time on more proactive and value-added tasks such as building relationships with their customers.</p><p><b>[00:22]</b> From the dashboard, I simply click into a queue and then click into an order to start processing. On the right-hand side is the order that the customer submitted. This could be a PDF, Excel file, just an email, or a variety of other document types. The left side is the data validation screen, and the top-left pane includes any additional documents and the email for reference.</p><p><b>[00:48]</b> There are background validations that take place prior to a user even opening up the form — like verifying against master data that the sold-to, ship-to, and materials are valid, checking for duplicates, and ensuring all required fields have been captured.</p><p><b>[01:03]</b> As a user, I simply need to verify the extracted information is correct, that there are no red errors, make any changes as needed, and approve the order. As you can see, Esker has extracted all of this information correctly. If I did need to make any changes, any time that I extract data from the order to add or change information, Esker's AI engine is learning for future processing.</p><p><b>[01:28]</b> Once I approve this, the sales order will then get created in the ERP. For customers that are submitting consistent information on their orders, there is an option to set up touchless processing — meaning that the order will come into Esker and after going through background validations, if all data validations are successful, that will just get created in the ERP without a user having to look at it.</p><p><b>[01:53]</b> In this video we covered how a CSR can approve an order and also how orders can be automatically processed in the Esker Order Management solution.</p>",
trFR:"<p><b>[00:01]</b> Dans cette vidéo, je vais montrer comment valider et approuver une commande dans Esker. En tant que CSR travaillant dans Esker, votre rôle passe de la saisie manuelle à la vérification et l'approbation des commandes. Cela permet aux CSR de se concentrer sur des tâches à plus forte valeur ajoutée, comme le développement de la relation client.</p><p><b>[00:22]</b> Depuis le tableau de bord, je clique dans une file puis sur une commande pour la traiter. Sur le côté droit se trouve la commande soumise par le client — PDF, fichier Excel, simple email ou tout autre type de document. Le côté gauche est l'écran de validation des données, et le panneau en haut à gauche inclut les documents supplémentaires et l'email pour référence.</p><p><b>[00:48]</b> Des validations en arrière-plan sont effectuées avant même qu'un utilisateur ouvre le formulaire : vérification des données maîtres (sold-to, ship-to, articles), détection des doublons et contrôle de la complétude des champs requis.</p><p><b>[01:03]</b> En tant qu'utilisateur, je dois simplement vérifier que les informations extraites sont correctes, qu'il n'y a pas d'erreurs rouges, effectuer les modifications nécessaires et approuver la commande. Esker a extrait toutes ces informations correctement. Si je devais apporter des modifications, chaque extraction ou correction alimente le moteur IA d'Esker pour le traitement futur.</p><p><b>[01:28]</b> Une fois la commande approuvée, la commande de vente est créée dans l'ERP. Pour les clients qui soumettent des commandes avec des informations constantes, il est possible de configurer le traitement touchless — la commande arrive dans Esker, passe les validations en arrière-plan et, si tout est conforme, est créée directement dans l'ERP sans intervention humaine.</p><p><b>[01:53]</b> Dans cette vidéo, nous avons vu comment un CSR peut approuver une commande et comment les commandes peuvent être traitées automatiquement dans la solution Esker Order Management.</p>"},

  {f:"3 - Dashboard & Reporting",t:"Dashboard & Reporting",sz:"35.8",
trEN:"<p><b>[00:00]</b> In this video, I'll be walking through how Esker provides visibility into the sales document processing through dashboards and reporting.</p><p><b>[00:08]</b> Often prospects that we talk to are utilizing Outlook as their primary order entry staging area. This leaves gaps in knowledge of what needs to get finished by the end of the day and what progress has been made. With Esker Order Management, you no longer have to painstakingly manage orders in Outlook or wonder how your team is doing on their day-to-day work. The platform provides visibility to order processing.</p><p><b>[00:29]</b> It's easy to see the workload and what has been completed directly from the dashboard. Not only that, but we're able to highlight priority orders to make sure that they get processed as fast as possible instead of being lost in the sea of that Outlook inbox.</p><p><b>[00:49]</b> Key metrics are being tracked and reported on, such as average processing time or automation rate. But let's go ahead and get into an actual report from here.</p><p><b>[01:02]</b> You can see a list of those standard reports that come with the solution. Going into one here — this one's showing those customers who would be good candidates for touchless processing, meaning no changes were required by the users when processing these orders.</p><p><b>[01:19]</b> In all our reports, the visual will be at the top with the raw data stored directly below so it's easy to access. These can be scheduled to get sent out via email, printed, that raw data can be exported, or you can edit these reports.</p><p><b>[01:34]</b> Although we have great standard reports, what's more important is that you as a user are empowered with the tools you need to easily create reports yourself. This ensures you can track the things that you care about.</p><p><b>[01:46]</b> The increased visibility with dashboards and also with the detailed reporting helps managers more effectively manage their team's workload and boost that team morale since everyone can see their progress over time.</p><p><b>[01:59]</b> In this video, we covered how Esker's dashboards and the reporting tool can help teams streamline day-to-day work by providing visibility into the order entry process.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais montrer comment Esker offre de la visibilité sur le traitement des documents commerciaux grâce aux tableaux de bord et au reporting.</p><p><b>[00:08]</b> Souvent, les prospects que nous rencontrons utilisent Outlook comme zone de staging principale pour la saisie de commandes. Cela crée des lacunes de visibilité sur ce qui doit être terminé en fin de journée et les progrès réalisés. Avec Esker Order Management, plus besoin de gérer péniblement les commandes dans Outlook ou de se demander comment l'équipe avance au quotidien. La plateforme offre une visibilité complète sur le traitement des commandes.</p><p><b>[00:29]</b> Il est facile de voir la charge de travail et ce qui a été accompli directement depuis le tableau de bord. Nous pouvons aussi mettre en avant les commandes prioritaires pour qu'elles soient traitées le plus rapidement possible, plutôt que de se perdre dans la boîte Outlook.</p><p><b>[00:49]</b> Les métriques clés sont suivies et reportées : temps moyen de traitement, taux d'automatisation, etc. Voyons un rapport concret.</p><p><b>[01:02]</b> Voici la liste des rapports standards fournis avec la solution. Celui-ci montre les clients qui seraient de bons candidats au traitement touchless — aucune modification n'a été nécessaire lors du traitement de leurs commandes.</p><p><b>[01:19]</b> Dans tous nos rapports, le visuel est en haut avec les données brutes juste en dessous pour un accès facile. Ces rapports peuvent être envoyés par email de façon planifiée, imprimés, les données brutes exportées, ou les rapports modifiés.</p><p><b>[01:34]</b> Bien que nous proposions d'excellents rapports standards, le plus important est que vous, en tant qu'utilisateur, avez les outils pour créer facilement vos propres rapports et suivre ce qui compte pour vous.</p><p><b>[01:46]</b> La visibilité accrue via les tableaux de bord et le reporting détaillé aide les managers à gérer plus efficacement la charge de travail de leur équipe et à renforcer le moral, puisque chacun peut voir sa progression dans le temps.</p><p><b>[01:59]</b> Dans cette vidéo, nous avons vu comment les tableaux de bord et l'outil de reporting d'Esker aident les équipes à fluidifier leur travail quotidien en offrant de la visibilité sur le processus de saisie des commandes.</p>"},

  {f:"4 - Change Order Management",t:"Change Order Management",sz:"31.8",
trEN:"<p><b>[00:01]</b> In this video, I'll show how Esker can help identify and process change orders, including identification of those change orders, passing data to update the original order, and archiving the change.</p><p><b>[00:14]</b> Change order processing is part of a larger initiative for Esker Customer Service to continue to support more sales document types. Gone are the days that require CSRs to search through an ERP, find the order the customer's referencing, read line by line, try not to miss any of the changes being requested, and manually enter those changes.</p><p><b>[00:35]</b> Here on the form, you can see that this incoming document has been flagged as a change order. This is based on AI technologies, and keywords can be used as well. Esker has the option to allow you to just archive the change orders — so don't push the changes to the ERP — or to fully push the data to the ERP to update the order.</p><p><b>[00:56]</b> There's also a link to that original order if it was processed in Esker. As a user, I can easily pull that up to reference it and compare anything that I need to. Similar to order processing, all I have to do as a user is validate that the information has been extracted correctly and then I can approve the changes. Again, this will be archived in Esker and linked to that original order.</p><p><b>[01:22]</b> Another major impact of this functionality is reducing downstream work. For example, if a change order can be entered faster, it's less likely to miss the change window on that original order and ship a customer an item that maybe they no longer need. This leads to reduced returns and less back-and-forth communication with the customer.</p><p><b>[01:41]</b> The ability to automate change orders is a huge win for customer service departments from a time savings, error reduction, and customer satisfaction perspective. That was an overview of how we can process change orders in Esker.</p>",
trFR:"<p><b>[00:01]</b> Dans cette vidéo, je vais montrer comment Esker peut aider à identifier et traiter les avenants de commande, incluant leur identification, la transmission des données pour mettre à jour la commande originale et l'archivage des modifications.</p><p><b>[00:14]</b> Le traitement des avenants fait partie d'une initiative plus large d'Esker pour supporter davantage de types de documents commerciaux. Fini le temps où les CSR devaient chercher dans l'ERP, trouver la commande référencée par le client, lire ligne par ligne en espérant ne manquer aucune modification demandée, et saisir manuellement les changements.</p><p><b>[00:35]</b> Sur le formulaire, vous pouvez voir que ce document entrant a été identifié comme un avenant de commande. Cela repose sur des technologies IA et des mots-clés. Esker offre la possibilité soit d'archiver simplement les avenants sans pousser les modifications dans l'ERP, soit de transmettre intégralement les données à l'ERP pour mettre à jour la commande.</p><p><b>[00:56]</b> Un lien vers la commande originale est aussi disponible si elle a été traitée dans Esker. En tant qu'utilisateur, je peux facilement la consulter pour comparer. Comme pour le traitement des commandes, il me suffit de valider que les informations ont été correctement extraites puis d'approuver les modifications. Le tout est archivé dans Esker et lié à la commande originale.</p><p><b>[01:22]</b> Un autre impact majeur est la réduction du travail en aval. Par exemple, si un avenant est saisi plus rapidement, il y a moins de risque de dépasser la fenêtre de modification et d'expédier un article dont le client n'a plus besoin. Cela réduit les retours et les allers-retours de communication.</p><p><b>[01:41]</b> La capacité à automatiser les avenants de commande est un atout considérable pour les services client en termes de gain de temps, réduction d'erreurs et satisfaction client. Voilà un aperçu du traitement des avenants dans Esker.</p>"},

  {f:"5 - ERP Integration",t:"ERP Integration",sz:"38.3",
trEN:"<p><b>[00:01]</b> This video will highlight integration options between your ERP and the Esker Order Management solution.</p><p><b>[00:08]</b> In this slide you can see there are a variety of ways that we can integrate — whether that's managed file transfer, APIs and web services, prebuilt connectors that currently apply to SAP and Oracle EBS, middleware, or in some cases utilizing RPA or EDI channels.</p><p><b>[00:25]</b> High level, there are three primary points of data exchange between Esker and your ERP. These consist of replicating master data, processing that order data, and updating that order status. The way that each of these integration points are set up will depend on the integration method or methods that you select.</p><p><b>[00:41]</b> For managed file transfer, Esker hosts SFTP folders and files are passed back and forth between Esker and your ERP. This starts with CSV files containing master data that will be exported and placed in this inbound folder. Once Esker has processed a document, an order output XML will be placed in the outbound SFTP folder. Once the file's placed in this folder, it needs to be retrieved and ingested into the ERP to create that order. The final step is to generate an XML file from your ERP and pass to Esker indicating if the order has been created successfully or not, to close the loop on that order.</p><p><b>[01:23]</b> When we talk about integrating via APIs, there are really two different types of integration that we're referencing. The first is utilizing Esker's REST API, which can be used to facilitate receiving master data — which would again be passed via CSV files — and passing order data. To use Esker's REST API, your technical team would set up API calls to pass master data and retrieve order data. Think of this order creation API call as near real-time.</p><p><b>[01:49]</b> The second way we can utilize APIs is real-time and involves Esker calling an order creation API in your ERP. Master data would still need to be replicated and sent to Esker, however that order creation would be real-time.</p><p><b>[02:02]</b> As mentioned before, we do have prebuilt connectors that are applicable for SAP and Oracle EBS today. That was an overview of some of the ways that Esker can be integrated with your ERP. We offer the flexibility to provide the integration option that works best for your team. If you have any questions, don't hesitate to reach out.</p>",
trFR:"<p><b>[00:01]</b> Cette vidéo présente les options d'intégration entre votre ERP et la solution Esker Order Management.</p><p><b>[00:08]</b> Vous pouvez voir qu'il existe plusieurs façons de s'intégrer : transfert de fichiers géré, APIs et web services, connecteurs pré-construits actuellement disponibles pour SAP et Oracle EBS, middleware, ou dans certains cas via RPA ou canaux EDI.</p><p><b>[00:25]</b> À haut niveau, il y a trois points principaux d'échange de données entre Esker et votre ERP : la réplication des données maîtres, le traitement des données de commande et la mise à jour du statut de commande. La configuration de chaque point d'intégration dépend de la ou des méthodes d'intégration choisies.</p><p><b>[00:41]</b> Pour le transfert de fichiers géré, Esker héberge des dossiers SFTP et les fichiers transitent entre Esker et votre ERP. Cela commence par des fichiers CSV contenant les données maîtres, déposés dans le dossier entrant. Une fois le document traité par Esker, un XML de sortie de commande est placé dans le dossier SFTP sortant. Ce fichier doit être récupéré et intégré dans l'ERP pour créer la commande. La dernière étape consiste à générer un fichier XML depuis votre ERP et le transmettre à Esker pour indiquer si la commande a été créée avec succès ou non.</p><p><b>[01:23]</b> Concernant l'intégration via APIs, il existe deux types. Le premier utilise l'API REST d'Esker pour recevoir les données maîtres (via fichiers CSV) et transmettre les données de commande. Votre équipe technique configure des appels API pour envoyer les données maîtres et récupérer les données de commande. Cette création de commande par API est quasi temps réel.</p><p><b>[01:49]</b> Le second type est en temps réel : Esker appelle directement une API de création de commande dans votre ERP. Les données maîtres doivent toujours être répliquées vers Esker, mais la création de commande est instantanée.</p><p><b>[02:02]</b> Comme mentionné, nous disposons de connecteurs pré-construits pour SAP et Oracle EBS. Voilà un aperçu des façons dont Esker peut s'intégrer à votre ERP. Nous offrons la flexibilité de choisir l'option d'intégration la plus adaptée à votre équipe. N'hésitez pas à nous contacter pour toute question.</p>"},

  {f:"6 - EDI - Orders, Confirmations, and Advance Shipping Notices",t:"EDI Processing",sz:"37.8",
trEN:"<p><b>[00:01]</b> With Esker's EDI Processing, we have full capabilities ranging from processing EDI exceptions to full end-to-end connectivity with your trading partners.</p><p><b>[00:11]</b> Through Esker, you can have any user process EDIs in our simple-to-use interface. We can process EDI orders in the common formats you receive and can also deliver documents like order confirmations, advance shipment notices (ASNs), and even invoices. In this video, I'll walk through these functions and speak to the benefits you can gain by processing EDI in Esker.</p><p><b>[00:37]</b> Let's take a look at what Esker is doing in action by processing an exception on my screen. Here on the right we have the human-readable version that was automatically converted. You no longer have to take time deciphering what the raw EDI actually means, but it is attached if I need to see it.</p><p><b>[00:57]</b> If there are additional segments on the EDI, those can be extracted and processed as well. We then do the validations according to your business rules, ensuring that orders are always created correctly in your ERP.</p><p><b>[01:12]</b> Some common EDI exceptions could be: maybe the customer didn't provide a ship-to or a drop shipment, or maybe the materials the customer ordered were their own material number and not yours. Esker can do these sorts of validations automatically, and if you have other rules, Esker can support those as well.</p><p><b>[01:32]</b> Now let's take a look at some of those documents you need to deliver, like confirmations and ASNs. In this example, I see the EDI order went through and it was created in the ERP. Because Esker also supports delivery of EDI, I can go and easily view those documents which are automatically tied to the order, allowing for archiving and easy searching if I need to look for one.</p><p><b>[01:56]</b> So in this example I see we have an order confirmation and an ASN. Just like the human-readable version, I can go and view that order confirmation, and the exact same thing with the ASN — I can view that here.</p><p><b>[02:13]</b> So this was an overview of how Esker can intelligently process EDI and help to automate your process. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Avec le traitement EDI d'Esker, nous disposons de capacités complètes allant du traitement des exceptions EDI à la connectivité de bout en bout avec vos partenaires commerciaux.</p><p><b>[00:11]</b> Via Esker, n'importe quel utilisateur peut traiter les EDI dans notre interface simple d'utilisation. Nous traitons les commandes EDI dans les formats courants que vous recevez et pouvons aussi émettre des documents comme les confirmations de commande, les avis d'expédition (ASN) et même les factures. Dans cette vidéo, je vais parcourir ces fonctions et présenter les bénéfices du traitement EDI dans Esker.</p><p><b>[00:37]</b> Voyons Esker en action en traitant une exception. Sur la droite, nous avons la version lisible par l'humain, convertie automatiquement. Plus besoin de passer du temps à décrypter le contenu EDI brut, même s'il reste accessible en pièce jointe si nécessaire.</p><p><b>[00:57]</b> Si l'EDI contient des segments supplémentaires, pièce jointe si nécessaire.</p><p><b>[00:57]</b> Si l'EDI contient des segments supplémentaires, ceux-ci peuvent aussi être extraits et traités. Nous effectuons ensuite les validations selon vos règles métier, garantissant que les commandes sont toujours créées correctement dans votre ERP.</p><p><b>[01:12]</b> Parmi les exceptions EDI courantes : le client n'a pas fourni d'adresse de livraison ou de drop shipment, ou les articles commandés utilisent la référence client et non la vôtre. Esker réalise ces validations automatiquement, et si vous avez d'autres règles, Esker peut aussi les supporter.</p><p><b>[01:32]</b> Voyons maintenant les documents à émettre, comme les confirmations et les ASN. Dans cet exemple, la commande EDI a été traitée et créée dans l'ERP. Comme Esker supporte aussi l'émission EDI, je peux facilement consulter ces documents automatiquement liés à la commande, permettant archivage et recherche facile.</p><p><b>[01:56]</b> Ici, je vois une confirmation de commande et un ASN. Comme pour la version lisible, je peux consulter la confirmation de commande et de même pour l'ASN.</p><p><b>[02:13]</b> Voilà un aperçu de la façon dont Esker peut traiter intelligemment les EDI et aider à automatiser votre processus. Merci d'avoir regardé.</p>"},

  {f:"7 - Quote Requests",t:"Quote Requests",sz:"23.9",
trEN:"<p><b>[00:01]</b> In this video, I'll show how Esker Order Management can help identify and process quote requests. This is a big win for customer service departments as quote volume can often exceed order volume, and it can be very repetitive and time-consuming to generate those quotes.</p><p><b>[00:18]</b> It's also a big win for businesses as a whole, since the faster a quote is generated, the faster the customer can place an order. But let's see what this looks like in action.</p><p><b>[00:29]</b> From my dashboard, I can click into the quote queue and then select a quote to validate from the list. Now, these have been already identified as quotes based on different AI technologies when they were received. Details can be extracted from a body of an email, as is the case here, or from a formatted document of a variety of different types.</p><p><b>[00:52]</b> As you can see on the left-hand side, Esker has already identified customer information as well as line items for materials that they're asking about. As a user, it's just my job to fill in any remaining items, such as the valid-to and valid-from. Then all I have to do is approve that to create the quote within the ERP.</p><p><b>[01:13]</b> To summarize, quotes can be created in Esker similar to how orders are created. Processing these in Esker speeds up quote creation by helping to automate the data entry, leading to huge time savings since incoming quote requests can be a very large volume. Not only does this save customer service teams time, it enables faster turnaround time from the quote request received to a quote in the hands of the customer.</p>",
trFR:"<p><b>[00:01]</b> Dans cette vidéo, je vais montrer comment Esker Order Management peut aider à identifier et traiter les demandes de devis. C'est un atout majeur pour les services client car le volume de devis peut souvent dépasser le volume de commandes, et leur génération est très répétitive et chronophage.</p><p><b>[00:18]</b> C'est aussi un avantage pour l'entreprise dans son ensemble : plus un devis est généré rapidement, plus vite le client peut passer commande. Voyons à quoi cela ressemble en pratique.</p><p><b>[00:29]</b> Depuis mon tableau de bord, je clique dans la file des devis puis je sélectionne un devis à valider. Ceux-ci ont déjà été identifiés comme des devis grâce à différentes technologies IA à leur réception. Les détails peuvent être extraits du corps d'un email, comme ici, ou d'un document formaté de différents types.</p><p><b>[00:52]</b> Sur le côté gauche, Esker a déjà identifié les informations client ainsi que les lignes d'articles demandés. En tant qu'utilisateur, mon rôle est de compléter les éléments restants, comme les dates de validité. Il me suffit ensuite d'approuver pour créer le devis dans l'ERP.</p><p><b>[01:13]</b> En résumé, les devis peuvent être créés dans Esker de façon similaire aux commandes. Le traitement dans Esker accélère la création de devis en automatisant la saisie, générant un gain de temps considérable vu le volume important de demandes de devis entrantes. Cela fait gagner du temps aux équipes et accélère le délai entre la réception de la demande et la remise du devis au client.</p>"},

  {f:"8 - Ecommerce Portal and Mobile app",t:"Ecommerce Portal & Mobile App",sz:"37.2",
trEN:"<p><b>[00:00]</b> What if orders were submitted in a format that could be processed seamlessly? What if orders were paid for before they were submitted? Or what if CSR inboxes weren't bombarded with questions like, \"When is my order supposed to arrive?\"</p><p><b>[00:13]</b> In this video, I'll walk through the Esker Customer Portal and the Esker Anywhere mobile app to give you a feel for how these solutions can improve your customer experience and support employees on the go.</p><p><b>[00:25]</b> With Esker's self-service Customer Portal, customers have access to important information 24/7. That includes the ability to place orders, view ASNs or order confirmations, and view any inquiries submitted.</p><p><b>[00:37]</b> From the portal, I can view all previous orders as well as their status and place a new order. I simply select my materials either from this catalog or by reloading a previous order. I'm going to add in that PO number, review that ship-to, and I can even pay before I place the order depending on if you want this option enabled.</p><p><b>[00:57]</b> But what if your customers already have an ordering portal? Then this can be used as a punchout catalog to ensure that you get the information you need while allowing your customers to place orders through existing procurement applications.</p><p><b>[01:11]</b> To check the status of an order, I can easily view ASNs to get that detailed delivery information.</p><p><b>[01:19]</b> The mobile app makes it easy to place orders while on the go. This can either apply to customers or sales reps. Let's see what it looks like from the perspective of a sales rep. When I log in, I see a list of previous orders as well as any status associated. Clicking \"New Order\" will bring me to select a customer and then a ship-to, and adding the additional details. From there, I select my materials and confirm that order.</p><p><b>[01:42]</b> Customers can also place orders directly from the app. CSR managers can use the mobile app to view the current metrics of their team and monitor processing through the dashboards.</p><p><b>[02:00]</b> While B2C standards continue to move into the B2B space, having options like the Esker Customer Portal and mobile app can keep companies relevant and competitive. The mobile app and Customer Portal help provide the tools to your customers so that they can get what they need when they need it. It's a win-win for customers and customer service departments alike.</p>",
