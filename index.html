trFR:"<p><b>[00:01]</b> Dans cette vidéo, je vais vous montrer comment configurer des RFQ dans Esker pour recevoir des devis de plusieurs fournisseurs dans le cadre d'un événement de sourcing.</p><p><b>[00:11]</b> Si vous choisissez d'avoir un RFQ dans la page de paramètres d'un nouvel événement de sourcing, vous pouvez spécifier la date limite de soumission et la devise. Le RFQ vous permet de recueillir des offres de fournisseurs par lot avant une date limite, et les participants ne peuvent soumettre qu'une seule offre par lot.</p><p><b>[00:33]</b> Gardez à l'esprit qu'un RFQ peut être utilisé seul, en combinaison avec des questionnaires — ce qui peut en faire un événement pondéré si nécessaire — et vous pouvez également le faire évoluer vers une enchère une fois le RFQ terminé.</p><p><b>[00:53]</b> Dans l'onglet RFQ au sein de l'événement de sourcing, vous pouvez spécifier les lots pour les enchères. Vous pouvez aussi indiquer à Dojo ce que vous payez actuellement et ce que vous souhaitez fixer comme prix de qualification. Cela aide à mettre en évidence les économies que vous pouvez attendre entre les différentes offres.</p><p><b>[01:13]</b> Voilà comment les RFQ peuvent être utilisés au sein des événements de sourcing dans Market Dojo pour négocier avec plusieurs fournisseurs simultanément et obtenir les tarifs les plus compétitifs.</p>"},

  {f:"4 - Questionnaires",t:"Questionnaires",sz:"37.5",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you how questionnaires can be included in a sourcing event within Market Dojo. To help qualify suppliers in the context of a particular sourcing event, I've pulled up a simple lot template example which includes a questionnaire.</p><p><b>[00:19]</b> You can add a questionnaire to any event type by selecting the checkbox for one on the initial settings page of a new event. On the Settings tab, we can specify the questionnaire name. The name you give your questionnaire will be used throughout the sourcing event. It will be used as the name of the tab for the questionnaire itself and will be visible to the participants or the suppliers that you invite.</p><p><b>[00:46]</b> It will also be used in all communication that goes out regarding the sourcing event. You can also specify a deadline after which a supplier will no longer be able to reply to the questionnaire questions. You can also specify if you want to create another questionnaire with different settings, but still as a part of the same sourcing event.</p><p><b>[01:11]</b> Now in the tab for the questionnaire itself, this is where you can edit specific question attributes. This is where you can actually write out the question, if it is required for a supplier to fill out before they can submit any bids for the sourcing event.</p><p><b>[01:28]</b> And you can also configure when to dynamically display the question whenever it is applicable, saving you and your suppliers time in finishing your sourcing events. You can provide a description. And finally, you can also specify the question type, whether it's multiple choice, binary, etcetera.</p><p><b>[01:50]</b> This was an overview on how to use the questionnaire features within sourcing events in Market Dojo to help streamline supplier relationship management when sourcing for particular purchases.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer comment les questionnaires peuvent être intégrés à un événement de sourcing dans Market Dojo. Pour aider à qualifier les fournisseurs dans le cadre d'un événement de sourcing particulier, j'ai ouvert un exemple de modèle par lot simple qui inclut un questionnaire.</p><p><b>[00:19]</b> Vous pouvez ajouter un questionnaire à n'importe quel type d'événement en cochant la case correspondante dans la page de paramètres initiale d'un nouvel événement. Dans l'onglet Paramètres, nous pouvons spécifier le nom du questionnaire. Le nom que vous donnez à votre questionnaire sera utilisé tout au long de l'événement de sourcing. Il sera utilisé comme nom de l'onglet du questionnaire lui-même et sera visible par les participants ou les fournisseurs que vous invitez.</p><p><b>[00:46]</b> Il sera également utilisé dans toutes les communications relatives à l'événement de sourcing. Vous pouvez aussi spécifier une date limite après laquelle un fournisseur ne pourra plus répondre aux questions du questionnaire. Vous pouvez également indiquer si vous souhaitez créer un autre questionnaire avec des paramètres différents, tout en restant dans le même événement de sourcing.</p><p><b>[01:11]</b> Dans l'onglet du questionnaire lui-même, c'est ici que vous pouvez modifier les attributs spécifiques des questions. C'est là que vous pouvez rédiger la question, indiquer si elle est obligatoire pour qu'un fournisseur puisse soumettre des offres pour l'événement de sourcing.</p><p><b>[01:28]</b> Et vous pouvez aussi configurer quand afficher dynamiquement la question lorsqu'elle est applicable, ce qui vous fait gagner du temps, à vous et à vos fournisseurs, pour finaliser vos événements de sourcing. Vous pouvez fournir une description. Et enfin, vous pouvez aussi spécifier le type de question, qu'il s'agisse de choix multiples, binaire, etc.</p><p><b>[01:50]</b> Voilà un aperçu de l'utilisation des fonctionnalités de questionnaire au sein des événements de sourcing dans Market Dojo pour rationaliser la gestion des relations fournisseurs lors du sourcing d'achats spécifiques.</p>"},

  {f:"5 - e-Auctions",t:"e-Auctions",sz:"37.2",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you how you can use e-auctions within Market Dojo to find the best market price and save by driving competition amongst your suppliers.</p><p><b>[00:13]</b> If you select to have an online auction on the settings page of a new sourcing event, you can specify the auction type and bid direction. There are three auction types to choose from: Ranked, Open and Japanese.</p><p><b>[00:30]</b> A Ranked auction is ideal when multiple suppliers are expected to bid around the same price point. Suppliers are then ranked based on their bids. An Open auction is suitable when decisions are purely based on price. Suppliers can see the leading bid and must submit a better bid to participate.</p><p><b>[00:53]</b> And finally, a Japanese auction creates competition even with few suppliers by releasing decreasing sums that suppliers must match to stay in the bidding process.</p><p><b>[01:08]</b> Creating auctions involves configuring event details, selecting auction settings and tailoring options based on the chosen auction type. Monitoring live auctions allows for real-time adjustments, and post-auction activities involve reviewing and exporting bids, awarding lots, and starting purchase requisitions within Esker.</p><p><b>[01:34]</b> Once an auction is done running, I could award these lots to a selected supplier and then directly create my purchase requisition from this completed sourcing event.</p><p><b>[01:47]</b> This was a look at how e-auctions within Dojo allow you to conduct live virtual auctions with invited suppliers where they bid for your business, and overall help drive down your sourcing costs.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer comment utiliser les enchères électroniques dans Market Dojo pour trouver le meilleur prix du marché et économiser en stimulant la concurrence entre vos fournisseurs.</p><p><b>[00:13]</b> Si vous choisissez d'avoir une enchère en ligne dans la page de paramètres d'un nouvel événement de sourcing, vous pouvez spécifier le type d'enchère et la direction des offres. Il y a trois types d'enchères au choix : Classée, Ouverte et Japonaise.</p><p><b>[00:30]</b> Une enchère Classée est idéale lorsque plusieurs fournisseurs sont susceptibles d'enchérir autour du même prix. Les fournisseurs sont ensuite classés en fonction de leurs offres. Une enchère Ouverte convient lorsque les décisions sont purement basées sur le prix. Les fournisseurs voient l'offre la plus basse et doivent soumettre une meilleure offre pour participer.</p><p><b>[00:53]</b> Enfin, une enchère Japonaise crée de la concurrence même avec peu de fournisseurs en libérant des montants décroissants que les fournisseurs doivent accepter pour rester dans le processus d'enchère.</p><p><b>[01:08]</b> La création d'enchères implique la configuration des détails de l'événement, la sélection des paramètres d'enchère et l'adaptation des options en fonction du type d'enchère choisi. Le suivi des enchères en direct permet des ajustements en temps réel, et les activités post-enchère comprennent l'examen et l'export des offres, l'attribution des lots et le lancement de demandes d'achat dans Esker.</p><p><b>[01:34]</b> Une fois l'enchère terminée, je peux attribuer ces lots à un fournisseur sélectionné puis créer directement ma demande d'achat à partir de cet événement de sourcing terminé.</p><p><b>[01:47]</b> Voilà comment les enchères électroniques dans Dojo vous permettent de mener des enchères virtuelles en direct avec des fournisseurs invités qui enchérissent pour votre marché, et contribuent globalement à réduire vos coûts de sourcing.</p>"},

  {f:"6 - Integration with Procurement",t:"Integration with Procurement",sz:"22.4",
trEN:"<p><b>[00:00]</b> In this video, I'm going to show you the points of integration across Procurement and Market Dojo.</p><p><b>[00:08]</b> You'll see that this integration into Esker's Procurement module makes our platform a powerful integrated system that is easy to use in solving your biggest purchasing challenges.</p><p><b>[00:22]</b> Within Esker's Procurement module, you can create a new sourcing event directly from the procurement dashboard, in the context of a purchasing requisition, when acting as a buyer, or as part of a purchasing project. You can also associate existing sourcing events to a project in the same spot.</p><p><b>[00:46]</b> Procurement module's integration with other Source-to-Pay modules such as Accounts Payable and Vendor Contracts further extends the downstream value of Market Dojo's sourcing integration with Procurement.</p><p><b>[01:02]</b> What you just saw was a high level overview of Esker's sourcing solution and how sourcing events in Dojo can help your organization drive more efficient and competitive sourcing, and free you up to focus on more value-added work when it comes to your procurement processes.</p>",
trFR:"<p><b>[00:00]</b> Dans cette vidéo, je vais vous montrer les points d'intégration entre l'Approvisionnement et Market Dojo.</p><p><b>[00:08]</b> Vous constaterez que cette intégration au module d'Approvisionnement d'Esker fait de notre plateforme un système intégré puissant et facile à utiliser pour résoudre vos plus grands défis d'achat.</p><p><b>[00:22]</b> Au sein du module d'Approvisionnement d'Esker, vous pouvez créer un nouvel événement de sourcing directement depuis le tableau de bord achats, dans le contexte d'une demande d'achat, en tant qu'acheteur, ou dans le cadre d'un projet d'achat. Vous pouvez aussi associer des événements de sourcing existants à un projet au même endroit.</p><p><b>[00:46]</b> L'intégration du module d'Approvisionnement avec d'autres modules Source-to-Pay tels que la Comptabilité Fournisseurs et les Contrats Fournisseurs étend encore davantage la valeur en aval de l'intégration du sourcing Market Dojo avec l'Approvisionnement.</p><p><b>[01:02]</b> Voilà un aperçu général de la solution de sourcing d'Esker et de la façon dont les événements de sourcing dans Dojo peuvent aider votre organisation à piloter un sourcing plus efficace et compétitif, vous libérant pour vous concentrer sur des tâches à plus forte valeur ajoutée dans vos processus d'achat.</p>"},

  {f:"7 - Analytics & Reports",t:"Analytics & Reports",sz:"18.3",
trEN:"<p><b>[00:00]</b> Let's take a quick look at analytics and reporting within Market Dojo. The Analytics tab takes you to a quick overview of events, supplier responses and savings.</p><p><b>[00:15]</b> Our sourcing reporting is mostly by means of export out of the Dojo tool on each individual closed event. Here's an example of where you can download a report on a closed event, and here's an example of what a report like that might look like.</p><p><b>[00:33]</b> You can also plug into Power BI to create some smart dashboards using AI-powered reporting, and you can work with your Esker team to get a custom link to those Power BI reports so that they will show in Dojo within a frame.</p><p><b>[00:52]</b> This has been a look at how to use reporting and analytics within Dojo to help your organization maximize the value out of the sourcing solution and realize the full benefits of using Market Dojo.</p>",
trFR:"<p><b>[00:00]</b> Jetons un coup d'œil rapide aux analyses et aux rapports dans Market Dojo. L'onglet Analyses vous amène à un aperçu rapide des événements, des réponses fournisseurs et des économies réalisées.</p><p><b>[00:15]</b> Nos rapports de sourcing se font principalement par export depuis l'outil Dojo pour chaque événement clôturé individuellement. Voici un exemple d'endroit où vous pouvez télécharger un rapport sur un événement clôturé, et voici un exemple de ce à quoi un tel rapport peut ressembler.</p><p><b>[00:33]</b> Vous pouvez aussi vous connecter à Power BI pour créer des tableaux de bord intelligents grâce au reporting alimenté par l'IA, et vous pouvez travailler avec votre équipe Esker pour obtenir un lien personnalisé vers ces rapports Power BI afin qu'ils s'affichent directement dans Dojo via un cadre intégré.</p><p><b>[00:52]</b> Voilà comment utiliser les rapports et analyses dans Dojo pour aider votre organisation à maximiser la valeur de la solution de sourcing et profiter pleinement des avantages de Market Dojo.</p>"},
]},
{id:"sm",label:"Supplier Management",suite:"S2P",icon:"🤝",folder:"Supplier Management",videos:[

  {f:"1 - Vendor Management Overview",t:"Vendor Management Overview",sz:"32.8",
trEN:"<p><b>[00:02]</b> Hello, this is Christina with Esker. And in this video, we'll take a high level look at Esker's Vendor Management solution.</p><p><b>[00:09]</b> I'll show you how Esker provides companies with a 360° view of vendor information to effectively manage compliance, minimize risk, gain full process visibility and reduce employee workload.</p><p><b>[00:23]</b> You can see here that companies are able to invite new vendors to register with a simple click. Vendors receive an email with the registration link where they can provide various types of information and documents.</p><p><b>[00:35]</b> Our customers love the self-service aspect of our solution and report that it significantly reduces their employee workload so they can focus on higher priority tasks.</p><p><b>[00:45]</b> Once a vendor has submitted their completed registration forms, Esker has the capability to execute a number of checks to reduce risk and prevent fraud, including OFAC screens, bank account validations, vendor compliance ratings, and risk scores. Any flags or warnings are highlighted for easy reference, and Esker will route the registration through an approval workflow to ensure the right sets of eyes are reviewing each request.</p><p><b>[01:10]</b> Our customers love the peace of mind these checks provide as Esker takes on the heavy lifting of managing compliance and risk on their behalf.</p><p><b>[01:20]</b> Once the vendor registration is approved, Esker can synchronize with your ERP so that the new vendor record is created appropriately. This ensures all records remain up to date and takes the vendor record creation task off your plate.</p><p><b>[01:34]</b> As you can imagine, our customers find immense value from the insights and visibility that Esker provides over every step of the onboarding and approval process.</p><p><b>[01:43]</b> This has been a high level look at how Esker's Vendor Management solution helps companies effectively manage compliance, minimize risk, gain full process visibility, and reduce employee workload. Thanks for watching.</p>",
trFR:"<p><b>[00:02]</b> Bonjour, ici Christina d'Esker. Dans cette vidéo, nous allons examiner à haut niveau la solution de Gestion des Fournisseurs d'Esker.</p><p><b>[00:09]</b> Je vais vous montrer comment Esker offre aux entreprises une vue à 360° des informations fournisseurs pour gérer efficacement la conformité, minimiser les risques, obtenir une visibilité complète sur les processus et réduire la charge de travail des collaborateurs.</p><p><b>[00:23]</b> Vous pouvez voir ici que les entreprises peuvent inviter de nouveaux fournisseurs à s'enregistrer en un simple clic. Les fournisseurs reçoivent un email avec le lien d'enregistrement où ils peuvent fournir différents types d'informations et de documents.</p><p><b>[00:35]</b> Nos clients apprécient particulièrement l'aspect self-service de notre solution et constatent qu'elle réduit considérablement la charge de travail de leurs collaborateurs, leur permettant de se concentrer sur des tâches prioritaires.</p><p><b>[00:45]</b> Une fois que le fournisseur a soumis ses formulaires d'enregistrement complétés, Esker a la capacité d'exécuter un certain nombre de vérifications pour réduire les risques et prévenir la fraude, notamment des contrôles OFAC, des validations de comptes bancaires, des notations de conformité fournisseur et des scores de risque. Tout signalement ou avertissement est mis en évidence pour une consultation rapide, et Esker achemine l'enregistrement via un workflow d'approbation pour s'assurer que les bonnes personnes examinent chaque demande.</p><p><b>[01:10]</b> Nos clients apprécient la tranquillité d'esprit que procurent ces vérifications, Esker prenant en charge le travail lourd de gestion de la conformité et des risques à leur place.</p><p><b>[01:20]</b> Une fois l'enregistrement fournisseur approuvé, Esker peut se synchroniser avec votre ERP afin que le nouveau dossier fournisseur soit créé correctement. Cela garantit que tous les enregistrements restent à jour et vous décharge de la tâche de création des fiches fournisseurs.</p><p><b>[01:34]</b> Comme vous pouvez l'imaginer, nos clients trouvent une valeur immense dans les informations et la visibilité qu'Esker apporte à chaque étape du processus d'intégration et d'approbation.</p><p><b>[01:43]</b> Voilà pour cet aperçu de la façon dont la solution de Gestion des Fournisseurs d'Esker aide les entreprises à gérer efficacement la conformité, minimiser les risques, obtenir une visibilité complète sur les processus et réduire la charge de travail. Merci d'avoir regardé.</p>"},

  {f:"2 - Vendor Risk and Compliance Ratings",t:"Vendor Risk and Compliance Ratings",sz:"28.6",
trEN:"<p><b>[00:01]</b> Hello. This is Christina with Esker. And in this video, we'll take a focused look at how Esker's tight integration with Dun & Bradstreet lays the groundwork for our customers to reduce risk, ensure compliance, and monitor engagement for optimal supply chain sustainability.</p><p><b>[00:17]</b> Our integration with D&B allows vendors to search the D&B database using a unique identifier such as an employee ID number or VAT number. This search happens directly from within Esker when the vendor is completing their registration forms.</p><p><b>[00:33]</b> The search triggers fields in the company profile section of the registration form to pre-fill when a match is found. Let's take a look.</p><p><b>[00:41]</b> Not only is the vendor able to avoid manual data entry, but Esker will present the vendor's risk scores and ratings for your review upon submission.</p><p><b>[00:51]</b> Here is a completed registration form that a vendor has submitted for your review. Our customers can immediately review the displayed scores and ratings powered by Dun & Bradstreet.</p><p><b>[01:01]</b> Supplier risk indicators include failure scores — the probability that a vendor may permanently close their doors — delinquency risks — the probability that a vendor will late-pay their suppliers — and layoff risks.</p><p><b>[01:15]</b> Displayed ESG indicators include environmental, social and governance related ratings. Our customers love that they can view all of a vendor's information in a single platform for quick and easy review and decision making.</p><p><b>[01:29]</b> This has been a focused look at how Esker's tight integration with Dun & Bradstreet lays the groundwork for our customers to reduce risk, ensure compliance, and monitor engagement for optimal supply chain sustainability. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, ici Christina d'Esker. Dans cette vidéo, nous allons examiner de plus près comment l'intégration étroite d'Esker avec Dun & Bradstreet pose les bases permettant à nos clients de réduire les risques, assurer la conformité et surveiller l'engagement pour une durabilité optimale de la chaîne d'approvisionnement.</p><p><b>[00:17]</b> Notre intégration avec D&B permet aux fournisseurs de rechercher dans la base de données D&B à l'aide d'un identifiant unique tel qu'un numéro d'identification ou un numéro de TVA. Cette recherche s'effectue directement depuis Esker lorsque le fournisseur remplit ses formulaires d'enregistrement.</p><p><b>[00:33]</b> La recherche déclenche le pré-remplissage des champs dans la section profil d'entreprise du formulaire d'enregistrement lorsqu'une correspondance est trouvée. Voyons cela.</p><p><b>[00:41]</b> Non seulement le fournisseur évite la saisie manuelle des données, mais Esker affichera également les scores de risque et les notations du fournisseur pour votre examen lors de la soumission.</p><p><b>[00:51]</b> Voici un formulaire d'enregistrement complété qu'un fournisseur a soumis pour votre examen. Nos clients peuvent immédiatement consulter les scores et notations affichés, alimentés par Dun & Bradstreet.</p><p><b>[01:01]</b> Les indicateurs de risque fournisseur comprennent les scores de défaillance — la probabilité qu'un fournisseur ferme définitivement ses portes — les risques de retard de paiement — la probabilité qu'un fournisseur paie ses propres fournisseurs en retard — et les risques de licenciement.</p><p><b>[01:15]</b> Les indicateurs ESG affichés comprennent les notations environnementales, sociales et de gouvernance. Nos clients apprécient de pouvoir consulter toutes les informations d'un fournisseur dans une plateforme unique pour un examen rapide et une prise de décision facilitée.</p><p><b>[01:29]</b> Voilà pour cet examen approfondi de la façon dont l'intégration étroite d'Esker avec Dun & Bradstreet pose les bases pour réduire les risques, assurer la conformité et surveiller l'engagement pour une durabilité optimale de la chaîne d'approvisionnement. Merci d'avoir regardé.</p>"},

  {f:"3 - Automatic Bank Detail Verification",t:"Automatic Bank Detail Verification",sz:"24.2",
trEN:"<p><b>[00:01]</b> Hello, this is Christina with Esker. And in this video, we'll take a focused look at how Esker works seamlessly with our partners to help you prevent payment fraud with automatic bank detail verification.</p><p><b>[00:13]</b> Esker's pre-connected partners are continuously monitoring and validating third-party data, including company IDs, bank details and payment histories to evaluate risk and prevent fraud.</p><p><b>[00:24]</b> Let's start with a look from the vendor's point of view as they complete the payment section of Esker's registration form. You can see here that vendors are prompted to provide their bank account information, and Esker's built-in logic can determine which details are required based on the country.</p><p><b>[00:40]</b> So our customers can always be sure they are capturing the necessary data from their vendors. For example, Esker requires an account number for this US-based bank account, but an IBAN for the French-based account.</p><p><b>[00:52]</b> When a vendor submits their completed registration form, Esker's fraud prevention partners are able to immediately flag suspicious data for quick visibility and review. Let's take a look.</p><p><b>[01:05]</b> Here is a completed registration form that a vendor has submitted for review. The potential errors are displayed right in the form for quick visibility, as you can see here.</p><p><b>[01:16]</b> Our customers love that they no longer have to navigate back and forth between different platforms or communicate with multiple parties to verify vendor data.</p><p><b>[01:25]</b> This has been a focused look at how Esker helps our customers prevent payment fraud with automatic bank detail verification. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, ici Christina d'Esker. Dans cette vidéo, nous allons examiner de plus près comment Esker travaille de manière transparente avec nos partenaires pour vous aider à prévenir la fraude au paiement grâce à la vérification automatique des coordonnées bancaires.</p><p><b>[00:13]</b> Les partenaires pré-connectés d'Esker surveillent et valident en continu les données tierces, y compris les identifiants d'entreprise, les coordonnées bancaires et les historiques de paiement pour évaluer les risques et prévenir la fraude.</p><p><b>[00:24]</b> Commençons par la perspective du fournisseur lorsqu'il remplit la section paiement du formulaire d'enregistrement Esker. Vous pouvez voir ici que les fournisseurs sont invités à fournir leurs informations de compte bancaire, et la logique intégrée d'Esker détermine quels détails sont requis en fonction du pays.</p><p><b>[00:40]</b> Ainsi, nos clients peuvent toujours être certains de capturer les données nécessaires auprès de leurs fournisseurs. Par exemple, Esker exige un numéro de compte pour ce compte bancaire basé aux États-Unis, mais un IBAN pour le compte basé en France.</p><p><b>[00:52]</b> Lorsqu'un fournisseur soumet son formulaire d'enregistrement complété, les partenaires de prévention de la fraude d'Esker peuvent immédiatement signaler les données suspectes pour une visibilité et un examen rapides. Voyons cela.</p><p><b>[01:05]</b> Voici un formulaire d'enregistrement complété qu'un fournisseur a soumis pour examen. Les erreurs potentielles sont affichées directement dans le formulaire pour une visibilité immédiate, comme vous pouvez le voir ici.</p><p><b>[01:16]</b> Nos clients apprécient de ne plus avoir à naviguer entre différentes plateformes ou à communiquer avec de multiples interlocuteurs pour vérifier les données fournisseurs.</p><p><b>[01:25]</b> Voilà pour cet examen approfondi de la façon dont Esker aide nos clients à prévenir la fraude au paiement grâce à la vérification automatique des coordonnées bancaires. Merci d'avoir regardé.</p>"},

  {f:"4 - Diversity Classifications",t:"Diversity Classifications",sz:"20.4",
trEN:"<p><b>[00:02]</b> Hello, this is Christina with Esker. And in this video, we'll take a focused look at how Esker's diversity certification management helps our customers drive inclusive procurement within the supply chain.</p><p><b>[00:14]</b> Here we're looking at Esker's registration form from the vendor's perspective, whether a vendor is registering for the first time or requesting to update their existing information.</p><p><b>[00:23]</b> Esker's form includes a diversity section where vendors can choose the classification, provide supporting documentation, and specify the certification's expiration date.</p><p><b>[00:34]</b> These details are always submitted for your review and approval and housed in Esker's Vendor Entity page for quick accessibility. Let's take a look.</p><p><b>[00:43]</b> The Vendor Entity page allows you to view all information related to a specific vendor, including the diversity classification details and any related documentation.</p><p><b>[00:53]</b> With more than 80% of organizations today focused on supplier diversity, our customers are excited about the opportunity Esker provides to promote, increase, and improve the participation of diverse businesses in their supply chains.</p><p><b>[01:07]</b> This has been a focused look at how Esker's diversity certification management helps our customers drive inclusive procurement within the supply chain. Thanks for watching.</p>",
trFR:"<p><b>[00:02]</b> Bonjour, ici Christina d'Esker. Dans cette vidéo, nous allons examiner de plus près comment la gestion des certifications de diversité d'Esker aide nos clients à promouvoir des achats inclusifs au sein de la chaîne d'approvisionnement.</p><p><b>[00:14]</b> Nous regardons ici le formulaire d'enregistrement d'Esker du point de vue du fournisseur, qu'il s'agisse d'un fournisseur qui s'enregistre pour la première fois ou qui demande la mise à jour de ses informations existantes.</p><p><b>[00:23]</b> Le formulaire d'Esker comprend une section diversité où les fournisseurs peuvent choisir leur classification, fournir les documents justificatifs et préciser la date d'expiration de la certification.</p><p><b>[00:34]</b> Ces détails sont systématiquement soumis pour votre examen et approbation, et conservés dans la page Entité Fournisseur d'Esker pour un accès rapide. Voyons cela.</p><p><b>[00:43]</b> La page Entité Fournisseur vous permet de consulter toutes les informations relatives à un fournisseur spécifique, y compris les détails de classification diversité et toute documentation associée.</p><p><b>[00:53]</b> Avec plus de 80 % des organisations aujourd'hui engagées sur la diversité fournisseurs, nos clients sont enthousiastes quant à l'opportunité qu'Esker offre de promouvoir, accroître et améliorer la participation d'entreprises diverses dans leurs chaînes d'approvisionnement.</p><p><b>[01:07]</b> Voilà pour cet examen approfondi de la façon dont la gestion des certifications de diversité d'Esker aide nos clients à promouvoir des achats inclusifs au sein de la chaîne d'approvisionnement. Merci d'avoir regardé.</p>"},
]},
{id:"vp",label:"Supplier Portal",suite:"S2P",icon:"🌐",folder:"Supplier Portal",videos:[

  {f:"1 - Vendor Portal Overview",t:"Vendor Portal Overview",sz:"33.1",
trEN:"<p><b>[00:00]</b> Hey everyone, this is Ryan from Esker. Let's take a moment to review Esker's Vendor Portal functionality, as part of its Source-to-Pay suite.</p><p><b>[00:07]</b> The Vendor Portal provides a convenient online interface where you can give your vendors self-service access to key information and options. Something to keep in mind is that the Vendor Portal is not its own separate application. It's something that becomes standardly available to you when you use different Esker Source-to-Pay modules, which include Accounts Payable, Procurement, and Vendor Management.</p><p><b>[00:28]</b> Based on whatever combination of those modules you're using, you can give your vendors access to different functionality. And at the end of the day, you have full control over how and when the portal is utilized.</p><p><b>[00:40]</b> In the context of the AP module, simply put, the Vendor Portal gives vendors the option to directly submit their invoices within the interface, as well as track the processing of those invoices so they can easily tell when they've gone through different steps such as being paid and displaying payment details, or even when they've been rejected and showing why.</p><p><b>[00:57]</b> When you place orders using the Esker Procurement module, vendors can have the option to accept, view, and communicate with you about those orders within the portal interface. They can generate advanced shipping notices and even flip POs into invoices that are sent directly into the Esker AP process.</p><p><b>[01:14]</b> And then finally, for Vendor Management, vendors can be given an option to manage and update their own company information by submitting registration requests. These updates can be subjected to the same validations and approvals normally available as part of the Vendor Management module, so you can ensure that all the requests are legitimate before you push any updates through to your ERP.</p><p><b>[01:33]</b> Presenting these options to your vendors gives you an opportunity to improve your relationships with them. They have the ability to submit and check in on documents and details on their own time, while conversely, you don't have to spend nearly as much of your time responding to the potentially dozens of emails or phone calls you'd be getting asking about the status of an invoice or an order.</p><p><b>[01:52]</b> So once again, this has been Ryan from Esker. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Ryan d'Esker. Prenons un moment pour passer en revue la fonctionnalité Portail Fournisseurs d'Esker, qui fait partie de sa suite Source-to-Pay.</p><p><b>[00:07]</b> Le Portail Fournisseurs offre une interface en ligne pratique où vous pouvez donner à vos fournisseurs un accès self-service aux informations et options clés. Un point important à retenir : le Portail Fournisseurs n'est pas une application séparée. C'est une fonctionnalité qui devient automatiquement disponible lorsque vous utilisez les différents modules Esker Source-to-Pay, à savoir Comptabilité Fournisseurs, Approvisionnement et Gestion des Fournisseurs.</p><p><b>[00:28]</b> Selon la combinaison de modules que vous utilisez, vous pouvez donner à vos fournisseurs accès à différentes fonctionnalités. Et au final, vous gardez un contrôle total sur la manière dont le portail est utilisé et à quel moment.</p><p><b>[00:40]</b> Dans le contexte du module AP, en résumé, le Portail Fournisseurs donne aux fournisseurs la possibilité de soumettre directement leurs factures dans l'interface, ainsi que de suivre le traitement de ces factures afin qu'ils puissent facilement savoir quand elles ont franchi les différentes étapes, comme le paiement avec les détails associés, ou même quand elles ont été rejetées avec la raison du rejet.</p><p><b>[00:57]</b> Lorsque vous passez des commandes via le module Approvisionnement d'Esker, les fournisseurs ont la possibilité d'accepter, consulter et échanger avec vous au sujet de ces commandes directement dans l'interface du portail. Ils peuvent générer des avis d'expédition anticipés et même convertir des commandes d'achat en factures envoyées directement dans le processus AP d'Esker.</p><p><b>[01:14]</b> Enfin, pour la Gestion des Fournisseurs, les fournisseurs peuvent avoir la possibilité de gérer et mettre à jour leurs propres informations d'entreprise en soumettant des demandes d'enregistrement. Ces mises à jour peuvent être soumises aux mêmes validations et approbations normalement disponibles dans le cadre du module de Gestion des Fournisseurs, afin de garantir que toutes les demandes sont légitimes avant de propager les mises à jour vers votre ERP.</p><p><b>[01:33]</b> Proposer ces options à vos fournisseurs vous donne l'opportunité d'améliorer vos relations avec eux. Ils peuvent soumettre et suivre des documents et détails à leur propre rythme, tandis que de votre côté, vous n'avez plus à passer autant de temps à répondre aux potentiellement dizaines d'emails ou appels téléphoniques demandant le statut d'une facture ou d'une commande.</p><p><b>[01:52]</b> Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

  {f:"2 - AP - Invoice Submission & Review",t:"AP - Invoice Submission & Review",sz:"24.5",
trEN:"<p><b>[00:01]</b> Oftentimes vendors will spam your inbox or your voicemail with requests on how their specific invoices are progressing, like if it's been paid yet or if it might have been rejected.</p><p><b>[00:11]</b> When you use the Esker Accounts Payable module, the included Vendor Portal functionality allows you to give your vendors the self-service capability to check in on these things themselves, ideally cutting down on the number of phone calls and emails they'd be sending you otherwise.</p><p><b>[00:26]</b> If you choose to utilize this functionality, vendors can gain two main abilities in this portal. First is the option to submit new invoices. Here you can determine if you'd like to make specific fields required when the vendor submits the invoice, which can help ensure that the parameters that you need to actually process the document are being included.</p><p><b>[00:46]</b> Next, of course, is the ability for vendors to view and check in on their invoices in progress. By default, the amount of information shared with the vendor is drastically reduced compared to all the details available to you internally. Normally, when you're processing these invoices, only the essential details are displayed so that the vendor can identify which particular invoice they're viewing.</p><p><b>[01:07]</b> Payment details can be displayed on the Vendor Portal so that the vendor can check in on when an invoice was paid, the payment method used, and any relevant payment reference number. If an invoice was rejected, the reason behind the rejection can be displayed in the Vendor Portal as well.</p><p><b>[01:22]</b> You can also choose to allow conversations with vendors through the Vendor Portal. Any questions or messages posted on a specific invoice will stay with that invoice for its entire life cycle and archive duration.</p>",
trFR:"<p><b>[00:01]</b> Il arrive souvent que les fournisseurs inondent votre boîte de réception ou votre messagerie vocale de demandes concernant l'avancement de leurs factures — si elles ont été payées ou si elles ont été rejetées.</p><p><b>[00:11]</b> Lorsque vous utilisez le module Comptabilité Fournisseurs d'Esker, la fonctionnalité Portail Fournisseurs incluse vous permet de donner à vos fournisseurs la capacité self-service de vérifier eux-mêmes l'état de leurs factures, réduisant ainsi idéalement le nombre d'appels téléphoniques et d'emails qu'ils vous enverraient autrement.</p><p><b>[00:26]</b> Si vous choisissez d'utiliser cette fonctionnalité, les fournisseurs obtiennent deux capacités principales dans ce portail. La première est la possibilité de soumettre de nouvelles factures. Ici, vous pouvez déterminer si vous souhaitez rendre certains champs obligatoires lors de la soumission de la facture par le fournisseur, ce qui contribue à garantir que les paramètres nécessaires au traitement du document sont bien inclus.</p><p><b>[00:46]</b> Ensuite, bien sûr, il y a la possibilité pour les fournisseurs de consulter et suivre leurs factures en cours de traitement. Par défaut, la quantité d'informations partagées avec le fournisseur est considérablement réduite par rapport à tous les détails disponibles en interne. Normalement, lors du traitement de ces factures, seuls les détails essentiels sont affichés pour que le fournisseur puisse identifier la facture qu'il consulte.</p><p><b>[01:07]</b> Les détails de paiement peuvent être affichés sur le Portail Fournisseurs afin que le fournisseur puisse vérifier quand une facture a été payée, le moyen de paiement utilisé et tout numéro de référence de paiement pertinent. Si une facture a été rejetée, la raison du rejet peut également être affichée dans le Portail Fournisseurs.</p><p><b>[01:22]</b> Vous pouvez aussi choisir d'autoriser les conversations avec les fournisseurs via le Portail Fournisseurs. Toute question ou message posté sur une facture spécifique restera attaché à cette facture pendant tout son cycle de vie et sa durée d'archivage.</p>"},

  {f:"3 - Procurement - PO Review & Convert to Invoice",t:"Procurement - PO Review & Convert to Invoice",sz:"24.8",
trEN:"<p><b>[00:00]</b> Utilizing the Esker Vendor Portal in conjunction with the Esker Procurement module gives you access to some key features that you can choose to utilize for your vendors.</p><p><b>[00:09]</b> From within the portal, vendors have the ability to view and respond to new purchase orders that you've created within Esker and sent their way. They can start a conversation with you about that particular order, or simply select the Accept Order option to get access to some additional features.</p><p><b>[00:25]</b> If you have the option enabled to allow vendors to submit order changes, vendors could alternatively request an update to the order or simply reject it. Common updates include requesting an item to have a modified delivery date, quantity, amount, or maybe it's simply unavailable.</p><p><b>[00:42]</b> After an order has been accepted, vendors can take a few different optional actions within the portal. They can generate an advance shipping notice wherein they can provide relevant shipping and tracking details, and in turn you can utilize these to trigger the goods receipt process on your side.</p><p><b>[00:57]</b> They can also generate an invoice using the details of the purchase order. They provide an invoice number and detail the quantity of each item they'd like to invoice, and then Esker can generate an invoice document and submit it to the AP process, which in turn also allows the vendor to keep track of it using the AP-related Vendor Portal functionality.</p><p><b>[01:17]</b> Of course, many of these steps can continue to be taken outside of Esker. These features just give your vendors the ability to complete them in a one-stop-shop interface that can even automate things on their side as well that they'd normally be doing anyway.</p>",
trFR:"<p><b>[00:00]</b> Utiliser le Portail Fournisseurs d'Esker conjointement avec le module d'Approvisionnement d'Esker vous donne accès à des fonctionnalités clés que vous pouvez choisir d'activer pour vos fournisseurs.</p><p><b>[00:09]</b> Depuis le portail, les fournisseurs ont la possibilité de consulter et répondre aux nouvelles commandes d'achat que vous avez créées dans Esker et que vous leur avez envoyées. Ils peuvent démarrer une conversation avec vous au sujet d'une commande spécifique, ou simplement sélectionner l'option Accepter la Commande pour accéder à des fonctionnalités supplémentaires.</p><p><b>[00:25]</b> Si vous avez activé l'option permettant aux fournisseurs de soumettre des modifications de commande, les fournisseurs peuvent alternativement demander une modification de la commande ou simplement la refuser. Les modifications courantes incluent la demande de modification de date de livraison, de quantité, de montant, ou le signalement d'une indisponibilité.</p><p><b>[00:42]</b> Après l'acceptation d'une commande, les fournisseurs peuvent effectuer plusieurs actions optionnelles dans le portail. Ils peuvent générer un avis d'expédition anticipé en fournissant les détails d'expédition et de suivi pertinents, et de votre côté, vous pouvez les utiliser pour déclencher le processus de réception des marchandises.</p><p><b>[00:57]</b> Ils peuvent aussi générer une facture à partir des détails de la commande d'achat. Ils fournissent un numéro de facture et détaillent la quantité de chaque article à facturer, puis Esker génère un document de facture et le soumet au processus AP, ce qui permet également au fournisseur de suivre cette facture via la fonctionnalité AP du Portail Fournisseurs.</p><p><b>[01:17]</b> Bien entendu, beaucoup de ces étapes peuvent continuer à être effectuées en dehors d'Esker. Ces fonctionnalités offrent simplement à vos fournisseurs la possibilité de les accomplir dans une interface unique, qui peut même automatiser de leur côté des tâches qu'ils feraient de toute façon.</p>"},

  {f:"4 - Vendor Management - Self service company updates",t:"Vendor Management - Self Service Company Updates",sz:"17.2",
trEN:"<p><b>[00:00]</b> Using the Esker Vendor Portal in conjunction with the Esker Vendor Management module gives you access to some key features that you can choose to utilize for your vendors.</p><p><b>[00:09]</b> You can choose to automatically invite vendors to utilize the portal, assuming that their new vendor onboarding registration request is fully approved.</p><p><b>[00:16]</b> From within the portal, active vendors have the ability to request updates to their company information, which can be kicked off by selecting a button on their dashboard.</p><p><b>[00:25]</b> This process will walk them through the registration request form, which they may already be familiar with if they've gone through the new vendor onboarding process already, allowing them to update relevant information where needed.</p><p><b>[00:36]</b> Once the new information or documents have been added, the vendor can send the registration request for your internal review. They're able to keep track of this request and any other previous requests in a list view on the Registration Request tab, and if the request is validated and approved, the new information is updated in the tables.</p>",
trFR:"<p><b>[00:00]</b> Utiliser le Portail Fournisseurs d'Esker conjointement avec le module de Gestion des Fournisseurs d'Esker vous donne accès à des fonctionnalités clés que vous pouvez choisir d'activer pour vos fournisseurs.</p><p><b>[00:09]</b> Vous pouvez choisir d'inviter automatiquement les fournisseurs à utiliser le portail, à condition que leur demande d'enregistrement d'intégration en tant que nouveau fournisseur ait été entièrement approuvée.</p><p><b>[00:16]</b> Depuis le portail, les fournisseurs actifs ont la possibilité de demander des mises à jour de leurs informations d'entreprise, en cliquant simplement sur un bouton de leur tableau de bord.</p><p><b>[00:25]</b> Ce processus les guide à travers le formulaire de demande d'enregistrement, qu'ils connaissent peut-être déjà s'ils ont déjà suivi le processus d'intégration en tant que nouveau fournisseur, leur permettant de mettre à jour les informations pertinentes là où c'est nécessaire.</p><p><b>[00:36]</b> Une fois les nouvelles informations ou documents ajoutés, le fournisseur peut soumettre la demande d'enregistrement pour votre examen interne. Il peut suivre cette demande ainsi que toutes les demandes précédentes dans une vue liste sur l'onglet Demandes d'Enregistrement, et si la demande est validée et approuvée, les nouvelles informations sont mises à jour dans les tables.</p>"},
]},
{id:"epay",label:"Esker Pay",suite:"S2P",icon:"💳",folder:"Esker Pay",videos:[

  {f:"1 - Esker Pay Overview",t:"Esker Pay Overview",sz:"25.4",
trEN:"<p><b>[00:01]</b> Hello, I'm Christina, and today we're going to review our Esker Pay suite, whose functionality includes payment proposals with Corpay as the payment provider, supply chain financing through LSQ, and dynamic discounting.</p><p><b>[00:15]</b> Organizations love our Esker Pay suite because they can manage multiple payment processes not only from a single platform, but using the same solution that they already use to process their AP invoices.</p><p><b>[00:31]</b> With Esker's payment proposal functionality, users can select invoices that are ready for payment to include in a payment run, and this payment run can actually flow through a specific approval workflow before Corpay, our payment provider, makes that payment for you on your behalf.</p><p><b>[00:50]</b> Esker's supply chain financing functionality partners with LSQ so that invoices can be published to the LSQ portal, and vendors can then log in and request early payment on those invoices. When a vendor requests early payment on one of those invoices, LSQ will make that payment on your behalf so that you can continue to ride out those initial payment terms. And when those payment terms are up, you would pay LSQ instead of the vendor. Just another way that we are working to help strengthen your supply relationships.</p><p><b>[01:23]</b> Esker's dynamic discounting functionality allows suppliers to request early payment on invoices that have been published to the Vendor Portal. The dynamic aspect comes into play with the sliding scale where the discount will change based on the days until payment requested.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, je suis Christina, et aujourd'hui nous allons passer en revue notre suite Esker Pay, dont les fonctionnalités comprennent les propositions de paiement avec Corpay comme prestataire de paiement, le financement de la chaîne d'approvisionnement via LSQ, et l'escompte dynamique.</p><p><b>[00:15]</b> Les organisations apprécient notre suite Esker Pay car elles peuvent gérer plusieurs processus de paiement non seulement depuis une plateforme unique, mais en utilisant la même solution que celle qu'elles utilisent déjà pour traiter leurs factures fournisseurs.</p><p><b>[00:31]</b> Avec la fonctionnalité de proposition de paiement d'Esker, les utilisateurs peuvent sélectionner les factures prêtes à être payées pour les inclure dans un cycle de paiement, et ce cycle peut passer par un workflow d'approbation spécifique avant que Corpay, notre prestataire de paiement, effectue le paiement en votre nom.</p><p><b>[00:50]</b> La fonctionnalité de financement de la chaîne d'approvisionnement d'Esker s'appuie sur un partenariat avec LSQ : les factures approuvées peuvent être publiées sur le portail LSQ, et les fournisseurs peuvent s'y connecter pour demander un paiement anticipé. Lorsqu'un fournisseur demande un paiement anticipé, LSQ effectue le paiement à votre place, vous permettant de conserver vos conditions de paiement initiales. À l'échéance, vous payez LSQ au lieu du fournisseur. C'est une façon supplémentaire de renforcer vos relations fournisseurs.</p><p><b>[01:23]</b> La fonctionnalité d'escompte dynamique d'Esker permet aux fournisseurs de demander un paiement anticipé sur les factures publiées sur le Portail Fournisseurs. L'aspect dynamique intervient grâce à un curseur glissant où le montant de l'escompte varie en fonction du nombre de jours avant le paiement demandé.</p>"},

  {f:"2 - Payment Proposals",t:"Payment Proposals",sz:"48.7",
trEN:"<p><b>[00:01]</b> Hey everyone, this is Ryan from Esker and in this video we're going to be taking a look at the Esker Pay functionality of creating payment proposals integrated with Corpay.</p><p><b>[00:10]</b> From the Invoices Pending Payment queue, I'm able to take a look at all the invoices that can be included in a new payment proposal. I'll go ahead and make a selection from this list here, grab one of these invoices and then click Create Payment Proposal.</p><p><b>[00:23]</b> That'll take us to a draft page where we can actually see a summary of the information that we've included for the invoices so far. We've got a total amount, we've got a breakdown of the vendors, of course, and we've got a list of our invoices that we've selected where we can actually see a review of the invoice images themselves. We can click on links to open up the full invoice details.</p><p><b>[00:40]</b> If needed, we can include more invoices into this list from this screen, and then we can see our workflow section. Much in the same way that you can generate workflow rules for other Esker modules such as AP or Procurement, the same can be done for the payment proposal functionality.</p><p><b>[00:54]</b> I actually have a workflow rule operating right now wherein David, our CFO, is being included as the approver. Let's go ahead and click Request Approval and send this over to him.</p><p><b>[01:03]</b> Back in our original user's perspective here, we can see that the payment proposal dashboard has actually been updated following the creation of that new proposal. That proposal itself actually moved through a couple different statuses — it went through the draft status into the approved status, and because David just approved it for us, it's actually now in the pending payment status.</p><p><b>[01:21]</b> The invoice itself actually got a couple of different status changes too. It moved from the pending payment status 'into the in payment proposal' status, so that way other users are actually blocked from trying to include it in a new separate proposal — so we don't accidentally try to pay the same invoice at the same time.</p><p><b>[01:36]</b> Let's go ahead and click on the pending payment queue to take a look at this proposal in the list, where I can actually go ahead and click open and once again review the details for this payment proposal. Really at this stage, all that I need to do is go ahead and click Submit for Payment.</p><p><b>[01:52]</b> This is going to transfer the invoice information, the payment information over to Corpay, who will actually facilitate the payment of the vendors for these invoices. Let's go ahead and click Submit for Payment now.</p><p><b>[02:04]</b> Once payment is facilitated, as an informational update on the Esker side, the payment proposal itself as well as the individual invoices will both be marked as paid.</p><p><b>[02:15]</b> And then an additional optional step that we can take here as part of this process is navigating over to Corpay's AP Gateway dashboard where we can review all the relevant payment details. I can go over to the Payments tab where at the top of the list is going to reflect the payment that we just submitted. We can click View under processing details where we can see those details put on display. From this screen, we can actually go ahead and click on the remittance icon, which will open up the actual remittance that was sent over to the vendor from Corpay, so we can review those details.</p><p><b>[02:48]</b> So once again, this has been Ryan from Esker. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour à tous, ici Ryan d'Esker. Dans cette vidéo, nous allons examiner la fonctionnalité Esker Pay de création de propositions de paiement intégrée avec Corpay.</p><p><b>[00:10]</b> Depuis la file d'attente des factures en attente de paiement, je peux consulter toutes les factures pouvant être incluses dans une nouvelle proposition de paiement. Je vais sélectionner dans cette liste, prendre l'une de ces factures, puis cliquer sur Créer une Proposition de Paiement.</p><p><b>[00:23]</b> Cela nous amène à une page de brouillon où nous pouvons voir un résumé des informations pour les factures incluses. Nous avons un montant total, une ventilation par fournisseur, et une liste des factures sélectionnées avec un aperçu des images de factures. Nous pouvons cliquer sur les liens pour ouvrir le détail complet de chaque facture.</p><p><b>[00:40]</b> Si nécessaire, nous pouvons ajouter d'autres factures à cette liste depuis cet écran, et nous voyons aussi notre section workflow. De la même manière que vous pouvez créer des règles de workflow pour d'autres modules Esker comme AP ou Approvisionnement, la même chose est possible pour les propositions de paiement.</p><p><b>[00:54]</b> J'ai d'ailleurs une règle de workflow active en ce moment, où David, notre DAF, est désigné comme approbateur. Cliquons sur Demander l'Approbation et envoyons-lui cette proposition.</p><p><b>[01:03]</b> De retour dans la perspective de notre utilisateur initial, nous voyons que le tableau de bord des propositions de paiement a été mis à jour suite à la création de cette nouvelle proposition. La proposition a traversé plusieurs statuts : elle est passée du statut brouillon au statut approuvé, et comme David vient de l'approuver, elle est maintenant au statut en attente de paiement.</p><p><b>[01:21]</b> La facture elle-même a aussi changé de statut. Elle est passée du statut « en attente de paiement » au statut 'dans une proposition de paiement', ce qui empêche d'autres utilisateurs de l'inclure dans une proposition séparée — évitant ainsi de payer accidentellement la même facture deux fois.</p><p><b>[01:36]</b> Cliquons sur la file d'attente des paiements en attente pour consulter cette proposition dans la liste, où je peux l'ouvrir et revoir les détails. À ce stade, il ne me reste plus qu'à cliquer sur Soumettre au Paiement.</p><p><b>[01:52]</b> Cela va transférer les informations de facture et de paiement vers Corpay, qui va effectivement réaliser le paiement des fournisseurs pour ces factures. Cliquons maintenant sur Soumettre au Paiement.</p><p><b>[02:04]</b> Une fois le paiement réalisé, côté Esker, la proposition de paiement ainsi que les factures individuelles seront toutes marquées comme payées.</p><p><b>[02:15]</b> Une étape optionnelle supplémentaire consiste à naviguer vers le tableau de bord AP Gateway de Corpay, où nous pouvons consulter tous les détails de paiement pertinents. Dans l'onglet Paiements, en haut de la liste se trouve le paiement que nous venons de soumettre. Nous pouvons cliquer sur Voir sous les détails de traitement, et depuis cet écran, cliquer sur l'icône d'avis de paiement pour ouvrir le bordereau de règlement envoyé au fournisseur par Corpay.</p><p><b>[02:48]</b> Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

  {f:"3 - Supply Chain Financing",t:"Supply Chain Financing",sz:"50.2",
trEN:"<p><b>[00:00]</b> Hey everyone, this is Ryan from Esker and in this video I'll be giving you a high level overview of the integrated functionality between Esker's Accounts Payable module with LSQ Fast Track.</p><p><b>[00:11]</b> Let's take a look at a diagram that walks us through this process. So to begin with, of course, a buyer makes a purchase of some kind. The corresponding supplier in that transaction receives and completes that order and/or delivery and then sends along an invoice back to the buyer.</p><p><b>[00:25]</b> That supplier's invoice is received into the Esker AP module. Now with this integrated functionality, Esker will also automatically send the approved processed invoices through to LSQ's Fast Track portal.</p><p><b>[00:37]</b> From there, suppliers who are utilizing the LSQ Fast Track platform can have the ability to actually select eligible invoices that they would like to receive early payment on. LSQ will then facilitate that payment right away. So that way the supplier has the improved cash flow from being paid potentially much sooner than normal, while the buyer has the added benefit of improved working capital for a longer term.</p><p><b>[00:56]</b> And then to wrap things up, the buyer would, instead of paying directly to their supplier, pay LSQ on the extended agreed-upon payment terms.</p><p><b>[01:04]</b> Now let's walk through a few screens from what a buyer's perspective in LSQ would look like. After logging into the tool, I'm taken to a dashboard which right away can present some key data covering items such as how much credit is being utilized, statuses of my suppliers, my open invoices, and so on.</p><p><b>[01:20]</b> On the Invoices tab specifically, we can see the list of invoices that are available in the Fast Track platform. This list will show us which invoices are eligible for early payment and which ones have been paid early already.</p><p><b>[01:31]</b> On the Suppliers tab, we're given a breakdown of the organizations the buyer is conducting business with. This screen can show us the totals for invoices correlating with each supplier and also give us a breakdown of which suppliers have enrolled or not yet enrolled in LSQ's platform at this point.</p><p><b>[01:44]</b> Next, there's the Payments tab. Here is where we're going to see a list of payments that have been made, a summarized look at our current remaining and total balances displayed up top, whereas below we have the specific payments detailing the payment date, reference, payer, recipient, type and amount.</p><p><b>[01:59]</b> Let's go ahead and switch gears a little bit and take a brief look at the supplier's perspective when accessing LSQ Fast Track. The primary use case for a supplier to access this portal is of course to request early payment on invoices. This is designed to be as fast and easy as possible.</p><p><b>[02:13]</b> As an example, a supplier can click on Request Payment to see the list of invoices eligible for early payment. They can then select the particular invoices they'd like early payment on and submit their request. As mentioned previously, the supplier would then be paid in one to two business days, allowing them to take advantage of a potentially greatly increased cash flow.</p><p><b>[02:32]</b> With this integrated functionality, Esker will be able to update the remittance information on the invoices that have been paid early by LSQ, such that the buyer organization in this transaction can easily distinguish which invoices need payment sent to LSQ versus the actual supplier.</p><p><b>[02:48]</b> So thanks for letting me take you through this new integrated functionality between Esker AP and LSQ Fast Track. Once again, this has been Ryan from Esker. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Ryan d'Esker. Dans cette vidéo, je vais vous donner un aperçu général de la fonctionnalité intégrée entre le module Comptabilité Fournisseurs d'Esker et LSQ Fast Track.</p><p><b>[00:11]</b> Examinons un schéma qui décrit ce processus. Pour commencer, un acheteur effectue un achat. Le fournisseur correspondant reçoit et exécute la commande et/ou la livraison, puis envoie une facture à l'acheteur.</p><p><b>[00:25]</b> La facture de ce fournisseur est reçue dans le module AP d'Esker. Grâce à cette fonctionnalité intégrée, Esker envoie aussi automatiquement les factures approuvées et traitées vers le portail LSQ Fast Track.</p><p><b>[00:37]</b> De là, les fournisseurs utilisant la plateforme LSQ Fast Track peuvent sélectionner les factures éligibles sur lesquelles ils souhaitent recevoir un paiement anticipé. LSQ facilite alors ce paiement immédiatement. Ainsi, le fournisseur bénéficie d'une trésorerie améliorée en étant payé potentiellement bien plus tôt que prévu, tandis que l'acheteur profite d'un fonds de roulement amélioré sur une plus longue période.</p><p><b>[00:56]</b> Pour conclure, l'acheteur, au lieu de payer directement son fournisseur, paie LSQ aux conditions de paiement prolongées convenues.</p><p><b>[01:04]</b> Voyons maintenant quelques écrans du point de vue de l'acheteur dans LSQ. Après connexion, un tableau de bord présente immédiatement des données clés : utilisation du crédit, statut des fournisseurs, factures en cours, etc.</p><p><b>[01:20]</b> Dans l'onglet Factures, nous voyons la liste des factures disponibles sur la plateforme Fast Track. Cette liste indique quelles factures sont éligibles au paiement anticipé et lesquelles ont déjà été payées en avance.</p><p><b>[01:31]</b> Dans l'onglet Fournisseurs, nous avons une ventilation des organisations avec lesquelles l'acheteur fait affaire. Cet écran affiche les totaux de factures par fournisseur et indique quels fournisseurs sont inscrits ou non sur la plateforme LSQ.</p><p><b>[01:44]</b> Ensuite, l'onglet Paiements. C'est ici que nous voyons la liste des paiements effectués, avec en haut un résumé des soldes restants et totaux, et en dessous les paiements détaillés avec date, référence, payeur, bénéficiaire, type et montant.</p><p><b>[01:59]</b> Changeons de perspective et examinons brièvement le point de vue du fournisseur dans LSQ Fast Track. Le principal cas d'usage pour un fournisseur est bien sûr de demander un paiement anticipé sur ses factures. C'est conçu pour être aussi rapide et simple que possible.</p><p><b>[02:13]</b> Par exemple, un fournisseur peut cliquer sur Demander un Paiement pour voir la liste des factures éligibles au paiement anticipé. Il sélectionne ensuite les factures concernées et soumet sa demande. Comme mentionné précédemment, le fournisseur est alors payé sous un à deux jours ouvrés, lui permettant de profiter d'une trésorerie potentiellement très améliorée.</p><p><b>[02:32]</b> Grâce à cette fonctionnalité intégrée, Esker peut mettre à jour les informations de règlement sur les factures payées en avance par LSQ, de sorte que l'organisation acheteuse puisse facilement distinguer quelles factures nécessitent un paiement à LSQ plutôt qu'au fournisseur réel.</p><p><b>[02:48]</b> Merci de m'avoir suivi dans cette présentation de la fonctionnalité intégrée entre Esker AP et LSQ Fast Track. Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

  {f:"4 - Dynamic Discounting",t:"Dynamic Discounting",sz:"42.8",
trEN:"<p><b>[00:01]</b> Hi everyone. This is Ryan from Esker. In this video, we'll be taking a look at the dynamic discounting capabilities that exist as part of the Esker Pay umbrella of features available within the Source-to-Pay application.</p><p><b>[00:13]</b> Now with this functionality, you have the opportunity to open up the request of early payments by suppliers logging into the Vendor Portal in exchange for some kind of discount. This functionality is controlled in Esker at two different levels: both at the vendor level overall, and then at the individual invoice level, typically determined by the specific payment terms that you're utilizing when processing that invoice on the AP module.</p><p><b>[00:35]</b> Now, as you can see, I've already gone ahead and logged in as one of my vendors in a demo environment of mine. And on their dashboard here, I actually have a queue for early payment. Over on the right side, I have one invoice that looks like it's eligible for early payment.</p><p><b>[00:47]</b> So what we can do is simply click on the Pay Me Now option, which takes us to this early payment request interface. Now, based on our selection, we'll actually see a couple different metrics. Over on this right side, you can see selected invoices — of course, just one — our total invoice amount, which is the normal amount for the invoice we would expect to be paid typically, which in this case is around $6,000. The total discount amount, which right now is at $94, and then the ending payment total.</p><p><b>[01:14]</b> Now this is assuming straight away that I am requesting early payment on this invoice tomorrow, right? So days until payment right now in the sliding scale is set to 1.</p><p><b>[01:23]</b> But, and this is where the dynamic aspect really comes in, I as the vendor can slide this around. And let's say if I want, you know, four or five days out until I'm actually requesting that payment, we'll actually see the total discount amount reflect that. So now instead of that $94, it's dropped down to $50. So as a vendor, my payment total is a little bit higher if I'm waiting a little bit longer to actually receive that payment.</p><p><b>[01:48]</b> So if everything looks OK here, if this is what I'm comfortable with, I can click Submit the Request and this will pass it off back to the actual Esker organization, the one that's using the AP module.</p><p><b>[01:58]</b> Users on that side can then of course review this request and determine: is this something that we actually want to entertain here? Do we want to pay it in this increased timeframe, maybe for a little bit cheaper of an invoice payment that we have to make? Or do we want to reject this one and just pay it as we would plan to normally at the end of our payment terms for that full invoice amount?</p><p><b>[02:18]</b> If that request is accepted, of course, Esker will communicate with the ERP to make sure that the updated payment amount and invoice amount are actually transmitted over for that correct amount to be paid.</p><p><b>[02:28]</b> And that's really the core of the dynamic discounting capability that exists within the Esker Pay suite of functionality in the Esker Source-to-Pay application. So once again, this has been Ryan from Esker. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour à tous. Ici Ryan d'Esker. Dans cette vidéo, nous allons examiner les fonctionnalités d'escompte dynamique qui font partie de l'offre Esker Pay, disponible au sein de l'application Source-to-Pay.</p><p><b>[00:13]</b> Avec cette fonctionnalité, vous avez la possibilité d'ouvrir aux fournisseurs la demande de paiement anticipé via le Portail Fournisseurs, en échange d'un escompte. Cette fonctionnalité est contrôlée dans Esker à deux niveaux : au niveau du fournisseur globalement, puis au niveau de chaque facture individuellement, généralement déterminé par les conditions de paiement utilisées lors du traitement de cette facture dans le module AP.</p><p><b>[00:35]</b> Comme vous pouvez le voir, je me suis connecté en tant que l'un de mes fournisseurs dans mon environnement de démo. Sur son tableau de bord, j'ai une file d'attente pour les paiements anticipés. Sur le côté droit, j'ai une facture qui semble éligible au paiement anticipé.</p><p><b>[00:47]</b> Nous pouvons simplement cliquer sur l'option « Payez-moi maintenant », ce qui nous amène à cette interface de demande de paiement anticipé. Selon notre sélection, nous voyons plusieurs métriques sur la droite : le nombre de factures sélectionnées — ici une seule — le montant total de la facture, soit le montant normal que nous nous attendons à recevoir, environ 6 000 $ dans ce cas. Le montant total de l'escompte, actuellement à 94 $, puis le total de paiement final.</p><p><b>[01:14]</b> Cela suppose que je demande le paiement anticipé de cette facture dès demain. Le curseur « jours avant paiement » est donc positionné sur 1.</p><p><b>[01:23]</b> Mais, et c'est là que l'aspect dynamique entre vraiment en jeu, en tant que fournisseur, je peux faire glisser ce curseur. Si je veux par exemple quatre ou cinq jours avant de réellement recevoir ce paiement, nous voyons le montant total de l'escompte se réduire en conséquence. Au lieu de 94 $, il descend à 50 $. Ainsi, en tant que fournisseur, mon total de paiement est un peu plus élevé si j'accepte d'attendre un peu plus longtemps.</p><p><b>[01:48]</b> Si tout me convient, je peux cliquer sur Soumettre la Demande, ce qui la transmet à l'organisation Esker, celle qui utilise le module AP.</p><p><b>[01:58]</b> Les utilisateurs côté acheteur peuvent alors examiner cette demande et décider : est-ce quelque chose que nous souhaitons accepter ? Voulons-nous payer dans ce délai raccourci, peut-être pour un montant de facture légèrement réduit ? Ou préférons-nous rejeter cette demande et payer comme prévu à l'échéance normale pour le montant total de la facture ?</p><p><b>[02:18]</b> Si la demande est acceptée, Esker communique bien sûr avec l'ERP pour s'assurer que le montant de paiement et le montant de facture mis à jour sont correctement transmis.</p><p><b>[02:28]</b> Voilà l'essentiel de la fonctionnalité d'escompte dynamique au sein de la suite Esker Pay dans l'application Esker Source-to-Pay. Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},
]},
