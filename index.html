trFR:"<p><b>[00:00]</b> Et si les commandes étaient soumises dans un format traitable automatiquement ? Et si les commandes étaient payées avant d'être soumises ? Ou si les boîtes mail des CSR n'étaient plus bombardées de questions comme « Quand ma commande doit-elle arriver ? »</p><p><b>[00:13]</b> Dans cette vidéo, je vais présenter le Portail Client Esker et l'application mobile Esker Anywhere pour montrer comment ces solutions peuvent améliorer l'expérience client et aider les collaborateurs en déplacement.</p><p><b>[00:25]</b> Avec le portail client en libre-service d'Esker, les clients accèdent aux informations importantes 24h/24, 7j/7 : passer des commandes, consulter les ASN ou confirmations de commande, et voir les demandes soumises.</p><p><b>[00:37]</b> Depuis le portail, je peux voir toutes les commandes précédentes avec leur statut et en passer une nouvelle. Je sélectionne mes articles depuis le catalogue ou en rechargeant une commande précédente. J'ajoute le numéro de bon de commande, vérifie l'adresse de livraison, et je peux même payer avant de passer la commande si cette option est activée.</p><p><b>[00:57]</b> Et si vos clients disposent déjà d'un portail de commande ? Le portail Esker peut alors servir de catalogue punchout, garantissant que vous recevez les informations nécessaires tout en permettant aux clients de commander via leurs applications d'approvisionnement existantes.</p><p><b>[01:11]</b> Pour vérifier le statut d'une commande, je peux facilement consulter les ASN pour obtenir les informations détaillées de livraison.</p><p><b>[01:19]</b> L'application mobile facilite la prise de commande en déplacement, que ce soit pour les clients ou les commerciaux. Voyons le point de vue d'un commercial. À la connexion, je vois la liste des commandes précédentes avec leurs statuts. « Nouvelle commande » me permet de sélectionner un client, une adresse de livraison, et d'ajouter les détails. Je choisis mes articles et confirme la commande.</p><p><b>[01:42]</b> Les clients peuvent aussi commander directement depuis l'application. Les responsables CSR peuvent utiliser l'app mobile pour consulter les métriques de leur équipe et suivre le traitement via les tableaux de bord.</p><p><b>[02:00]</b> Alors que les standards B2C continuent de s'imposer dans le B2B, des options comme le Portail Client Esker et l'application mobile permettent aux entreprises de rester pertinentes et compétitives. Le portail et l'application mobile fournissent à vos clients les outils pour obtenir ce dont ils ont besoin, quand ils en ont besoin. C'est gagnant-gagnant pour les clients comme pour les services client.</p>"},

  {f:"9 - Communicating Internally and Externally",t:"Communicating Internally and Externally",sz:"31.5",
trEN:"<p><b>[00:00]</b> As companies strive to provide their best customer service, having quick, streamlined, and easy communication processes is key. It's cumbersome to look through past messages about an order, having to dig through email, maybe your instant messages, potentially a CRM or ERP.</p><p><b>[00:19]</b> With Esker, we provide several tools to make this process easier, ensuring a streamlined way to communicate and have everything tied to the order.</p><p><b>[00:28]</b> Now let's take a look at that process in action. So here in this order, after I'm done looking through it, maybe I realized that this material is actually out of stock currently. I can simply start a conversation with the customer. I can add any additional contacts that I want from the list of contacts or create new ones. I can utilize templates — so maybe I want to use the product availability template — and then I can simply add an attachment or not and send this out to the customer.</p><p><b>[00:59]</b> They will receive an email with this message and if they respond back, it's going to be tied directly to this thread. Let's say I'm out tomorrow and someone needs to backfill for me. That person can come into this order, see that record of communication, and know immediately what's going on and why this order is not being placed, and simply wait for a response from that customer.</p><p><b>[01:19]</b> But let's say I just need to communicate internally. I can utilize this chat feature, add different participants, and then go ahead and send out a message. Again, they're going to get this message — they'll get it via email. It'll take them with a link right back to this order so they'll be able to see exactly why I'm asking them that question.</p><p><b>[01:41]</b> So today we covered the different conversation tools that we have in Esker that allow communication processes to be streamlined when it comes to order management. Not only is it easy to send messages via this platform, it allows them to be archived and tied directly to that order.</p>",
trFR:"<p><b>[00:00]</b> Alors que les entreprises s'efforcent d'offrir le meilleur service client, disposer de processus de communication rapides, fluides et simples est essentiel. Il est fastidieux de chercher les messages passés concernant une commande en fouillant dans les emails, la messagerie instantanée, voire un CRM ou ERP.</p><p><b>[00:19]</b> Avec Esker, nous fournissons plusieurs outils pour simplifier ce processus, garantissant une communication fluide avec tout l'historique lié à la commande.</p><p><b>[00:28]</b> Voyons cela en action. Dans cette commande, après l'avoir examinée, je réalise par exemple que cet article est actuellement en rupture de stock. Je peux simplement démarrer une conversation avec le client. Je peux ajouter des contacts supplémentaires depuis la liste ou en créer de nouveaux. Je peux utiliser des modèles — par exemple le modèle « disponibilité produit » — puis ajouter une pièce jointe ou non et envoyer au client.</p><p><b>[00:59]</b> Le client recevra un email avec ce message, et s'il répond, la réponse sera directement liée à ce fil de discussion. Si je suis absent demain et que quelqu'un doit me remplacer, cette personne peut ouvrir cette commande, voir l'historique de communication et comprendre immédiatement la situation — pourquoi la commande n'a pas été passée — et simplement attendre la réponse du client.</p><p><b>[01:19]</b> Si j'ai besoin de communiquer en interne, je peux utiliser la fonctionnalité de chat, ajouter des participants et envoyer un message. Ils le recevront par email avec un lien direct vers cette commande pour voir exactement pourquoi je les sollicite.</p><p><b>[01:41]</b> Nous avons couvert les différents outils de conversation disponibles dans Esker pour fluidifier les processus de communication dans le cadre de la gestion des commandes. Non seulement il est facile d'envoyer des messages via cette plateforme, mais ils sont aussi archivés et directement liés à la commande.</p>"},
]},
{id:"id",label:"Invoice Delivery",suite:"O2C",icon:"📨",folder:"Invoice Delivery",videos:[

  {f:"1 - Invoice Delivery Overview",t:"Invoice Delivery Overview",sz:"56.8",
trEN:"<p><b>[00:01]</b> Hey there, TJ from Esker here. And are you looking to future-proof your business? Well, Esker's Invoice Delivery module can help.</p><p><b>[00:08]</b> It seems like invoice requirements are constantly changing based on mandates by your government or governments around the world, or adapting to the newest technology for delivering those invoices. Well, Esker's Invoice Delivery can help by delivering via email, postal, fax, and even delivery into those portals. So let's take a look.</p><p><b>[00:28]</b> So with this quick 4-minute video, I plan to go over some of the functionality that ties into the module, as well as some areas where our customers have seen a lot of value gained by utilizing that functionality.</p><p><b>[00:40]</b> Just quickly jumping into our dashboard, there's a lot of key insights, graphs, and counters that are really designed for each specific user in that invoice delivery process. So whether I'm an invoicing clerk who needs to get an extra pair of eyes on an invoice before it goes out, or if I'm a higher-level exec who needs to see just higher-level information to get trending data to make executive decisions, we can tailor those as well.</p><p><b>[01:08]</b> A really common pain that we've seen here at Esker is really evolving invoicing requirements from your customers. This is really exemplified in individual portals such as Amazon or Walmart where they have specific e-invoicing requirements, or let's say you need to go through middle services such as Ariba, Coupa, Tungsten, or Taulia. Esker can leverage our relationships with those middle services to really get those invoices where they need to go.</p><p><b>[01:33]</b> This can be exemplified in Esker functionality in our invoice delivery process. As a part of that connection, a really big value is that you can get key information into why that invoice was not delivered, really getting to the root cause of that problem as soon as it starts.</p><p><b>[01:50]</b> So let's take a look. Here I've navigated over to a rejected EDI invoice submission to the Italian public administration. And here I'd like to quickly run through some of the tools that we have to course-correct this invoice as well as gather the necessary information to do so.</p><p><b>[02:04]</b> Here we can see this exemplified in our \"Resend Invoice\" button in the top left. From here we can leverage quick options to get this invoice in the right hands — re-choosing that delivery method, tweaking pre-populated email information, as well as even attaching an ad hoc invoice PDF or BOL.</p><p><b>[02:26]</b> Tied in with that, we have a lot of information tied in with the delivery and history of this invoice. A big part of the Invoice Delivery solution is that we do also offer a self-service portal for your customers to view, pay, and download invoice copies. We can see that exemplified in the invoice delivery here where it's been published but not yet viewed by the customer. And then lastly, we can see that history of that delivery as well — being submitted and then that processing error — really getting all that information to get to the root cause and solve this invoice.</p><p><b>[03:00]</b> So through these features, insights, and automation, we've seen a ton of value gained for our customers. We've seen this in the realm of 3× faster invoice processing, lower DSO, and even 700 man-hours saved annually. And this is just the tip of the iceberg of the value that the Invoice Delivery module can achieve for your organization.</p><p><b>[03:20]</b> So with that, that was a quick 4-minute overview of some of the major functionality within the Invoice Delivery module. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, ici TJ d'Esker. Vous cherchez à pérenniser votre activité ? Le module Invoice Delivery d'Esker peut vous aider.</p><p><b>[00:08]</b> Les exigences de facturation évoluent constamment, en fonction des obligations gouvernementales nationales ou internationales, ou de l'adaptation aux nouvelles technologies de livraison de factures. Esker Invoice Delivery peut aider en livrant par email, courrier postal, fax, et même directement dans les portails. Voyons cela de plus près.</p><p><b>[00:28]</b> Dans cette vidéo rapide de 4 minutes, je vais parcourir certaines fonctionnalités du module ainsi que les domaines où nos clients ont constaté une forte valeur ajoutée.</p><p><b>[00:40]</b> En accédant rapidement au tableau de bord, on trouve de nombreux indicateurs clés, graphiques et compteurs conçus pour chaque profil d'utilisateur du processus de livraison de factures. Que je sois un agent de facturation ayant besoin d'une double vérification avant envoi, ou un dirigeant qui a besoin d'informations de haut niveau pour prendre des décisions stratégiques, nous pouvons adapter ces vues.</p><p><b>[01:08]</b> Un problème très courant que nous observons chez Esker concerne l'évolution des exigences de facturation de vos clients. Cela se manifeste notamment avec les portails individuels comme Amazon ou Walmart qui ont des exigences spécifiques de facturation électronique, ou lorsque vous devez passer par des intermédiaires comme Ariba, Coupa, Tungsten ou Taulia. Esker s'appuie sur ses partenariats avec ces services intermédiaires pour acheminer vos factures à destination.</p><p><b>[01:33]</b> Cela se traduit dans Esker par notre processus de livraison de factures. Un avantage majeur de ces connexions est d'obtenir les informations clés sur les raisons d'un échec de livraison, permettant d'identifier la cause racine du problème dès qu'il survient.</p><p><b>[01:50]</b> Voyons un exemple concret. Ici, j'ai navigué vers une soumission EDI rejetée auprès de l'administration publique italienne. Je vais rapidement parcourir les outils dont nous disposons pour corriger cette facture et rassembler les informations nécessaires.</p><p><b>[02:04]</b> Nous voyons ici le bouton « Renvoyer la facture » en haut à gauche. Depuis cette interface, nous pouvons exploiter des options rapides pour acheminer cette facture correctement : re-choisir la méthode de livraison, ajuster les informations email pré-remplies, voire joindre un PDF de facture ou un bon de livraison ad hoc.</p><p><b>[02:26]</b> En complément, nous disposons de nombreuses informations liées à la livraison et à l'historique de cette facture. Une part importante de la solution Invoice Delivery est le portail en libre-service qui permet à vos clients de consulter, payer et télécharger des copies de factures. On voit ici que la facture a été publiée mais pas encore consultée par le client. Enfin, nous pouvons voir l'historique de livraison — la soumission puis l'erreur de traitement — rassemblant toutes les informations pour identifier la cause racine et résoudre le problème.</p><p><b>[03:00]</b> Grâce à ces fonctionnalités, ces analyses et cette automatisation, nos clients constatent une valeur considérable : un traitement des factures 3 fois plus rapide, un DSO réduit, et jusqu'à 700 heures-homme économisées par an. Et ce n'est que la partie émergée de l'iceberg de la valeur que le module Invoice Delivery peut apporter à votre organisation.</p><p><b>[03:20]</b> Voilà un aperçu rapide de 4 minutes des principales fonctionnalités du module Invoice Delivery. Merci d'avoir regardé.</p>"},
]},
{id:"ca",label:"Cash Application",suite:"O2C",icon:"💰",folder:"Cash Application",videos:[

  {f:"1 - Cash App Overview",t:"Cash App Overview",sz:"27.4",
trEN:"<p><b>[00:00]</b> Hi everyone, TJ from Esker here. And with this quick 4-minute video, I plan to do a quick high-level overview of the Cash Application module while also touching on some customer stories and functionality that ties into the value that they saw within the module. So let's take a look.</p><p><b>[00:16]</b> Jumping into our dashboard here, there's really a lot going on. We've got queues, counters, graphs, buttons, but what's important here is that there's a lot of flexibility in configuring what's important to you as a user — whether that be C-level trends and historic data, or user-level gritty data that you really need to get your hands on. We give you the tools in order to tweak, change and modify that.</p><p><b>[00:38]</b> Before we jump into specific functionality, I always think it's important to kind of restate the goal of the solution and also a little bit on how it works so we can better understand that functionality down the road. Essentially we're working with three sets of data to achieve no-touch automation, reconciling your invoices to payments with that data.</p><p><b>[00:57]</b> The first set we're working with is your ERP master data — mainly the invoice information. Tied in is remittance information that's been extracted utilizing our AI Synergy neural network to get that field-level data. And then lastly, we're utilizing your payments file — that can be BAI2, MT940, or even lockbox — to get that three-way automation.</p><p><b>[01:18]</b> An area where we saw a lot of value for our current customers in that automation is through AI Synergy, extracting that field-level information not based on the template of that document, but the layout. This really comes in handy when you have really long remittance advices, maybe 800 line items long. You can go from manually keying that into your ERP to validating that information, which can really reduce processing time and boost morale for your cash application specialists.</p><p><b>[01:46]</b> Although that goal is 100% no-touch automation, there are going to be those scenarios that do require more manual tools in order to allocate the money into the correct invoices. So with that, we'll go through some of the tools that Esker provides to really allocate the correct payments to the correct invoices.</p><p><b>[02:03]</b> We can jump into our \"To Allocate\" queue where we are going to get a list of those payments that require a little extra attention. In here, we'll jump into a demo example of a payer where we have all the right information, but it's the first time with that automation so that we can allow that for future scenarios down the road.</p><p><b>[02:29]</b> Jumping into that demo example, here we have a scenario where this is the first time that we've seen a three-way match and all we need to do is enable auto allocation for the scenario. In the top right we have that payment information — here we can extract the payment type, payment amount and the payer name. Right below that we have the remittance advice document. We've already extracted that field-level data utilizing AI Synergy. And then lastly, we have the two invoices that do correlate to that ERP master data.</p><p><b>[03:05]</b> In order to enable that automatic scenario down the road, all we need to do is enable auto allocation for this payer. Alongside this perfect three-way match, we do know that there are going to be many scenarios where we may not have all that necessary information. Within the solution, we do have plenty of tools in order to gather that.</p><p><b>[03:24]</b> Just a few quick examples: we do have an internal and external conversation feature tool, really enabling powerful communication between you and your teammates as well as you and your customers. And then once you gather that information, we do have plenty of tools in order to get that money to the correct allocation — that can be exemplified in our Recycle Payment feature where we can put that payment on customer accounts until we get that information.</p><p><b>[03:56]</b> So that was a very quick 4-minute overview of the Cash Application solution. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici TJ d'Esker. Dans cette vidéo rapide de 4 minutes, je vais faire un survol du module Cash Application tout en abordant des retours clients et les fonctionnalités qui leur ont apporté le plus de valeur. Allons-y.</p><p><b>[00:16]</b> En accédant au tableau de bord, il y a vraiment beaucoup d'éléments : files d'attente, compteurs, graphiques, boutons. L'important ici, c'est la flexibilité de configuration selon votre profil — que vous ayez besoin de tendances haut niveau pour la direction ou de données granulaires pour le traitement quotidien. On vous donne les outils pour adapter tout ça.</p><p><b>[00:38]</b> Avant d'entrer dans les fonctionnalités spécifiques, je pense qu'il est utile de rappeler l'objectif de la solution et son fonctionnement. Essentiellement, nous travaillons avec trois jeux de données pour atteindre l'automatisation sans intervention humaine, en rapprochant vos factures et vos paiements.</p><p><b>[00:57]</b> Le premier jeu de données est votre master data ERP — principalement les informations de facturation. S'y ajoutent les informations de remise extraites grâce à notre réseau neuronal AI Synergy pour obtenir les données au niveau champ. Enfin, nous utilisons votre fichier de paiements — BAI2, MT940 ou même lockbox — pour réaliser ce rapprochement tripartite.</p><p><b>[01:18]</b> Un domaine où nos clients ont constaté beaucoup de valeur dans cette automatisation, c'est via AI Synergy, qui extrait les informations au niveau champ non pas sur la base du template du document, mais de sa mise en page. C'est particulièrement utile quand vous avez de très longs avis de remise — parfois 800 lignes. Vous passez de la saisie manuelle dans votre ERP à la simple validation, ce qui réduit considérablement le temps de traitement.</p><p><b>[01:46]</b> Bien que l'objectif soit une automatisation 100 % sans intervention, il y aura toujours des scénarios nécessitant des outils manuels pour allouer les fonds aux bonnes factures. Nous allons donc parcourir les outils qu'Esker fournit pour cela.</p><p><b>[02:03]</b> On accède à notre file « À allouer » qui liste les paiements nécessitant une attention particulière. On va prendre l'exemple d'un payeur pour lequel nous avons toutes les bonnes informations, mais c'est la première fois qu'on active l'automatisation afin de la permettre pour les futurs scénarios.</p><p><b>[02:29]</b> Dans cet exemple, c'est la première fois qu'on observe un rapprochement tripartite parfait et il suffit d'activer l'allocation automatique. En haut à droite, les informations de paiement : type, montant et nom du payeur. En dessous, l'avis de remise dont les données ont déjà été extraites via AI Synergy. Enfin, les deux factures correspondantes issues des données ERP.</p><p><b>[03:05]</b> Pour activer l'automatisation future, il suffit d'activer l'allocation automatique pour ce payeur. Au-delà de ce rapprochement parfait, il y aura des scénarios où toutes les informations ne sont pas disponibles. La solution dispose de nombreux outils pour les obtenir.</p><p><b>[03:24]</b> Quelques exemples rapides : un outil de conversation interne et externe pour communiquer efficacement avec vos équipes et vos clients. Et la fonctionnalité de recyclage de paiement qui permet de placer l'argent sur le compte client en attendant les informations manquantes.</p><p><b>[03:56]</b> Voilà pour ce rapide tour d'horizon du module Cash Application. Merci d'avoir regardé.</p>"},

  {f:"2 - Request remits for payments with dynamic messaging",t:"Request Remits for Payments with Dynamic Messaging",sz:"14.8",
trEN:"<p><b>[00:02]</b> Applying cash to invoices without remittances is risky business. If applied incorrectly, reversing and fixing those entries can be very time-consuming. Incorrectly applying payments can also skew your aging reports.</p><p><b>[00:16]</b> In this video, we'll see how you can use messaging within the Esker on Demand payment pane to contact your customers with dynamic message templates.</p><p><b>[00:27]</b> Within this payment form here, you can see that we have a payment received. We may have made some suggestions as to which invoices this may apply to, but if you want to confirm with your customer and get a remittance — with the conversation pane here, all I need to do is choose who I want this email to go out to, choose my template. Again, with dynamic templates, some of this is filled in based on the information received from that payment.</p><p><b>[00:55]</b> We also have a rich text editor, so I can change things here to highlight certain pieces of this message if I wish, and I can also set those up in the template. Once I have the email ready to go, I can click OK and this is going to generate an email out to my customer. It'll look like any other email — they won't know that it came through Esker. They can then reply with that remittance.</p><p><b>[01:21]</b> So how do you keep track of these and make sure that you apply those remittances once received? Esker can also help with that. On my dashboard, I have a counter for payments with new messages. So once that customer has replied with that remittance form, I can go ahead and go in, validate the remittance against my open AR, make sure that everything matches, and then I can go ahead and apply that payment.</p><p><b>[01:49]</b> All of the communication for this payment will be saved along with the payment record as well. So for auditing and archiving purposes, I can always get back to any of that communication with my customer within the archive.</p><p><b>[02:02]</b> So this was a video to show you how to use Esker's dynamic message templates to request remittance advices.</p>",
trFR:"<p><b>[00:02]</b> Appliquer des encaissements sur des factures sans avis de remise est risqué. En cas d'erreur, annuler et corriger ces écritures peut être très chronophage. Des paiements mal appliqués peuvent aussi fausser vos rapports d'ancienneté.</p><p><b>[00:16]</b> Dans cette vidéo, nous verrons comment utiliser la messagerie dans le volet paiement d'Esker on Demand pour contacter vos clients avec des modèles de messages dynamiques.</p><p><b>[00:27]</b> Dans ce formulaire de paiement, on voit qu'un paiement a été reçu. Esker peut avoir suggéré les factures auxquelles il s'applique, mais si vous voulez confirmer avec votre client et obtenir un avis de remise — via le volet conversation, il suffit de choisir le destinataire et le modèle. Avec les modèles dynamiques, certains champs sont pré-remplis à partir des informations du paiement.</p><p><b>[00:55]</b> Nous disposons aussi d'un éditeur de texte riche pour personnaliser le message et mettre en évidence certaines parties. Une fois l'email prêt, un clic sur OK génère l'envoi au client. L'email ressemble à n'importe quel email classique — le client ne saura pas qu'il provient d'Esker. Il peut ensuite répondre avec l'avis de remise.</p><p><b>[01:21]</b> Comment suivre ces demandes et s'assurer d'appliquer les remises une fois reçues ? Esker aide aussi sur ce point. Sur le tableau de bord, un compteur affiche les paiements avec de nouveaux messages. Une fois que le client a répondu avec son avis de remise, on peut le valider contre l'AR ouvert, vérifier la correspondance, puis appliquer le paiement.</p><p><b>[01:49]</b> Toute la communication liée à ce paiement est sauvegardée avec l'enregistrement du paiement. À des fins d'audit et d'archivage, vous pouvez toujours retrouver l'historique des échanges avec votre client dans les archives.</p><p><b>[02:02]</b> Cette vidéo vous a montré comment utiliser les modèles de messages dynamiques d'Esker pour demander des avis de remise.</p>"},

  {f:"3 - Zero Dollar Payment Allocation",t:"Zero Dollar Payment Allocation",sz:"13.6",
trEN:"<p><b>[00:01]</b> Cash application can be a real challenge when customers don't actually pay you — rather, they want to close open invoices with open credits. The $0.00 payment can be a real challenge for cash application teams because they have to go through manually and determine which invoices need to be closed using what credit. So with a lot of open invoices and credits, this can be a really tedious process.</p><p><b>[00:26]</b> In this video, we'll see how Esker is able to help with $0.00 payments. I can see that I have several $0.00 payments waiting for allocation. The first step is if I've received a remittance from the customer, we're going to validate this remittance. We see that there are two credits and two invoices on this remittance.</p><p><b>[00:49]</b> If I scroll down, I can see that all four of these are valid. Esker has validated these against my open AR from my ERP to make sure that these credits are actually still open and that they can be applied to the invoices.</p><p><b>[01:03]</b> Once I've verified everything, I can approve this remittance — and I can also automate approving these remittances moving forward. Once that remittance is approved, over on my payment screen, I can now allocate that payment. Even though no cash is coming in, we've identified this as a $0.00 payment. On the left, I have the invoices and credits that will be allocated, and then from here I can allocate and close out those invoices. This step can also be automated if configured.</p><p><b>[01:42]</b> So this video covered how Esker is able to help with $0.00 payments — getting the information on open invoices and open credits to be able to automate that and close out those invoices when those $0.00 payments come through.</p>",
trFR:"<p><b>[00:01]</b> Le lettrage peut devenir un vrai défi quand les clients ne vous paient pas réellement — ils souhaitent plutôt solder des factures ouvertes avec des avoirs. Le paiement à 0 € est problématique pour les équipes de Cash Application car il faut déterminer manuellement quelles factures clôturer avec quel avoir. Avec de nombreuses factures et avoirs ouverts, c'est un processus vraiment fastidieux.</p><p><b>[00:26]</b> Dans cette vidéo, voyons comment Esker gère les paiements à 0 €. On voit que plusieurs paiements à 0 € attendent l'allocation. Première étape : si un avis de remise a été reçu du client, on le valide. On constate ici deux avoirs et deux factures sur cet avis de remise.</p><p><b>[00:49]</b> En défilant, on voit que les quatre éléments sont valides. Esker les a validés contre l'AR ouvert de l'ERP pour s'assurer que ces avoirs sont toujours ouverts et applicables aux factures.</p><p><b>[01:03]</b> Une fois la vérification terminée, on peut approuver l'avis de remise — et aussi automatiser cette approbation pour l'avenir. Une fois approuvé, sur l'écran de paiement, on peut allouer le paiement. Même si aucun encaissement réel n'arrive, le paiement est bien identifié à 0 €. À gauche, les factures et avoirs à allouer, puis on clôture les factures. Cette étape peut aussi être automatisée.</p><p><b>[01:42]</b> Cette vidéo a montré comment Esker aide à gérer les paiements à 0 € — en récupérant les informations sur les factures et avoirs ouverts pour automatiser la clôture.</p>"},

  {f:"4 - Tax Witholding",t:"Tax Withholding",sz:"13.2",
trEN:"<p><b>[00:02]</b> For accounting teams, tax withholdings can be a real challenge. In some countries, customers are required to pay taxes directly to the government, so when they pay your invoices, it looks like they've short-paid. Allocating them correctly while accounting for what happened to the tax can be labor-intensive and prone to error. There are also legal and reporting requirements to consider.</p><p><b>[00:24]</b> In this video we see how Esker can automate your tax withholdings. In this payment, we can see that the customer paid $700.00, but Esker has allocated it to an invoice worth $1,000. This is because I have this customer set up for a 30% tax withholding.</p><p><b>[00:44]</b> I can see below that Esker has automatically allocated 30% of this payment to a GL account that I previously set up for this customer specifically. So we can see that there's withholding tax on this invoice and that I have validation required. What this means is that this is going to go on hold, and on my homepage I'll have a queue that will give me visibility that I still need to validate this.</p><p><b>[01:14]</b> Once I've received the customer's tax withholding certificates, I can go ahead and validate it and send the payment to my ERP. Additionally, I can set up different tax withholding amounts by company code, so I can account for different withholdings for different countries.</p><p><b>[01:33]</b> Back to my homepage, here is where you would see the withholding tax adjustments to validate. This is where I will have that visibility to make sure that I follow up on those customers and get their correct tax certifications.</p><p><b>[01:48]</b> So this was a video to walk you through how Esker is able to automate those tax allocations by setting up different tax withholdings by company code.</p>",
trFR:"<p><b>[00:02]</b> Pour les équipes comptables, les retenues à la source peuvent être un vrai casse-tête. Dans certains pays, les clients doivent payer les taxes directement au gouvernement. Quand ils règlent vos factures, on dirait qu'ils ont sous-payé. Les allouer correctement en tenant compte de la taxe est laborieux et source d'erreurs. Il y a aussi des exigences légales et de reporting à considérer.</p><p><b>[00:24]</b> Dans cette vidéo, voyons comment Esker automatise les retenues à la source. Ici, le client a payé 700 $, mais Esker l'a alloué à une facture de 1 000 $, car ce client est paramétré avec une retenue à la source de 30 %.</p><p><b>[00:44]</b> On voit qu'Esker a automatiquement alloué 30 % de ce paiement sur un compte de grand livre configuré spécifiquement pour ce client. La retenue fiscale est identifiée sur cette facture et une validation est requise. Cela signifie que le paiement est mis en attente, et sur ma page d'accueil, une file d'attente me signale qu'une validation est nécessaire.</p><p><b>[01:14]</b> Une fois les certificats de retenue à la source reçus du client, je peux valider et envoyer le paiement à l'ERP. De plus, je peux configurer différents taux de retenue par code société pour tenir compte des différentes réglementations par pays.</p><p><b>[01:33]</b> De retour sur la page d'accueil, c'est ici qu'apparaissent les ajustements de retenue à la source à valider. Cela donne la visibilité nécessaire pour assurer le suivi auprès des clients et obtenir les certifications fiscales.</p><p><b>[01:48]</b> Cette vidéo vous a montré comment Esker automatise les allocations fiscales en configurant différentes retenues à la source par code société.</p>"},

  {f:"5 - Extraction Using OCR and AI Synergy",t:"Extraction Using OCR and AI Synergy",sz:"13.8",
trEN:"<p><b>[00:00]</b> Welcome. With this quick video, we're going to dive a little bit deeper into how Esker can leverage its AI suite of technology in order to automate remittance advice processing.</p><p><b>[00:10]</b> In the suite, we have AI Synergy, which is essentially a neural network trained on thousands of documents to extract information based on the layout of the document — not the template — combined with machine learning to continuously learn from those documents over time, and OCR to extract that information.</p><p><b>[00:29]</b> Let's start by taking a look at some of the common challenges within the cash application process: manual data entry, complex remittance formats, as well as high volumes of transactions can often lead to errors and delays.</p><p><b>[00:44]</b> With Esker, we see opportunities for efficiency within those challenges. Here we can see that at work. Within our remittance advice processing screen, on the right-hand side, we can see that we have two invoices and one claim that have been extracted from that remit. Anywhere that you see that green box is where AI Synergy is at work.</p><p><b>[01:04]</b> On the left-hand side of the screen, we can see all of that information extracted, and it gives you the tools to tweak that information as needed. What's powerful here is that we do have an auto-complete feature, and this really comes into play when you have really long remits. You can train the first line of that document, and then if you have 800 line items below that, clicking that auto-complete link will sift through those 800 line items and leverage AI Synergy to auto-extract — really giving your finance team a lot of free time for more higher-value-added tasks.</p><p><b>[01:43]</b> So what else does this mean for your financial team? Efficiency and accuracy at scale. Once trained, you can rely on the system processing hundreds of remits in mere seconds, effortlessly matching your invoices to payments in that cash application automation.</p>",
trFR:"<p><b>[00:00]</b> Bienvenue. Dans cette vidéo rapide, nous allons approfondir comment Esker exploite sa suite d'IA pour automatiser le traitement des avis de remise.</p><p><b>[00:10]</b> Dans la suite, nous avons AI Synergy — un réseau neuronal entraîné sur des milliers de documents pour extraire les informations en se basant sur la mise en page du document (et non le template), combiné au machine learning pour apprendre continuellement, et à l'OCR pour l'extraction des données.</p><p><b>[00:29]</b> Commençons par les défis courants du processus de Cash Application : saisie manuelle, formats de remise complexes, et volumes élevés de transactions qui engendrent souvent erreurs et retards.</p><p><b>[00:44]</b> Avec Esker, nous voyons des opportunités d'efficacité face à ces défis. Dans l'écran de traitement des avis de remise, à droite, on voit que deux factures et une réclamation ont été extraites. Partout où vous voyez un cadre vert, c'est AI Synergy qui est à l'œuvre.</p><p><b>[01:04]</b> À gauche de l'écran, toutes les informations extraites sont affichées avec les outils pour les ajuster si nécessaire. Un point fort : la fonctionnalité d'auto-complétion, particulièrement utile pour les longs avis de remise. Vous entraînez la première ligne du document, puis pour les 800 lignes suivantes, un clic sur auto-complétion lance AI Synergy pour tout extraire automatiquement — libérant ainsi du temps précieux pour votre équipe finance.</p><p><b>[01:43]</b> Qu'est-ce que cela signifie pour votre équipe financière ? Efficacité et précision à grande échelle. Une fois entraîné, le système traite des centaines d'avis de remise en quelques secondes, rapprochant automatiquement vos factures et paiements.</p>"},

  {f:"6 - Recycling Payments",t:"Recycling Payments",sz:"10.6",
trEN:"<p><b>[00:01]</b> Recycling a payment. So here's a scenario: you just received a lump-sum deposit into your bank account and you have an inclination of which customers and invoices it applies to, but you don't quite know yet. So what do you do?</p><p><b>[00:13]</b> You kick off a conversation with that customer via phone or email. From that, the customer indicates they're going to provide the remittance advice within the next few days — they just need their accounting system to catch up. This can be a problem for you if you need to park this money or designate it right away.</p><p><b>[00:32]</b> So what Esker does in this scenario is provide a Recycle Payment feature. What does this do? Essentially, it lets you park that money as unapplied cash on that customer account. And what Esker is going to do is, after a predetermined period of time, re-suggest that allocation to you. Or if we receive the necessary information — such as an updated bank file, updated open AR, or we finally get that remittance advice — we can use that as automation in the background to be a hands-off process and then essentially apply that money to the correct invoices.</p><p><b>[01:06]</b> So let's take a look at it in action. Here we have an example of a payment from Adacom where we have all the necessary payment information in the top right, suggested invoices, but no remittance advice. In order to recycle this, I'll click our button here. Here's just a quick warning that we are in fact putting this money as unapplied on the customer account.</p><p><b>[01:28]</b> And then lastly, I get a validation step to triple-check that we're making sure this is going to the correct customer ID, as well as being able to attach necessary information such as a tax code or reason code.</p><p><b>[01:40]</b> So why is this important for cash application specialists? Essentially, it gives you peace of mind for those on-hold or parked transactions so you can prioritize more important allocations.</p>",
trFR:"<p><b>[00:01]</b> Le recyclage de paiement. Voici un scénario : vous venez de recevoir un dépôt global sur votre compte bancaire et vous avez une idée des clients et factures concernés, mais sans certitude. Que faire ?</p><p><b>[00:13]</b> Vous contactez le client par téléphone ou email. Le client indique qu'il fournira l'avis de remise dans les prochains jours — son système comptable doit rattraper le retard. C'est problématique si vous devez immédiatement affecter cet argent.</p><p><b>[00:32]</b> Esker propose alors la fonctionnalité de recyclage de paiement. Elle permet de placer l'argent en encaissement non appliqué sur le compte client. Ensuite, après une période prédéfinie, Esker re-proposera l'allocation. Ou si les informations nécessaires arrivent — fichier bancaire mis à jour, AR actualisé, ou avis de remise enfin reçu — l'automatisation en arrière-plan applique l'argent aux bonnes factures sans intervention.</p><p><b>[01:06]</b> Voyons cela en pratique. Ici, un paiement d'Adacom avec toutes les informations de paiement en haut à droite, des factures suggérées, mais pas d'avis de remise. Pour recycler, un clic sur le bouton. Un avertissement confirme que l'argent est bien placé en non-appliqué sur le compte client.</p><p><b>[01:28]</b> Enfin, une étape de validation permet de vérifier que le bon identifiant client est sélectionné et de joindre des informations comme un code taxe ou un code motif.</p><p><b>[01:40]</b> Pourquoi est-ce important ? Cela donne la sérénité nécessaire pour les transactions en attente, permettant de prioriser les allocations les plus importantes.</p>"},

  {f:"7 - Auto allocation of payments and matching remits",t:"Auto Allocation of Payments and Matching Remits",sz:"8.6",
trEN:"<p><b>[00:01]</b> Esker's Cash Application tool is designed to help automatically allocate payments to invoices. We're able to do this by bringing in an open AR file from the ERP that's going to give us open invoices and open credits for each customer on at least a daily basis. In addition, we would also be bringing over bank file details and any remittance advices that customers would be submitting through as well.</p><p><b>[00:26]</b> So let's take a look at what a perfect three-way match would look like. In this screen, we can see we have the bank file details up here at the top right — this is where I can see who the payer is and the paid amount. If I scroll down, this is where I can see the remittance advice that was provided by the customer. Esker has already extracted the details directly off this document and we've now matched that over in our validation screen to the associated invoices.</p><p><b>[00:56]</b> So as a user, I don't have to update anything in this screen. I don't have to manually type into any of the data fields. I can simply now enable this payer for auto allocation and go ahead and allocate this payment. Once I click this Allocate button, Esker will remember that the next time we receive a payment from this payer, we can now automatically allocate payments directly to invoices.</p>",
trFR:"<p><b>[00:01]</b> L'outil Cash Application d'Esker est conçu pour allouer automatiquement les paiements aux factures. Cela fonctionne en important un fichier AR ouvert depuis l'ERP, qui fournit les factures et avoirs ouverts pour chaque client, au moins quotidiennement. Nous importons aussi les détails du fichier bancaire et les avis de remise soumis par les clients.</p><p><b>[00:26]</b> Voyons à quoi ressemble un rapprochement tripartite parfait. Sur cet écran, en haut à droite, les détails du fichier bancaire : le payeur et le montant payé. En dessous, l'avis de remise fourni par le client. Esker a déjà extrait les détails directement du document et les a rapprochés dans l'écran de validation avec les factures associées.</p><p><b>[00:56]</b> En tant qu'utilisateur, je n'ai rien à mettre à jour dans cet écran, aucune saisie manuelle. Je peux simplement activer l'allocation automatique pour ce payeur et allouer le paiement. Une fois le bouton Allouer cliqué, Esker mémorise que les prochains paiements de ce payeur pourront être automatiquement alloués aux factures.</p>"},

  {f:"8 - Auto thresholds for posting to GL or customer account",t:"Auto Thresholds for Posting to GL or Customer Account",sz:"4.2",
trEN:"<p><b>[00:01]</b> Within Esker's Cash Application tool, you can configure a short-paid threshold based on dollar amount or percentage. In this example, we can see where we've received a payment from this payer, but the invoice that they're paying is actually for $0.27 more. So because they short-paid by $0.27 — if our threshold was set at a dollar — we can see where Esker went ahead and automatically wrote off that $0.27 to a specified GL account.</p>",
trFR:"<p><b>[00:01]</b> Dans l'outil Cash Application d'Esker, vous pouvez configurer un seuil de sous-paiement basé sur un montant en dollars ou un pourcentage. Dans cet exemple, un paiement a été reçu mais la facture concernée est de 0,27 $ de plus. Comme le sous-paiement de 0,27 $ est inférieur au seuil configuré (ici 1 $), Esker a automatiquement passé cet écart en pertes sur un compte de grand livre spécifié.</p>"},

  {f:"9 - Multiple customers for one payer",t:"Multiple Customers for One Payer",sz:"13.4",
trEN:"<p><b>[00:00]</b> For those scenarios where you might have one payer making payment on behalf of multiple different customers, Esker is able to automatically allocate payments to invoices based on that information.</p><p><b>[00:14]</b> So how do we do that? If we take a look at this screen, here's an example where we've received a payment from this payer — we know the total paid amount — and they're actually paying on behalf of these two customers. Esker is able to provide mapping for which payers are associated with which customers.</p><p><b>[00:35]</b> We then are able to look at the open AR file to determine which invoices match up to the total paid exactly. Now in this scenario, we don't have a remittance advice, but we were still able to run that algorithm to correctly identify the invoices that match that total exactly.</p><p><b>[00:53]</b> We can take an import of the payer and customer mapping if you currently have that available. Otherwise, we can use machine learning for when we receive a remittance advice and we identify invoices belonging to multiple different customer accounts — to be able to present those as customers associated with this payer. A third option is a user can actually browse to an existing customer account, and once they select that customer and an invoice, we can see that customer is now added to that mapping.</p><p><b>[01:30]</b> Esker is able to maintain a table of this information so that users are able to update that mapping. For example, if a customer is no longer part of that payer's profile, they can simply be removed from the table. And also, as time goes on, consistently add customers to those payers as needed.</p>",
trFR:"<p><b>[00:00]</b> Pour les scénarios où un payeur règle au nom de plusieurs clients différents, Esker peut automatiquement allouer les paiements aux factures correspondantes.</p><p><b>[00:14]</b> Comment cela fonctionne-t-il ? Sur cet écran, un paiement a été reçu de ce payeur — on connaît le montant total — et il paie au nom de deux clients. Esker fournit un mapping des associations payeur-clients.</p><p><b>[00:35]</b> Esker consulte ensuite le fichier AR ouvert pour déterminer quelles factures correspondent exactement au total payé. Dans ce scénario, il n'y a pas d'avis de remise, mais l'algorithme a pu identifier correctement les factures correspondant au total exact.</p><p><b>[00:53]</b> On peut importer le mapping payeur-clients si disponible. Sinon, le machine learning identifie les factures appartenant à différents comptes clients lors de la réception d'un avis de remise, et les présente comme clients associés à ce payeur. Une troisième option : l'utilisateur peut manuellement naviguer vers un compte client existant et l'ajouter au mapping.</p><p><b>[01:30]</b> Esker maintient une table de ces associations que les utilisateurs peuvent mettre à jour. Si un client ne fait plus partie du profil d'un payeur, il peut simplement être retiré. Et inversement, de nouveaux clients peuvent être ajoutés au fil du temps.</p>"},

  {f:"10 - Intercompany payments",t:"Intercompany Payments",sz:"15.4",
trEN:"<p><b>[00:00]</b> Hey everyone, TJ from Esker here, and with this quick video I plan to go through some exciting new functionality where we can now help automate intercompany or cross-company-code payments.</p><p><b>[00:11]</b> Here's a story that we are typically seeing at Esker. Let's say your organization has multiple ERPs through acquisitions — you might have different companies where you have separate ledgers. In this case, we can see that in action: AC1 sells monitors, AC2 sells keyboards, and AC3 sells mice.</p><p><b>[00:31]</b> A common scenario we were coming across is that the customer might make a payment or purchase order for all three of those products, and that payment then has to be applied across each of those 3 entities. This can be a pain for cash application specialists in terms of making sure that the netting amount is balanced across all three of those entities.</p><p><b>[00:53]</b> Esker now has functionality to help support this, so let's take a look. Here is an example of what a user might expect once they see a singular payment for $1,000 for invoices that fall under 2 separate company codes.</p><p><b>[01:09]</b> To see that in greater detail, on the right-hand side of our screen, we can see that there's a remittance advice designating the separate amounts of that payment. $600.00 is going towards one invoice under company code A01, and then the remainder $400 is going under company code FR1. Esker is automatically associating each of those invoices to those company codes. Here we can see a new column \"Company Code\" designating that specific payment.</p><p><b>[01:38]</b> So what happens once I click the Allocate button? Depending on your ERP connection or your accounting setup, you'll typically see two separate connectors to the Esker interface. On that first connection, you'll see that first invoice for $600 closed out normally alongside a $0.00 or netting transaction relating that to the second company code. And then on that second connection with that remaining company code, you'll see that closed out as normal.</p><p><b>[02:05]</b> So ultimately saving a lot of clicks and automatically netting out those transactions, saving time for your cash application specialists for more value-added tasks. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici TJ d'Esker. Dans cette vidéo rapide, je vais vous présenter une nouvelle fonctionnalité passionnante : l'automatisation des paiements inter-sociétés ou inter-codes société.</p><p><b>[00:11]</b> Voici un cas typique que nous observons chez Esker. Imaginons que votre organisation dispose de plusieurs ERP suite à des acquisitions — avec des sociétés distinctes et des comptabilités séparées. Ici : AC1 vend des écrans, AC2 des claviers, et AC3 des souris.</p><p><b>[00:31]</b> Un scénario fréquent : le client passe une commande ou effectue un paiement pour les trois produits, et ce paiement doit être réparti sur les 3 entités. C'est un casse-tête pour les spécialistes Cash Application qui doivent s'assurer que les montants de compensation sont équilibrés entre les entités.</p><p><b>[00:53]</b> Esker propose désormais une fonctionnalité pour gérer cela. Voici un exemple : un paiement unique de 1 000 $ pour des factures relevant de 2 codes société différents.</p><p><b>[01:09]</b> En détail, à droite de l'écran, l'avis de remise indique la ventilation : 600 $ pour une facture sous le code société A01, et les 400 $ restants sous le code société FR1. Esker associe automatiquement chaque facture à son code société. Une nouvelle colonne « Code Société » identifie chaque paiement.</p><p><b>[01:38]</b> Que se passe-t-il au clic sur Allouer ? Selon votre connexion ERP, deux connecteurs distincts traitent les écritures. Sur le premier, la facture de 600 $ est clôturée normalement avec une écriture de compensation à 0 $ reliant l'autre code société. Sur le second, la facture restante est clôturée normalement.</p><p><b>[02:05]</b> Résultat : beaucoup moins de clics, des transactions de compensation automatiques, et du temps gagné pour vos spécialistes Cash Application sur des tâches à plus forte valeur ajoutée. Merci d'avoir regardé.</p>"},

]},
{id:"com",label:"Collections",suite:"O2C",icon:"📬",folder:"Collection Management",videos:[

  {f:"1 - Collections Management Solution Overview",t:"Collections Management Solution Overview",sz:"23.6",
trEN:"<p><b>[00:00]</b> Hey everyone, TJ from Esker here. Are you currently managing a chaotic or disorganized collections process? Are you ready to turn that chaos into control? Well, Esker's Collections Management solution can help. With this quick 4-minute demonstration, I plan to go over most of the powerful functionality that we see our customers get a lot of value in and how they achieve that value. So let's dig in.</p><p><b>[00:23]</b> To set the stage for how the solution works, you can almost think of it like a CRM that's really designed for your collectors. Some of the areas that our customers see a lot of value in: a self-service payment portal for your customers to view, download, and pay invoices; AI-powered automated email reminders; tools to create your own reports and many out-of-the-box ones; and then lastly, tools to create workflows and to-do lists to prioritize your collector's day.</p><p><b>[00:50]</b> So let's jump right in. Here I've navigated over to where you now have the tools to configure the settings within those automated payment reminders. A couple common scenarios: you may have an ERP add-on or you might be doing this completely manually, but most cases this involves a lot of IT interaction to make small changes to any external communication. Here you now have the tools to make changes and view those changes in real time.</p><p><b>[01:20]</b> So to see that in action — let's say we want these reminders to go out every 30 days instead of 20 days. We can make that change. We can determine when we want this invoice reminder to be triggered — whether that be on the expected date powered by AI or the actual invoice due date. We can configure any custom top or bottom texts. And then lastly, we do have the option to configure the content within these payment reminders as well — a common example is displaying or not displaying your customer's credits.</p><p><b>[01:54]</b> With those automated payment reminders set up in the background, we can now focus on more core functionality designed for your collections efforts. A really common trend we see is a lot of pain organizing information among disparate systems — email, Excel, or just Post-it notes on your desk. Here we solved that problem by organizing and giving you the tools to gather that information and store it in a singular place.</p><p><b>[02:23]</b> This is exemplified in our full customer history where we can see who called, what invoices that was regarding, how they interacted with that customer, as well as a full timeline of any automated payment reminders or messages that may have been sent out. To take a quick look at the tools to organize and gather that information, let's jump into logging a call. Here's just a quick snapshot of some of the tools and plug-and-play options that we give you to organize a collections effort.</p><p><b>[02:54]</b> With those collections efforts made, I may want to gain some valuable insight into how effective they were. Here's just one of many out-of-the-box reports. This AI-driven report is really powered by payment behavior of your customers, any data collected from promises to pay logged within the solution, as well as any payments made through our portal — really giving you a full picture of what your cash forecast is going to look like down the road.</p><p><b>[03:25]</b> So that was just a quick 4-minute demo of most of the major functionality within the Collections solution. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici TJ d'Esker. Vous gérez actuellement un processus de recouvrement chaotique ou désorganisé ? Vous êtes prêt à transformer ce chaos en contrôle ? La solution Collections Management d'Esker peut vous aider. Dans cette démonstration de 4 minutes, je vais passer en revue les principales fonctionnalités qui apportent le plus de valeur à nos clients.</p><p><b>[00:23]</b> Pour poser le décor : la solution fonctionne un peu comme un CRM conçu spécifiquement pour vos chargés de recouvrement. Les domaines de valeur : un portail de paiement en libre-service pour que vos clients consultent, téléchargent et paient leurs factures ; des relances automatisées par email pilotées par l'IA ; des outils de reporting personnalisés et de nombreux rapports prêts à l'emploi ; et enfin, des workflows et listes de tâches pour prioriser la journée de vos chargés de recouvrement.</p><p><b>[00:50]</b> Ici, les outils de configuration des relances de paiement automatisées. Scénario courant : un add-on ERP ou un processus entièrement manuel, avec beaucoup d'interactions IT pour chaque petit changement. Désormais, vous pouvez modifier et visualiser les changements en temps réel.</p><p><b>[01:20]</b> En action : on passe les relances de 20 à 30 jours. On choisit le déclenchement — date prédite par l'IA ou date d'échéance réelle. On configure les textes personnalisés en en-tête ou pied de page. Et on paramètre le contenu des relances — par exemple, afficher ou masquer les avoirs du client.</p><p><b>[01:54]</b> Avec les relances automatisées en arrière-plan, on se concentre sur le cœur du recouvrement. Un problème récurrent : l'information dispersée entre emails, Excel et Post-it. Esker centralise tout en un seul endroit.</p><p><b>[02:23]</b> L'historique client complet montre qui a appelé, quelles factures étaient concernées, les interactions, et la chronologie complète des relances automatisées envoyées. Pour organiser les actions de recouvrement, on dispose d'outils plug-and-play pour enregistrer les appels et structurer les efforts.</p><p><b>[02:54]</b> Après ces actions, on veut mesurer leur efficacité. Voici un des nombreux rapports prêts à l'emploi. Ce rapport piloté par l'IA s'appuie sur le comportement de paiement des clients, les promesses de paiement enregistrées et les paiements effectués via le portail — offrant une vision complète des prévisions de trésorerie.</p><p><b>[03:25]</b> Voilà un aperçu rapide des principales fonctionnalités de la solution Collections. Merci d'avoir regardé.</p>"},

  {f:"2 - Automated Payment Reminders",t:"Automated Payment Reminders",sz:"9.6",
trEN:"<p><b>[00:00]</b> Having trouble keeping up with or managing your B2B payment reminders? Well, Esker's Collections Management solution has a feature that can help. This feature enables automated reminders where you get to configure the who, what, when, and where behind these reminders. So let's take a look.</p><p><b>[00:18]</b> Previously, as a collection specialist, I may look through an Excel sheet, maybe look at my aging buckets, and then prioritize which reminders I want to get sent out. But Esker takes that burden off your hands by automatically sending these out, grouped based on severity. Level 1 is typically a proactive reminder letting customers know that they have invoices coming due. Levels 2 through 4 can be configured for increasing severity and changing the language within that reminder.</p><p><b>[00:50]</b> Jumping in, here are all the settings I have at my fingertips in order to enable, disable, or tweak the content within these payment reminders. I can change the days past due — let's say instead of 20, I want 30. I can use the due date instead of the expected-to-pay date to determine lateness. I can customize any top or bottom text. And then lastly, I can determine the content of that payment reminder — for example, if we want to display credits, I can easily select that and have it automatically populate, ultimately taking that burden off the IT group to make those changes.</p><p><b>[01:29]</b> So that was a quick run-through of Esker's automated payment feature, enabling you to have a more streamlined, correct collections process.</p>",
trFR:"<p><b>[00:00]</b> Vous avez du mal à gérer vos relances de paiement B2B ? La solution Collections Management d'Esker dispose d'une fonctionnalité dédiée. Elle permet de configurer des relances automatisées : qui, quoi, quand et comment.</p><p><b>[00:18]</b> Auparavant, un chargé de recouvrement consultait un fichier Excel, analysait les tranches d'ancienneté et priorisait manuellement les relances. Esker automatise tout cela, avec des relances groupées par niveau de sévérité. Le niveau 1 est une relance proactive informant les clients que des factures arrivent à échéance. Les niveaux 2 à 4 sont configurables avec une sévérité croissante et un langage adapté.</p><p><b>[00:50]</b> Tous les paramètres sont accessibles : activer, désactiver ou ajuster le contenu des relances. On modifie le nombre de jours de retard (20 → 30), on choisit entre date d'échéance et date de paiement prédite pour évaluer le retard, on personnalise les textes d'en-tête et de pied de page, et on configure le contenu — par exemple afficher les avoirs. Tout cela sans solliciter l'IT.</p><p><b>[01:29]</b> Voilà un aperçu rapide de la fonctionnalité de relances automatisées d'Esker, pour un processus de recouvrement plus fluide et fiable.</p>"},

  {f:"3 - Payment Portal",t:"Payment Portal",sz:"13.6",
trEN:"<p><b>[00:00]</b> Many businesses today struggle with the time-consuming and manual tasks associated with accepting ACH and credit card payments, and this can lead to delays, errors, and even strained vendor relationships. Esker helps solve this problem by providing a self-service payment portal to make payments as easy as ever for your customers. So let's take a look.</p><p><b>[00:20]</b> Let's first talk about a few of the ways that Esker makes this an easy process to log in for your customers. The first way is via a link either on your website or any external communication. The second way is an email-only validation link on any of the automated payment reminders that the collection system sends out.</p><p><b>[00:40]</b> Now that I've logged in as a customer, I have easy access to apply credits and view information around my invoices. We can easily flag discounts, change the information that's important to your customer, and as a customer, I can sign up for available payment actions such as scheduling a payment, making a lump sum payment, or even signing up for auto-pay.</p><p><b>[01:03]</b> Let's jump into a payment. What's key to note here is that Esker maintains PCI compliance by working with third-party payment processors to process your payments. This works by tokenizing that data and relying on those relationships. Another cool thing is that we can utilize surcharging that can be turned on and off for specific customers, states, or your entire organization.</p><p><b>[01:28]</b> A few options we also have here: payment timing — we can pay now, on the due date of that invoice, or on a specific date. And lastly, another powerful feature: if the customer pays short on an invoice, Esker is going to require a reason for that partial payment in order for it to process.</p><p><b>[01:53]</b> So that's a quick overview of most of the features that are part of our payment portal, streamlining payments for your organization.</p>",
trFR:"<p><b>[00:00]</b> De nombreuses entreprises peinent avec les tâches manuelles et chronophages liées à l'acceptation des paiements ACH et par carte bancaire — ce qui entraîne retards, erreurs et tensions dans les relations commerciales. Esker résout ce problème avec un portail de paiement en libre-service.</p><p><b>[00:20]</b> Deux méthodes de connexion pour vos clients : un lien sur votre site web ou dans une communication externe, ou un lien de validation par email inclus dans les relances automatisées du système de recouvrement.</p><p><b>[00:40]</b> Une fois connecté, le client peut appliquer des avoirs, consulter ses factures, signaler des remises, planifier un paiement, effectuer un paiement forfaitaire, ou s'inscrire au prélèvement automatique.</p><p><b>[01:03]</b> Point important : Esker maintient la conformité PCI en s'appuyant sur des prestataires de paiement tiers via tokenisation des données. On peut aussi activer la surcharge (surcharging) par client, par état/région ou pour toute l'organisation.</p><p><b>[01:28]</b> Options de paiement : paiement immédiat, à la date d'échéance, ou à une date spécifique. En cas de paiement partiel, Esker exige une justification — ce qui garantit la traçabilité.</p><p><b>[01:53]</b> Voilà un aperçu du portail de paiement Esker, qui fluidifie les encaissements pour votre organisation.</p>"},

  {f:"4 - Collections Reporting",t:"Collections Reporting",sz:"14.4",
trEN:"<p><b>[00:00]</b> In the digital age, data is everything and it can mean the difference between meeting your bottom line and exceeding your competition. Esker provides many out-of-the-box reports and gives you the tools to create unique and creative views to help empower your organization. So let's take a look.</p><p><b>[00:16]</b> The first report I'd like to dive into is our Dynamic Accounts Receivable Aging Graph. A little background: we take in your ERP master data — meaning that invoice due date — and we can dynamically adjust your aging buckets to prioritize those most overdue accounts. This is broken down into how much contact information we have for that customer, ultimately prioritizing those customers as well.</p><p><b>[00:39]</b> The next set of reports: performance reports. These out-of-the-box reports provide a lot of insight into how effective your collections efforts are going. At the top of the screen, our overall collections — which we can set as a percentage or dollar amount. Scrolling down, insight into our automated reminders — how many are going out on a monthly basis. On the right, insight into our specific collectors — how many calls they're completing, are they deferring calls, how many are they completing on time. We get a good breakdown collector by collector.</p><p><b>[01:16]</b> Scrolling down further on the left, our heavy hitters — we can report on DSO and CEI. And then lastly, at the bottom, a powerful set of reports reporting on root causes for problems within the collections process. Keeping track of reasons for disputes, reasons for lateness — that can give you a lot of insight and track downstream effects that you may not have eyes on today.</p><p><b>[01:41]</b> The last report I'd like to quickly talk about is our AI-powered cash forecasting tool. This tool utilizes different sets of data to give you the best picture possible into what your bottom line looks like down the road. This is powered by any invoices that have a promise to pay, have been scheduled to pay, or where AI has predicted the payment date. These reports, powered by the tools to create your own, can give your organization the data it needs to excel.</p>",
trFR:"<p><b>[00:00]</b> À l'ère du numérique, les données font toute la différence entre atteindre vos objectifs et dépasser la concurrence. Esker fournit de nombreux rapports prêts à l'emploi et les outils pour créer des vues personnalisées.</p><p><b>[00:16]</b> Premier rapport : le graphique dynamique d'ancienneté des créances (AR Aging). Il intègre les données maîtres de votre ERP (dates d'échéance) et ajuste dynamiquement les tranches d'ancienneté pour prioriser les comptes les plus en retard, en tenant compte aussi de la complétude des informations de contact.</p><p><b>[00:39]</b> Ensuite, les rapports de performance : efficacité des efforts de recouvrement (en pourcentage ou montant), volume de relances automatisées mensuelles, et performance par chargé de recouvrement — nombre d'appels réalisés, différés, complétés dans les délais. Analyse détaillée par collaborateur.</p><p><b>[01:16]</b> Plus bas : les indicateurs clés — DSO et CEI (Collection Effectiveness Index). Et enfin, des rapports sur les causes racines des problèmes de recouvrement : motifs de litiges, raisons des retards — pour identifier les effets en cascade souvent invisibles.</p><p><b>[01:41]</b> Dernier rapport : l'outil de prévision de trésorerie piloté par l'IA. Il exploite les promesses de paiement, les paiements planifiés et les prédictions IA de dates de paiement pour donner la meilleure vision possible de votre trésorerie future. Ces rapports, combinés aux outils de création personnalisée, fournissent à votre organisation les données nécessaires pour exceller.</p>"},

  {f:"5 - Dispute Management",t:"Dispute Management",sz:"10.4",
trEN:"<p><b>[00:01]</b> Creating, modifying, and resolving disputes can be a painful process among many organizations. Esker's Collections solution aims to give you the tools necessary in order to successfully tackle those disputes. So let's take a look.</p><p><b>[00:14]</b> Let's first take a quick look at some of the features designed around dispute creation. Whether that be a customer-initiated dispute on their self-service portal or a collector-initiated one, here we have some tools to gather that necessary information and reduce manual efforts. So let's say as a collector, from this invoice I want to mark it in dispute. Here's a quick glimpse into some of the tools I have — such as automatically sending an email to that customer with all the necessary information.</p><p><b>[00:45]</b> With that dispute created, let's now take a look at some of the tools to resolve it. In this screen, we have a listing of all those disputes broken down by root cause. A common benefit our customers really see: they can break down disputes by root cause and then assign a bulk action or kick off a workflow based on that root cause. So let's say you have a department that takes care of quality issues — I can easily filter my disputes to only include quality-issue-related disputes.</p><p><b>[01:19]</b> With that, I can then do a bulk action to create a task and kick off that workflow. The last powerful aspect of managing disputes within Collections is being able to report on those disputes — in our performance dashboard, disputes are broken down into drill-down reports by root cause. Here I can easily investigate downstream effects that may not have been visible before and take a more proactive measure into preventing these disputes.</p><p><b>[01:46]</b> Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Créer, modifier et résoudre les litiges peut être un processus laborieux dans de nombreuses organisations. La solution Collections d'Esker fournit les outils nécessaires pour les gérer efficacement.</p><p><b>[00:14]</b> Côté création de litige : qu'il soit initié par le client via le portail libre-service ou par le chargé de recouvrement, Esker offre des outils pour collecter les informations nécessaires et réduire les efforts manuels. Par exemple, en marquant une facture en litige, un email est automatiquement envoyé au client avec toutes les informations pertinentes.</p><p><b>[00:45]</b> Pour la résolution : un listing de tous les litiges ventilés par cause racine. Avantage clé : on peut filtrer par cause racine et assigner une action en masse ou déclencher un workflow. Par exemple, filtrer uniquement les litiges liés à des problèmes de qualité et les transférer au département concerné.</p><p><b>[01:19]</b> On peut créer une tâche en masse et lancer le workflow associé. Enfin, le reporting sur les litiges : dans le tableau de bord de performance, les litiges sont ventilés en rapports détaillés par cause racine — permettant d'investiguer les effets en cascade et de prendre des mesures préventives.</p><p><b>[01:46]</b> Merci d'avoir regardé.</p>"},

  {f:"6 - Automated Collection Call Listing",t:"Automated Collection Call Listing",sz:"13.2",
trEN:"<p><b>[00:02]</b> Collection teams often spend a lot of time figuring out what they need to do each day. They need to look at who is past due, who's at risk for not paying, who's been called on in the last week, etcetera. This is usually a very manual process involving the ERP, Excel, looking at notes which may or may not be easy to find.</p><p><b>[00:22]</b> This video is going to show you how Esker is able to automate a list of what collection calls are needed. Right from my dashboard, I can see a list of 12 customers that need to be called. When I click in, I can see the details of these collection calls that are needed today. This list has been automatically generated for me using collection strategies that are set up and can be customized all the way down to the customer level.</p><p><b>[00:50]</b> There can be multiple different strategies going on, but I have one easy list to manage. Here I can also see the customer risk level, which is based on the customer's payment behavior. With Esker's Synergy AI, we're able to determine if the customer's risk is increasing because they're paying later — we'll increase that risk so you have better visibility on when to call that customer.</p><p><b>[01:19]</b> Clicking into the customer I want to call, I'm brought to a list of prior calls — I can see all the notes on which calls were made as well as which invoices were discussed. This allows me to see what was done previously with this customer, all in a nice easy-to-view screen, before I actually log a call with this customer.</p><p><b>[01:43]</b> That was how Esker is able to automatically generate this collection calls needed list based on your strategies as well as Esker's Synergy AI looking at the risk of your customers.</p>",
trFR:"<p><b>[00:02]</b> Les équipes de recouvrement passent beaucoup de temps à déterminer quoi faire chaque jour : qui est en retard, qui risque de ne pas payer, qui a été contacté la semaine dernière… C'est généralement un processus très manuel impliquant l'ERP, Excel et des notes plus ou moins faciles à retrouver.</p><p><b>[00:22]</b> Cette vidéo montre comment Esker automatise la liste des appels de recouvrement nécessaires. Depuis le tableau de bord, on voit 12 clients à appeler. En cliquant, le détail des appels nécessaires aujourd'hui apparaît. Cette liste est générée automatiquement à partir de stratégies de recouvrement paramétrables jusqu'au niveau de chaque client.</p><p><b>[00:50]</b> Plusieurs stratégies peuvent coexister, mais tout est regroupé en une seule liste. On voit aussi le niveau de risque de chaque client, basé sur son comportement de paiement. Grâce à l'IA Synergy d'Esker, si un client paie de plus en plus tard, son risque augmente automatiquement — offrant une meilleure visibilité sur les priorités d'appel.</p><p><b>[01:19]</b> En ouvrant un client, on accède à l'historique des appels précédents — notes, factures discutées — pour être parfaitement préparé avant de passer l'appel suivant.</p><p><b>[01:43]</b> Voilà comment Esker génère automatiquement la liste des appels de recouvrement nécessaires, basée sur vos stratégies et l'IA Synergy qui évalue le risque de vos clients.</p>"},

  {f:"7 - To do list",t:"To-Do List",sz:"8.6",
trEN:"<p><b>[00:00]</b> Are you a busy collector looking to free up some time in your workday? Well, Esker's personalized and prioritized To-Do List can help here.</p><p><b>[00:09]</b> Jumping in on the right-hand side of our dashboard, we can see a listing of items that are important to me as a specific collector. Whether that be replying to specific accounts, jumping into that prioritized collections calls list, or resolving any tasks that are assigned to me as well.</p><p><b>[00:32]</b> Jumping into our collections calls needed list, we can see an AI-powered and prioritized To-Do List. Here we're categorizing customers by their trending payment behavior. Using AI to look at that predicted payment behavior so you can better spend your time. Some other reasons a call may follow up: any follow-up calls that have been scheduled in the solution, any overdue promises to pay, as well as any overdue blocked orders that need to be taken care of.</p><p><b>[00:59]</b> From here I can jump into each account and initiate the collections call process.</p><p><b>[01:04]</b> So that was a quick snapshot into your personalized To-Do List as a collector — ultimately giving you more time, reducing errors, and giving you greater visibility into your workday. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Vous êtes un chargé de recouvrement débordé qui cherche à libérer du temps dans sa journée ? La liste de tâches personnalisée et priorisée d'Esker est faite pour vous.</p><p><b>[00:09]</b> Sur la droite du tableau de bord, une liste des éléments importants pour le chargé de recouvrement connecté : comptes à relancer, liste d'appels prioritaires, tâches assignées à résoudre.</p><p><b>[00:32]</b> La liste des appels de recouvrement est pilotée par l'IA : les clients sont catégorisés selon l'évolution de leur comportement de paiement. L'IA analyse les tendances de paiement pour mieux orienter votre temps. Autres raisons d'appel : appels de suivi planifiés, promesses de paiement en retard, commandes bloquées en attente.</p><p><b>[00:59]</b> Depuis cette liste, on accède directement à chaque compte pour initier le processus d'appel de recouvrement.</p><p><b>[01:04]</b> Voilà un aperçu de la liste de tâches personnalisée du chargé de recouvrement — plus de temps, moins d'erreurs, meilleure visibilité sur votre journée. Merci d'avoir regardé.</p>"},

  {f:"8 - Different Levels of Collection Strategy",t:"Different Levels of Collection Strategy",sz:"11.4",
trEN:"<p><b>[00:00]</b> Do you currently manage a collection strategy, but you might be lacking the levers to pull to create a more targeted, specific strategy for your customers or customer groups? Well, this feature within the Collections Management module can help.</p><p><b>[00:14]</b> Here we're looking at a series of settings based on levels 1 through 4, where we can configure when these payment reminders go out and who they go out to. What's powerful here is that you can target these for specific groups. One way we commonly see this: customers can leverage data from our Credit module that takes into account risk levels. With a higher risk level, you can have a more aggressive collection strategy. In other cases, you could tweak the settings for specific customers — let's say you have a VIP customer who you really don't want any automated reminders to go out to. You can tailor the settings here as well.</p><p><b>[00:57]</b> Let's take a look at a couple of tools to create that targeted strategy. At the top of our screen, we have super overrides — let's say you want to put in a buffer while you're creating that targeted strategy, here's where you can easily toggle that on or off. We can see those levels 1 through 4 and drill down into the contents of those levels. Scrolling down, we can also see how this applies to account statements — being able to have a strategy towards those.</p><p><b>[01:27]</b> And then lastly, at the bottom, we have a full history of what was changed with that collection strategy, when that was changed, and who changed that.</p><p><b>[01:37]</b> So that was a very quick overview of how you can apply a targeted collection strategy within our solution. Thanks for watching.</p>",
