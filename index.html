<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esker Consensus — Video Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B2046;--navy-light:#132d5e;--navy-dark:#081830;--cyan:#00A7E1;--cyan-light:#33c4f5;--cyan-glow:rgba(0,167,225,0.25);--purple:#6366f1;--white:#fff;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-900:#111827}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--gray-50);color:var(--gray-900);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--cyan);color:white}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}

@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--cyan-glow)}50%{box-shadow:0 0 20px var(--cyan-glow),0 0 40px rgba(0,167,225,0.1)}}
.ani{animation:fadeInUp .5s ease both}.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:linear-gradient(135deg,var(--navy),var(--navy-light));border-bottom:1px solid rgba(255,255,255,0.06)}
.topnav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan-glow),transparent)}
.topnav-brand{display:flex;align-items:center;gap:14px}
.topnav-logo{font-size:20px;font-weight:900;color:white;letter-spacing:-.5px}
.topnav-logo em{font-style:normal;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topnav-sep{width:1px;height:24px;background:rgba(255,255,255,.15)}
.topnav-badge{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;padding:4px 14px;border:1px solid rgba(255,255,255,.12);border-radius:50px;letter-spacing:.5px;transition:all .3s}
.topnav-badge:hover{border-color:var(--cyan);color:var(--cyan)}
.topnav-right{display:flex;align-items:center;gap:20px}
.topnav-stat{font-size:12px;color:rgba(255,255,255,.5);font-weight:500}
.topnav-stat b{color:var(--cyan);font-weight:800}
.topnav-search{position:relative}
.topnav-search input{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:8px 14px 8px 36px;color:white;font-size:13px;font-family:inherit;width:200px;transition:all .3s;outline:none}
.topnav-search input::placeholder{color:rgba(255,255,255,.3)}
.topnav-search input:focus{width:280px;background:rgba(255,255,255,.12);border-color:var(--cyan);box-shadow:0 0 20px var(--cyan-glow)}
.topnav-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:rgba(255,255,255,.3);fill:none;stroke-width:2}

/* LAYOUT */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh;padding-top:60px}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid var(--gray-200);height:calc(100vh - 60px);position:sticky;top:60px;overflow-y:auto;overflow-x:hidden}
.sb-group{padding:24px 0 8px}
.sb-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:var(--gray-400);padding:0 24px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sb-title::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 24px;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray-600);transition:all .25s cubic-bezier(.4,0,.2,1);border-left:3px solid transparent;position:relative;overflow:hidden}
.sb-item::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,167,225,.06),transparent);opacity:0;transition:opacity .3s}
.sb-item:hover{color:var(--gray-900);background:var(--gray-50)}.sb-item:hover::before{opacity:1}
.sb-item.on{color:var(--cyan);font-weight:700;border-left-color:var(--cyan);background:rgba(0,167,225,.04)}.sb-item.on::before{opacity:1}
.sb-icon{font-size:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--gray-50);transition:all .25s}
.sb-item:hover .sb-icon,.sb-item.on .sb-icon{background:rgba(0,167,225,.1);transform:scale(1.1)}
.sb-cnt{margin-left:auto;font-size:10px;background:var(--gray-100);color:var(--gray-400);padding:2px 8px;border-radius:50px;font-weight:700;transition:all .25s}
.sb-item.on .sb-cnt{background:rgba(0,167,225,.12);color:var(--cyan)}
.sb-arr{margin-left:4px;opacity:0;transform:translateX(-4px);transition:all .2s;font-size:11px;color:var(--cyan)}
.sb-item:hover .sb-arr,.sb-item.on .sb-arr{opacity:1;transform:translateX(0)}
.sb-div{height:1px;background:linear-gradient(90deg,transparent,var(--gray-200),transparent);margin:8px 24px}

/* MAIN */
.main{padding:36px 40px;max-width:1100px;min-height:100vh}
.welcome{text-align:center;padding:120px 20px;animation:fadeIn .8s ease}
.welcome-icon{font-size:64px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
.welcome h1{font-size:36px;font-weight:900;letter-spacing:-1.5px;margin-bottom:12px;background:linear-gradient(135deg,var(--navy),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{font-size:16px;color:var(--gray-500);max-width:400px;margin:0 auto;line-height:1.7}
.mh{margin-bottom:28px;animation:fadeInUp .4s ease both}
.mh-bc{font-size:12px;color:var(--gray-400);margin-bottom:8px;font-weight:500}.mh-bc b{color:var(--cyan)}
.mh h1{font-size:32px;font-weight:900;letter-spacing:-1px;display:flex;align-items:center;gap:12px}.mh h1 span{font-size:28px}
.mh-sub{font-size:14px;color:var(--gray-500);margin-top:4px}

/* PLAYER */
.player{background:var(--white);border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08);margin-bottom:32px;border:1px solid var(--gray-200);animation:scaleIn .4s ease both;transition:all .3s}
.player:hover{box-shadow:0 12px 50px rgba(0,0,0,.12)}
.player-frame{aspect-ratio:16/9;background:linear-gradient(135deg,var(--navy-dark),var(--navy));position:relative;overflow:hidden}
.player-frame iframe{width:100%;height:100%;border:none}
.player-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:rgba(255,255,255,.3)}
.player-empty-icon{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.1);animation:pulse 2s ease-in-out infinite}
.player-empty-icon svg{width:32px;height:32px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:1.5;margin-left:4px}
.player-empty p{font-size:14px;font-weight:500}
.player-bar{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--gray-100)}
.player-bar-t{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:pulse 1.5s ease-in-out infinite;display:none}.pdot.on{display:block}
.player-bar-m{font-size:12px;color:var(--gray-500);display:flex;gap:16px;font-weight:500}

/* PLAYER SIDE-BY-SIDE LAYOUT */
.player-layout{position:relative;background:var(--white);border-radius:24px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08);margin-bottom:32px;border:1px solid var(--gray-200);animation:scaleIn .4s ease both;transition:all .3s}
.player-layout:hover{box-shadow:0 12px 50px rgba(0,0,0,.12)}
.player-main{display:flex;flex-direction:column;transition:margin .3s}
.player-layout.has-tr .player-main{margin-right:400px}
.player-tr{position:absolute;top:0;right:0;bottom:0;width:400px;border-left:1px solid var(--gray-200);display:none;flex-direction:column;overflow:hidden;background:var(--white)}
.player-layout.has-tr .player-tr{display:flex}
.player-tr-head{padding:14px 20px;border-bottom:1px solid var(--gray-100);flex-shrink:0}
.player-tr-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--gray-400);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.player-tr-label::after{content:'';flex:1;height:1px;background:var(--gray-200)}
.player-tr-tabs{display:flex;gap:4px}
.player-tr-tab{padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;color:var(--gray-400);background:transparent;border:none;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;transition:all .2s;font-family:inherit}
.player-tr-tab:hover{color:var(--gray-600);background:var(--gray-50)}
.player-tr-tab.on{color:var(--cyan);background:rgba(0,167,225,.08)}
.player-tr-body{padding:18px 22px;font-size:13.5px;line-height:1.9;color:var(--gray-600);overflow-y:auto;flex:1;min-height:0}
.player-tr-body p{margin-bottom:4px;padding-top:14px;border-top:1px solid var(--gray-100)}
.player-tr-body p:first-child{padding-top:0;border-top:none}
.player-tr-body b{color:var(--cyan);font-weight:700;font-size:12px}
.player-tr-empty{display:flex;align-items:center;justify-content:center;flex:1;color:var(--gray-400);font-size:13px;font-style:italic;padding:40px 20px;text-align:center;min-height:0}
@media(max-width:1100px){.player-layout.has-tr .player-main{margin-right:0}.player-tr{display:none !important}}

/* GRID */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:40px}
.vcard{background:var(--white);border-radius:20px;border:1.5px solid var(--gray-200);overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative}
.vcard:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.1);border-color:rgba(0,167,225,.25)}
.vcard.playing{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow),0 16px 40px rgba(0,167,225,.15)}
.vcard.playing::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--purple));animation:gradientShift 3s ease infinite;background-size:200% 200%}
.vcard-top{padding:20px 20px 14px;position:relative}
.vcard-num{font-size:10px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.vcard h3{font-size:15px;font-weight:700;color:var(--gray-900);line-height:1.45;padding-right:40px;transition:color .2s}
.vcard:hover h3{color:var(--cyan)}
.vcard-play{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;transition:all .3s cubic-bezier(.4,0,.2,1)}
.vcard:hover .vcard-play{background:var(--cyan);transform:scale(1.15);box-shadow:0 4px 15px var(--cyan-glow)}
.vcard.playing .vcard-play{background:var(--cyan);box-shadow:0 4px 15px var(--cyan-glow)}
.vcard-play svg{width:14px;height:14px;stroke:var(--gray-500);fill:none;stroke-width:2.5;margin-left:2px;transition:stroke .2s}
.vcard:hover .vcard-play svg,.vcard.playing .vcard-play svg{stroke:white}
.vcard-bot{padding:0 20px 4px;display:flex;align-items:center;gap:12px}
.vcard-dur{font-size:12px;font-weight:600;color:var(--gray-500);display:flex;align-items:center;gap:4px;background:var(--gray-50);padding:4px 10px;border-radius:50px}
.vcard-sz{font-size:11px;color:var(--gray-400)}

/* TRANSCRIPT */
.vcard-xpand{display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;font-size:11px;font-weight:700;color:var(--gray-400);gap:6px;transition:all .2s;border-top:1px solid var(--gray-100);text-transform:uppercase;letter-spacing:1px}
.vcard-xpand:hover{background:var(--gray-50);color:var(--cyan)}
.vcard-xpand svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .3s}
.vcard.expanded .vcard-xpand svg{transform:rotate(180deg)}
.vcard-transcript{border-top:1px solid var(--gray-100);max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.vcard.expanded .vcard-transcript{max-height:600px}
.tr-tabs{display:flex;gap:0;border-bottom:1px solid var(--gray-100)}
.tr-tab{flex:1;padding:10px 16px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;color:var(--gray-400);transition:all .2s;position:relative;text-transform:uppercase;letter-spacing:.5px}
.tr-tab:hover{color:var(--gray-600)}.tr-tab.on{color:var(--cyan)}
.tr-tab.on::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;background:var(--cyan);border-radius:2px}
.tr-body{padding:16px 20px;font-size:13px;line-height:1.85;color:var(--gray-600);max-height:200px;overflow-y:auto}.tr-body.hide{display:none}

/* FILTER */
.fbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;animation:fadeInUp .4s ease .1s both}
.fsearch{position:relative;flex:1;max-width:360px}
.fsearch input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:13px;font-family:inherit;transition:all .3s;background:var(--white);outline:none}
.fsearch input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow)}
.fsearch svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--gray-400);fill:none;stroke-width:2}
.fcnt{font-size:12px;color:var(--gray-400);font-weight:600;margin-left:auto}

@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.main{padding:20px}.topnav-search,.topnav-stat{display:none}.vgrid{grid-template-columns:1fr}}
</style>
</head>

</nav>
<div class="app">

    <div class="welcome"><div class="welcome-icon">🎬</div><h1>Consensus Video Library</h1><p>Explorez les vidéos de démonstration Esker par module. Sélectionnez un module pour commencer.</p></div>

<script>
// =============================================================================
// CONFIG — Modifier ici si besoin de changer de SharePoint
// =============================================================================
// Option A : flu.sharepoint.com (site Fluxym_group)
const EMBED = "https://flu.sharepoint.com/sites/Fluxym_group/_layouts/15/embed.aspx";
const ROOT = "/sites/Fluxym_group/Sales/Sales documentation/Products - Partner/07 Esker/8. Consensus";

// Option B : flu-portal1 (décommenter si besoin)
// const EMBED = "https://flu-portal1.sharepoint.com/_layouts/15/embed.aspx";
// const ROOT = "/Produits/Esker/1 - Comprendre Esker/2 - Vidéos Esker - Consensus";

function url(suite,folder,file){return EMBED+"?id="+encodeURIComponent(ROOT+"/"+suite+"/"+folder+"/"+file+".mp4")}

// =============================================================================
// DATA — 114 vidéos, noms exacts OneDrive
// =============================================================================
const M=[
// ========== S2P ==========
{id:"ap",label:"Accounts Payable",suite:"S2P",icon:"📄",folder:"Account Payable",videos:[
{f:"1 - Accounts Payable Overview",t:"Accounts Payable Overview",sz:"154.7",
trEN:"<p><b>[00:00]</b> Hi everyone, this is Ryan from Esker. Let's take a few minutes to review Esker's Accounts Payable automation solution at a high level. As we look at some of the key areas of the tool, I'll be sure to call out a few success stories and statistics from some of our clients using this module.</p><p><b>[00:15]</b> Here's an example of an AP Specialist's dashboard. Thanks to the greatly improved visibility gained through using dashboards and metrics in the tool, one of the largest pharmaceutical organizations based out of Japan was able to increase their capture of early payment discounts by 75%.</p><p><b>[00:31]</b> Dashboards in Esker are highly configurable and can be personalized by each user if given the appropriate permissions.</p><p><b>[00:38]</b> Now I've gone ahead and opened up an example of a purchase order based invoice. Information here is presented in a split screen format with a preview of the invoice on the right side of our screen and then what we call the validation form on the left.</p><p><b>[00:50]</b> By using this solution, an international water treatment company was able to achieve 90% of their invoices being processed in just one click.</p><p><b>[00:58]</b> This is something they attributed to the tool's streamlined extraction capabilities, which use a combination of AI technologies developed by Esker that allow the solution to quickly recognize different invoice layouts as well as learn how to best process invoices from watching the changes that users are making.</p><p><b>[01:14]</b> That same organization noted that Esker's ability to integrate and maintain controls from the ERP system was a key part of their success. They were able to easily mitigate the risk of errors and ensure that any discrepancies, much like the price mismatch we see on this particular invoice example, are clearly identified and then routed to the appropriate users.</p><p><b>[01:32]</b> A leading retail conglomerate credited Esker's three-way matching capability of reconciling extracted invoice data against purchase orders and goods receipts from their ERP system as a big reason why their AP staff is now able to spend much more time on higher value tasks like improving supplier relationships.</p><p><b>[01:48]</b> AP specialists can send invoices out for approval if needed, or simply post the invoices from Esker to the ERP if their matching criteria is met. These invoices could even be posted automatically if everything lines up as expected.</p><p><b>[02:01]</b> Now over here we have an example of a non purchase order based invoice which maintains the same look and feel that we saw previously. Using the intelligent coding options available for non-PO invoice processing, organizations are able to significantly improve their processing time for these types of documents.</p><p><b>[02:16]</b> One organization I've actually worked with in the past was able to make their approval process four times as fast compared to how long their approvals were taking before they were using Esker.</p><p><b>[02:25]</b> And thanks to automated workflow determination, users are able to greatly increase their level of confidence that the documents making their way through the system are being delivered to the proper users, all while maintaining full visibility into the overall process.</p><p><b>[02:38]</b> That's about it for what I wanted to talk about at a high level for the Esker Accounts Payable module. Once again, this has been Ryan from Esker. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Ryan d'Esker. Prenons quelques minutes pour passer en revue la solution d'automatisation des comptes fournisseurs d'Esker à haut niveau. En parcourant les fonctionnalités clés de l'outil, je m'assurerai de mentionner quelques success stories et statistiques de nos clients utilisant ce module.</p><p><b>[00:15]</b> Voici un exemple de tableau de bord d'un spécialiste AP. Grâce à la visibilité considérablement améliorée offerte par les tableaux de bord et les métriques de l'outil, l'une des plus grandes entreprises pharmaceutiques basée au Japon a pu augmenter la captation de ses escomptes de paiement anticipé de 75 %.</p><p><b>[00:31]</b> Les tableaux de bord dans Esker sont hautement configurables et peuvent être personnalisés par chaque utilisateur si les permissions appropriées lui sont accordées.</p><p><b>[00:38]</b> J'ai ouvert un exemple de facture basée sur un bon de commande. L'information est présentée en écran partagé avec un aperçu de la facture à droite et ce que nous appelons le formulaire de validation à gauche.</p><p><b>[00:50]</b> En utilisant cette solution, une entreprise internationale de traitement de l'eau a réussi à faire traiter 90 % de ses factures en un seul clic.</p><p><b>[00:58]</b> C'est quelque chose qu'ils ont attribué aux capacités d'extraction optimisées de l'outil, qui utilisent une combinaison de technologies d'IA développées par Esker permettant à la solution de reconnaître rapidement différents formats de factures et d'apprendre à mieux les traiter en observant les corrections effectuées par les utilisateurs.</p><p><b>[01:14]</b> Cette même entreprise a souligné que la capacité d'Esker à s'intégrer et à maintenir les contrôles du système ERP était un élément clé de leur succès. Ils ont pu facilement réduire le risque d'erreurs et s'assurer que toute anomalie, comme l'écart de prix que nous voyons sur cet exemple de facture, est clairement identifiée puis acheminée vers les utilisateurs appropriés.</p><p><b>[01:32]</b> Un grand conglomérat de distribution a crédité la fonctionnalité de rapprochement à trois voies d'Esker — qui réconcilie les données extraites des factures avec les bons de commande et les bons de réception de l'ERP — comme une raison majeure pour laquelle leur équipe AP peut désormais consacrer bien plus de temps à des tâches à plus forte valeur ajoutée comme l'amélioration des relations fournisseurs.</p><p><b>[01:48]</b> Les spécialistes AP peuvent envoyer les factures en approbation si nécessaire, ou simplement les comptabiliser depuis Esker vers l'ERP si les critères de rapprochement sont respectés. Ces factures peuvent même être comptabilisées automatiquement si tout correspond.</p><p><b>[02:01]</b> Ici, nous avons un exemple de facture hors bon de commande qui conserve la même ergonomie que celle vue précédemment. Grâce aux options d'imputation intelligente disponibles pour le traitement des factures hors commande, les entreprises peuvent améliorer significativement le temps de traitement de ces types de documents.</p><p><b>[02:16]</b> Une entreprise avec laquelle j'ai travaillé a réussi à rendre son processus d'approbation quatre fois plus rapide qu'avant l'utilisation d'Esker.</p><p><b>[02:25]</b> Et grâce à la détermination automatique des workflows, les utilisateurs peuvent considérablement augmenter leur confiance dans le fait que les documents transitant dans le système sont bien acheminés vers les bonnes personnes, tout en maintenant une visibilité totale sur l'ensemble du processus.</p><p><b>[02:38]</b> Voilà ce que je voulais vous présenter à haut niveau sur le module Comptes Fournisseurs d'Esker. Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

{f:"2 - AI-Driven Data Extraction",t:"AI-Driven Data Extraction",sz:"79.9",
trEN:"<p><b>[00:01]</b> Hey everyone, this is Ryan from Esker. Let's take a moment to chat about how data extraction works within the Esker Accounts Payable Automation solution.</p><p><b>[00:08]</b> Esker's own data extraction mechanisms can be broken down into a few different categories.</p><p><b>[00:13]</b> Synergy Neural Network, which relies on artificial intelligence, uses deep learning and natural language processing to best understand which information to pull from the pages of an invoice and what that information really means.</p><p><b>[00:25]</b> Synergy's shared network is based on auto-learning templates from across the Esker AP client database, allowing organizations new to Esker to take full advantage of the recognition improvements made by other companies from day one.</p><p><b>[00:38]</b> Machine learning is a tool that watches the corrections made by AP specialists when processing invoices in order to adjust how invoices are handled in the future and continuously improve accuracy over time.</p><p><b>[00:48]</b> Teaching is a slightly older option that is also available, but typically acts as more of a safety net to specifically define extraction rules for more unique scenarios.</p><p><b>[00:58]</b> One additional point to clarify: OCR, or Optical Character Recognition, is utilized by Esker AP, but only in certain situations where the solution needs to convert an image-based document, like a JPG file for instance, into system-readable text.</p><p><b>[01:13]</b> After that, the data extraction tech is applied. If however a new invoice is received that's already text-based — like many system-generated PDFs are by default — Esker will skip over using OCR entirely and jump straight into using its own data extraction technology.</p><p><b>[01:29]</b> Here I have an example of a PO-based invoice wherein I didn't have to do any kind of data extraction setup or configure any templates manually in advance. The system is able to use that technology stack to extract these details for me automatically.</p><p><b>[01:43]</b> Something that I personally think is pretty cool is that you can actually click on the different fields of the validation form to have Esker show you where on the invoice it's pulling that data from.</p><p><b>[01:52]</b> So once again, this has been Ryan from Esker. Thanks for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour à tous, ici Ryan d'Esker. Parlons un instant du fonctionnement de l'extraction de données dans la solution d'automatisation des comptes fournisseurs d'Esker.</p><p><b>[00:08]</b> Les mécanismes d'extraction de données propres à Esker peuvent être répartis en plusieurs catégories.</p><p><b>[00:13]</b> Le réseau neuronal Synergy, qui repose sur l'intelligence artificielle, utilise le deep learning et le traitement du langage naturel pour identifier au mieux les informations à extraire des pages d'une facture et comprendre la signification de ces données.</p><p><b>[00:25]</b> Le réseau partagé de Synergy s'appuie sur des modèles auto-apprenants issus de l'ensemble de la base clients Esker AP, permettant aux nouvelles entreprises de bénéficier dès le premier jour des améliorations de reconnaissance apportées par les autres clients.</p><p><b>[00:38]</b> Le machine learning est un outil qui observe les corrections effectuées par les spécialistes AP lors du traitement des factures, afin d'ajuster le traitement futur et d'améliorer continuellement la précision au fil du temps.</p><p><b>[00:48]</b> Le teaching est une option plus ancienne également disponible, qui sert généralement de filet de sécurité pour définir des règles d'extraction spécifiques à des scénarios particuliers.</p><p><b>[00:58]</b> Un point important à clarifier : l'OCR (Reconnaissance Optique de Caractères) est utilisée par Esker AP, mais uniquement dans les cas où la solution doit convertir un document image — comme un fichier JPG par exemple — en texte lisible par le système.</p><p><b>[01:13]</b> Ensuite, la technologie d'extraction de données est appliquée. Si en revanche une nouvelle facture reçue est déjà en format texte — comme c'est le cas par défaut pour beaucoup de PDF générés par un système — Esker ignore complètement l'OCR et passe directement à sa propre technologie d'extraction.</p><p><b>[01:29]</b> Ici j'ai un exemple de facture avec bon de commande pour laquelle je n'ai eu aucune configuration d'extraction ni aucun modèle à paramétrer manuellement en amont. Le système utilise cette pile technologique pour extraire automatiquement les informations.</p><p><b>[01:43]</b> Ce que je trouve personnellement très pratique, c'est que vous pouvez cliquer sur les différents champs du formulaire de validation pour qu'Esker vous montre exactement où sur la facture il extrait cette donnée.</p><p><b>[01:52]</b> Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

{f:"3 - PO Invoice Matching & Automatic Posting",t:"PO Invoice Matching & Automatic Posting",sz:"93.7",
trEN:"<p><b>[00:01]</b> Hey everyone, this is Ryan from Esker. Let's take a moment to talk about how the Esker Accounts Payable module is able to take extracted information from vendor invoices and match that against corresponding purchase order and even goods receipt data.</p><p><b>[00:14]</b> In this example, Esker is going line by line on the document and looking up the corresponding reference data from the ERP in order to make a comparison. It's working to identify which lines match as expected versus those that have a discrepancy — and in this case, there are multiple different purchase orders referenced on the same invoice.</p><p><b>[00:31]</b> While most of the lines look OK, there are a few line items showing a pricing discrepancy. Esker will call that out within the specific lines themselves and can even be set up with logic to recognize specific exception types, which can then drive your workflow rules.</p><p><b>[00:48]</b> In the order number field, users have the ability to view and even search for corresponding order details, meaning they don't have to open up the ERP system separately to review this information.</p><p><b>[00:58]</b> This is especially helpful in cases where the vendor may have decided not to include your order number on their invoice and you need to track down the correct PO information to process the document.</p><p><b>[01:08]</b> In a different invoice example here, Esker has identified that this invoice does not have any exceptions or discrepancies that need to be reviewed. So as an AP specialist, I can simply take a quick look to validate the results before posting the invoice to the ERP.</p><p><b>[01:22]</b> Many organizations will take that automation a step further and actually enable something called automatic posting, which means that the invoice will be received, have data extracted, be reconciled against ERP master data, and then posted to the ERP — all in the background without any user intervention required.</p><p><b>[01:39]</b> This is a standard option that you can enable on a vendor-by-vendor basis at your discretion.</p><p><b>[01:45]</b> So once again, this has been Ryan from Esker. Thank you for watching.</p>",
trFR:"<p><b>[00:01]</b> Bonjour à tous, ici Ryan d'Esker. Voyons comment le module Comptes Fournisseurs d'Esker est capable de prendre les informations extraites des factures et de les rapprocher des bons de commande et même des bons de réception correspondants.</p><p><b>[00:14]</b> Dans cet exemple, Esker parcourt le document ligne par ligne et recherche les données de référence correspondantes dans l'ERP pour effectuer une comparaison. Il identifie les lignes conformes et celles présentant un écart — et dans ce cas, plusieurs bons de commande différents sont référencés sur la même facture.</p><p><b>[00:31]</b> Si la plupart des lignes sont conformes, quelques éléments présentent un écart de prix. Esker le signale directement dans les lignes concernées et peut même être configuré avec une logique de reconnaissance des types d'exception spécifiques, qui peuvent ensuite déclencher vos règles de workflow.</p><p><b>[00:48]</b> Dans le champ numéro de commande, les utilisateurs peuvent consulter et même rechercher les détails de commande correspondants, sans avoir à ouvrir l'ERP séparément.</p><p><b>[00:58]</b> C'est particulièrement utile lorsque le fournisseur n'a pas inclus votre numéro de commande sur sa facture et que vous devez retrouver la bonne référence pour traiter le document.</p><p><b>[01:08]</b> Dans un autre exemple de facture, Esker a identifié qu'il n'y a aucune exception ni anomalie à examiner. En tant que spécialiste AP, je peux simplement vérifier rapidement les résultats avant de comptabiliser la facture dans l'ERP.</p><p><b>[01:22]</b> Beaucoup d'entreprises vont plus loin dans l'automatisation en activant la comptabilisation automatique : la facture est reçue, les données sont extraites, réconciliées avec les données de référence ERP, puis comptabilisées — le tout en arrière-plan sans aucune intervention humaine.</p><p><b>[01:39]</b> C'est une option standard que vous pouvez activer fournisseur par fournisseur selon vos besoins.</p><p><b>[01:45]</b> Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

{f:"4 - Non-PO Invoice Coding Automation",t:"Non-PO Invoice Coding Automation",sz:"99.2",
trEN:"<p><b>[00:01]</b> When it comes to processing non purchase order related invoices, Esker isn't going to attempt to reconcile or match this invoice against any purchase orders or goods receipts. We're just working off the invoice in question.</p><p><b>[00:13]</b> However, Esker will still try to automate the processing of those documents as much as possible — namely through coding automation.</p><p><b>[00:23]</b> There are a couple of key features that Esker employs to speed up processing and fill out the line item section for us before we send it for review or post the invoice.</p><p><b>[00:35]</b> Taking a look at the line items on this example, Esker is already displaying one of those features. Something referred to as Most Recently Used, or MRU, is a capability that allows the system to remember and then apply the most recently used coding. How you allocated the invoice from that same vendor last time can be applied automatically to the next invoice you receive from them.</p><p><b>[00:57]</b> In this case, it can tell that I commonly allocate things using a certain GL account, tax code, cost center, and apply those for me automatically. As an AP specialist, I don't have to copy-paste or look up what it might have been — I can simply review and send it on its way.</p><p><b>[01:20]</b> In addition to MRU, a functionality called Assignment Templates is also available. It gives users a way to save different coding splits and allocations as their own template. Those templates can then be applied on an invoice-by-invoice basis or as a default on a vendor level for any new invoices coming in.</p><p><b>[01:41]</b> This is especially helpful when dealing with a newer vendor where you don't have that historical invoice backlog to reference. You can apply a previously created assignment template as a starting point for how to code that invoice.</p><p><b>[01:57]</b> And last but not least, let's say you're dealing with a spreadsheet that dictates how you need to code or split the amounts for a non-PO invoice. Using a feature called Load Lines from Clipboard, you can copy and paste all that information from the spreadsheet into your Esker line item section on a non-PO invoice in one fell swoop, without having to go meticulously line by line, field by field. It's done in a much more efficient way.</p>",
trFR:"<p><b>[00:01]</b> Lorsqu'il s'agit de traiter des factures hors bon de commande, Esker ne va pas tenter de rapprocher ou faire correspondre cette facture avec des bons de commande ou des bons de réception. On travaille uniquement avec la facture elle-même.</p><p><b>[00:13]</b> Cependant, Esker va quand même automatiser au maximum le traitement de ces documents, notamment grâce à l'automatisation de l'imputation comptable.</p><p><b>[00:23]</b> Plusieurs fonctionnalités clés permettent d'accélérer le traitement et de pré-remplir la section des postes de ligne avant envoi en approbation ou comptabilisation.</p><p><b>[00:35]</b> En regardant les postes de cette facture exemple, Esker affiche déjà l'une de ces fonctionnalités. Le MRU (Most Recently Used) est une capacité qui permet au système de mémoriser et d'appliquer automatiquement la dernière imputation utilisée. L'imputation que vous avez faite sur la dernière facture de ce même fournisseur peut être appliquée automatiquement à la facture suivante.</p><p><b>[00:57]</b> Ici, le système détecte que j'utilise habituellement un certain compte général, code TVA, centre de coûts, et les applique automatiquement. En tant que spécialiste AP, je n'ai plus besoin de copier-coller ni de rechercher les imputations — je vérifie simplement et j'envoie.</p><p><b>[01:20]</b> En complément du MRU, une fonctionnalité appelée Modèles d'imputation est également disponible. Elle permet aux utilisateurs de sauvegarder différentes ventilations et imputations sous forme de modèles. Ces modèles peuvent ensuite être appliqués facture par facture ou définis par défaut au niveau fournisseur pour toute nouvelle facture entrante.</p><p><b>[01:41]</b> C'est particulièrement utile avec un nouveau fournisseur pour lequel vous n'avez pas d'historique de factures. Vous pouvez appliquer un modèle préalablement créé comme point de départ pour l'imputation.</p><p><b>[01:57]</b> Enfin, imaginons que vous ayez un tableur qui dicte comment ventiler les montants d'une facture hors commande. Grâce à la fonctionnalité Charger les lignes depuis le presse-papiers, vous pouvez copier-coller toutes ces informations du tableur vers la section postes de ligne d'Esker en une seule opération, sans avoir à saisir laborieusement ligne par ligne, champ par champ.</p>"},

{f:"5 - Automated Approval Workflows",t:"Automated Approval Workflows",sz:"134.4",
trEN:"<p><b>[00:01]</b> Hey there, this is Ryan from Esker. Let's take a moment to talk through automated workflow rules in the Esker Accounts Payable module.</p><p><b>[00:07]</b> Within Esker AP, you have the capability to use the workflow rule engine to set up and anticipate different situations and how they need to be handled. Who needs to be involved in a potential workflow to help alleviate exceptions or provide additional approvals on different types of invoices?</p><p><b>[00:25]</b> I've opened up a couple of different invoice examples. The first is a purchase order based invoice. Esker has performed data extraction and attempted to reconcile it against purchase order data from our ERP. In this case, it's noticed an exception — highlighted at the header level in the net amount field, as well as within the lines themselves.</p><p><b>[00:46]</b> If we scroll down to the workflow section, we notice that Esker is suggesting a workflow for us automatically. I didn't have to input that as an AP specialist manually. It knew who to send this to right away based on workflow logic I previously established.</p><p><b>[01:04]</b> In this case, Carol is being involved because she was the originator of the purchase order used to reconcile this invoice. This is just one example for exception handling — you might route to an individual buyer, or a group of buyers if you don't have a specific buyer in mind.</p><p><b>[01:28]</b> Another example here is on the non-PO side where we're not reconciling against any purchase orders. We might require additional approvals before processing. Scrolling down, the workflow section shows that Esker is looking at the coding section — specifically the cost center field — to determine who needs to approve.</p><p><b>[01:56]</b> Specifically, it's basing that on the cost center manager. Sam is being pulled in because she owns Cost Center 1000. You can also incorporate additional logic like delegation of authority spending limits — maybe Sam can only approve up to $500, so if exceeded, her manager gets brought in.</p><p><b>[02:29]</b> These are just a couple of quick examples of how you can establish different workflow rules within the Esker AP environment to make sure the proper users or groups of users are involved in signing off on invoices.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, ici Ryan d'Esker. Parlons des règles de workflow automatisées dans le module Comptes Fournisseurs d'Esker.</p><p><b>[00:07]</b> Dans Esker AP, vous pouvez utiliser le moteur de règles de workflow pour anticiper différentes situations et définir comment les traiter. Qui doit intervenir dans un workflow pour résoudre des exceptions ou fournir des approbations supplémentaires sur différents types de factures ?</p><p><b>[00:25]</b> J'ai ouvert deux exemples de factures. La première est une facture avec bon de commande. Esker a effectué l'extraction de données et tenté de la rapprocher des données de commande de l'ERP. Ici, une exception est détectée — visible au niveau en-tête dans le champ montant net, ainsi que dans les lignes.</p><p><b>[00:46]</b> En descendant vers la section workflow, on constate qu'Esker suggère automatiquement un circuit d'approbation. Je n'ai rien eu à saisir manuellement — le système savait immédiatement à qui envoyer cette facture, grâce à la logique de workflow préalablement configurée.</p><p><b>[01:04]</b> Dans ce cas, Carol est impliquée car elle est à l'origine du bon de commande utilisé pour le rapprochement. C'est juste un exemple de gestion d'exception — vous pourriez router vers un acheteur individuel ou un groupe d'acheteurs.</p><p><b>[01:28]</b> Un autre exemple concerne le côté hors commande, où nous ne rapprochons pas la facture avec des bons de commande. Des approbations supplémentaires peuvent être requises. En descendant, la section workflow montre qu'Esker examine la section d'imputation — spécifiquement le centre de coûts — pour déterminer qui doit approuver.</p><p><b>[01:56]</b> Plus précisément, il se base sur le responsable du centre de coûts. Sam est sollicitée car elle est propriétaire du centre de coûts 1000. Vous pouvez aussi ajouter une logique de délégation de pouvoir avec des seuils de montant — par exemple, Sam ne peut approuver que jusqu'à 500 $, et au-delà, son responsable est automatiquement impliqué.</p><p><b>[02:29]</b> Voilà quelques exemples rapides montrant comment établir différentes règles de workflow dans l'environnement Esker AP pour s'assurer que les bons utilisateurs interviennent dans le processus de validation des factures.</p>"},

{f:"6 - Vendor Statement Reconciliation",t:"Vendor Statement Reconciliation",sz:"48.5",
trEN:"<p><b>[00:00]</b> Hey everyone, this is Ryan from Esker. Let's take a moment to review the statement reconciliation feature from the Esker AP module.</p><p><b>[00:08]</b> If you're processing vendor statements manually today, then I don't have to reiterate how tiresome that process can be. This tool allows you to dramatically decrease the time it takes to review these statements.</p><p><b>[00:19]</b> Esker can automate the data extraction as well as reconciliation to review what invoices are called out on the statement versus which invoices you actually have on record.</p><p><b>[00:29]</b> Corresponding invoice lines can be given three different statuses: Match, where everything lines up as expected; Mismatch, where the invoice has been found but one or more parameters don't quite align; and Unmatched, where we see an invoice on the statement but don't have any record of it.</p><p><b>[00:48]</b> A nice quality-of-life function is that end users can easily select a \"Request Missing Invoices\" button, which will prefill a conversation message to the vendor with all pertinent details so it can be sent off with a click of a button.</p><p><b>[01:02]</b> Once again, this has been Ryan from Esker. Thank you for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Ryan d'Esker. Parlons de la fonctionnalité de rapprochement des relevés fournisseurs du module Esker AP.</p><p><b>[00:08]</b> Si vous traitez les relevés fournisseurs manuellement aujourd'hui, je n'ai pas besoin de vous rappeler à quel point ce processus peut être fastidieux. Cet outil permet de réduire drastiquement le temps de traitement de ces relevés.</p><p><b>[00:19]</b> Esker automatise l'extraction de données ainsi que le rapprochement pour comparer les factures mentionnées sur le relevé avec celles effectivement enregistrées dans vos systèmes.</p><p><b>[00:29]</b> Chaque ligne de facture peut recevoir trois statuts : Correspondance, lorsque tout est conforme ; Écart, lorsque la facture est trouvée mais qu'un ou plusieurs paramètres ne concordent pas ; et Non rapprochée, lorsqu'une facture figure sur le relevé mais n'apparaît pas dans vos enregistrements.</p><p><b>[00:48]</b> Une fonctionnalité très pratique permet aux utilisateurs de cliquer sur le bouton « Demander les factures manquantes », qui pré-remplit un message au fournisseur avec toutes les informations pertinentes pour l'envoyer en un clic.</p><p><b>[01:02]</b> Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

{f:"7 - Reporting",t:"Reporting",sz:"91.5",
trEN:"<p><b>[00:00]</b> Hi everyone, this is Ryan from Esker. Let's talk about how the Esker Accounts Payable module enables you to capture key performance indicators, gain insights into areas for potential improvement, and provide visibility into all aspects of the AP invoice process through its reporting functionality.</p><p><b>[00:16]</b> The AP module is bundled with 50 pre-configured reports available right out of the box, covering subjects such as accrual information, available discounts, average processing time, and how many invoices are out for approval.</p><p><b>[00:28]</b> These reports can be directly edited or duplicated if you'd like to tweak a certain aspect. New custom reports can easily be created by end users within the tool, following a straightforward step-by-step reporting wizard.</p><p><b>[00:40]</b> You're able to define additional values with operations, group data in a particular order, determine which columns to display, filter the data, and even create corresponding charts or graphs for a more visual representation.</p><p><b>[00:55]</b> With a given report, you can print or export the results, and even schedule reports to be emailed to you at a frequency of your choosing — so you can stay up to date without even needing to log in.</p><p><b>[01:08]</b> A nice part about these reports is that all the information exists within your Esker environment, so you can easily access corresponding invoice information for a deeper look at document details. From dashboards, reports can be displayed in chart or graph form for even further improved ease of access.</p><p><b>[01:25]</b> This way the key information that matters the most can be shown as soon as you log in. Once again, this has been Ryan from Esker. Thank you for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Ryan d'Esker. Voyons comment le module Comptes Fournisseurs d'Esker vous permet de capturer des indicateurs de performance clés, d'identifier des axes d'amélioration et d'offrir une visibilité complète sur l'ensemble du processus de traitement des factures grâce à ses fonctionnalités de reporting.</p><p><b>[00:16]</b> Le module AP est livré avec 50 rapports préconfigurés disponibles nativement, couvrant des sujets comme les provisions, les escomptes disponibles, le temps de traitement moyen et le nombre de factures en cours d'approbation.</p><p><b>[00:28]</b> Ces rapports peuvent être directement modifiés ou dupliqués. De nouveaux rapports personnalisés peuvent facilement être créés par les utilisateurs via un assistant de création étape par étape.</p><p><b>[00:40]</b> Vous pouvez définir des valeurs calculées, regrouper les données, choisir les colonnes à afficher, filtrer les données, et même créer des graphiques pour une représentation plus visuelle.</p><p><b>[00:55]</b> Vous pouvez imprimer ou exporter les résultats, et même programmer l'envoi automatique de rapports par e-mail à la fréquence de votre choix — pour rester informé sans même avoir à vous connecter.</p><p><b>[01:08]</b> L'avantage est que toutes les données sont accessibles dans votre environnement Esker, permettant de consulter facilement le détail de chaque facture. Depuis les tableaux de bord, les rapports s'affichent sous forme de graphiques pour un accès encore plus rapide.</p><p><b>[01:25]</b> Ainsi, les informations clés s'affichent dès votre connexion. Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

{f:"8 - Requesting Credit Memos & Related Invoices",t:"Requesting Credit Memos & Related Invoices",sz:"82.7",
trEN:"<p><b>[00:01]</b> In the world of AP, you'll often run into situations where two separate invoices, or an invoice and a credit note, are related to one another.</p><p><b>[00:09]</b> There's a function in the Esker Accounts Payable module that allows you to easily tie related documents together, as well as request a credit note in response to an overcharged invoice.</p><p><b>[00:22]</b> Let's first look at this PO-based invoice from London Postmaster. It seems mostly OK, yet it has two line items causing an exception — what's noted on the invoice doesn't match up with our purchase order and receipt data.</p><p><b>[00:39]</b> If I select the mismatched line items, I can choose a \"Request Credit Note\" option at the bottom. This automatically fills in the relevant information into a conversation message that can be sent to the vendor.</p><p><b>[00:53]</b> I can make modifications if needed, attach supporting documents, and then send it out.</p><p><b>[00:59]</b> Once that credit note has been received, it can be tied back to the original invoice via a specific field at the header level. We'll also see that credit note appear within a Related Invoices section on the original invoice.</p><p><b>[01:13]</b> Having these options allows users to jump to other supporting documents instantly without having to search or sort to track down all the relevant invoices.</p>",
trFR:"<p><b>[00:01]</b> Dans le monde de la comptabilité fournisseurs, il arrive fréquemment que deux factures ou qu'une facture et un avoir soient liés.</p><p><b>[00:09]</b> Le module Esker AP dispose d'une fonctionnalité qui permet de relier facilement les documents entre eux, ainsi que de demander un avoir en réponse à une facture avec un montant trop élevé.</p><p><b>[00:22]</b> Regardons cette facture avec bon de commande de London Postmaster. Elle semble globalement correcte, mais deux lignes présentent une exception — les montants facturés ne correspondent pas aux données de notre commande et de notre réception.</p><p><b>[00:39]</b> En sélectionnant les lignes en écart, je peux choisir l'option « Demander un avoir » en bas. Cela pré-remplit automatiquement un message au fournisseur avec toutes les informations pertinentes.</p><p><b>[00:53]</b> Je peux modifier le message si besoin, joindre des pièces justificatives, puis l'envoyer.</p><p><b>[00:59]</b> Une fois l'avoir reçu, il peut être rattaché à la facture d'origine via un champ dédié au niveau en-tête. L'avoir apparaîtra également dans une section Factures liées sur la facture originale.</p><p><b>[01:13]</b> Ces fonctionnalités permettent aux utilisateurs d'accéder instantanément aux documents associés sans avoir à faire de recherches pour retrouver les factures concernées.</p>"},

{f:"9 - Vendor Portal",t:"Vendor Portal",sz:"62.2",
trEN:"<p><b>[00:01]</b> Oftentimes vendors will spam your inbox or voicemail with requests about how their specific invoices are progressing — like if it's been paid yet or if it might have been rejected.</p><p><b>[00:12]</b> When you use the Esker Accounts Payable module, the included Vendor Portal functionality allows you to give your vendors self-service capability to check on these things themselves, ideally cutting down on the number of phone calls and emails they'd otherwise send you.</p><p><b>[00:26]</b> If you choose to utilize this functionality, vendors gain two main abilities in this portal.</p><p><b>[00:32]</b> First is the option to submit new invoices. Here you can determine if you'd like to make specific fields required when the vendor submits, which helps ensure that the parameters you need to process the document are actually included.</p><p><b>[00:47]</b> Next is the ability for vendors to view and check in on their invoices in progress. By default, the amount of information shared with the vendor is drastically reduced compared to what's available internally — only essential details are displayed so the vendor can identify which invoice they're viewing.</p><p><b>[01:07]</b> Payment details can be displayed on the Vendor Portal so vendors can check when an invoice was paid, the payment method used, and any relevant payment reference number. If an invoice was rejected, the reason behind the rejection can also be displayed.</p><p><b>[01:22]</b> You can also choose to allow conversations with vendors through the Vendor Portal. Any questions or messages posted on a specific invoice will stay with that invoice for its entire lifecycle and archive duration.</p>",
trFR:"<p><b>[00:01]</b> Les fournisseurs sollicitent souvent votre boîte mail ou votre messagerie vocale pour connaître l'avancement de leurs factures — paiement effectué, éventuel rejet, etc.</p><p><b>[00:12]</b> Avec le module Esker AP, la fonctionnalité de Portail Fournisseur intégrée permet de donner à vos fournisseurs un accès en libre-service pour consulter ces informations eux-mêmes, réduisant ainsi le nombre d'appels et d'e-mails reçus.</p><p><b>[00:26]</b> En activant cette fonctionnalité, les fournisseurs disposent de deux capacités principales sur le portail.</p><p><b>[00:32]</b> La première est la possibilité de soumettre de nouvelles factures. Vous pouvez rendre certains champs obligatoires lors de la soumission, garantissant ainsi que les informations nécessaires au traitement sont bien fournies.</p><p><b>[00:47]</b> La seconde est la possibilité de consulter et suivre l'avancement de leurs factures. Par défaut, les informations partagées avec le fournisseur sont considérablement réduites par rapport à ce qui est disponible en interne — seuls les détails essentiels sont affichés pour identifier la facture consultée.</p><p><b>[01:07]</b> Les détails de paiement peuvent être affichés sur le portail : date de paiement, mode de règlement et référence de paiement. En cas de rejet, le motif est également visible.</p><p><b>[01:22]</b> Vous pouvez aussi autoriser les échanges avec les fournisseurs via le portail. Tous les messages associés à une facture sont conservés durant tout le cycle de vie et la durée d'archivage de celle-ci.</p>"},

{f:"Delegation of Authority High Level (Configure Workflows)",t:"Delegation of Authority (Configure Workflows)",sz:"139.6",
trEN:"<p><b>[00:00]</b> Hey everyone, this is Ryan from Esker. Just wanted to make a quick video highlighting how easy it is to manage your delegation of authority within Esker — specifically showing Esker AP here, although this is really applicable for any Esker module.</p><p><b>[00:17]</b> So within my demo environment, I've got a couple different tabs open. For context, we're talking about workflow rules. Within your Esker environment, you can create and manage automated workflow rules which help suggest which users or groups of users need to be involved when processing an invoice — usually for exception handling or reviewing non-PO invoices and direct expenses.</p><p><b>[00:44]</b> Let's look at my non-PO workflow. I'll click edit on one of my workflow rules. It's very straightforward: just give it conditions for when the rule should apply — in my case, based on the company code for non-PO invoices — and then define the steps.</p><p><b>[01:04]</b> I can simply say: pull in the cost center manager, then always enforce the managerial hierarchy — effectively enforcing the delegation of authority.</p><p><b>[01:14]</b> With that set up, Esker knows that for any incoming non-PO invoice, it will look at the cost centers being used, pull the cost center manager based on the data table, and also check if the amount passes the approval limits. If it doesn't, whoever's next in line gets brought in.</p><p><b>[01:46]</b> We can go into our tables to see the individual users and their approval limits. Here we have a listing of all users with their information. If we look at Cost Center Owner 4 — Sam — we see her manager and her amount limit of $10,000.</p><p><b>[02:17]</b> Looking at an invoice example, a utility bill — this non-PO workflow rule applies. Sam is brought in automatically by the system. If we update the amount to $9,000 — still good because Sam's limit is $10,000. But if we make it $11,000 — boom, now Christine, Sam's manager, is also brought in. And if we make it $50,000, Christine's manager, the executives group, also gets involved.</p><p><b>[03:22]</b> All this refreshes automatically based on that one workflow rule and a couple entries in the user properties tables. It's extremely straightforward to manage — no programming experience required. Business-level admins are typically the ones making these changes.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Ryan d'Esker. Une courte vidéo pour montrer à quel point il est simple de gérer la délégation de pouvoir dans Esker — ici dans le module AP, mais c'est applicable à tous les modules Esker.</p><p><b>[00:17]</b> Dans mon environnement de démo, j'ai ouvert plusieurs onglets. Pour contexte, nous parlons de règles de workflow. Dans votre environnement Esker, vous pouvez créer et gérer des règles de workflow automatisées qui déterminent quels utilisateurs ou groupes doivent intervenir lors du traitement d'une facture — généralement pour la gestion d'exceptions ou la validation de factures hors commande.</p><p><b>[00:44]</b> Regardons mon workflow hors commande. Je clique sur modifier. C'est très simple : on définit les conditions d'application de la règle — ici basées sur le code société pour les factures hors commande — puis les étapes.</p><p><b>[01:04]</b> Je peux simplement indiquer : impliquer le responsable du centre de coûts, puis toujours appliquer la hiérarchie managériale — ce qui applique de fait la délégation de pouvoir.</p><p><b>[01:14]</b> Avec cette configuration, Esker sait que pour toute facture hors commande entrante, il doit examiner les centres de coûts utilisés, récupérer le responsable du centre de coûts dans la table de données, et vérifier si le montant respecte les seuils d'approbation. Si ce n'est pas le cas, le niveau hiérarchique supérieur est automatiquement sollicité.</p><p><b>[01:46]</b> On peut consulter les tables pour voir les utilisateurs et leurs seuils d'approbation. Ici, Sam (propriétaire du centre de coûts 4) a un seuil de 10 000 $.</p><p><b>[02:17]</b> Sur un exemple de facture de services publics — la règle workflow hors commande s'applique. Sam est automatiquement sollicitée. Si on passe le montant à 9 000 $ — toujours bon car son seuil est à 10 000 $. Mais à 11 000 $ — Christine, sa responsable, est aussi impliquée. Et à 50 000 $, le groupe direction, responsable de Christine, intervient également.</p><p><b>[03:22]</b> Tout se met à jour automatiquement grâce à cette seule règle de workflow et quelques entrées dans les tables utilisateurs. C'est extrêmement simple à gérer — aucune compétence en programmation n'est requise. Ce sont typiquement des administrateurs métier qui gèrent ces configurations.</p>"},

{f:"Esker Statement Reconciliation",t:"Esker Statement Reconciliation",sz:"49.7",
trEN:"<p><b>[00:00]</b> Hey everyone, this is Ryan from Esker. Let's take a moment to review the statement reconciliation feature from the Esker AP module.</p><p><b>[00:07]</b> If you're processing vendor statements manually today, then I don't have to reiterate how tiresome that process can be. This tool allows you to dramatically decrease the time it takes to review these statements.</p><p><b>[00:19]</b> Esker can automate the data extraction as well as reconciliation to review what invoices are listed on the statement versus which invoices you actually have on record.</p><p><b>[00:29]</b> Corresponding invoice lines can be given three different statuses: Match, where everything lines up; Mismatch, where the invoice has been found but parameters don't quite align; and Unmatched, where an invoice appears on the statement but we have no record of it.</p><p><b>[00:48]</b> A nice quality-of-life function is that end users can select a \"Request Missing Invoices\" button, which prefills a conversation message to the vendor with all pertinent details so it can be sent with a click.</p><p><b>[01:02]</b> Once again, this has been Ryan from Esker. Thank you for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Ryan d'Esker. Passons en revue la fonctionnalité de rapprochement des relevés dans le module Esker AP.</p><p><b>[00:07]</b> Si vous traitez manuellement les relevés fournisseurs aujourd'hui, vous savez combien ce processus peut être laborieux. Cet outil permet de réduire considérablement le temps de traitement de ces relevés.</p><p><b>[00:19]</b> Esker automatise l'extraction de données et le rapprochement pour comparer les factures listées sur le relevé avec celles présentes dans vos systèmes.</p><p><b>[00:29]</b> Les lignes de facture reçoivent trois statuts possibles : Correspondance quand tout concorde ; Écart quand la facture est trouvée mais certains paramètres divergent ; et Non rapprochée quand une facture figure sur le relevé sans correspondance dans vos enregistrements.</p><p><b>[00:48]</b> Une fonctionnalité très appréciée est le bouton « Demander les factures manquantes » qui pré-remplit un message au fournisseur avec toutes les informations pertinentes, envoyable en un clic.</p><p><b>[01:02]</b> Encore une fois, ici Ryan d'Esker. Merci d'avoir regardé.</p>"},

{f:"S2P AI Feature - Predictive Coding - Single Experience",t:"AI Predictive Coding — Single Experience",sz:"72.2",
trEN:"<p><b>[00:01]</b> Hello, this is Christina. Today we're going to take a look at our AI feature for predictive coding of non-PO invoices.</p><p><b>[00:09]</b> Esker knows that coding — even within a specific supplier — can vary invoice to invoice based on things like the service, ship-to address, or even the items on the invoice.</p><p><b>[00:21]</b> So what the AI does, instead of simply suggesting the coding from the last invoice, is take it a step further and evaluate the coding of every invoice within that supplier to identify the document that most closely resembles the one currently being processed.</p><p><b>[00:42]</b> This match can be based on words or values from the document. When Esker identifies that match, the coding will be populated in the current invoice with confidence levels to support decision-making by the user.</p><p><b>[00:58]</b> In this example, because the invoices within the supplier are coded in many different ways, we have some varying confidence levels — 78 for the GL account, 56 for the cost center. But again, this supports decision-making, whether it's a specific workflow or another business process.</p><p><b>[01:22]</b> In comparison, we have a utility bill that is coded the same way every single time, so Esker and the AI are able to display a 100% confidence level.</p><p><b>[01:34]</b> If you have any questions, please let us know. Thank you.</p>",
trFR:"<p><b>[00:01]</b> Bonjour, ici Christina. Nous allons découvrir la fonctionnalité d'IA pour l'imputation prédictive des factures hors bon de commande.</p><p><b>[00:09]</b> Esker sait que l'imputation — même chez un même fournisseur — peut varier d'une facture à l'autre selon la prestation, l'adresse de livraison, ou les articles facturés.</p><p><b>[00:21]</b> Au lieu de simplement reprendre l'imputation de la dernière facture, l'IA va plus loin : elle analyse l'imputation de toutes les factures de ce fournisseur pour identifier le document le plus similaire à celui en cours de traitement.</p><p><b>[00:42]</b> Cette correspondance peut se baser sur les mots ou les valeurs du document. Quand Esker identifie une correspondance, l'imputation est pré-remplie avec des niveaux de confiance pour aider l'utilisateur dans sa prise de décision.</p><p><b>[00:58]</b> Dans cet exemple, comme les factures de ce fournisseur sont imputées de différentes façons, les niveaux de confiance varient — 78 pour le compte général, 56 pour le centre de coûts. Mais cela reste un outil d'aide à la décision, que ce soit pour un workflow ou un autre processus métier.</p><p><b>[01:22]</b> En comparaison, voici une facture de services publics toujours imputée de la même façon — Esker et l'IA affichent un niveau de confiance de 100 %.</p><p><b>[01:34]</b> Si vous avez des questions, n'hésitez pas à nous contacter. Merci.</p>"}
]},
{id:"pr",label:"E-Procurement",suite:"S2P",icon:"🛒",folder:"E-Procurement",videos:[
  {f:"1 - Procurement Overview",t:"Procurement Overview",sz:"106.6",
trEN:"<p><b>[00:00]</b> Hi everyone, this is Jared from Esker. In this video, I'm going to be walking through a high level overview of the Esker procurement solution. Along the way, I'll share some examples of what brought our customers to the Esker platform and what results they're able to achieve to give you a better idea of how the solution could fit into your landscape.</p><p><b>[00:18]</b> So Esker's procurement module helps organizations optimize spend requests for the ordering of their indirect goods and services in a way that ensures that those requests get the proper authorization. As with all of Esker's solutions, metrics and KPIs can be easily displayed in configurable high-visibility dashboards like the one you see here.</p><p><b>[00:38]</b> Using this solution, organizations are able to dramatically decrease their average purchase processing time. Let's take a look at a purchase requisition in progress — you'll start to see why.</p><p><b>[00:49]</b> We'll see that I've already added a couple of items that I'd like to order on this requisition. In order to capture this information, I have the ability to add the data manually, upload a quote, or jump to a vendor-specific punch-out catalog. Otherwise, I can select an item from an internal catalog, which is a list of items and services an organization can maintain. That helps to tie key details like preferred suppliers or pricing behind the scenes so that requesters don't need to worry about that level of detail. They just pick the item they'd like to order.</p><p><b>[01:22]</b> Our customers love how easy the internal catalog is to use while providing their users a consumer-like experience.</p><p><b>[01:30]</b> Workflow capabilities are a critical element of the procurement module. The system is designed so that organizations can easily configure what workflow steps would be required in order for requested goods or services to be approved by the appropriate users or groups.</p><p><b>[01:46]</b> As an example, a university we've worked with was faced with delays and challenges due to a manual requisition process that relied on data entry into Excel spreadsheets. Through the use of Esker's procurement module, they achieved purchase requisition approvals 3 times faster through automated predefined workflow.</p><p><b>[02:04]</b> Not only was that university able to increase their approval speeds, they were also able to control the maverick or rogue spending so many organizations struggle with without a dedicated solution in place.</p><p><b>[02:16]</b> After those requested items flow through the defined approval steps, we have the ability to add them to a new purchase order. Esker aims to maintain its ease of use in this stage of the process as well, driving towards having purchase orders created with as few clicks as possible — if not fully touchless.</p><p><b>[02:32]</b> If needed, goods receipts can be logged in the system after the items start to be delivered.</p><p><b>[02:40]</b> With having all this procurement information flowing through Esker, it means that everything is within reach for use in other modules such as Accounts Payable. This means that PO-related invoices can more easily reconcile with supporting data and allows the system to instantly call out any matching discrepancies that may exist.</p><p><b>[02:59]</b> A popular beverage manufacturer who implemented both Esker's procurement and Accounts Payable solutions was able to alleviate the burden of payment delays and reduced efficiency from their procurement team, resulting in stronger relationships with their suppliers.</p><p><b>[03:13]</b> So this has been a high level overview of Esker's procurement solution where we focused on the benefits of optimizing spend requests through automation. Thanks for watching.</p>",
trFR:"<p><b>[00:00]</b> Bonjour à tous, ici Jared d'Esker. Dans cette vidéo, je vais vous présenter un aperçu général de la solution d'approvisionnement Esker. En cours de route, je partagerai quelques exemples de ce qui a amené nos clients à choisir la plateforme Esker et les résultats qu'ils ont pu obtenir, pour vous donner une meilleure idée de la façon dont la solution pourrait s'intégrer dans votre environnement.</p><p><b>[00:18]</b> Le module d'approvisionnement d'Esker aide les organisations à optimiser les demandes de dépenses pour la commande de leurs biens et services indirects, en s'assurant que ces demandes obtiennent les autorisations appropriées. Comme pour toutes les solutions Esker, les métriques et KPIs peuvent être facilement affichés dans des tableaux de bord configurables à haute visibilité, comme celui que vous voyez ici.</p><p><b>[00:38]</b> Grâce à cette solution, les organisations peuvent réduire considérablement leur temps moyen de traitement des achats. Examinons une demande d'achat en cours — vous allez vite comprendre pourquoi.</p><p><b>[00:49]</b> Vous verrez que j'ai déjà ajouté quelques articles que je souhaite commander sur cette demande. Pour saisir ces informations, j'ai la possibilité d'ajouter les données manuellement, de télécharger un devis, ou d'accéder à un catalogue punch-out spécifique à un fournisseur. Sinon, je peux sélectionner un article dans un catalogue interne, qui est une liste d'articles et de services qu'une organisation peut maintenir. Cela permet d'associer des détails clés comme les fournisseurs privilégiés ou les prix en arrière-plan, de sorte que les demandeurs n'ont pas à se soucier de ce niveau de détail. Ils choisissent simplement l'article qu'ils souhaitent commander.</p><p><b>[01:22]</b> Nos clients apprécient la facilité d'utilisation du catalogue interne tout en offrant à leurs utilisateurs une expérience similaire au e-commerce grand public.</p><p><b>[01:30]</b> Les fonctionnalités de workflow sont un élément essentiel du module d'approvisionnement. Le système est conçu pour que les organisations puissent facilement configurer les étapes de workflow nécessaires à l'approbation des biens ou services demandés par les utilisateurs ou groupes appropriés.</p><p><b>[01:46]</b> Par exemple, une université avec laquelle nous avons travaillé était confrontée à des retards et des difficultés en raison d'un processus de demande d'achat manuel reposant sur la saisie de données dans des tableurs Excel. Grâce au module d'approvisionnement d'Esker, elle a obtenu des approbations de demandes d'achat 3 fois plus rapides grâce à un workflow automatisé prédéfini.</p><p><b>[02:04]</b> Non seulement cette université a pu accélérer ses approbations, mais elle a également pu contrôler les dépenses non conformes auxquelles tant d'organisations sont confrontées sans solution dédiée.</p><p><b>[02:16]</b> Une fois les articles demandés validés à travers les étapes d'approbation définies, nous avons la possibilité de les ajouter à une nouvelle commande d'achat. Esker s'efforce de maintenir sa facilité d'utilisation à cette étape du processus également, en visant la création de commandes d'achat avec le moins de clics possible — voire de manière totalement automatique.</p><p><b>[02:32]</b> Si nécessaire, les réceptions de marchandises peuvent être enregistrées dans le système une fois que les articles commencent à être livrés.</p><p><b>[02:40]</b> Avec toutes ces informations d'approvisionnement transitant par Esker, tout est accessible pour être utilisé dans d'autres modules comme la Comptabilité Fournisseurs. Cela signifie que les factures liées aux commandes peuvent plus facilement être rapprochées des données justificatives, et le système peut instantanément signaler toute anomalie de rapprochement.</p><p><b>[02:59]</b> Un fabricant de boissons réputé qui a implémenté les solutions d'approvisionnement et de comptabilité fournisseurs d'Esker a pu alléger le fardeau des retards de paiement et de l'inefficacité de son équipe achats, renforçant ainsi ses relations avec ses fournisseurs.</p><p><b>[03:13]</b> Voilà pour cet aperçu général de la solution d'approvisionnement Esker, axé sur les bénéfices de l'optimisation des demandes de dépenses par l'automatisation. Merci d'avoir regardé.</p>"},

  {f:"2 - Internal Items Catalog",t:"Internal Items Catalog",sz:"36.1",
trEN:"<p><b>[00:02]</b> Many organizations struggle with controlling rogue spending, which can occur when no defined process is in place to quickly and efficiently order indirect goods or services. This can lead to overspending for non-essential items, which has a direct impact on a company's bottom line.</p><p><b>[00:16]</b> With Esker's hosted catalogs, organizations can load items and services that have been pre-approved at negotiated prices. Let's take a look at an example of a hosted or internal catalog.</p><p><b>[00:28]</b> The catalogs are designed to emulate a typical e-commerce user interface to maximize user adoption. As you can see, I can easily scroll through the entire list of items, change my view, navigate through a filtered list by category or vendor, or even search for specific items.</p><p><b>[00:51]</b> Clicking an item allows me to see specific details such as lead time or pricing conditions. As I browse the items, I'm able to quickly select my desired quantity for as many of the items or services I need, regardless of vendor.</p><p><b>[01:05]</b> Now I'm able to bring these back to my requisition to continue with the approval process.</p><p><b>[01:12]</b> To summarize, we reviewed how Esker's hosted catalogs can help our customers control their maverick spending on items and services through a seamless and easy process. By defining and guiding your users to pre-negotiated items and services from key vendors, you'll ensure budgetary goals are met and savings targets are recognized.</p>",
trFR:"<p><b>[00:02]</b> De nombreuses organisations peinent à contrôler les dépenses non conformes, qui surviennent lorsqu'aucun processus défini n'est en place pour commander rapidement et efficacement des biens ou services indirects. Cela peut entraîner des dépenses excessives pour des articles non essentiels, avec un impact direct sur les résultats financiers de l'entreprise.</p><p><b>[00:16]</b> Avec les catalogues hébergés d'Esker, les organisations peuvent charger les articles et services qui ont été pré-approuvés à des prix négociés. Examinons un exemple de catalogue hébergé ou interne.</p><p><b>[00:28]</b> Les catalogues sont conçus pour reproduire une interface e-commerce classique afin de maximiser l'adoption par les utilisateurs. Comme vous pouvez le voir, je peux facilement parcourir la liste complète des articles, changer ma vue, naviguer dans une liste filtrée par catégorie ou fournisseur, ou même rechercher des articles spécifiques.</p><p><b>[00:51]</b> Cliquer sur un article me permet de voir des détails spécifiques comme le délai de livraison ou les conditions tarifaires. En parcourant les articles, je peux rapidement sélectionner la quantité souhaitée pour autant d'articles ou services que nécessaire, quel que soit le fournisseur.</p><p><b>[01:05]</b> Je peux ensuite ramener ces articles dans ma demande d'achat pour poursuivre le processus d'approbation.</p><p><b>[01:12]</b> En résumé, nous avons vu comment les catalogues hébergés d'Esker peuvent aider nos clients à contrôler leurs dépenses non conformes sur les articles et services grâce à un processus simple et fluide. En orientant vos utilisateurs vers des articles et services pré-négociés auprès de fournisseurs clés, vous vous assurez que les objectifs budgétaires sont atteints et que les économies ciblées sont réalisées.</p>"},

  {f:"3 - Punch-Out Catalogs",t:"Punch-Out Catalogs",sz:"38.6",
trEN:"<p><b>[00:01]</b> Online shopping by consumers continues to increase year over year and is a common way to browse and purchase items. This trend also extends to businesses and organizations that need to acquire goods and services from their approved suppliers that have business catalogs or e-commerce capability.</p><p><b>[00:18]</b> External or punch-out catalogs allow users to seamlessly browse and select items directly from the Esker procurement module to facilitate the purchasing process. Let's take a look at how this works.</p><p><b>[00:30]</b> From the requisition form, users have the ability to select and browse punch-out catalogs which link to our customer's supplier sites. The difference from hosted or internal catalogs is that these external catalogs benefit from real-time prices and availability of items.</p><p><b>[00:46]</b> As a user, I'm utilizing a familiar interface and adding items to the cart to submit for approval. This brings the selected items back to the requisition form where they can also be combined with other items from different requisition types.</p><p><b>[00:59]</b> Here, predefined category information can drive key accounting details such as GL or cost center to streamline the accounting process.</p><p><b>[01:07]</b> By utilizing punch-out catalogs, organizations can recognize the benefits of real-time information on their contracted items without the need of catalog maintenance, and also increase their visibility into spending through key metrics and reports.</p><p><b>[01:21]</b> With Esker's Procurement module, users have the ability to stay within a singular platform for all their purchasing needs.</p>",
trFR:"<p><b>[00:01]</b> Les achats en ligne par les consommateurs continuent d'augmenter d'année en année et constituent un moyen courant de parcourir et d'acheter des articles. Cette tendance s'étend également aux entreprises et organisations qui doivent acquérir des biens et services auprès de leurs fournisseurs agréés disposant de catalogues professionnels ou de capacités e-commerce.</p><p><b>[00:18]</b> Les catalogues externes ou punch-out permettent aux utilisateurs de parcourir et sélectionner des articles de manière fluide directement depuis le module d'approvisionnement Esker, facilitant ainsi le processus d'achat. Voyons comment cela fonctionne.</p><p><b>[00:30]</b> Depuis le formulaire de demande d'achat, les utilisateurs ont la possibilité de sélectionner et parcourir les catalogues punch-out qui se connectent aux sites fournisseurs de nos clients. La différence avec les catalogues hébergés ou internes est que ces catalogues externes bénéficient de prix en temps réel et de la disponibilité des articles.</p><p><b>[00:46]</b> En tant qu'utilisateur, j'utilise une interface familière et j'ajoute des articles au panier pour les soumettre à approbation. Les articles sélectionnés sont ramenés dans le formulaire de demande d'achat où ils peuvent également être combinés avec des articles provenant d'autres types de demandes.</p><p><b>[00:59]</b> Ici, les informations de catégorie prédéfinies peuvent alimenter les détails comptables clés comme le compte GL ou le centre de coûts pour simplifier le processus comptable.</p><p><b>[01:07]</b> En utilisant les catalogues punch-out, les organisations bénéficient d'informations en temps réel sur leurs articles contractualisés sans avoir besoin de maintenir un catalogue, tout en augmentant leur visibilité sur les dépenses grâce à des métriques et rapports clés.</p><p><b>[01:21]</b> Avec le module d'approvisionnement d'Esker, les utilisateurs peuvent rester au sein d'une plateforme unique pour tous leurs besoins d'achat.</p>"},

  {f:"4 - Automatic Purchase Order Creation and Workflow",t:"Automatic PO Creation & Workflow",sz:"40.2",
